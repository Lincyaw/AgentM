project:
  name: llmharness
  description: |
    Cognitive-audit AgentM extension that supervises a running main agent
    via TurnEndEvent → child diagnostic session → BeforeAgentStart reminder
    injection. Persistence rides on the AgentM session entry tree; no file
    store, no subprocess CLI, no Claude Code hook protocol. Single SDK-native
    consumer of AgentSessionConfig + ExtensionAPI.

requirements:
  # ---------------------------------------------------------------------------
  # Core typed payloads (P0 — load-bearing for the audit loop)

  - id: REQ-001
    title: Event/Verdict/Reminder schema
    description: |
      Closed-enum types for event kinds and drift types; serializable Event,
      Verdict, Reminder dataclasses. Stable JSON shape — Verdict and Event
      payloads round-trip through the AgentM session entry tree
      (``api.session.append_entry``).
    priority: P0
    status: implemented
    code: [src/llmharness/schema.py]
    tests: [tests/test_smoke.py]

  # ---------------------------------------------------------------------------
  # Cognitive-audit pipeline (P0 — the entire feature)

  - id: REQ-016
    title: cards.py loader + cards_list/cards_get tools + axis_hint
    description: |
      Module exposing the 42 AFC cards as searchable tools to the
      cognitive-audit diagnostic agent (design: .claude/designs/llmharness-cognitive-audit.md §4.4).
      ``cards_list()`` returns one CardSummary per YAML on disk (id, name,
      axis_hint, one_line_mechanism). ``cards_get(card_id)`` returns the
      full CardFull payload; raises KeyError on unknown id. ``_AXIS_HINT``
      is curated in Python code, NOT a YAML field. Lazy load (no import-time
      I/O); cache after first call; ``LLMHARNESS_CARDS_ROOT`` env override
      supported. Coverage: all 42 cards across memory/reflection/planning/
      action/specification/inter_agent/verification/termination/cognitive/
      system_level/. Distribution: axis 1 = 13, axis 2 = 14, axis 3 = 13,
      None = 2 (AFC-0032 / AFC-0033 — pure infra failures).
    priority: P0
    status: implemented
    code: [src/llmharness/cards.py]
    depends_on: [REQ-001]

  - id: REQ-017
    title: AgentM adapter — TurnEnd trigger + BeforeAgentStart inject
    description: |
      V0 cognitive-audit adapter for AgentM-on-AgentM
      (design: .claude/designs/llmharness-cognitive-audit.md §4.5,
      single-file extension contract: extension-as-scenario.md §11).
      Module-level ``MANIFEST: ExtensionManifest`` (tier 1, api_version 1)
      declares two event subscriptions; ``install(api, config)`` registers
      them via ``api.on(...)``.

      On every ``TurnEndEvent.CHANNEL``, the adapter pulls the full
      conversation via ``api.session.get_messages()``, reads prior audit
      events and recent verdicts back from the session entry tree
      (``api.session.get_branch()`` filtered by entry type), spawns a child
      AgentM session via ``api.spawn_child_session(AgentSessionConfig(
      extensions=compose_extensions(...), provider=bridge_provider, ...))``,
      drives ``child.prompt(json_payload)`` to completion, parses the
      trailing JSON via ``RawAuditOutput``, appends events + verdict to the
      session tree via ``api.session.append_entry``, and on ``drift &&
      reminder && type is not None`` caches a single pending Reminder in
      adapter-local closure state.

      On ``BeforeAgentStartEvent.CHANNEL``, the adapter pops the pending
      reminder (if any) and *appends* its text to ``event.system`` in place
      with the configurable ``reminder_prefix`` (default ``\n\n[harness] ``).
      No reminder ⇒ no mutation. No throttling — design §5.1 mandates
      trigger on every TurnEndEvent.

      Plug-and-play config knobs (all optional): ``K_history_events``,
      ``N_recent_alerts``, ``child_purpose``, ``reminder_prefix``,
      ``prompt_override``, ``cards_tools_config``, ``observability_config``.
    priority: P0
    status: implemented
    code: [src/llmharness/adapters/agentm.py]
    tests: [tests/test_smoke.py]
    depends_on: [REQ-001, REQ-016, REQ-018]

  - id: REQ-018
    title: audit/ subpackage — diagnostic engine as Python (no scenario YAML)
    description: |
      The cognitive-audit diagnostic agent's prompt + extension list ships
      as a Python subpackage at ``src/llmharness/audit/``. Public surface:

      - ``audit.AUDIT_SYSTEM_PROMPT`` — the full system prompt body as a
        module-level string. Encodes the two-stage audit flow; step 10
        instructs the agent to terminate by calling ``submit_audit``.
      - ``audit.compose_extensions(prompt_override=, cards_tools_config=,
        observability_config=)`` — factory returning the canonical tuple
        list ``[(observability, {}), (cards_tools, {}), (submit_tool, {}),
        (system_prompt, {prompt: AUDIT_SYSTEM_PROMPT})]``. Pass ``None``
        for ``cards_tools_config`` / ``observability_config`` to drop those;
        ``submit_tool`` is mandatory.
      - ``audit.submit_tool`` — §11 extension that registers the
        ``submit_audit`` terminal tool. Its ``parameters`` JSON Schema
        carries the events + verdict shape; the LLM provider validates
        each call against it. Returning ``ToolTerminate`` ends the audit
        loop the moment the tool fires.
      - ``audit.RawAuditOutput`` / ``audit.RawAuditEvent`` — typed coercion
        of the ``submit_audit`` arguments dict into Verdict + Event.

      The adapter (REQ-017) drives the child via ``AgentSessionConfig(
      extensions=audit.compose_extensions(...))`` — no ``scenario=``
      argument, no YAML lookup, no cross-directory indirection.
    priority: P0
    status: implemented
    code:
      - src/llmharness/audit/__init__.py
      - src/llmharness/audit/prompt.py
      - src/llmharness/audit/extensions.py
      - src/llmharness/audit/output.py
      - src/llmharness/audit/submit_tool.py
      - src/llmharness/atoms/cards_tools.py
    tests: [tests/test_smoke.py]
    depends_on: [REQ-001, REQ-016]

