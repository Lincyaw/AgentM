id: AFC-0028
name: "Wrong-location fixation"
schema_version: 1
last_reviewed: "2026-05-07"

defect:
  class: cognitive_fault
  subclass: location_anchor
  mechanism: |
    Agent anchors on a wrong location / file / entity early in the
    trajectory and persists with it despite contrary evidence. Watson's
    case study `django-13401`: agent kept proposing fixes in
    `model_inheritance/tests.py` because it first wrote "issues likely
    originate from these subclasses", though the real fix was in
    `django/db/models/fields/__init__.py`. EAGER's SWE-Agent Localization
    Error (28%) is the same pattern in production scale.

activation:
  required:
    - "task involves localizing a target entity (file, function, button, page) among many candidates"
    - "agent's first hypothesis is incorrect"
  amplifying:
    - "salient surface keyword in the wrong location matches task statement"
    - "no re-localization step after initial commit"
  timescale: seconds

observable:
  metrics:
    - predicate: agent_state.target.fixated
      direction: up
      shape: step
  logs:
    - pattern: "every subsequent action targets a single fixed location even after that location's actions fail"
  traces:
    - pattern: "target-entity field across multiple actions has identical value despite failures"
  detection_difficulty: silent

downstream_effects:
  - predicate: trajectory.step.repeated
    confidence: high
    delay: seconds
  - predicate: outcome.task.failed
    confidence: high
    delay: minutes_to_hours

system_requirements:
  - has_component: localization_subtask

evidence:
  - source: "Watson (ASE 2025, arXiv 2411.03455) §IV-C case study django-13401"
    type: paper
    extracted_by: subagent_synthesis
    human_reviewed: true
  - source: "EAGER (arXiv 2603.21522) Table 1: SWE-Agent Localization Error 28.21%"
    type: paper
    extracted_by: subagent_synthesis
    human_reviewed: true

reproducibility:
  confirmed_in_chaos: false
