id: AFC-0014
name: "Action format error"
schema_version: 1
last_reviewed: "2026-05-07"

defect:
  class: action_fault
  subclass: action_malformed
  mechanism: |
    The agent emits an action whose syntax is invalid: malformed JSON,
    wrong tool name, missing required envelope, broken function-call
    arguments. The action is rejected by the runtime before it ever
    reaches the target tool. Visible / loud failure mode (parser error)
    but often masks an upstream planning fault.

activation:
  required:
    - "agent emits a structured action via a parser-validated channel"
    - "emitted string fails the parser schema"
  amplifying:
    - "complex schema with nested objects"
    - "rare tool whose schema differs from training-time exemplars"
  timescale: sub_second

observable:
  metrics:
    - predicate: trajectory.action.malformed
      direction: up
      shape: spike
  logs:
    - pattern: "JSON parse error on agent emission"
    - pattern: "tool runtime returns 'invalid action format'"
  traces:
    - pattern: "action span has parser-error annotation"
  detection_difficulty: easy

downstream_effects:
  - predicate: trajectory.step.repeated
    confidence: high
    delay: seconds
  - predicate: system.budget.exhausted
    confidence: medium
    delay: minutes_to_hours

system_requirements:
  - has_component: structured_action_protocol

evidence:
  - source: "AgentDebug (arXiv 2509.25370) §A.2 Table 2: Action.Format Error"
    type: paper
    extracted_by: subagent_synthesis
    human_reviewed: true

reproducibility:
  confirmed_in_chaos: false
