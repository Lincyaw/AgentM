id: AFC-0027
name: "Step / round limit exhausted"
schema_version: 1
last_reviewed: "2026-05-07"

defect:
  class: termination_fault
  subclass: budget_cap_hit
  mechanism: |
    Agent exhausts the runtime's hard step / round / token cap before
    producing a result. Usually a *symptom* of an upstream pattern
    (AFC-0011 inefficient plan, AFC-0012 no backtrack, AFC-0026
    unbounded loop) — but worth tracking distinctly because it's the
    cleanest observable in production: budget hit = task failed by
    definition.

activation:
  required:
    - "runtime enforces a max-step / max-round / max-token cap"
    - "agent's trajectory consumes the cap without emitting a final result"
  amplifying:
    - "tight cap relative to task complexity"
    - "any upstream plan-quality fault present"
  timescale: minutes_to_hours

observable:
  metrics:
    - predicate: system.budget.exhausted
      direction: up
      shape: step
  logs:
    - pattern: "runtime emits 'max steps reached' / 'token limit hit'"
  traces:
    - pattern: "trajectory length equals configured cap"
  detection_difficulty: easy

downstream_effects:
  - predicate: outcome.task.failed
    confidence: high
    delay: sub_second

system_requirements:
  - has_component: bounded_budget_or_deadline

evidence:
  - source: "AgentDebug (arXiv 2509.25370) §A.2 Table 2: System.Step Limit Exhaustion"
    type: paper
    extracted_by: subagent_synthesis
    human_reviewed: true
  - source: "AgentDebug Fig 11 ALFWorld: Step Limit 10/100 (top system mode)"
    type: paper
    extracted_by: subagent_synthesis
    human_reviewed: true
  - source: "EAGER (arXiv 2603.21522) Table 1: Round Limitation 17.24% AutoGen-Code, 5.26% RCLAgent"
    type: paper
    extracted_by: subagent_synthesis
    human_reviewed: true

reproducibility:
  confirmed_in_chaos: false
