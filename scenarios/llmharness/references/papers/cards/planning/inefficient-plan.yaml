id: AFC-0011
name: "Inefficient plan / wrong decomposition"
schema_version: 1
last_reviewed: "2026-05-07"

defect:
  class: planning_fault
  subclass: decomposition_inefficient
  mechanism: |
    The plan would eventually achieve the goal but is structurally
    wasteful: redundant subgoals, wrong granularity, illogical ordering,
    or a decomposition that ignores natural subproblem boundaries.
    Empirically the most common multi-agent failure mode (EAGER:
    AutoGen-Code 34% Decomposition Error). Often consumes the round
    budget and triggers AFC-0027 (step-limit exhaustion).

activation:
  required:
    - "agent emits a multi-step plan / task decomposition"
  amplifying:
    - "complex tasks with implicit subgoal structure (GAIA: 18/50 traj)"
    - "agent doesn't revisit the plan mid-trajectory (most decomp happens at step 1 only)"
  timescale: seconds

observable:
  metrics:
    - predicate: quality.decomposition.inefficient
      direction: up
      shape: monotonic_linear
    - predicate: trajectory.step.repeated
      shape: slow_ramp
  logs:
    - pattern: "agent revisits same subproblem with different framing"
    - pattern: "more steps used than minimal expert plan"
  traces:
    - pattern: "subgoal spans don't tile the task; overlap or leave gaps"
  detection_difficulty: medium

downstream_effects:
  - predicate: outcome.task.budget_exhausted
    confidence: high
    delay: minutes_to_hours
  - predicate: trajectory.step.repeated
    confidence: high
    delay: seconds
  - predicate: quality.plan.amplified
    confidence: high
    delay: minutes_to_hours

system_requirements:
  - has_component: planner_module

evidence:
  - source: "AgentDebug (arXiv 2509.25370) §A.2: Planning.Inefficient Planning — 48/200 trajectories (top mode overall)"
    type: paper
    extracted_by: subagent_synthesis
    human_reviewed: true
  - source: "AgentDebug §5.2 / Fig 8 p.9: 'Planning errors also contribute heavily, with constraint ignorance or infeasible strategies compounding as the agent attempts to execute them'"
    type: paper
    extracted_by: subagent_review
    human_reviewed: true
  - source: "EAGER (arXiv 2603.21522) Table 1: AutoGen-Code Decomposition Error 34.48%"
    type: paper
    extracted_by: subagent_synthesis
    human_reviewed: true
  - source: "AgentDiagnose (EMNLP demos.15) §3: 'task decomposition' competency, easiest to score (Pearson 0.78)"
    type: paper
    extracted_by: subagent_synthesis
    human_reviewed: true
  - source: "Who&When (arXiv 2505.00212) Appendix C.3 Figure 9 right-panel vignette: Magnetic-One Assistant proposes 'Step 2: Script for Direct Contact / gather contact information' instead of solving the question — concrete decomposition-error case"
    type: paper
    extracted_by: subagent_review
    human_reviewed: true

reproducibility:
  confirmed_in_chaos: false
