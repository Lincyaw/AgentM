id: AFC-0010
name: "Impossible action planned"
schema_version: 1
last_reviewed: "2026-05-07"

defect:
  class: planning_fault
  subclass: action_infeasible
  mechanism: |
    Plan includes a step that is physically or logically impossible
    given the current preconditions: open a non-existent file, click a
    non-existent button, take an action whose required precondition is
    not yet satisfied. This card is the *strict* irrecoverable case
    (no policy/budget can rescue it). ELPO's "first irrecoverable
    step" is a broader, *policy-relative* notion: under fixed rollout
    budget, no suffix completion from this prefix succeeds (ELPO §4.1
    / Algorithm 1 BEL). The strict case here is one sufficient (but
    not necessary) instantiation; AFC-0011, AFC-0012, AFC-0029 can
    also produce policy-relative irrecoverable steps under tight
    budgets.

activation:
  required:
    - "plan step references object / state that is not present at execution time"
  amplifying:
    - "stale observation snapshot used for planning"
    - "agent commits early to a strategy without checking preconditions"
    - "policy-relative: under fixed rollout budget, no suffix completion from this prefix succeeds (ELPO §4.1 BEL)"
  timescale: seconds

observable:
  metrics:
    - predicate: quality.plan.infeasible
      direction: up
      shape: step
    - predicate: trajectory.action.malformed
      shape: spike
  logs:
    - pattern: "tool returns 'object not found' / 'precondition failed' for the planned step"
  traces:
    - pattern: "plan step preconditions absent in current state span"
  detection_difficulty: easy

downstream_effects:
  - predicate: trajectory.step.repeated
    confidence: high
    delay: seconds
  - predicate: outcome.task.failed
    confidence: high
    delay: minutes_to_hours

system_requirements:
  - has_component: planner_module
  - has_component: structured_action_space

evidence:
  - source: "AgentDebug (arXiv 2509.25370) §A.2 Table 2: Planning.Impossible Action"
    type: paper
    extracted_by: subagent_synthesis
    human_reviewed: true
  - source: "AgentDebug Fig 11 ALFWorld: Impossible Action 12/100 (top-3 mode for that domain)"
    type: paper
    extracted_by: subagent_synthesis
    human_reviewed: true
  - source: "ELPO (arXiv 2602.09598) §1, Fig 1: 'first irrecoverable step' as the dominant failure-causing decision"
    type: paper
    extracted_by: subagent_synthesis
    human_reviewed: true

reproducibility:
  confirmed_in_chaos: false
