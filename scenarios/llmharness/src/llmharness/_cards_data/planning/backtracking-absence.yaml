id: AFC-0012
name: "Backtracking absence"
schema_version: 1
last_reviewed: "2026-05-07"

defect:
  class: planning_fault
  subclass: no_backtrack
  mechanism: |
    Once the agent commits to a path it cannot back out — or, more
    insidiously, *appears* to revise but only produces structurally
    isomorphic re-attempts (same algorithmic strategy with cosmetic
    variation). It never switches to a genuinely different branch,
    never revisits earlier states, and persists with a strategy that
    has already shown failure signals. Distinct from AFC-0011 (plan
    was inefficient from the start): here the *plan revision
    capability itself is missing*, even when the agent has direct
    evidence the current path is wrong. ELPO Appendix I (Figure 9,
    AIME-15): DemyAgent rewrites brute-force code multiple times
    after timeout, but each rewrite is the same brute-force strategy.

activation:
  required:
    - "agent encounters a step where the chosen path produces failure signals"
    - "either: no revision / retract / branch-switch step is taken; OR any revision produced is structurally isomorphic to the failed strategy (no algorithmic change)"
  amplifying:
    - "long-horizon tasks where committing late is more costly"
    - "system prompts that emphasize 'be decisive', 'don't second-guess'"
  timescale: seconds

observable:
  metrics:
    - predicate: quality.plan.no_backtrack
      direction: up
      shape: step
  logs:
    - pattern: "agent repeats the same failing approach with cosmetic variation"
  traces:
    - pattern: "no plan-rewrite / state-rollback span exists despite multiple failed sub-attempts"
  detection_difficulty: silent

downstream_effects:
  - predicate: trajectory.step.looped
    confidence: high
    delay: seconds
  - predicate: outcome.task.budget_exhausted
    confidence: high
    delay: minutes_to_hours

system_requirements:
  - has_component: multi_step_loop

evidence:
  - source: "AgentDiagnose (EMNLP demos.15) §3: 'backtracking & exploration' competency (hardest to score, Pearson 0.39)"
    type: paper
    extracted_by: subagent_synthesis
    human_reviewed: true
  - source: "ELPO (arXiv 2602.09598) Appendix I prose: 'repeats isomorphic but ineffective strategies' after first irrecoverable step"
    type: paper
    extracted_by: subagent_review
    human_reviewed: true

reproducibility:
  confirmed_in_chaos: false
