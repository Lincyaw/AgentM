id: AFC-0020
name: "Ambiguous request to peer"
schema_version: 1
last_reviewed: "2026-05-07"

defect:
  class: coordination_fault
  subclass: message_ambiguous
  mechanism: |
    Agent sends an under-specified request to a peer agent and proceeds
    on whatever the peer happens to interpret it as. The receiver fills
    the gap with a plausible default that may or may not match the
    sender's intent — and the sender doesn't issue a clarification
    round before consuming the response.

activation:
  required:
    - "agent emits a sub-request to another agent"
    - "request omits a parameter or constraint that materially affects the answer"
  amplifying:
    - "no clarification subprotocol"
    - "tight token budget that discourages back-and-forth"
  timescale: seconds

observable:
  metrics:
    - predicate: coordination.message.ambiguous
      direction: up
      shape: spike
  logs:
    - pattern: "peer's response addresses a different question than was asked"
  traces:
    - pattern: "request span lacks fields its grammar/spec recommends"
  detection_difficulty: silent

downstream_effects:
  - predicate: quality.observation.misread
    confidence: medium
    delay: seconds
  - predicate: outcome.task.failed
    confidence: medium
    delay: minutes_to_hours

system_requirements:
  - has_component: multi_agent
  - has_component: peer_request_protocol

evidence:
  - source: "AEGIS (arXiv 2509.14295) Appendix E.2 FM-2.2 'Make request ambiguous'"
    type: paper
    extracted_by: subagent_synthesis
    human_reviewed: true

reproducibility:
  confirmed_in_chaos: false
