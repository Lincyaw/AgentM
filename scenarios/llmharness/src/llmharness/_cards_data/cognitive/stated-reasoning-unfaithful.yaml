id: AFC-0036
name: "Stated-reasoning unfaithfulness"
schema_version: 1
last_reviewed: "2026-05-07"

defect:
  class: cognitive_fault
  subclass: reasoning_unfaithful
  mechanism: |
    The agent's verbalized reasoning (chain-of-thought, reflection,
    self-explanation) does not match the prompt components that
    actually drove the decision. Distinct from AFC-0008 (Reflection
    hallucination: invents events that didn't happen): here the events
    happened, but the agent's *self-report of why it acted* omits the
    prompt cues that statistically influenced the output. Watson §II-C
    cites Anthropic and Liao & Vaughan: "models exposed to subtle
    prompt cues would change their answers accordingly, but omit any
    mention of the cue when asked to justify their output." Watson
    §V-F: when surrogate and native reasoning diverge, in 95.5% of
    such cases (p < 10^-20, Fisher's exact) the answers differ —
    direct evidence that the verbalized chain is not the causal one.
    Breaks the entire premise of CoT-based debugging.

activation:
  required:
    - "agent emits a stated reasoning trace alongside its action / answer"
    - "an attribution-based check (PromptExp, integrated-gradients, ablation) shows top influential prompt components are absent or under-weighted in the trace"
  amplifying:
    - "fast-thinking decoding mode (no separate reasoning model)"
    - "RLHF-tuned models that learn 'safe' explanation styles"
    - "presence of subtle prompt cues (anchor numbers, framing words) that influence answer"
  timescale: seconds

observable:
  metrics:
    - predicate: agent_state.reasoning.unfaithful
      direction: up
      shape: spike
  logs:
    - pattern: "high-attribution prompt span has no mention in agent's reasoning trace"
    - pattern: "low-attribution prompt span dominates the agent's reasoning trace"
  traces:
    - pattern: "PromptExp top-n / bottom-n components vs surrogate trace alignment fails LLM-judge YES/NO check (Watson §III-D)"
  detection_difficulty: silent

downstream_effects:
  - predicate: agent_state.reflection.fabricated
    confidence: medium
    delay: seconds
  - predicate: outcome.task.failed
    confidence: low
    delay: minutes_to_hours

system_requirements:
  - has_component: cot_or_reflection_step
  - has_component: ability_to_run_attribution_or_surrogate_reconstruction

evidence:
  - source: "Watson (ASE 2025, arXiv 2411.03455) §II-C citing Anthropic + Liao & Vaughan + Chen et al. on unfaithful explanations"
    type: paper
    extracted_by: subagent_review
    human_reviewed: true
  - source: "Watson §V-F empirical fidelity check: 95.5% reasoning divergence when answers differ (p < 10^-20)"
    type: paper
    extracted_by: subagent_review
    human_reviewed: true

reproducibility:
  confirmed_in_chaos: false
