id: AFC-0041
name: "Rationalizing pseudo-backtrack"
schema_version: 1
last_reviewed: "2026-05-07"

defect:
  class: cognitive_fault
  subclass: motivated_rationalization
  mechanism: |
    When evidence directly refutes the working hypothesis, the agent
    does not abandon it. Instead it manufactures a low-probability
    auxiliary hypothesis whose role is precisely to make the
    contradictory evidence compatible with the original deduction.
    The trajectory therefore *appears* to engage with the refutation
    (a new node / claim is introduced) but functionally defends the
    failed branch — distinct from AFC-0012 (no-backtrack-attempt) where
    no revision happens at all. Distinct from AFC-0011 (inefficient
    plan): the plan is now actively wrong; the agent is *protecting*
    a falsified hypothesis against evidence rather than exploring
    alternatives. GoS example: X-ray rules out an ankle fracture; the
    agent doubles down with 'occult micro-fracture undetectable by
    X-ray' — a rare condition whose only function is to make the
    refutation toothless. Empirically, GoS reports 30.90% of its
    failures still exhibit this even with a state-machine forcing
    backtrack triggers, indicating the failure surfaces whenever the
    LLM lacks the domain knowledge to recognize that the evidence
    *should* count as refutation; structural enforcement alone does
    not solve it.

activation:
  required:
    - "current hypothesis has just received evidence that, on a domain-correct reading, refutes it"
    - "agent emits a new sub-hypothesis or qualifier whose adoption restores compatibility with the refuting evidence"
    - "the new sub-hypothesis has no independent support and is rare under domain priors"
  amplifying:
    - "specialized domains where rare exceptions exist for almost any rule (medicine, complex distributed-system failure modes)"
    - "instructions that reward 'confident final answer' over 'expressed uncertainty'"
    - "no external critic with veto power over the agent's own confidence updates"
  timescale: seconds

observable:
  metrics:
    - predicate: agent_state.hypothesis.defended_against_refutation
      direction: up
      shape: spike
    - predicate: quality.plan.no_backtrack
      direction: up
      shape: step
  logs:
    - pattern: "after a refuting tool result, the next agent message introduces a low-prior auxiliary hypothesis instead of switching branch"
  traces:
    - pattern: "ancestor hypothesis confidence does not decrease despite a refute-class evidence link being added downstream"
    - pattern: "newly added hypothesis node has zero supporting evidence beyond the act of saving the parent"
  detection_difficulty: silent

downstream_effects:
  - predicate: outcome.task.failed
    confidence: high
    delay: minutes_to_hours
  - predicate: trajectory.reasoning.misjudged
    confidence: high
    delay: seconds

system_requirements:
  - has_component: hypothesis_state_explicit
  - has_component: free_form_reasoning_step

evidence:
  - source: "GoS (ICML 2026, arXiv 2603.21250) §error analysis: 'Failed Backtracking' — 52.78% of baselines, 30.90% of GoS (residual after FSM)"
    type: paper
    extracted_by: subagent_synthesis
    human_reviewed: true
  - source: "GoS appendix prose: 'logical stubbornness — proposes ad-hoc, low-probability auxiliary hypotheses to force compatibility with the contradictory evidence'"
    type: paper
    extracted_by: subagent_synthesis
    human_reviewed: true
  - source: "Cross-ref AFC-0012 (backtracking-absence): AFC-0041 is the *defended* variant; AFC-0012 is the *omitted* variant"
    type: cross_ref
    extracted_by: subagent_synthesis
    human_reviewed: true

reproducibility:
  confirmed_in_chaos: false
