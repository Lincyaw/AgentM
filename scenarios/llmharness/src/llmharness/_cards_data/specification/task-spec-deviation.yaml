id: AFC-0016
name: "Task specification deviation"
schema_version: 1
last_reviewed: "2026-05-07"

defect:
  class: specification_fault
  subclass: task_spec_deviation
  mechanism: |
    Agent abandons or rewrites the task it was given. The model
    silently substitutes an adjacent / "more interesting" / "more
    achievable" task and executes that instead. The output may be
    high quality but answers the wrong question. AEGIS uses this as
    its FM-1.1 injection mode by rewriting the input prompt to "force
    the agent to abandon its task".

activation:
  required:
    - "agent receives a task spec and at least one decision step"
  amplifying:
    - "task spec is long / ambiguous / multi-objective"
    - "agent has prior strong preferences from training (alignment overrides)"
  timescale: seconds

observable:
  metrics:
    - predicate: agent_state.task.deviated
      direction: up
      shape: step
  logs:
    - pattern: "agent's first action targets a goal not stated in the task"
    - pattern: "agent's final summary does not address the original question"
  traces:
    - pattern: "task statement and final answer span have low semantic overlap"
  detection_difficulty: medium

downstream_effects:
  - predicate: outcome.task.failed
    confidence: high
    delay: minutes_to_hours

system_requirements:
  - has_component: task_specification_input

evidence:
  - source: "AEGIS (arXiv 2509.14295) Appendix E.2 FM-1.1 'Task specification deviation'"
    type: paper
    extracted_by: subagent_synthesis
    human_reviewed: true
  - source: "AEGIS Table 2: EM-1.1 = 2,310 instances (most frequent error mode in synthesized data)"
    type: paper
    extracted_by: subagent_synthesis
    human_reviewed: true

reproducibility:
  confirmed_in_chaos: false
