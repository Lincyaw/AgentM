id: AFC-0023
name: "Verification step skipped"
schema_version: 1
last_reviewed: "2026-05-07"

defect:
  class: verification_fault
  subclass: verification_skipped
  mechanism: |
    Agent never validates intermediate outputs against the task
    objective. Distinct from AFC-0024 (verification ran but accepted
    wrong work): here the verification step does not occur at all.
    Failures consequently propagate unchecked through downstream steps.

activation:
  required:
    - "task expects intermediate self-checks (or has explicit verification subgoals)"
    - "no self-eval / sanity-check span occurs in the trajectory"
  amplifying:
    - "system prompt that prizes speed over correctness"
    - "no built-in 'verify after each step' template"
  timescale: seconds

observable:
  metrics:
    - predicate: quality.verification.skipped
      direction: up
      shape: step
  logs:
    - pattern: "no 'check' / 'verify' / 'test' phrase in any reasoning span"
  traces:
    - pattern: "no validator tool call between produce-output and consume-output"
  detection_difficulty: easy

downstream_effects:
  - predicate: outcome.task.failed
    confidence: medium
    delay: minutes_to_hours

system_requirements:
  - has_component: multi_step_loop

evidence:
  - source: "AEGIS (arXiv 2509.14295) Appendix E.2 FM-3.2 'Remove verification steps'"
    type: paper
    extracted_by: subagent_synthesis
    human_reviewed: true
  - source: "AgentDiagnose (EMNLP demos.15) §3: 'self-verification' competency"
    type: paper
    extracted_by: subagent_synthesis
    human_reviewed: true

reproducibility:
  confirmed_in_chaos: false
