id: AFC-0042
name: "Coarse-granularity termination"
schema_version: 1
last_reviewed: "2026-05-07"

defect:
  class: termination_fault
  subclass: insufficient_granularity
  mechanism: |
    The agent terminates the investigation upon identifying a
    directionally correct but coarse-grained symptom, never drilling
    down to the actionable root cause. The final answer would receive
    a 'relevant but not match' partial-credit score: it points to the
    correct diagnostic family, but lacks the specific entity, mechanism
    or component that would enable mitigation. Distinct from AFC-0025
    (premature-termination): AFC-0025 stops *before the answer
    direction is right at all*; AFC-0042 stops *when direction is right
    but resolution is wrong*. Distinct from AFC-0027 (step-limit):
    the agent here terminates voluntarily, not because budget hit cap.
    GoS example: agent identifies 'Memory Fault' and stops, instead of
    locating the leaking service that triggered OOM and the scaling
    action it implies. GoS reports 63.89% of pooled baseline failures
    exhibit this vs. 18.75% of GoS — the FSM's drill-down trigger with
    explicit confidence-gap threshold δ and minimum-evidence threshold
    η measurably suppresses the failure mode by externalizing the
    'is this fine-grained enough?' decision out of the LLM's free
    judgment.

activation:
  required:
    - "task requires fine-grained root-cause output (not just diagnostic category)"
    - "agent's final answer matches the correct diagnostic family but not the specific root-cause entity"
    - "agent terminated voluntarily, not via step-budget exhaustion"
  amplifying:
    - "evaluation scheme that gives partial credit for direction-only answers"
    - "no explicit drill-down policy (granularity check) before termination"
    - "system prompts that reward 'concise final answer'"
  timescale: seconds

observable:
  metrics:
    - predicate: outcome.task.terminated_at_coarse_grain
      direction: up
      shape: spike
  logs:
    - pattern: "final answer is a category label (e.g., 'memory fault', 'database issue') rather than a specific entity-mechanism pair"
  traces:
    - pattern: "no drill-down or refinement span between last evidence retrieval and termination, despite coarse-grained final output"
  detection_difficulty: medium

downstream_effects:
  - predicate: outcome.task.failed
    confidence: medium
    delay: seconds
  - predicate: outcome.task.actionable
    direction: down
    confidence: high
    delay: seconds

system_requirements:
  - has_component: self_initiated_termination
  - has_component: hierarchical_root_cause_target

evidence:
  - source: "GoS (ICML 2026, arXiv 2603.21250) §error analysis: 'Early Stopping' — 63.89% of pooled baselines, 18.75% of GoS"
    type: paper
    extracted_by: subagent_synthesis
    human_reviewed: true
  - source: "GoS Match vs. Relevant metric design: a Relevant=1 case is a directionally correct but coarse-grained answer; the gap between Match and Relevant scores quantifies AFC-0042's prevalence"
    type: paper
    extracted_by: subagent_synthesis
    human_reviewed: true
  - source: "Cross-ref AFC-0025 (premature-termination): AFC-0025 = wrong direction, AFC-0042 = right direction wrong granularity"
    type: cross_ref
    extracted_by: subagent_synthesis
    human_reviewed: true

reproducibility:
  confirmed_in_chaos: false
