id: AFC-0032
name: "LLM API limit"
schema_version: 1
last_reviewed: "2026-05-07"

defect:
  class: system_fault
  subclass: llm_api_constraint
  mechanism: |
    LLM provider returns an API-level error: rate limit, context-window
    exceeded, model unavailable, request timeout, content-policy block.
    Agent itself is healthy but cannot make progress because the
    backbone model stops responding usefully. Often masquerades as
    other failures because the agent's last visible action is its
    pre-error step.

activation:
  required:
    - "agent issues a request to its LLM backbone"
    - "provider returns rate-limit / context-too-long / safety-block / 5xx"
  amplifying:
    - "long trajectory accumulates context near limit"
    - "high-throughput multi-agent systems hit RPM/TPM caps"
    - "task contains content the provider's safety classifier flags"
  timescale: seconds

observable:
  metrics:
    - predicate: system.llm_api.limit
      direction: up
      shape: spike
  logs:
    - pattern: "'rate_limit_exceeded' / 'context_length_exceeded' / 'content_policy_violation' from provider"
  traces:
    - pattern: "model response span is empty or contains provider error JSON"
  detection_difficulty: easy

downstream_effects:
  - predicate: outcome.task.failed
    confidence: high
    delay: sub_second

system_requirements:
  - has_component: llm_api_dependency

evidence:
  - source: "AgentDebug (arXiv 2509.25370) §A.2 Table 2: System.LLM Limit"
    type: paper
    extracted_by: subagent_synthesis
    human_reviewed: true

reproducibility:
  confirmed_in_chaos: false
