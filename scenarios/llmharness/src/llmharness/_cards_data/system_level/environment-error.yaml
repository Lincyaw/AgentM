id: AFC-0033
name: "Environment error"
schema_version: 1
last_reviewed: "2026-05-07"

defect:
  class: system_fault
  subclass: environment_break
  mechanism: |
    The simulator / environment / world model itself breaks expected
    rules: a network glitch, a simulator bug, a state-machine race in
    the host. Agent's behavior would have succeeded; the environment
    itself produced wrong observations or rejected valid actions.
    AgentDebug classifies these as 'not the agent's fault' but worth
    cataloging because they look like agent failures in surface metrics.

activation:
  required:
    - "agent operates inside a simulator / environment / OS"
    - "environment produces an observation or rejection that violates its declared spec"
  amplifying:
    - "concurrent processes touching shared environment state"
    - "simulator under heavy load"
    - "non-deterministic environments without seed pinning"
  timescale: seconds

observable:
  metrics:
    - predicate: system.environment.error
      direction: up
      shape: spike
  logs:
    - pattern: "simulator emits crash / inconsistent-state log"
    - pattern: "valid action returns 'invalid' from environment"
  traces:
    - pattern: "environment span has non-spec error annotation"
  detection_difficulty: medium

downstream_effects:
  - predicate: trajectory.step.repeated
    confidence: medium
    delay: seconds
  - predicate: outcome.task.failed
    confidence: high
    delay: minutes_to_hours

system_requirements:
  - has_component: environment_or_simulator

evidence:
  - source: "AgentDebug (arXiv 2509.25370) §A.2 Table 2: System.Environment Error"
    type: paper
    extracted_by: subagent_synthesis
    human_reviewed: true

reproducibility:
  confirmed_in_chaos: false
