name: rca
description: Root-cause analysis over parquet observability data via DuckDB SQL.
extensions:
  # Orchestrator-side: NO direct data tools. The lead investigator only
  # plans, dispatches workers, tracks hypotheses, and finalizes. SQL
  # tools live exclusively on worker sessions via ``inherit_extensions``
  # below — this forces the orchestrator to delegate instead of spinning
  # on ``query_sql`` until the turn budget runs out.
  - local: hypothesis_tools
  - module: agentm_rca.tools.finalize
  - module: agentm.extensions.builtin.artifact_store
  - module: agentm.extensions.builtin.observability

  # Multi-agent wiring. ``orchestrator_setup`` (scenario-local) loads the
  # orchestrator system prompt, appends the available-personas block, and
  # answers ``resolve_subagent`` for the personas under ``agents/``.
  - local: orchestrator_setup
  - module: agentm.extensions.builtin.sub_agent
    config:
      max_workers: 4
      inherit_extensions:
        - duckdb_sql
        - artifact_store
        - observability
      available_inherited_extensions:
        duckdb_sql:
          # Real importable path. The synthetic
          # ``agentm._scenarios.rca.duckdb_sql`` name only exists when the
          # orchestrator loads a ``local: duckdb_sql`` entry — and we
          # deliberately do NOT, so workers must import the real module.
          module: agentm_rca.tools.duckdb_sql
          config:
            exclude:
              - conclusion.parquet
            row_limit: 200
            token_limit: 5000
        artifact_store:
          module: agentm.extensions.builtin.artifact_store
          config: {}
        observability:
          module: agentm.extensions.builtin.observability
          config: {}
