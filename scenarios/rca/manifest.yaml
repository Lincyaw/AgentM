name: rca
description: Root-cause analysis with hypothesis tracking.
extensions:
  - module: agentm.extensions.builtin.tool_read
  - module: agentm.extensions.builtin.tool_grep
  - module: agentm.extensions.builtin.tool_find
  - module: agentm.extensions.builtin.tool_ls
  - module: agentm.extensions.builtin.tool_bash
  - module: agentm.extensions.builtin.system_prompt
    config:
      prompt: |
        You are doing root-cause analysis. Form hypotheses, gather evidence,
        record updates via the hypothesis_store tool. Iterate until you can
        explain the failure and propose a remediation.
  - module: agentm_rca.tools.hypothesis_tools
