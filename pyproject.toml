[project]
name = "agentm"
version = "0.1.0"
description = "AgentM - an agent framework"
readme = "README.md"
authors = [{ name = "Aoyang Fang", email = "aoyangfang@gmail.com" }]
requires-python = ">=3.12"
dependencies = [
    "langchain-core>=0.3",
    "langchain-openai>=0.3",
    "langchain-anthropic>=0.3",
    "pydantic>=2.0",
    "jinja2>=3.1",
    "pyyaml>=6.0",
    "tiktoken>=0.12.0",
    "duckdb>=1.4.4",
    "pytz>=2026.1.post1",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.34",
    "rich>=13.0",
    "typer>=0.15",
    "aiosqlite>=0.22.1",
    "python-dotenv>=1.2.2",
    "sentence-transformers>=3.0",
    "rcabench-platform[llm-eval]>=0.4.13",
    "sqlite-vec>=0.1.6",
    "mcp[cli]>=1.0",
]

#[tool.uv.sources]
#rcabench-platform = { path = "../proj/rcabench-platform", editable = true }

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-cov>=5.0",
    "mypy>=1.0",
    "ruff>=0.4",
    "types-pyyaml>=6.0.12.20250915",
]

[project.scripts]
agentm = "agentm:main"
vault-mcp = "agentm.tools.vault.mcp_server:main"

[project.entry-points."llm_eval.agents"]
agentm = "agentm.agents.eval_agent:AgentMAgent"

[build-system]
requires = ["uv_build>=0.10.9,<0.11.0"]
build-backend = "uv_build"

[tool.setuptools.package-data]
agentm = ["py.typed"]

# [tool.uv]
# index-url = "https://pypi.tuna.tsinghua.edu.cn/simple"
