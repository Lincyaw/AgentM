[project]
name = "agentm"
version = "0.1.0"
description = "AgentM - an agent framework"
readme = "README.md"
authors = [{ name = "Aoyang Fang", email = "aoyangfang@gmail.com" }]
requires-python = ">=3.12"
dependencies = [
    "langgraph>=0.3",
    "langchain-core>=0.3",
    "langchain-openai>=0.3",
    "pydantic>=2.0",
    "jinja2>=3.1",
    "pyyaml>=6.0",
    "tiktoken>=0.12.0",
    "duckdb>=1.4.4",
    "pytz>=2026.1.post1",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.34",
    "rich>=13.0",
    "typer>=0.15",
    "langgraph-checkpoint-sqlite>=2.0",
    "aiosqlite>=0.22.1",
    "langchain>=1.2.10",
]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-cov>=5.0",
    "mypy>=1.0",
    "ruff>=0.4",
]

[project.scripts]
agentm = "agentm:main"

[build-system]
requires = ["uv_build>=0.10.9,<0.11.0"]
build-backend = "uv_build"
