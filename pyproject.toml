[project]
name = "agentm"
version = "0.1.0"
description = "AgentM - an agent framework"
readme = "README.md"
authors = [{ name = "Aoyang Fang", email = "aoyangfang@gmail.com" }]
requires-python = ">=3.12"
dependencies = [
    "pyyaml>=6.0",
    "anthropic>=0.86.0",
    "python-frontmatter>=1.1.0",
]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-cov>=5.0",
    "mypy>=1.0",
    "ruff>=0.4",
    "types-pyyaml>=6.0.12.20250915",
    "types-tqdm>=4.66.0.20240417",
]

[project.scripts]
agentm = "agentm:main"

[build-system]
requires = ["uv_build>=0.10.9,<0.11.0"]
build-backend = "uv_build"

[tool.setuptools.package-data]
agentm = ["py.typed", "extensions/scenarios/*.yaml"]

[tool.uv.workspace]
members = ["scenarios/*"]
