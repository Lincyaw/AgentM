[project]
name = "agentm"
version = "0.1.0"
description = "AgentM - an agent framework"
readme = "README.md"
authors = [{ name = "Aoyang Fang", email = "aoyangfang@gmail.com" }]
requires-python = ">=3.12"
dependencies = [
    "pyyaml>=6.0",
    "anthropic>=0.86.0",
    "python-frontmatter>=1.1.0",
    "pathspec>=1.0.4",
    "typer>=0.25.1",
    "textual>=0.85",
]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-cov>=5.0",
    "mypy>=1.0",
    "ruff>=0.4",
    "types-pyyaml>=6.0.12.20250915",
    "types-tqdm>=4.66.0.20240417",
]

[project.scripts]
agentm = "agentm:main"

[build-system]
requires = ["uv_build>=0.10.9,<0.11.0"]
build-backend = "uv_build"

[tool.setuptools.package-data]
agentm = ["py.typed", "modes/*.tcss"]

[tool.uv.workspace]
members = ["scenarios/*"]
exclude = ["scenarios/plan_mode", "scenarios/trajectory_analysis"]

[tool.pytest.ini_options]
# UI tests exercise the Textual TUI; they pass but don't map to any
# fail-stop core position (per CLAUDE.md "Testing Philosophy" §1). Run
# them explicitly with ``pytest -m ui`` when touching the TUI.
markers = [
    "ui: tests for the Textual TUI rendering layer",
]
addopts = "-m 'not ui'"
