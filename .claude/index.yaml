  llmharness_cognitive_audit:
    description: "Two-phase cognitive-audit pipeline for the llmharness contrib extension (Lincyaw/AgentM issue #134), redesigned to v3 (2026-05-10). Static-analysis lens: trajectory is source code, extractor is lex+parse+type-check, the graph is the IR (closer to a PDG than a CFG), the auditor is the verifier. Phase 1 extractor LLM builds the graph by witness-required tool calls — register_event registers one event per ReAct cycle; add_edge constructs data/ref edges with literal cited_entities (data) or cited_quote (ref) verified at tool-call time after case+whitespace normalization; submit_extraction terminates the loop. Edges are first-class records, not embedded Event.refs. Witness retry budget = 2 per (src, dst, kind) tuple; on exhaustion the edge is dropped into extractor_partial without fail-stopping the firing. Phase 2 auditor consumes the validated graph plus advisory findings from scenario-registered checks (api.get_service('llmharness.audit_registry').register_check(...) — atom-only, never SDK-fixed); switches from full-payload to summary-only at audit_summary_threshold=30 events with on-demand drill-down via get_event_detail. The trust-asymmetry axiom (thought = testimony, tool_call/tool_result = evidence) is stated explicitly in both prompts. Verdict shape (surface_reminder + reminder_text + continuation_notes + matched_event_ids + cited_cards) is preserved from V2 — replacement is upstream of the auditor only. Public surface (Event sans refs / Edge / EdgeKind / Finding / api.audit registry) is breaking — rca-autorl backwards-compat explicitly waived."
    design: "designs/llmharness-cognitive-audit.md"
    related_concepts: [extension_as_scenario, pluggable_architecture, observability, single_file_extension_contract, audit_check_registry, per_task_evolution_loop, harness_runner]
    plans: ["plans/2026-05-10-llmharness-issue-134-redirection.md", "plans/2026-05-10-llmharness-issue-134-v3.md"]
    tasks: []

  harness_runner:
    status: proposed
    description: "Single driver for the llmharness cognitive-audit pipeline; collapses the duplicated implementations (`_drain_extractor`/`_drain_auditor` in adapters/agentm.py, `replay_extractor_record`/`replay_auditor_record` in replay/runner.py, plus the now-deleted `run_offline_auditor_over_control` in replay/strict_ab.py) of 'fold the op log + window the trajectory + compose the payload + invoke the child + persist the result'. Parametrised by two Protocols (ChildRunner for live `api.spawn_child_session` vs offline `run_phase_standalone`; OpSink for live `api.session.append_entry(AUDIT_GRAPH_OP, ...)` vs offline `InMemorySink` / `NoopSink`) and one in-memory state holder (CumulativeAuditState — folds GraphOp log on demand, threads recent_graph/recent_edges/next_event_id across firings; hydrate_from_session_log for live restart, fresh() for offline). Single public entry point HarnessRunner.on_trajectory_progress(messages, turn_count) owns cadence (extractor_interval, audit_interval) and returns a StepResult with both extractor_record and auditor_record populated even when the sidecar writer is None. Unlocks the user-facing fork-tree pipeline (`replay/fork_tree.py::run_fork_tree_experiment`, P6): a producer-consumer self-feeding work queue where consuming one ForkTask (a backbone rollout + `stop_on_first_surface=False` offline replay) emits a ForkNode and produces one child task per auditor surface — the parallel-universe tree (intervene vs continue) rather than the old single greedy chain. `replay_pipeline_over_trajectory(seed_cumulative=..., start_turn=...)` threads each parent node's CumulativeAuditState (`SurfaceFiring.cumulative_snapshot`, an independent deep copy taken at the surface) into its children; `write_fork_tree_replay` materialises one root-keyed `<root_sid>.chained.jsonl` with a `__fork_tree_header__` and per-record `extras{node_id, parent_node_id}`. Old linear chain = `surfaces[:1]` policy; star = `max_depth=1`. Three diff-testable acceptance invariants: (1) live ≡ offline equivalence on a fixed trajectory + same model — same sidecar byte-for-byte modulo ts_ns/uuid/LLM-nondet, proving windowing+payload composition exists in exactly one place; (2) single-firing replay is a degenerate case of fire_extractor_once with hydrate_from_replay_record; (3) sidecar is an artefact not a seed — runner never reads ReplayRecord. Migration: P1 live adapter rerouted through runner (wrappers preserve behaviour); P2 land replay_pipeline_over_trajectory + chain_replay reimplemented with cumulative threading; P3 collapse run_offline_auditor_over_control + replay_{extractor,auditor}_record become thin wrappers; P4 (superseded) wired baseline_fork to rca:baseline → rca:baseline; P5 (2026-05-24) replaced strict-A/B `baseline_fork` with N-segment `chained_fork` — `replay/strict_ab.py` deleted, `_HARNESS_VARIANT_TO_CONTROL` deleted, agentm_rca constructor narrowed to `chained_fork: bool` + `max_interventions: int`; P6 (2026-05-25) generalised the linear chain into the producer-consumer fork tree (`chained_fork.py` → `fork_tree.py`), added `OfflineRunResult.surfaces` / `SurfaceFiring` / `CumulativeAuditState.snapshot()`, fixed the cadence to step per agent turn not per message, and made the sidecar root-keyed + tree-shaped (`__fork_tree_header__`); `--ak chained_fork=true` retained (→ `max_depth`). Non-goals: cross-case state sharing, ReplayRecord schema changes, auditor verdict semantics (in-case parallelism is now structurally supported via the work queue's `max_workers`, default 1)."
    design: "designs/harness-runner.md"
    related_concepts: [llmharness_cognitive_audit, audit_check_registry, pluggable_architecture, sub_agent_lifecycle, observability, single_file_extension_contract, nested_session_task]
    plans: []
    tasks: []

  nested_session_task:
    status: implemented
    description: "Unifies the duplicated 'spawn a nested AgentSession, send one prompt, drive to completion, scrape its result' copies INSIDE llmharness onto one convenience helper layered over the api.spawn_child_session ABI seam. Initial hypothesis (three copies sharable across the sub_agent/llmharness package boundary) was half wrong: copies 2+3 (llmharness LiveChildRunner.run_{extractor,auditor} live + tools.engine.run_phase_standalone embedded) ARE the same single-shot shape and were genuinely duplicated; copy 1 (sub_agent._ChildTaskManager._run_child) only looked similar — it is an interactive, multi-turn, injectable driver over a PRE-spawned session with its own finalize/abort/artifact bookkeeping and a different (dict-tolerant, return_response-aware, newline-joined) collect contract, NOT a single-shot spawn-collect. Forcing it onto the shared helper would push injection-loop policy into the helper (rejected). So the real duplication was WITHIN llmharness. HOME decision: §11 forbids cross-contrib imports, so a helper shared by two PACKAGES must live in core; but the sole consumer is llmharness, so the two-package trigger never fires and 'keep core small / compose existing ABI in contrib' governs — run_child_task is composed entirely from public core.abi (spawn_child_session/AgentSessionConfig/messages), adding no core capability, so both child_collect + child_task live in llmharness (contrib), NOT core. (They were briefly placed in agentm.extensions on the sub_agent-will-consume assumption, then relocated when that was falsified.) Layering: api.spawn_child_session (core ABI, the real pluggability seam) < run_child_task (llmharness convenience, single-shot, terminal_tool knob: None->free-text, set->tool-arg) < ChildRunner Protocol (llmharness live/offline swap — LiveChildRunner over spawn_child_session, StandaloneChildRunner over create_agent_session; earns its keep, two impls + multiple consumers) < child_collect pure scrapers (flatten_assistant_blocks/terminal_tool_arguments/final_assistant_text/serialize_block — single replay-sidecar block-shape definition). run_child_task is a convenience layer, NOT a new pluggability axis (the axis is spawn_child_session itself); promote to a registered service (api.set_service/get_service, zero cross-package import) only if a real second in-session consumer with a swap need appears. sub_agent stays its own interactive driver over spawn_child_session — declined unification, not deferred. Core change: none (seam + create_agent_session already existed)."
    design: "designs/nested-session-task.md"
    related_concepts: [sub_agent_lifecycle, harness_runner, llmharness_cognitive_audit, pluggable_architecture, agent_loop, single_file_extension_contract]
    plans: []
    tasks: []

  audit_check_registry:
    description: "ExtensionAPI service that lets scenarios plug graph-health checks into the llmharness Phase-2 auditor. Registry lives at contrib/extensions/llmharness/src/llmharness/audit/registry.py (mechanism only — Check Protocol + CheckContext + AuditCheckRegistry). Concrete checks ship as one-file §11 atoms under llmharness/extensions/ (check_repeated_actions, check_open_branches, check_premature_conclusion as worked examples). Atoms call api.get_service('llmharness.audit_registry').register_check(check) from install(api, config). Idempotent on (name, id(check)); raising checks captured non-fatally; zero-checks → empty findings, no error. Fed into the auditor prompt as advisory findings; never gates the firing. Canonical example of 'scenario-registered behaviour through ExtensionAPI', the SDK-vs-scenario separation rule's preferred shape."
    design: "designs/llmharness-cognitive-audit.md"
    related_concepts: [llmharness_cognitive_audit, extension_as_scenario, pluggable_architecture, single_file_extension_contract]
    plans: ["plans/2026-05-10-llmharness-issue-134-v3.md"]
    tasks: []

  llm_native_judges:
    status: proposed
    description: "Architectural refactor of hypothesis_driven_rca's gate decision logic away from structural rules (regex on free-text verdict fields, mechanical observation→prediction→hypothesis chain-walks, literal worker_session_id equality, structural 'at least one negative prediction checked' rule) toward pluggable LLM judgment ports. First principle: structural enforcement is the wrong primitive for semantic judgments — the gate's job is to be the only writer, but its decision logic should be LLM judgment, not regex/structural rules. Three true invariants remain non-LLM: (1) typed graph state (data shape), (2) single-writer property (enforcement), (3) two-column WorkerReturn contract (interface). Everything else — what counts as satisfied / covered / independent / genuinely-falsified / explains — becomes Judge protocol calls. New Judge port: api.set_service('rca.judge.<kind>', impl); each judge is a §11 atom with config.mode: 'llm' | 'stub' (llm uses LLM tool_use for structured output, stub returns scripted verdicts for tests). Phase 2 ships 4 judges (judge.satisfied / judge.coverage / judge.independence / judge.falsified_genuinely) which together remove every regex/structural-rule branch in Phase 1's falsification gate. Downgrade-application semantics flip: gate returns UpdateResult.downgraded(suggested=..., applied_id=None) and the refine is NOT auto-applied — orchestrator decides next steps based on judge.reason. Failure modes: LLM failure / malformed structured output → retry-once → verdict='unclear' (first-class verdict, no structural fallback). Per-session LRU cache keyed by sha256(canonical_json(context)). N-small-judges over one-big-judge for: independent eval (per-judge data localizes the weak link), independent swap (§11 atom contract pays off), independent caching (higher hit rates on focused contexts). Future judges (Phase 3+) collapse §9/§10 features from hypothesis-driven-rca into the same Protocol: judge.find_contradiction (devil's advocate), judge.propose_alternatives (isolated hypothesis generator), judge.what_can_be_dropped (state-triggered compaction), judge.next_to_verify (information-gain scheduler replacement). Bias telemetry stops being separate machinery — every judge call writes inputs+verdict to observability JSONL, and telemetry is just queries over that stream. Acceptance: zero regex/string-matching in gate source (test_gate_no_regex.py greps the file); all 50 Phase 1 fail-stop tests pass with stub judges mounted (behavior preservation); each judge has both stub and llm modes tested; 10-case eval run against contrib/scenarios/rca/eval/ produces honest results report at contrib/scenarios/rca_hfsm/eval/phase2_results.md. Pass rate is NOT in the acceptance gate — Phase 2 ships the refactor + measurement; tuning is downstream."
    design: "designs/llm-native-judges.md"
    related_concepts: [hypothesis_driven_rca, pluggable_architecture, extension_as_scenario, single_file_extension_contract, per_task_evolution_loop, observability]
    plans: ["plans/2026-05-13-rca-hfsm-phase2-llm-native-judges.md"]
    tasks: []

  hypothesis_driven_rca:
    status: phase_1_landed
    description: "Methodologically disciplined RCA scenario built on the scientific hypothesis-verify cycle, sibling (not replacement) to contrib/scenarios/rca/. Three structural commitments that lift it above prompt-level guidance: (1) hypothesis lifecycle is a DAG of update operators (propose / confirm / refute / refine / split / merge / supersede / suspend), not confirm-or-refute binary — verifications produce graph mutations, not terminal verdicts; (2) Popperian falsification enforced at gate time, not asked for in prompts — confirm requires ≥1 satisfied negative prediction AND ≥1 independent positive check AND coverage of every unexplained symptom; refute requires either a triggered negative prediction or a failed steelman attempt; failing preconditions downgrade to refine instead of hard-erroring; (3) semantic structure (FSM: INTAKE/OBSERVE/HYPOTHESIZE/VERIFY/JUDGE/FINALIZE/BLOCKED) is orthogonal to context structure (sessions) — the scenario picks L1+L2+L3 layered context: L1 persistent HypothesisGraph + ObservationLog + SymptomSet survives all sessions; L2 orchestrator session contains only L1 derived views + recent hypothesis events (grows linear in cognitive operations, not tool calls); L3 worker sessions are ephemeral per-verification, briefed from L1, transcript discarded on return. Worker→Orchestrator contract is two-column: observations[] (facts, enter graph) vs interpretation (advisory, audit-only) — orchestrator re-derives the update from observations alone, structurally preventing 'worker uses rhetoric to replace evidence' bias. ObservationLog doubles as memoization keyed by tool_signature (idempotent tools only) so independent workers don't re-query. Anti-bias mechanisms tiered by cost: cheap and always-on = two-column return + falsification-framed briefs + blinded hypothesis identity + negative-prediction-required + information-gain verification scheduler + isolated hypothesis_generator session that doesn't see existing HypothesisGraph; heavyweight and gated to critical mutations (would trigger FINALIZE or close last open branch) = twin verifier with non-overlapping brief slices, devil's-advocate persona, tool-heterogeneous workers. Single-writer property: only rca_falsification_gate atom can mutate the graph (write API not exposed on the public store service). State-triggered compaction at JUDGE transitions provides semantically-justified compression rather than token-count truncation. New atoms (all single-file §11): rca_hgraph_store (session-state axis), rca_evidence_tools (tool-environment axis), rca_fsm_policy / rca_brief_builder / rca_falsification_gate / rca_bias_audit (policy axis). Reuses duckdb_sql, worker_skills, skill_loader, rcabench_contract, sub_agent from existing rca scenario; shares its eval/ suite for direct A/B comparison. No core changes, no new ExtensionAPI surface. Phased: Phase 1 = graph + gate + two-column contract + FSM + layered context (no compaction); Phase 2 = state-triggered compaction + independent corroboration + bias telemetry; Phase 3 = cross-trace skill learning + multi-incident memory + concurrent verification (parked until data demands them). Implementation target: contrib/scenarios/rca_hfsm/ (provisional name). Acceptance: 10 fail-stop scenarios covering negative-prediction requirement, confirm/refute gate downgrades, observation/interpretation separation, memoization, single-writer property, FINALIZE coverage, L2 sub-linear growth, independent-worker brief disjointness, hypothesis-generator blinding."
    design: "designs/hypothesis-driven-rca.md"
    related_concepts: [pluggable_architecture, extension_as_scenario, sub_agent_lifecycle, observability, llmharness_cognitive_audit, per_task_evolution_loop, single_file_extension_contract, agent_team, artifact_system]
    plans: ["plans/2026-05-13-rca-hfsm-phase1.md"]
    tasks: []

  gateway_channels:
    status: historical
    superseded_by: single_process_gateway
    description: "channels v0 (in-process). HISTORICAL — deprecated in Phase 4 (2026-05-11) by client_server_architecture; both v0 and v1 fully retired by single_process_gateway (v2, 2026-05-28). Original v0 shape: long-running daemon (contrib/channels/) that mediates between chat platforms (Feishu today; Slack/Telegram/WeChat tomorrow) and per-(channel, chat_id) AgentSessions. Two-queue MessageBus decouples channels from gateway: channels publish InboundMessage, gateway publishes OutboundMessage, ChannelManager dispatches. Typed wire format — OutboundKind enum (MESSAGE / TURN_COMPLETE) avoids magic-metadata-string dispatch; typed Button dataclass avoids list[list[str]] + label string-matching. Cross-loop safety centralized in MessageBus._publish (lark_oapi WS client dispatches on a foreign asyncio loop in a background thread — naive queue.put silently drops; bridge via call_soon_threadsafe). BaseChannel ABC contract is small (start/stop/send + opt-in send_delta) with _handle_message helper enforcing allow_from. ApprovalBridge is the channel-agnostic HITL gate: hooks ToolCallEvent, posts typed Buttons, identity-checks sender_id, owns private encoding of button value. Gateway routes by session_key (defaults to channel:chat_id; channels can override for thread scoping). Per-inbound asyncio.create_task so a route blocked on an approval future cannot stall button-click routing. v0 in-process channels still load (StubChannel exempt) but emit DeprecationWarning; the `channels:` yaml block additionally prints an agentm-gateway stderr warning at startup. Deleted entirely (not merely deprecated) in v2 rewrite."
    design: "designs/historical/gateway-channels.md"
    related_concepts: [pluggable_architecture, command_routing, extension_as_scenario, client_server_architecture, single_process_gateway]
    plans: ["plans/2026-05-11-gateway-command-layer.md"]
    tasks: []

  client_server_architecture:
    status: historical
    superseded_by: single_process_gateway
    replaces: [gateway_channels]
    description: "Peer-mesh chat substrate (channels v1 + agent mesh + durable delivery). HISTORICAL — superseded by single_process_gateway (v2, 2026-05-28). v1 introduced the daemon/worker process split: gateway becomes a routing bus with declared peer_kinds (chat_client, agent_worker, control), wire is length-prefixed JSON, envelope {v,id,kind,ts,body,to?,correlation_id?,hops?,root_session_key?}, addressing via chat://channel/chat_id / session://session_id / peer://peer_id / kind://peer_kind, durable outbox per peer (SQLite WAL, pipelined push, exponential backoff, dead-letter), at-most-once inbound via ack-on-process ledger, catch-up batching via delivery_batch on reconnect, OutboxStore/InboxLog Protocols for pluggable backends, distributed agent workers (sessions live in workers, gateway routes by scenario/model capability), agent-to-agent via tool_peer_send atom (fire-and-forget durable, wait_for_reply RPC-style with hops loop guard), approvals forwarded to root_session_key chat. The v1 abstractions are dropped in v2 because the codebase's actual use case (single user / small team / single host) does not exercise the isolation, distribution, or zero-SDK-coupling properties they bought; instead v2 collapses to a single gateway process holding all sessions in memory, with chat clients as separate processes solely for vendor SDK isolation. Outbox/Inbox Protocols and the wire protocol carry over to v2 essentially unchanged — those are the parts that earned their rent."
    design: "designs/historical/client-server-architecture.md"
    related_concepts: [gateway_channels, command_routing, pluggable_architecture, single_process_gateway]
    plans: ["plans/2026-05-11-gateway-client-server.md"]
    tasks: []

  single_process_gateway:
    replaces: [client_server_architecture, gateway_channels]
    description: "channels v2. Single-process gateway: one agentm gateway daemon holds all sessions in memory and serves all chat-client peers. Wire protocol exists only for chat-client vendor SDK isolation (lark_oapi, Textual). No separate worker process — earlier daemon/worker split carried v1 abstractions whose isolation/distribution properties were not actually needed at this codebase's scale. Daemon imports agentm.core directly. Sessions live as dict[session_key, AgentSession] in daemon memory; persistence via ChatSessionMap (session_key → session_id) for crash recovery only. session_key is chat-client-computed (channel:chat_id default, optionally thread_id/sender_id), opaque to gateway. wire_driver atom (~80 LoC, §11 contract) is the only new code: translates session events to outbound envelopes via api.set_service / api.get_service / @api.on. peer_send is removed (not ported): no users, and its same-process wait_for_reply semantics are a redundant sibling of sub_agent; cross-peer/a2a messaging is out of scope until a concrete need appears. sub_agent works unchanged (child sessions in same dict). Three pluggability Protocols: OutboxStore, InboxLog, Authenticator — all with default impls, no hidden optional-method surfaces. Seven wire kinds (down from 11): hello/welcome, inbound/outbound, ack, ping/pong, error. Envelope is minimal: v, id, kind, ts, session_key, scenario, body; routing primitives (to/correlation_id/hops/root_session_key/session_id) all deleted because there's no cross-process routing. No worker pool, no spawn-on-demand, no inactivity timeout, no --resume normal path, no --inproc-worker mode. Approval: same-process Future map in ApprovalManager; identity check against original requester's sender_id; chat-client renders card. Commands: /help, /status synthesised locally; /new shuts down session keeping ChatSessionMap (next message resumes from transcript); /end shuts down + clears map (fresh session); /skill:X and /<markdown> expanded server-side and fall through to session; /atom:install/uninstall mutates session atom registry directly. CLI: agentm gateway subcommand alongside existing agentm prompt and agentm trace; agentm-feishu and agentm-terminal stay as separate binaries (vendor SDK isolation only); agentm-worker deleted. Single-jump rewrite — no compat with v0 or v1; v1 hello → error{unsupported_wire_version}. Fail-stop test set is ~40 tests covering wire round-trip, outbox/inbox semantics, Router three-case dispatch, SessionManager get_or_create + resume, CommandRouter handler classes, ApprovalManager identity check + timeout, wire_driver atom translation, auth, wire version negotiation."
    design: "designs/single-process-gateway.md"
    related_concepts: [pluggable_architecture, command_routing, single_file_extension_contract, sub_agent_lifecycle, session_inbox]
    plans: ["plans/2026-05-28-single-process-gateway.md"]
    tasks: []

  command_routing:
    description: "Slash command layer for the gateway. User-typed messages starting with '/' are intercepted before reaching the LLM — control commands mutate gateway/session state, prompt commands expand a template and fall through to session.prompt(). Unknown commands are rejected (never forwarded to model). Four handler kinds under one CommandHandler Protocol: BuiltinControl (Python in commands/builtins/), MarkdownPrompt (cwd/.agentm/commands/*.md with frontmatter+$ARGUMENTS), SkillCommand (auto-generated from skill directories; expands SKILL.md as one-turn injection), AtomCommand (PR #2; MANIFEST opt-in via mountable_via_command + gateway whitelist; mounts/unmounts atoms against a per-session runtime scenario overlay copied from contrib/scenarios/<name>/manifest.yaml into <state_dir>/scenarios/<session_key>/ so kernel mutations never touch source files). Namespacing: /name for builtin/markdown, /skill:name and /atom:name for the others — provenance visible in /help. Discovery is data-driven for non-builtin kinds (filesystem walk, MANIFEST lookup). Parallels Claude Code's slash-command + skill + plugin design but keeps AgentM's atom concept explicit and auditable (every mount produces a catalog event via self_modifiable_architecture's existing reload primitive)."
    design: "designs/command-routing.md"
    related_concepts: [gateway_channels, pluggable_architecture, self_modifiable_architecture, single_file_extension_contract]
    plans: ["plans/2026-05-11-gateway-command-layer.md"]
    tasks: []

  mcp_integration:
    status: draft
    description: "MCP (Model Context Protocol) client bridge as a package-form contrib atom at contrib/extensions/mcp_bridge/. Talks the MCP wire via the official `mcp` Python SDK (stdio + streamable-HTTP transports; SSE / prompts / resources / sampling deferred). Lives on the Tool Environment pluggability axis — no new ABI. `install(api, config)` is async: connects every configured server, calls tools/list ONCE per server (install-time snapshot), wraps each remote tool as an MCPTool registered via api.register_tool with name mcp__<server>__<tool>, publishes an MCPSessionManager via api.set_service('mcp', manager) for follow-up atoms to reuse, and subscribes SessionShutdownEvent for transport teardown. Snapshot semantics chosen over runtime discovery — aligns with AgentM's freeze/atom-hash model; any connect or schema failure raises so partial tool sets never reach the catalog; `notifications/tools/list_changed` is intentionally ignored (logged then discarded; users restart the session to pick up new tools). MCPTool.execute races call_tool against both the cancellation signal and a configurable timeout (`timeout_seconds`, default 30s) so a hung server cannot stall the loop. ${VAR} interpolation in server config reads from os.environ for header/env secrets. Permission integration is deny-by-default — scenarios must explicitly allow mcp__* prefixes (not auto-registered by the bridge). Test seam is module-level (set_test_session_factory) so the public config schema stays clean. Ships with contrib/scenarios/mcp_demo/ as a smoke-test composition over general_purpose. NOT enrolled in the default scenario."
    design: "designs/mcp-integration.md"
    related_concepts: [pluggable_architecture, extension_as_scenario, single_file_extension_contract]
    plans: []
    tasks: []
