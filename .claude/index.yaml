        layer: "L1 — Deterministic Invariants"

  memory_system:
    description: "Two-layer memory: intra-task (context compression via CompressionMiddleware, see orchestrator.md) and cross-task (trajectory_analysis scenario with trajectory-analysis skills writing to vault, see trajectory-analysis.md)"
    design: "designs/orchestrator.md"
    related_concepts: [orchestrator, trajectory_system, memory_vault, trajectory_analysis]
    related_designs: ["designs/trajectory-analysis.md"]
    plans: ["plans/2026-03-09-compression-recall-memory.md"]
    tasks: []

  trajectory_analysis:
    description: "Skill-driven trajectory analysis scenario. Agent Skills spec (SKILL.md + references/ + examples/) in vault under skill/trajectory-analysis/. Three-tier progressive disclosure: catalog → SKILL.md → references/. Model-driven or config-driven skill activation. Uses generic state via Scenario protocol, two phases (analyze → synthesize)."
    design: "designs/trajectory-analysis.md"
    related_concepts: [system_architecture, memory_system, memory_vault, scenario_protocol, configuration_system]
    plans: ["plans/2026-03-24-trajectory-analysis.md"]
    tasks:
