# AgentM Concept Index
# Maintenance rules: see CLAUDE.md "Design Documentation System"

concepts:
  # === ACTIVE ===
  # Live v2 architecture concepts. Edit these as the design evolves.

  pluggable_architecture:
    description: "First-principles pluggable architecture. Unreplaceable-substrate axiom: the only thing that cannot be a replaceable extension is the act of loading replacements itself; anything else — including defaults — lives as an atom that the substrate loads. Three-layer package boundary collapses harness back into core: agentm.core (substrate: abi + runtime + lib; AgentSession/EventBus/SessionManager/Loader live here) / agentm.extensions (atoms, including default policy impls like operations_local, llm_<provider>, session_state_memory) / agentm.cli (+ embedded SDK / future HTTP/RPC presenters). agentm.harness and agentm.llm as separate packages are dissolved; providers become atoms. Five pluggability axes as Protocol ports in core.abi: StreamFn (LLM), Tool+Operations (env; Operations registered by an atom via api.register_operations, not constitution-only), SessionManager/SessionStore (state), ResourceLoader (project context), EventBus+ExtensionAPI plus RetryPolicy (policy). Substrate provides register_* hooks and asserts at freeze time that required services exist; it never instantiates a default itself. The Jupyter-import contract is restated as 'zero side effects at import', not 'runtime classes excluded from core'."
    design: "designs/pluggable-architecture.md"
    related_concepts: [agent_loop, extension_as_scenario, operations_ports, observability, self_modifiable_architecture, evolution_substrate, git_backed_versioning, textual_tui, runtime_context_atom]
    plans: [plans/2026-05-09-issue-80-abi-prep.md]
    tasks: ["tasks/2026-05-09-issue-85-session-refactor.md", "tasks/2026-05-09-issue-87-builtin-atoms-extension-api.md", "tasks/2026-05-09-issue-89-file-tool-io-seams.md", "tasks/2026-05-09-issue-93-llm-stream-common.md", "tasks/2026-05-09-issue-94-provider-registry.md", "tasks/2026-05-09-issue-92-retry-policy.md", "tasks/2026-05-09-issue-96-cli-provider-session-seams.md", "tasks/2026-05-09-issue-95-wire-policy-leaks.md", "tasks/2026-05-09-issue-98-textual-tui-registries.md", "tasks/2026-05-09-issue-119-core-kernel-residuals.md"]

  agent_loop:
    description: "Per-turn termination protocol for AgentLoop.run, expressed as sum types. ToolOutcome (ToolContinue|ToolTerminate) is what tools return; TerminationCause is a sealed hierarchy describing WHO ended the loop and WHY (ModelEndTurn, ToolTerminated{tool_name,reason}, MaxTurnsExhausted, SignalAborted, ProviderTruncated{kind}, ProviderProtocolViolation{detail}, BudgetExhausted), with a class-var `final` that controls override semantics. LoopAction (Step|Stop(cause)|Inject(messages)) is what the kernel does next. Single decide_turn_action event fires every turn (including kernel-imposed terminations, for symmetric observability) carrying a TurnObservation snapshot; extensions return LoopAction|None to override. Resolution lattice: final causes shadow everything; otherwise Inject>Stop>Step with Inject messages concatenated in registration order. Replaces the old multi-flag (assistant.stop_reason + tool_calls presence + BeforeAgentEndEvent.stop_reason + cancel/append dict) protocol that silently masked provider/parser disagreements and buried multi-handler resolution rules in folklore comments. Hard-cut migration in PR #58 (no shims): tools wanting to terminate return ToolTerminate; before_agent_end handlers move to decide_turn_action returning Inject(messages=[...])."
    design: "designs/agent-loop.md"
    related_concepts: [pluggable_architecture, sub_agent_lifecycle, observability, extension_as_scenario, session_inbox]
    plans: [plans/2026-05-09-issue-80-abi-prep.md]
    tasks: ["tasks/2026-05-09-issue-86-atom-rework-infra.md", "tasks/2026-05-09-issue-119-core-kernel-residuals.md"]

  session_inbox:
    description: "ACCEPTED (design resolved 2026-05-28; implementation starting step 1). One first-class SessionInbox as the single entry point for EVERY message that enters the agent loop — user input, background-task completion, ticker status, monitor/wakeup fires, subagent findings, cross-agent messages. Motivated by four requested affordances (per-tool-call foreground/background, auto-background after ~60s, ticker status report, agent-defined monitor/scheduled-wakeup — mirroring Claude Code's Bash run_in_background / BashOutput / Monitor / ScheduleWakeup) that all reduce to ONE question: how does an out-of-band event become a message inside the loop. The only clean seam today is decide_turn_action → Inject (abi/loop.py:599-620). Two orthogonal concepts must not be conflated: (A) background WORK = a tool/subagent running as an asyncio.Task while the agent keeps taking turns (sub_agent already proves this — dispatch spawns create_task + immediate ticket at sub_agent.py:737, polls via check_tasks/wait_subagent, injects via inject_instruction, aborts via signal, and a decide_turn_action floor refuses termination with unread findings at :834); (B) out-of-band SIGNAL injection = how that event lands as a message. Everything funnels through the inbox. InboxItem carries a mechanism-level `source` routing enum (user/background/ticker/monitor/subagent — objective plumbing, not a subjective classification, so it does not violate the no-preset-enums rule) deciding whether it lands as UserMessage / synthetic tool_result / system-reminder note, plus an optional dedup_key. CORE MODEL = one entry + one driver, kept orthogonal: ENTRY (how a message gets in) is always inbox.push; DRIVING (who runs the loop, how a caller learns 'this round finished') is always a single driver (no re-entrant AgentLoop.run). prompt() does NOT bypass the inbox or grab its own driver — it is sugar = push(source=user) + await the next agent_end + return messages, so CLI/SDK `messages = await session.prompt(...)` still works. One-shot CLI = start driver → push → await agent_end → close → exit; long-lived host may use prompt OR inbox.push + bus subscription (same mechanism, two usages, NOT two APIs). A runtime-owned (not atom) decide_turn_action handler drains at each turn boundary, renders per source, returns Inject — NO change to kernel AgentLoop. The drain rule GENERALIZES sub_agent's floor: at a turn boundary, inbox non-empty ⇒ drain+Inject+keep running instead of Stop ('unread findings' = special case 'finding landed in inbox'); final=True causes (budget/signal/max_turns) still hard-win. Completion boundary: prompt awaits real Stop+agent_end (inbox empty AND ModelEndTurn); floor re-runs emit no agent_end so prompt never returns early; well-defined under low-concurrency CLI, fuzzy under multi-source host where callers use push+subscribe. The earlier 'optional kernel Park' is ABSORBED by the driver's wait_nonempty (kernel loop stays pure 'one round to idle then return'; staying-alive lives in the driver's outer while). Routing user input through the inbox collapses prompt()/tick() (kills near-duplicate session.py:242-406), unifies idle-wakeup, and gives PENDING user input while the agent runs. send_user_message becomes a thin inbox.push(source=user) wrapper (ABI-compatible); pending_user_messages deleted. Inbox items are append-only new messages (prefix-cache friendly); ephemeral reminders still ride the last-message tail and do NOT go through the inbox. Producers are pure single-file atoms: background_exec (wraps api.tools; auto-backgrounds via asyncio.wait(timeout=60) leaving the task running and returning a ticket as the immediate tool_result, real result arrives later as an inbox item; check_background/wait_background/cancel_background) and monitor (schedule_wakeup/create_monitor/list_monitors/cancel_monitor). sub_agent's registry+completion-injection extracted into core.lib (§11 forbids atom→atom import) so both background_exec (unit=coroutine) and sub_agent (unit=child session) sit on it; sub_agent's bespoke floor DELETED in favour of the generalized inbox rule; subagents get loop/monitor for free since a child is a full session loading the same atoms (recursion); inject_instruction IS SendMessage. One-shot `agentm \"<prompt>\"` (cli.py:530 asyncio.run-then-exit) is the WRONG home for tickers/monitors. RESOLVED DECISIONS: (1) default cooperative turn-boundary pending; interrupt key = abort turn via signal (abi/loop.py:440,667) + preserve context + resume with new input via inbox; (2) ticker = milestone-driven (completion/error/new-output/silence-warning) + sparse heartbeat fallback, dedup_key REPLACES same-key undrained item (never stacks); (3) one entry + one driver + prompt-as-sugar, no dual API, no separate Park, floor generalized; (4) FIFO no priority (drain-all injected as one arrival-ordered batch); (5) undrained-window persistence MVP none (transient signals regenerate on restart; items hit session log only once drained via message_persisted; TODO). IMPLEMENTATION ORDER: 1 spine (SessionInbox + runtime drain handler + single driver + prompt/tick collapse + send_user_message wrapper + delete pending_user_messages; does NOT touch sub_agent, floors coexist via Inject concatenation abi/loop.py:317); 2 extract sub_agent registry→core.lib + route findings through inbox + delete floor; 3 background_exec; 4 monitor; 5 long-lived host driver + interrupt-and-resume."
    design: "designs/session-inbox.md"
    related_concepts: [agent_loop, sub_agent_lifecycle, sub_agent, nested_session_task, extension_as_scenario, pluggable_architecture, client_server_architecture]
    plans: []
    tasks: []

  self_modifiable_architecture:
    description: "Boundary refinement of pluggable_architecture: core/extensions split is drawn by 'what an agent can safely self-modify' rather than mechanism vs policy. Constitution layer is uniform on the modifiability axis (none of core/ is agent-modifiable) but split on the visibility axis into core/abi/ (types & Protocols, atom + llm import), core/lib/ (pure-function utilities, atom imports as stdlib), and core/_internal/ (stateful subsystems — skills, prompt_templates, catalog/, compaction engine — atoms reach exclusively via ExtensionAPI services: api.get_operations / api.skills / api.catalog / api.compaction (prompt registry now via api.get_service('prompt_templates')). The earlier operations_impl module was promoted to the operations_local atom (extensions/builtin/operations_local.py) — Stage 1 of pluggable_architecture §10; direct import forbidden by validator). Autonomy layer holds atoms + scenarios + skills + prompts (tier-1 free / tier-2 reviewable). Discovery layer = fs scan + reload + assert_active. Adds versioned ExtensionAPI (api_version with grace window), transactional reload (validator → snapshot → install → rollback on failure), and a new ExtensionAPI surface (reload_atom, freeze_current, list_atoms, is_constitution_path). Tier-2 atoms (permission, cost_budget, tool_filter, llm_compaction) require propose_change approval to reload. Compaction prompts are the canonical mechanism→policy split: prompt strings moved out of core into the llm_compaction atom, engine in core/_internal/compaction/ takes prompt as a required parameter. Establishes that change is safe and atomic; evolution-substrate.md establishes that change is evidence-driven; per_task_evolution_loop establishes WHO drives the change (a tuner meta-scenario optimizing for a specific task class)."
    design: "designs/self-modifiable-architecture.md"
    related_concepts: [pluggable_architecture, extension_as_scenario, single_file_extension_contract, observability, evolution_substrate, git_backed_versioning, per_task_evolution_loop]
    plans: [plans/2026-05-09-issue-80-abi-prep.md]
    tasks: ["tasks/2026-05-09-issue-79-atom-reloader-hardening.md", "tasks/2026-05-09-issue-86-atom-rework-infra.md", "tasks/2026-05-09-issue-89-file-tool-io-seams.md", "tasks/2026-05-09-issue-101-tool-catalog-split.md", "tasks/2026-05-09-issue-120-harness-reload-dedup.md"]

  evolution_substrate:
    description: "Constitution-owned data layer that binds every (atom, scenario) version to all observation data generated under it, so rollback / composition / optimization become evidence-driven, not error-driven. Adds .agentm/catalog/{atoms,scenarios}/<hash>/ with frozen source + manifest.yaml + metrics.jsonl + runs/ + decisions.jsonl. Active-set fingerprint in every observability session.start header binds traces to the exact loaded version set. Indexer (constitution-layer, idempotent, rebuildable from raw observability) aggregates per-(atom_hash, scenario, task_type) statistics. tool_catalog atom (tier-1 read API) exposes list_versions / get_manifest / runs_for / get_source_at / list_history / rollback_resource. Hard problems addressed: statistical power (CI + inconclusive enforcement), confounding (experiment-mode lock), Goodhart (universal guard metrics + regressed flag), replayability (LLM response cache, Phase 3), catalog corruption (constitution-layer write-protect on .agentm/catalog/**). Phased: MVP = fingerprint + freeze + browse; Phase 2 = compare + decisions; Phase 3 = replay cache + experiment lock. NOTE: per per_task_evolution_loop (2026-05-02), §6 compare/find_best are demoted to optional — the tuner agent in that loop does its own LLM-native analysis on raw observability JSONL; catalog metrics.jsonl stays as cross-scenario browsing index, not on the decision path."
    design: "designs/evolution-substrate.md"
    related_concepts: [self_modifiable_architecture, observability, pluggable_architecture, extension_as_scenario, git_backed_versioning, per_task_evolution_loop]
    plans: []
    tasks: []

  per_task_evolution_loop:
    description: "Operational shape of self-modification: optimization target is a task class, not a user. A production agent runs the task; a separate tuner agent (a meta-scenario at scenarios/<name>/tuner/) reads observability JSONL traces filtered by (task_class, fingerprint), proposes mutations to atoms / prompts / scenario composition, validates them against a pinned eval set, and activates winners that beat the baseline on the scenario's primary metric without guard regression. Three load-bearing reframes: (1) JSONL is the source of truth — tuner reads raw .agentm/observability/<trace>.jsonl directly; catalog metrics.jsonl is demoted to optional cross-scenario browsing index, NOT decision input; (2) no predefined stats API — compare/find_best from evolution-substrate.md §6 are downgraded to optional because the tuner is itself an LLM agent that does LLM-native trace analysis (which counts as success is policy in the tuner's system prompt, not a stats library; analysis quality scales with model capability automatically); (3) confounding killed by an eval set, not by sample size — production user inputs vary, so any compare on production traces conflates atom effect with task difficulty; a pinned scenarios/<name>/eval/ task suite gives a fixed input distribution. New autonomy-layer pieces: scenarios/<name>/eval/ directory (task YAMLs + grader.md/grader.py); scenarios/<name>/tuner/ meta-scenario (manifest.yaml + prompt.md); three new tier-1 atoms tool_query_traces (filter trace_id by task_class+fingerprint, lightweight summaries; agent reads bodies on demand via existing read tool), tool_eval_run (run eval suite under a proposed fingerprint without permanently mutating worktree — sub-session source overrides OR shadow worktree, Plan-stage decision), tool_propose_change (signature requires eval_run_baseline + eval_run_proposed + decision in {activate, rollback, exploratory}; activate gate is four-floor: economic threshold (≥+5%) AND statistical 2σ noise floor AND guard envelope (±10%) AND holdout non-regression — all four independent; exploratory channel waives only the first two. Tier-2 atoms still pending_human_approval; thin policy wrapper over reload_atom. ChangeSpec generalizes target beyond atom_source — Phase 2 unlocks system_prompt/manifest_extensions/manifest_field/scenario_compose). Activations land in .agentm/decisions/<scenario>/activations.jsonl (constitution-write-protected; renamed from decisions.jsonl to make room for Phase 2 candidates/ pool directory). task_class field on session.fingerprint becomes populated (was schema-defined but unfilled). Phase 2 reshapes around GEPA (Agrawal et al. 2026, arxiv 2507.19457): MAP-Elites Pareto candidate pool replaces single-incumbent hill climbing; tool_reflect atom separates diagnosis from mutation reading μ_f.feedback_text natural-language signal; System Aware Merge crossover combines non-dominated parents; per-module credit assignment via μ_f.module_feedback drives round-robin selection; rollout budget tracking via .agentm/decisions/<scenario>/budget.json; the four-floor gate's role narrows from inclusion-gate to deployment-gate. Production agent does not know it is being optimized — tuner is async sibling, not parent. Reuses all existing constitution mechanism: reload_atom, ResourceWriter, observability sink, transactional rollback. Acceptance scenarios P1-P10 cover missing eval/, null task_class, evidence-missing rejection, ResourceWriter constitution rejection, post-activate production regression watching, tuner concurrency on shared atoms, eval budget exhaustion, tier-2 deferral, trace round-trip filtering, and git-backed activation history. Phase 2 IMPLEMENTED (2026-05-09): all 10 Layer B tasks shipped — Pareto candidate pool (B-1) with split inclusion/deployment gates, generalized ChangeSpec validators (B-3), rollout budget (B-6), tool_reflect diagnosis atom (B-2), per-module credit assignment (B-5), System Aware Merge (B-4) with parent_ids: list[str] schema, structural stop_after_no_improvement counter persisted via activations.jsonl (B-9), production-traffic auto-rollback via tool_guard_watch passive observer (B-7), opt-in cross-task transfer (B-8), baseline_fingerprint concurrent-tuner-race fix (B-10). Five new fail-stop test classes added: pareto inclusion correctness, stop-counter persistence, merge gate noise floor, stale-baseline rejection, auto-rollback evidence floor. No agentm.core.* modifications; §11 contract clean."
    design: "designs/per-task-evolution-loop.md"
    related_concepts: [evolution_substrate, self_modifiable_architecture, observability, extension_as_scenario, git_backed_versioning]
    plans: []
    tasks: ["tasks/2026-05-09-issue-101-tool-catalog-split.md"]

  git_backed_versioning:
    description: "Replaces bespoke per-atom version store with git as the version layer. Catalog keeps only what git does not provide — metrics.jsonl + runs/<trace_id> attribution. Source content, lineage (parent commits), authorship, timestamp, and rationale (commit message) all flow through git plumbing. New harness service ResourceWriter (constitution layer) is the single chokepoint for all managed writes: classifies path as constitution / managed / unmanaged from core-manifest.yaml's managed.globs section, rejects constitution writes, git-commits managed writes before mutation, passes through unmanaged writes uncommitted. tool_edit / tool_write / reload_atom retrofit to write through ResourceWriter; the freeze→tempfile→os.replace→rollback dance in atom_reloader collapses into writer.write + git restore on failure. Browse API becomes git-log/git-cat-file wrappers; version IDs become full git SHAs replacing compute_atom_hash content hashes. Rollback is ResourceWriter.restore(path, target_sha) routed through the same writer. On absent .git/ the writer auto-inits .agentm/repo/ as a shadow worktree; advisory mode if git binary missing. Skills, prompts, scenarios, and .claude/ docs all gain versioning for free. ~300 LoC deleted from freeze.py + _layout.py; parent_hash dead-code problem disappears (git provides it); direct-edit bypass closed."
    design: "designs/git-backed-versioning.md"
    related_concepts: [self_modifiable_architecture, evolution_substrate, pluggable_architecture, per_task_evolution_loop]
    plans: [plans/2026-05-09-issue-80-abi-prep.md]
    tasks: ["tasks/2026-05-09-issue-85-session-refactor.md", "tasks/2026-05-09-issue-89-file-tool-io-seams.md", "tasks/2026-05-09-issue-101-tool-catalog-split.md"]

  textual_tui:
    description: "Replaces the minimal rich.live interactive mode (modes/interactive.py, ~150 lines) with a Textual-based TUI: scrollable ConversationLog of TurnContainers (ThinkingBlock + AssistantTextBlock + Collapsible ToolCallBlock), multi-line PromptInput TextArea with slash command palette, persistent StatusLine showing model/turn/tokens/cost/phase. Maps each public bus event to one widget mutation (stream_delta → text/tool block; tool_call/tool_result → fill + status glyph; llm_request_start/end → status phase + token totals; child_session_start/end → nested SubagentBlock; extension_install error → toast). 20 Hz batched stream flush via set_interval; no per-token repaint. Key bindings: Esc soft-cancels in-flight prompt (never exits), Ctrl+C interrupts then quits, Ctrl+L clear visual log (not session), Ctrl+R command palette, Shift+Enter newline. Slash commands open a CommandPalette modal listing ExtensionAPI-registered commands plus TUI-built-ins (/quit, /clear, /help, /copy-last); unknown slashes pass through as raw text. Theming via CSS file textual_app.tcss with dark/light themes. Migration: keep modes/interactive.py as 'simple' fallback; new mode at modes/textual_app.py selected via CLI --tui textual; default flips after stabilization. Mode-layer contract from pluggable-architecture.md §5 unchanged: run(config) owns session lifecycle, subscribes to public bus channels only. Permission-prompt UX deferred (no permission_request event yet); gracefully degrades to red tool-result errors."
    design: "designs/textual-tui.md"
    related_concepts: [pluggable_architecture, observability]
    plans: []
    tasks: ["tasks/2026-05-09-issue-98-textual-tui-registries.md", "tasks/2026-05-09-issue-99-presenter-seams.md", "tasks/2026-05-09-issue-121-tui-registries.md"]

  observability:
    description: "Per-session OTel-flavored JSONL diagnostic stream complementary to trajectory. Single principle: every signal goes through the bus. EventBus exposes EventBusObserver + emit_sync (sync handlers only, async skipped). New bus events: ApiRegisterEvent / ApiSendUserMessageEvent (harness, emit_sync from ExtensionAPI), LlmRequestStartEvent / LlmRequestEndEvent (kernel, around stream_fn drain in AgentLoop with try/except for error path), ExtensionInstallEvent (harness, around load_extension). observability builtin is a pure subscriber + Observer installed via ExtensionAPI.add_observer; no EventBus or ExtensionAPI monkey-patching. Records: session.start/ready/end, extension.install, api.register, api.send_user_message, llm.request.start/end, event.dispatch, handler.invoke, turn.summary. Writes to <cwd>/.agentm/observability/<trace_id>.jsonl, flushed per record. evolution_substrate extends session.start with active-set fingerprint binding the trace to exact (core, scenario, atom_versions) tuple."
    design: "designs/observability.md"
    related_concepts: [pluggable_architecture, extension_as_scenario, evolution_substrate, self_modifiable_architecture, textual_tui, per_task_evolution_loop, single_event_log]
    plans: []
    tasks: []

  single_event_log:
    description: "LANDED 2026-05-24. Collapses the two parallel JSONL streams (SessionManager trajectory file under ~/.agentm/sessions/ and observability event file under <cwd>/.agentm/observability/) into one per-session OTLP/JSON ndjson event log at <cwd>/.agentm/observability/<session_id>.jsonl. One ResourceSpans / ResourceLogs element per line, produced via opentelemetry-sdk Tracer/LoggerProvider plumbing (canonical encoder from opentelemetry-exporter-otlp, MessageToDict'd into proto-JSON shape) so collector pipelines (filelog + otlpjson decoder) consume the file directly. Span vocabulary: invoke_agent / chat / execute_tool with gen_ai.* semconv attributes. Log vocabulary: agentm.session.{header,start,ready,fingerprint,end}, agentm.message.appended, agentm.turn.summary, agentm.agent.end, agentm.{extension,atom}.{install,reload,unload}, agentm.api.{register,send_user_message}, agentm.diagnostic, agentm.event.dispatch + agentm.handler.invoke. SessionManager._append_record no longer writes its own file; it dispatches MessageAppendedEvent through the EventBus, and the observability atom emits one agentm.message.appended log record (body = SessionEntry dict verbatim) via api.get_session_telemetry().logger. continue_recent walks scopeLogs filtering on eventName to rebuild the in-memory trajectory. All writes go through SDK BatchProcessor wrapped in PR-A's BlockingBatch* subclasses (block on overflow, not drop); the _SessionTelemetryHolder installs a SessionShutdownEvent handler at BusPriority.POST so observability emits agentm.session.end before the drain. Dispatch_id lives on the Event ABI as a real field (PR-E, `531378b`): Event is `@dataclass(slots=True)` with `dispatch_id: str = field(default_factory=lambda: uuid.uuid4().hex, kw_only=True)`; the EventBus reassigns the field on every emit; observability reads `event.dispatch_id` and stamps it onto agentm.event.dispatch + agentm.handler.invoke records so consumers recover the fanout join. before_send_to_llm stops carrying the full messages payload — canonical trajectory lives in agentm.message.appended records — making the chars+sha256_prefix redaction layer redundant for that channel (still serves LlmRequestStart/End when redact_prompts=True). Landed across PR-A (file exporters, be78860), Commit 1 (dispatch_id, 9bae7dc), Commit 2a (ExtensionAPI.get_session_telemetry service facade, ad6c5cb), Commit 2b (atomic writer + readers cutover, 1f9caa3), Commit 3 (this doc sync). Followups: PR-E landed (Event ABI dataclass with dispatch_id field, `531378b`), PR-G landed (TraceReader API in core.runtime.trace_reader, re-exported via agentm.core.abi — every reader site now depends on it; tests/unit/core/test_trace_reader.py locks the surface), PR-H landed 2026-05-24 (one TracerProvider + LoggerProvider per process carrying only service.name=agentm + service.version on the resource; agentm.session.id moved from resource attribute to per-span / per-log attribute, stamped by the observability atom and the SessionManager direct-write path; per-session BlockingBatchSpanProcessor / BlockingBatchLogRecordProcessor attached to the shared providers with a session_id_filter that drops cross-session records before they enter the queue; session shutdown drains and removes those processors via the SDK's internal multi-processor tuple; global providers torn down once via atexit; tests/unit/core/test_otel_export.py locks the contract — two sessions share a provider, shutdown of one leaves the other intact, scenario/session attrs no longer appear in the resource block), PR-F landed 2026-05-24 (declarative Event→OTel mapping: each concrete Event subclass declares its own to_otel(telemetry) translator and the observability atom collapses to a thin dispatcher that subscribes one uniform `event.to_otel(telemetry)` handler per typed channel; lifecycle pairing for Start/End span families goes through SessionTelemetry.open_span / pop_span / close_open_spans helpers keyed by (span_kind, correlator); SessionTelemetry gains obs_* fields stamped by the observability atom at install time so per-event translators have session-scoped metadata without reaching ExtensionAPI; observability still owns the bus-observer side — agentm.event.dispatch / agentm.handler.invoke / agentm.handler.mutated — plus the atom-hash bookkeeping for agentm.session.fingerprint and agentm.atom.reload; on-disk wire format unchanged, locked down by test_observability_semconv.py; coverage enforced by tests/unit/core/test_event_to_otel.py — every concrete Event subclass either overrides to_otel or appears in the explicit intentional no-op set, so new Event classes cannot silently drop off the wire)."
    design: "designs/single-event-log.md"
    related_concepts: [observability, pluggable_architecture, agent_loop, evolution_substrate]
    plans: []
    tasks: []

  extension_as_scenario:
    description: "Pluggability model: a scenario is a *composition* of atomic extensions, expressed as data (YAML), not code. Atoms (one Python module, one responsibility) live in extensions/builtin/; scenario recipes live in extensions/scenarios/*.yaml; opt-in contrib packages may group multiple tier-2 single-file atoms under contrib/extensions/<package>/ and mount them explicitly. load_scenario(name) flattens and requires-sorts YAML to list[(module, config)] for AgentSession.create. Same mechanism for built-in and third-party scenarios — no privileged path. Legacy harness/scenarios/tools tree is deleted in Phase 2.5 single sweep. self_modifiable_architecture extends ExtensionManifest with api_version, affects, tier fields; evolution_substrate makes scenarios catalogable and queryable like atoms. RCA now uses a shared contrib rcabench_contract atom rather than duplicated scenario-local vendor loading."
    design: "designs/extension-as-scenario.md"
    related_concepts: [pluggable_architecture, operations_ports, single_file_extension_contract, self_modifiable_architecture, evolution_substrate, runtime_context_atom]
    plans: []
    tasks: ["tasks/2026-05-09-issue-102-rca-cleanup.md"]

  single_file_extension_contract:
    description: "§11 hard rule: one new built-in extension = one new .py file under extensions/builtin/<name>.py with module-level MANIFEST: ExtensionManifest plus install(api, config). Auto-discovery (extensions.discover) and a mechanical validator (extensions.validate, 8 checks keyed to design §11.4) gate the catalog. Designed so future agent self-edits have a tiny, verifiable surface — atom-to-atom imports forbidden, harness.session import forbidden, allow-listed imports only, private ExtensionAPI reflection/attribute overwrites/mutable globals/dynamic agentm.* imports/concrete harness-service downcasts and undeclared peer-name string literals rejected. Phase 2.0c scaffolding landed; A/B/C/D1 atoms must conform. self_modifiable_architecture grows the manifest with api_version (integer ABI + grace window), affects (declared metric surface for catalog), tier (1 free / 2 reviewable). Validator gains api_version compatibility check and constitution-path rejection. Contrib package atoms keep the same per-atom contract while package-internal helpers handle shared parsing/rendering."
    design: "designs/extension-as-scenario.md#11-single-file-self-contained-extension-contract"
    related_concepts: [extension_as_scenario, pluggable_architecture, self_modifiable_architecture, evolution_substrate]
    plans: ["plans/2026-04-30-phase2-parallel-extensions.md"]
    tasks: ["tasks/2026-04-30-phase2-group-0c.md"]

  runtime_context_atom:
    description: "Builtin atom at src/agentm/extensions/builtin/runtime_context.py that prepends a <runtime_context> block (workspace cwd from api.cwd + host platform/python from stdlib platform) to the system prompt via BeforeAgentStartEvent, plus a one-paragraph instruction telling the agent to answer cwd questions from this path rather than guessing. Generic — usable by any scenario by listing the module in extensions YAML; zero config (config_schema={} so a bare entry validates). §11-compliant single file; allowed imports stdlib + agentm.extensions + agentm.core.abi.events + agentm.core.abi.extension. Distinct from the system_prompt atom: system_prompt takes a static config string, runtime_context resolves at install-time from the live ExtensionAPI/host so scenario authors do not hand-build the workspace fact. Replaces the channel-side runtime_identity.py + extra_extensions injection from contrib/channels/, which violated layering by composing prompt content in the channel/gateway layer; the cwd-hallucination bug it addresses (agent answering with operator's $HOME instead of session cwd) is generic to every scenario, not Feishu-specific. Channel-format hints (chat surface prefers short paragraphs, no tables) stay in scenario system_prompt text where they are persona, not runtime fact."
    design: "designs/runtime-context-atom.md"
    related_concepts: [extension_as_scenario, pluggable_architecture, single_file_extension_contract]
    plans: []
    tasks: []

  operations_ports:
    description: "FileOperations / BashOperations Protocols in src/agentm/core/abi/operations.py. Default LocalFileOperations / LocalBashOperations live as an atom in src/agentm/extensions/builtin/operations_local.py (Stage 1 of pluggable_architecture §10 landed 2026-05-11; the earlier core/_internal/operations_impl.py module has been deleted). The environment boundary is hybrid after issue #89: read-only file atom (tool_read) consumes FileOperations through ExtensionAPI operations, write atoms (tool_write, tool_edit) consume ResourceWriter as the single mutation chokepoint, and tool_bash consumes BashOperations (which subsumes ls/find/grep — those dedicated atoms were removed in favour of shell composition). Operations is registered like any other axis: an early atom in the default scenario calls api.register_operations(file=..., bash=...); the substrate enforces 'registered at most once before freeze' and 'must be registered by freeze time, else fail loud'. It is no longer a constitution-only axis."
    design: "designs/extension-as-scenario.md#10b6"
    related_concepts: [pluggable_architecture, extension_as_scenario]
    plans: [plans/2026-05-09-issue-80-abi-prep.md]
    tasks: [tasks/2026-05-09-issue-85-session-refactor.md]

  skills:
    description: "Filesystem-discovered SKILL.md files (YAML frontmatter + body) advertised in the system prompt as a compact <available_skills> XML index; LLM loads any specific skill on demand via the `read` tool. Implements progressive disclosure. Includes core/_internal/skills.py (loader + validator + diagnostics), core/lib/frontmatter.py (in-house parser, promoted from resource_loader._split_frontmatter), and extensions/builtin/skill_loader.py atom that injects the index via before_agent_start."
    design: "designs/skills.md"
