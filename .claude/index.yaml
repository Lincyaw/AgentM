      - file: "tests/snapshot/test_error_recovery.py"
        layer: "L2 — Snapshot Pipeline"
      - file: "tests/unit/test_generic_sdk.py"
        layer: "L1 — Deterministic Invariants"

  system_architecture:
    description: "Pure Python multi-agent orchestration system. SimpleAgentLoop-based ReAct cycle, AgentRuntime for worker management, WorkerLoopFactory for config-driven worker creation, build_agent_system() single canonical builder, Scenario protocol for domain logic, Middleware protocol (3 hooks) for cross-cutting concerns. Config-driven design, trajectory recording, monitoring, and failure recovery."
    design: "designs/system-design-overview.md"
    related_concepts: [agent_harness, orchestrator, sub_agent, configuration_system, trajectory_system, recovery_system, memory_system, frontend_architecture, execution_runner, scenario_protocol, middleware_system, storage_backend, trajectory_analysis]
    plans: ["plans/2026-03-08-tdd-skeleton-and-tests.md", "plans/2026-03-08-stub-implementation.md"]
    tasks:
      - "tasks/2026-03-08-design-audit-findings.md"
      - "tasks/2026-03-08-impl-builder.md"
      - "tasks/2026-03-08-impl-config-loader.md"
      - "tasks/2026-03-08-impl-config-validator-phase-manager.md"
      - "tasks/2026-03-08-impl-orchestrator-agent.md"
      - "tasks/2026-03-08-impl-orchestrator-tools.md"
      - "tasks/2026-03-08-impl-prompt-tool-registry.md"
      - "tasks/2026-03-08-impl-task-manager.md"
      - "tasks/2026-03-08-snapshot-tests.md"

  orchestrator:
    description: "SimpleAgentLoop-based orchestrator with DynamicContextMiddleware for state injection. Dispatches workers via AgentRuntime. Monitors/injects/aborts via dispatch_agent/check_tasks/inject_instruction/abort_task tools. RCA scenario uses HypothesisStore for hypothesis reasoning."
    design: "designs/orchestrator.md"
    related_concepts: [system_architecture, sub_agent, trajectory_system, memory_system, execution_runner]
    plans: ["plans/2026-03-08-tdd-skeleton-and-tests.md", "plans/2026-03-09-compression-recall-memory.md"]
    tasks: []

  sub_agent:
    description: "Worker agents built by WorkerLoopFactory as SimpleAgentLoop instances. Config-driven tools/prompts, middleware stack (budget, compression, dedup, trajectory). Data-only constraint in RCA mode. Launched as asyncio.Tasks by AgentRuntime."
    design: "designs/sub-agent.md"
    related_concepts: [system_architecture, orchestrator, configuration_system, execution_runner, service_profile]
    plans: ["plans/2026-03-08-tdd-skeleton-and-tests.md"]
    tasks:
      - "tasks/2026-03-08-impl-hooks-sub-agent.md"

  generic_state_wrapper:
    status: historical
    description: "[HISTORICAL — superseded by extension_as_scenario (scenario = YAML composition of atoms); code deleted in Phase 2.5] Scenario Protocol architecture: Scenario protocol (setup() -> ScenarioWiring), SetupContext (platform resources), ScenarioRegistry (register/discover), build_agent_system() 4-phase pipeline integration. 3 built-in scenarios: RCA (hypothesis_driven), trajectory_analysis, general_purpose."
    design: "designs/generic-state-wrapper.md"
    related_concepts: [agent_harness, orchestrator, configuration_system, memory_system, scenario_protocol, middleware_system, builder]
    plans: ["plans/2026-03-08-tdd-skeleton-and-tests.md", "plans/2026-03-09-compression-recall-memory.md"]
    tasks: []
