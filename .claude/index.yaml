# AgentM Concept Index
# Maintenance rules: see CLAUDE.md "Design Documentation System"

concepts:
  system_architecture:
    description: "LangGraph Supervisor+Subgraph multi-agent orchestration system with config-driven design, trajectory recording, monitoring, and failure recovery"
    design: "designs/system-design-overview.md"
    related_concepts: [orchestrator, sub_agent, configuration_system, trajectory_system, recovery_system, memory_system, frontend_architecture, execution_runner]
    plans: []
    tasks: []

  orchestrator:
    description: "create_react_agent acting as hypothesis reasoner. Maintains DiagnosticNotebook, drives RCA flow in ReAct loop (phases are Notebook state markers, not graph nodes), context compression with checkpoint-backed recall. Dispatches Sub-Agents asynchronously via TaskManager, monitors/injects/aborts via tools"
    design: "designs/orchestrator.md"
    related_concepts: [system_architecture, sub_agent, trajectory_system, memory_system, execution_runner]
    plans: []
    tasks: []

  sub_agent:
    description: "Independently compiled subgraphs via create_react_agent. Isolated State Schema, config-driven tools/prompts, pre_model_hook compression (llm_input_messages), data-only constraint in RCA mode, static agent pool compiled at startup. Launched as asyncio.Tasks by TaskManager"
    design: "designs/sub-agent.md"
    related_concepts: [system_architecture, orchestrator, configuration_system, execution_runner]
    plans: []
    tasks: []

  generic_state_wrapper:
    description: "Generic SDK wrapper supporting multiple agent system types (hypothesis-driven, sequential, memory-extraction, decision-tree) via configuration. Shared BaseOrchestrator, PhaseManager, State Schema Registry"
    design: "designs/generic-state-wrapper.md"
    related_concepts: [orchestrator, configuration_system, memory_system]
    plans: []
    tasks: []

  memory_system:
    description: "Two-layer memory: intra-task (context compression + recall_history tool backed by checkpoint chain, see orchestrator.md) and cross-task (Memory Extraction agent system producing KnowledgeEntry items with three confidence levels — FACT/PATTERN/HEURISTIC — in LangGraph Store, see generic-state-wrapper.md)"
    design: "designs/orchestrator.md"
    related_concepts: [orchestrator, generic_state_wrapper, trajectory_system]
    related_designs: ["designs/generic-state-wrapper.md"]
    plans: []
    tasks: []

  configuration_system:
    description: "Config system: system.yaml (global), tools/*.yaml (reusable tool defs), scenarios/<name>/ (scenario.yaml + prompts/*.j2). Pydantic schema validation + cross-reference validation at startup. Environment variable substitution"
    design: "designs/system-design-overview.md"
    related_concepts: [system_architecture, sub_agent, orchestrator]
    plans: []
    tasks: []

  trajectory_system:
    description: "Hierarchical trace capture via TaskManager registry (TaskTraceRef). Independent checkpoint chains per agent, linked by task_id. Export to RL training format. CompressionRef stored in state"
    design: "designs/orchestrator.md"
    related_concepts: [system_architecture, orchestrator, recovery_system, memory_system, execution_runner]
    plans: []
    tasks: []

  recovery_system:
    description: "Four-layer error handling: Sub-Agent self-heal, API+Task retry (ChatOpenAI max_retries + TaskManager exponential backoff), Orchestrator decision (with error summary + last steps), manual system recovery via checkpoint resume. Debug replay via checkpoint fork"
    design: "designs/system-design-overview.md"
    related_concepts: [system_architecture, trajectory_system, orchestrator, sub_agent, execution_runner]
    plans: []
    tasks: []

  execution_runner:
    description: "TaskManager: manages async Sub-Agent execution as asyncio.Tasks. Provides backing for dispatch_agent/check_tasks/inject_instruction/abort_task tools. Injects instructions via interrupt+Command(resume). Streams events to frontend WebSocket"
    design: "designs/orchestrator.md"
    related_concepts: [orchestrator, sub_agent, frontend_architecture, trajectory_system]
    plans: []
    tasks: []

  frontend_architecture:
    description: "Read-only observation dashboard: Agent Topology (d3.js), Execution Monitor (timeline+detail), Conversation View (scenario plugin), Debug Panel (checkpoint browser). Single HTML file, React + WebSocket + d3.js. Scenario plugin architecture for extensibility"
    design: "designs/frontend-architecture.md"
    related_concepts: [system_architecture, trajectory_system, orchestrator, execution_runner, configuration_system]
    plans: []
    tasks: []
