      - "tasks/2026-03-08-impl-notebook.md"
    tests:
      - file: "tests/unit/test_generic_sdk.py"
        covers:
          - "Base middleware passthrough"
          - "compose_middleware chaining"
          - "Class hierarchy verification"

  storage_backend:
    description: "DELETED: StorageBackend Protocol, FilesystemBackend, and CompositeBackend were removed. The framework now uses direct filesystem operations and vault-based storage."
    related_concepts: [memory_vault]
    plans: []
    tasks: []
    tests: []

  memory_vault:
    description: "Markdown + YAML frontmatter persistent knowledge vault with SQLite-backed three-layer index (structural, link graph, FTS5 + sqlite-vec). Replaces JSON-based KnowledgeStore. [[wikilink]] bidirectional linking, atomic write flow, vault_edit with 4 incremental edit primitives (replace_string, set_frontmatter, replace_section, append_section), rebuildable index."
    design: "designs/memory-vault.md"
    related_concepts: [memory_system, agent_harness, storage_backend, configuration_system]
    plans: ["plans/2026-03-16-memory-vault.md"]
    tasks:
      - "tasks/2026-03-16-vault-parser.md"
      - "tasks/2026-03-16-vault-schema.md"
      - "tasks/2026-03-16-vault-store.md"
      - "tasks/2026-03-16-vault-search.md"
      - "tasks/2026-03-16-vault-graph.md"
      - "tasks/2026-03-16-vault-tools.md"
      - "tasks/2026-03-16-vault-migration.md"
      - "tasks/2026-03-16-vault-integration.md"

  tool_dedup:
    description: "Two-layer tool call deduplication: on_llm_start hook (soft limit, reminder injection) + tool wrapper (hard limit, short rejection). DedupTracker with OrderedDict FIFO eviction. Excludes think tool. Per-agent-invocation cache. All code in middleware/dedup.py"
    design: "designs/tool-dedup.md"
    related_concepts: [sub_agent, configuration_system, middleware_system]
    plans: []
    tasks: []
    tests:
      - file: "tests/unit/test_dedup.py"
        layer: "L1 — Deterministic Invariants"
      - file: "tests/unit/test_generic_sdk.py"
        layer: "L1 — Deterministic Invariants"

  service_profile:
    description: "Thread-safe, run-scoped shared service knowledge store (ServiceProfileStore). Orchestrator and workers both read/write via update_service_profile/query_service_profile tools. Merge semantics: topology union, observations append, anomaly upgrade only. Injected into workers via extra_tools, into orchestrator via format_context partial binding."
    design: "designs/sub-agent.md"
    related_concepts: [orchestrator, sub_agent, execution_runner]
    plans: []
    tasks: []
    tests:
      - file: "tests/unit/test_service_profile.py"
        layer: "L1 — Deterministic Invariants"
        covers:
          - "ServiceProfileStore CRUD (update/get/get_all)"
          - "Merge logic: topology union, observations append, anomaly upgrade"
          - "Thread safety: concurrent updates preserve all data"
          - "Query filters: anomalous_only, related_to"
          - "LLM formatting: anomalous/healthy grouping"
          - "Immutability: frozen dataclasses"

  tool_filter:
    description: "Three-layer tool filtering: global disallowed (SDK safety, prevents worker recursion), agent-level disallowed_tools, whitelist. resolve_tools() pure function in harness/tool_filter.py. Wildcard ['*'] semantics. Fail-fast on unknown whitelist names."
    design: "designs/tool-filter.md"
    related_concepts: [sub_agent, agent_harness, sdk_consistency, tool_dedup, agent_definition]
    plans: []
    tasks: []

  permission_mode:
    description: "Four-mode permission system (DEFAULT, READONLY, SUPERVISED, UNRESTRICTED) enforced via PermissionMiddleware on_tool_call hook. Three-layer defense: prompt reinforcement + tool filtering + middleware interception. Tool.readonly annotation, PermissionPolicy with per-tool overrides, audit trail for SUPERVISED mode."
    design: "designs/permission-mode.md"
    related_concepts: [agent_harness, middleware_system, scenario_protocol, sub_agent, sdk_consistency, tool_filter]
    plans: []
    tasks: []

  agent_memory:
    status: historical
    description: "[HISTORICAL — dropped from Phase 2 catalog; covered by RCA's tool_hypothesis_store + SessionManager.payload; code deleted in Phase 2.5] Per-agent persistent memory with three scopes (AGENT, SCENARIO, PROJECT). MemoryMiddleware injects memory prompt via on_llm_start. Dedicated tools (memory_read/write/edit/delete) with auto-maintained MEMORY.md index. Reuses vault parser module. Flat markdown storage, no SQLite."
    design: "designs/agent-memory.md"
    related_concepts: [memory_vault, agent_harness, middleware_system, sub_agent, configuration_system]
    plans: []
    tasks: []

  agent_definition:
    description: "Declarative AgentDefinition frozen dataclass replacing AgentConfig. Loaded from Markdown frontmatter (.md) or YAML. One file = one agent. Supports tools/disallowed_tools, task_type dispatch routing, Jinja2 system prompt. Source layering with full-replacement semantics."
    design: "designs/agent-definition.md"
    related_concepts: [sub_agent, configuration_system, builder, tool_filter, permission_mode, agent_memory]
    plans: []
    tasks: []

  prompt_patterns:
    description: "Catalog of 12 prompt design patterns for AgentM templates: role anchor, critical boundary markers, numbered sections, decision tables, good/bad contrast, anti-rationalization checklists, deterrence statements, purpose statements, forced output format, context isolation, three-layer permissions, per-turn reminders."
    design: "designs/prompt-patterns.md"
    related_concepts: [orchestrator, sub_agent, configuration_system, middleware_system, scenario_protocol, loop_resilience]
    plans: []
    tasks: []

  loop_resilience:
    description: "Five mechanisms for robust agent loops: tool result budget (truncation of oversized results), tool concurrency partitioning (safe parallel vs serial execution), critical system reminder (periodic constraint re-injection), micro-compact (lightweight rule-based context cleanup), cost budget (USD/token hard stop). All implemented as middleware or minimal loop changes."
    design: "designs/loop-resilience.md"
    related_concepts: [agent_harness, middleware_system, sub_agent, permission_mode, prompt_patterns, configuration_system, recovery_system]
    plans: []
    tasks: []

  trajectory_judger:
    description: "Judge trajectory quality by classifying agent behavior patterns. Single-pass scenario with structured output schema for classification results."
    design: "designs/trajectory-judger.md"
    related_concepts: [trajectory, trajectory_analysis, scenario_protocol]
    plans: []
    tasks: []

  investigation_sanitizer:
    description: "Automated investigation quality checks (linter/sanitizer) for the RCA orchestrator. Two-layer design: CodeSanitizer (deterministic store/sequence checks) + CriticSanitizer (LLM-based semantic judgment). Detects exploration gaps (E1-E4), confirmation failures (C1-C4), judgment errors (J1-J4), process violations (P1-P3). Injects findings into orchestrator message stream. Hard-gates finalize on critical violations."
    design: "designs/investigation-sanitizer.md"
    related_concepts: [orchestrator, middleware_system, scenario_protocol, loop_resilience, trajectory_judger, service_profile]
    plans: ["plans/2026-04-02-investigation-sanitizer.md"]
    tasks:
      - "tasks/2026-04-02-investigation-tracker.md"
      - "tasks/2026-04-02-code-sanitizer.md"
      - "tasks/2026-04-02-critic-sanitizer.md"
      - "tasks/2026-04-02-sanitizer-middleware.md"
      - "tasks/2026-04-02-sanitizer-config-wiring.md"
      - "tasks/2026-04-02-sanitizer-e2e.md"
