  builder:
    description: "build_agent_system() — single canonical 4-phase builder (platform resources -> worker infra -> orch tools -> orch loop). Scenario-driven, no legacy wrappers. Factory closure DI for tools, trajectory wiring."
    related_concepts: [system_architecture, orchestrator, sub_agent, trajectory, configuration_system, scenario_protocol, middleware_system, storage_backend]
    plans: ["plans/2026-03-09-compression-recall-memory.md"]
    tasks: []

  scenario_protocol:
    status: historical
    description: "[HISTORICAL — replaced by scenario YAML recipes in extensions/scenarios/; code deleted in Phase 2.5] Scenario Protocol: pluggable domain logic. setup(ctx) -> ScenarioWiring (orchestrator_tools, worker_tools, format_context, answer_schemas, output_schema, hooks, should_terminate, middleware). ScenarioRegistry maps names to instances. Concrete: RCAScenario (hypothesis_driven), TrajectoryAnalysisScenario, GeneralPurposeScenario."
