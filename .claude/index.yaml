      - "tasks/2026-03-24-ta-schemas-registry.md"
      - "tasks/2026-03-24-ta-config.md"
      - "tasks/2026-03-24-ta-vault-skills.md"
      - "tasks/2026-03-24-ta-integration.md"
      - "tasks/2026-03-24-ta-tests.md"

  configuration_system:
    description: "Config system: system.yaml (global), tools/*.yaml (reusable tool defs), scenarios/<name>/ (scenario.yaml + prompts/*.j2). Pydantic schema validation + cross-reference validation at startup. Environment variable substitution"
    design: "designs/system-design-overview.md"
    related_concepts: [system_architecture, sub_agent, orchestrator]
