# AgentM Concept Index
# Maintenance rules: see CLAUDE.md "Design Documentation System"

concepts:
  # === ACTIVE ===
  # Live v2 architecture concepts. Edit these as the design evolves.

  pluggable_architecture:
    description: "First-principles pluggable architecture inspired by pi-mono (badlogic/pi-mono). Three-layer package boundary (agentm-llm / agentm-core / agentm-harness / agentm-modes). Five pluggability axes as Protocol ports: StreamFn (LLM), Tool+Operations (env; Operations are constitution-only in v0 and selected at session construction), SessionManager (state), ResourceLoader (project context), EventBus+ExtensionAPI (policy). Built-in features become default extensions. Reference index to pi-mono source paths."
    design: "designs/pluggable-architecture.md"
    related_concepts: [agent_loop, extension_as_scenario, operations_ports, observability, self_modifiable_architecture, evolution_substrate, git_backed_versioning, textual_tui]
    plans: [plans/2026-05-09-issue-80-abi-prep.md]
    tasks: ["tasks/2026-05-09-issue-85-session-refactor.md", "tasks/2026-05-09-issue-87-builtin-atoms-extension-api.md", "tasks/2026-05-09-issue-93-llm-stream-common.md"]

  agent_loop:
    description: "Per-turn termination protocol for AgentLoop.run, expressed as sum types. ToolOutcome (ToolContinue|ToolTerminate) is what tools return; TerminationCause is a sealed hierarchy describing WHO ended the loop and WHY (ModelEndTurn, ToolTerminated{tool_name,reason}, MaxTurnsExhausted, SignalAborted, ProviderTruncated{kind}, ProviderProtocolViolation{detail}, BudgetExhausted), with a class-var `final` that controls override semantics. LoopAction (Step|Stop(cause)|Inject(messages)) is what the kernel does next. Single decide_turn_action event fires every turn (including kernel-imposed terminations, for symmetric observability) carrying a TurnObservation snapshot; extensions return LoopAction|None to override. Resolution lattice: final causes shadow everything; otherwise Inject>Stop>Step with Inject messages concatenated in registration order. Replaces the old multi-flag (assistant.stop_reason + tool_calls presence + BeforeAgentEndEvent.stop_reason + cancel/append dict) protocol that silently masked provider/parser disagreements and buried multi-handler resolution rules in folklore comments. Hard-cut migration in PR #58 (no shims): tools wanting to terminate return ToolTerminate; before_agent_end handlers move to decide_turn_action returning Inject(messages=[...])."
    design: "designs/agent-loop.md"
    related_concepts: [pluggable_architecture, sub_agent_lifecycle, observability, extension_as_scenario]
    plans: [plans/2026-05-09-issue-80-abi-prep.md]
    tasks: ["tasks/2026-05-09-issue-86-atom-rework-infra.md"]

  self_modifiable_architecture:
    description: "Boundary refinement of pluggable_architecture: core/extensions split is drawn by 'what an agent can safely self-modify' rather than mechanism vs policy. Constitution layer is uniform on the modifiability axis (none of core/ is agent-modifiable) but split on the visibility axis into core/abi/ (types & Protocols, atom + llm import), core/lib/ (pure-function utilities, atom imports as stdlib), and core/_internal/ (stateful subsystems & default impls — operations_impl, skills, prompt_templates, catalog/, compaction engine — atoms reach exclusively via ExtensionAPI services: api.get_operations / api.skills / api.prompt_templates / api.catalog / api.compaction; direct import forbidden by validator). Autonomy layer holds atoms + scenarios + skills + prompts (tier-1 free / tier-2 reviewable). Discovery layer = fs scan + reload + assert_active. Adds versioned ExtensionAPI (api_version with grace window), transactional reload (validator → snapshot → install → rollback on failure), and a new ExtensionAPI surface (reload_atom, freeze_current, list_atoms, is_constitution_path). Tier-2 atoms (permission, cost_budget, tool_filter, llm_compaction) require propose_change approval to reload. Compaction prompts are the canonical mechanism→policy split: prompt strings moved out of core into the llm_compaction atom, engine in core/_internal/compaction/ takes prompt as a required parameter. Establishes that change is safe and atomic; evolution-substrate.md establishes that change is evidence-driven."
    design: "designs/self-modifiable-architecture.md"
    related_concepts: [pluggable_architecture, extension_as_scenario, single_file_extension_contract, observability, evolution_substrate, git_backed_versioning]
    plans: [plans/2026-05-09-issue-80-abi-prep.md]
    tasks: ["tasks/2026-05-09-issue-79-atom-reloader-hardening.md", "tasks/2026-05-09-issue-86-atom-rework-infra.md"]

  evolution_substrate:
    description: "Constitution-owned data layer that binds every (atom, scenario) version to all observation data generated under it, so rollback / composition / optimization become evidence-driven, not error-driven. Adds .agentm/catalog/{atoms,scenarios}/<hash>/ with frozen source + manifest.yaml + metrics.jsonl + runs/ + decisions.jsonl. Active-set fingerprint in every observability session.start header binds traces to the exact loaded version set. Indexer (constitution-layer, idempotent, rebuildable from raw observability) aggregates per-(atom_hash, scenario, task_type) statistics. tool_catalog atom (tier-1 read API + propose_change as the only mediated write) exposes list_versions / get_manifest / compare / find_best / runs_for / decisions_for / propose_change to the agent. Hard problems addressed: statistical power (CI + inconclusive enforcement), confounding (experiment-mode lock), Goodhart (universal guard metrics + regressed flag), replayability (LLM response cache, Phase 3), catalog corruption (constitution-layer write-protect on .agentm/catalog/**). Phased: MVP = fingerprint + freeze + browse; Phase 2 = compare + decisions; Phase 3 = replay cache + experiment lock."
    design: "designs/evolution-substrate.md"
    related_concepts: [self_modifiable_architecture, observability, pluggable_architecture, extension_as_scenario, git_backed_versioning]
    plans: []
    tasks: []

  git_backed_versioning:
    description: "Replaces bespoke per-atom version store with git as the version layer. Catalog keeps only what git does not provide — metrics.jsonl + runs/<trace_id> attribution. Source content, lineage (parent commits), authorship, timestamp, and rationale (commit message) all flow through git plumbing. New harness service ResourceWriter (constitution layer) is the single chokepoint for all managed writes: classifies path as constitution / managed / unmanaged from core-manifest.yaml's managed.globs section, rejects constitution writes, git-commits managed writes before mutation, passes through unmanaged writes uncommitted. tool_edit / tool_write / reload_atom retrofit to write through ResourceWriter; the freeze→tempfile→os.replace→rollback dance in atom_reloader collapses into writer.write + git restore on failure. Browse API becomes git-log/git-cat-file wrappers; version IDs become full git SHAs replacing compute_atom_hash content hashes. Rollback is ResourceWriter.restore(path, target_sha) routed through the same writer. On absent .git/ the writer auto-inits .agentm/repo/ as a shadow worktree; advisory mode if git binary missing. Skills, prompts, scenarios, and .claude/ docs all gain versioning for free. ~300 LoC deleted from freeze.py + _layout.py; parent_hash dead-code problem disappears (git provides it); direct-edit bypass closed."
    design: "designs/git-backed-versioning.md"
    related_concepts: [self_modifiable_architecture, evolution_substrate, pluggable_architecture]
    plans: [plans/2026-05-09-issue-80-abi-prep.md]
    tasks: [tasks/2026-05-09-issue-85-session-refactor.md]

  textual_tui:
    description: "Sole interactive frontend at modes/textual_app.py serving two roles simultaneously — conversation surface AND control+observability surface for AgentM's runtime (legacy rich.live mode deleted 2026-05-02; layout rebuilt outside-in same day; control modals + live subscriptions added 2026-05-02). Outside-in dock layout per Textual's design-a-layout guide: StatusHeader docks top (h:1, model · turn · N ext (M failed) · K tools · in/out tokens · $cost ⚠ if budget exceeded · phase glyph), Footer docks bottom auto-rendering BINDINGS with show=True (⌃C ⌃D ⌃L ⌃R ⌃E), InputBar containing PromptInput TextArea docks bottom above Footer, ConversationLog fills the 1fr middle. Conversation widgets: UserTurn (markdown body, blue $primary border-left gutter; injected variant from api.send_user_message uses yellow $warning gutter + 'system → you (from <ext>)' label), TurnContainer for assistant turns (●-assistant label + ThinkingBlock Collapsible + AssistantTextBlock streaming + ToolCallBlock Collapsible with single yellow gutter and 'tool_name ✓ Nms' title format + SubagentBlock Vertical with cyan gutter). Control modals via generic InfoModal with Rich tables: /extensions (every ExtensionInstallEvent phase tracked, ⏳ start / ✓ end / ✗ error), /tools (every ApiRegisterEvent kind=tool tracked: name + source ext + description), /budget (current CostBudgetExceededEvent state). Live observability subscriptions: extension_install (track all phases + error toast), extension_reload (toast; trigger=agent or propose_change_approved → '★ self-modify' warning toast — framework's headline behavior made visible), api_register (live tool/command capture for post-create reloads), cost_budget_exceeded (latch state + header ⚠ indicator + error toast warning next prompt halts), api_send_user_message (synthetic UserTurn with injected styling). Two-phase bus subscription in run(): pre-AgentSession.create accumulators populate snapshot dicts handed to AgentMApp.__init__ (because api_register and extension_install fire DURING create, before the app exists); post-create live handlers cover hot reloads. Single-source-of-truth gutters: CSS border-left only — Rich Panel rendering removed because doubling with CSS produced visibly broken borders. Theming: self.theme = 'textual-dark'/'textual-light' (Textual built-in registered themes); CLI --theme accepts 'dark'/'light' as aliases; CSS uses semantic variables ($primary/$surface/$boost/$text/$accent/$warning/$error/$text-muted) instead of hardcoded hex. Maps each public bus event to one widget mutation. 20 Hz batched stream flush via set_interval; no per-token repaint. Key bindings: Esc soft-cancels in-flight prompt then on idle emits explicit 'Nothing to cancel.' toast (replaces previous silent no-op); Ctrl+C cancels then escalates to quit on second press within 1.5s window (replaces 'never quits while prompt runs' behavior); Ctrl+D unconditional quit; Ctrl+L clear visual log (not session); Ctrl+R command palette; Shift+Enter newline; PromptInput tab_behavior='focus' so Tab leaves input naturally (App-level Tab binding removed because TextArea ate the key). Slash commands open a CommandPalette modal listing ExtensionAPI-registered commands plus TUI-built-ins (/quit, /clear, /help, /copy-last, /extensions, /tools, /budget); unknown slashes pass through as raw text. Built-in command palette (Ctrl+P) disabled via ENABLE_COMMAND_PALETTE=False so atom-registered commands surface naturally at Ctrl+R. Mode-layer contract from pluggable-architecture.md §5 unchanged: run(config) owns session lifecycle, subscribes to public bus channels only. Permission-prompt UX still deferred (no permission_request event yet); gracefully degrades to red tool-result errors."
    design: "designs/textual-tui.md"
    related_concepts: [pluggable_architecture, observability]
    plans: []
    tasks: []

  observability:
    description: "Per-session OTel-flavored JSONL diagnostic stream complementary to trajectory. Single principle: every signal goes through the bus. EventBus exposes EventBusObserver + emit_sync (sync handlers only, async skipped). New bus events: ApiRegisterEvent / ApiSendUserMessageEvent (harness, emit_sync from ExtensionAPI), LlmRequestStartEvent / LlmRequestEndEvent (kernel, around stream_fn drain in AgentLoop with try/except for error path), ExtensionInstallEvent (harness, around load_extension). observability builtin is a pure subscriber + Observer installed via ExtensionAPI.add_observer; no EventBus or ExtensionAPI monkey-patching. Records: session.start/ready/end, extension.install, api.register, api.send_user_message, llm.request.start/end, event.dispatch, handler.invoke, turn.summary. Writes to <cwd>/.agentm/observability/<trace_id>.jsonl, flushed per record. evolution_substrate extends session.start with active-set fingerprint binding the trace to exact (core, scenario, atom_versions) tuple."
    design: "designs/observability.md"
    related_concepts: [pluggable_architecture, extension_as_scenario, evolution_substrate, self_modifiable_architecture, textual_tui]
    plans: []
    tasks: []

  handler_priority:
    description: "Per-channel dispatch-order knob on api.on. Three symbolic tiers (BusPriority.PRE=100, NORMAL=500, POST=900) mapped to integers; numeric values legal but discouraged. EventBus._handlers upgrades to list[_Subscription{priority, seq, handler}], bisect.insort on (priority, seq). Existing 'last non-None wins' replacement semantics unchanged — dispatch order IS authority order under last-wins. Block/veto contracts (tool_call block, before_install/unload_atom veto) use first-refusal-wins, priority only controls who decides first. Backward compatible: api.on without priority lands at NORMAL, registration order within tier preserved. Reload-position-preservation (atom_reloader._capture/_restore) still in place as fallback for un-prioritized handlers; prioritized ones land in the right slot via bisect. No depends_on / before / after constraint graph in v0."
    design: "designs/handler-priority.md"
    related_concepts: [pluggable_architecture, agent_loop, self_modifiable_architecture, observability]
    plans: []
    tasks: []

  extension_as_scenario:
    description: "Pluggability model: a scenario is a *composition* of atomic extensions, expressed as data (YAML), not code. Atoms (one Python module, one responsibility) live in extensions/builtin/; scenario recipes live in extensions/scenarios/*.yaml. load_scenario(name) flattens a YAML to list[(module, config)] for AgentSession.create. Same mechanism for built-in and third-party scenarios — no privileged path. Legacy harness/scenarios/tools tree is deleted in Phase 2.5 single sweep. self_modifiable_architecture extends ExtensionManifest with api_version, affects, tier fields; evolution_substrate makes scenarios catalogable and queryable like atoms."
    design: "designs/extension-as-scenario.md"
    related_concepts: [pluggable_architecture, operations_ports, single_file_extension_contract, self_modifiable_architecture, evolution_substrate]
    plans: []
    tasks: []

  single_file_extension_contract:
    description: "§11 hard rule: one new built-in extension = one new .py file under extensions/builtin/<name>.py with module-level MANIFEST: ExtensionManifest plus install(api, config). Auto-discovery (extensions.discover) and a mechanical validator (extensions.validate, 8 checks keyed to design §11.4) gate the catalog. Designed so future agent self-edits have a tiny, verifiable surface — atom-to-atom imports forbidden, harness.session import forbidden, allow-listed imports only, private ExtensionAPI reflection/attribute overwrites/mutable globals/dynamic agentm.* imports/concrete harness-service downcasts rejected. Phase 2.0c scaffolding landed; A/B/C/D1 atoms must conform. self_modifiable_architecture grows the manifest with api_version (integer ABI + grace window), affects (declared metric surface for catalog), tier (1 free / 2 reviewable). Validator gains api_version compatibility check and constitution-path rejection."
    design: "designs/extension-as-scenario.md#11-single-file-self-contained-extension-contract"
    related_concepts: [extension_as_scenario, pluggable_architecture, self_modifiable_architecture, evolution_substrate]
    plans: []
    tasks: []

  operations_ports:
    description: "FileOperations / BashOperations Protocols in src/agentm/core/abi/operations.py + LocalFileOperations / LocalBashOperations defaults in src/agentm/core/_internal/operations_impl.py. The environment boundary that lets tool atoms (tool_read, tool_bash, tool_edit, tool_write) run unchanged whether targeting local FS or remote (SSH, sandbox). In v0 this is a constitution-only axis: the harness injects the Operations bundle at session construction, and atoms consume but do not replace it at runtime. Acceptance scenario 2 of pluggable-architecture.md depends on this port."
    design: "designs/extension-as-scenario.md#10b6"
    related_concepts: [pluggable_architecture, extension_as_scenario]
    plans: [plans/2026-05-09-issue-80-abi-prep.md]
    tasks: [tasks/2026-05-09-issue-85-session-refactor.md]

  skills:
    description: "Filesystem-discovered SKILL.md files (YAML frontmatter + body) advertised in the system prompt as a compact <available_skills> XML index; LLM loads any specific skill on demand via the `read` tool. Implements progressive disclosure. Pi-mono port of core/skills.ts. Includes core/_internal/skills.py (loader + validator + diagnostics), core/lib/frontmatter.py (in-house parser, promoted from resource_loader._split_frontmatter), and extensions/builtin/skill_loader.py atom that injects the index via before_agent_start."
    design: "designs/skills.md"
    related_concepts: [prompt_templates, pluggable_architecture, extension_as_scenario, search_tools]
    plans: []
    tasks: []

  prompt_templates:
    description: "Filesystem-discovered markdown templates with YAML frontmatter. /<name> args expansion with bash-style placeholders ($1, $@, $ARGUMENTS, ${@:N:L}). Pi-mono port of core/prompt-templates.ts. Includes core/_internal/prompt_templates.py (parser + substituter + loader) and extensions/builtin/prompt_templates.py atom (input-event handler that expands before agent loop runs). Code-registered slash commands win over templates on name collision via the slash_commands atom and typed CommandDispatcher service facade; non-matching /-prefixed text falls through verbatim."
    design: "designs/prompt-templates.md"
    related_concepts: [skills, extension_as_scenario, pluggable_architecture]
    plans: []
    tasks: []

  search_tools:
    description: "Three new tool atoms — tool_grep, tool_find, tool_ls — backed by ripgrep/fd with stdlib+pathspec fallback, .gitignore-aware, deterministic byte/line truncation. Each tool exposes its own Operations Protocol (GrepOperations/FindOperations/LsOperations) for SSH/sandbox swap, mirroring core/abi/operations.py. Adds shared core/lib/text_truncate.py and core/lib/path_utils.py modules. Pi-mono port of tools/{grep,find,ls,truncate,path-utils}.ts."
    design: "designs/search-tools.md"
    related_concepts: [edit_diff, tool_event_narrowing, extension_as_scenario, operations_ports, pluggable_architecture]
    plans: []
    tasks: []

  edit_diff:
    description: "Pure-function module core/lib/edit_diff.py owning the edit-application algorithm: line-ending detection/restoration, UTF-8 BOM handling, NFKC + smart-quote/dash/space fuzzy normalization, and multi-edit application pipeline (Edit{old,new} sequences). Pi-mono port of tools/edit-diff.ts. Consumed by the upgraded tool_edit atom in Tier 2."
    design: "designs/edit-diff.md"
    related_concepts: [search_tools, tool_event_narrowing, extension_as_scenario, operations_ports]
    plans: []
    tasks: []

  tool_event_narrowing:
    description: "Per-tool typed event subclasses (BashToolCallEvent, ReadToolCallEvent, GrepToolCallEvent, ...) + isinstance-based TypeGuard helpers (is_bash_tool_call, ...) replacing the single ToolCallEvent with stringly-typed tool_name. Recommends Python match-statement dispatch as the idiomatic style. Custom user tools fall through to the base ToolCallEvent. Pi-mono port of the typed-event/type-guard pattern from extensions/types.ts:740-940. Coordinated single-PR migration across all atoms that branch on tool_name."
    design: "designs/tool-event-narrowing.md"
    related_concepts: [search_tools, edit_diff, pluggable_architecture, extension_as_scenario]
    plans: []
    tasks: []

  sub_agent_lifecycle:
    description: "Async sub-agent dispatch lifecycle: parent's kernel loop must not declare agent_end while a child has unread findings. After PR #58 the floor is implemented on the agent_loop redesign — sub_agent subscribes to decide_turn_action and, on a voluntary Stop(ModelEndTurn|ToolTerminated) when there are unread/running children, returns Inject(messages=[notification]) so the loop stays alive. Completed-but-unread children's final_text plus still-running children are concatenated into one synthesized user-role notification (<subagent_result task_id=... purpose=...>...</subagent_result> + <subagent_pending task_id=... purpose=... />). The parent then chooses: write final report, wait_subagent(id) to block on one, check_tasks to block until any one progresses, or abort_task. Single read flag per task is the source of truth (never reset; consumed by check_tasks / wait_subagent / decide_turn_action). Three usage patterns share one mechanism — fire-and-forget (passive collection at exit), explicit wait (synchronous wait_subagent), steered fan-out (loop check_tasks reading as ready). Rejects synchronous dispatch (would lose parallel fan-out absent kernel-level parallel tool execution) and dead-letter / re-delivery (consumed-but-unattended findings are on the agent, same as ignored user messages). max_turns / signal / budget still strictly enforced — those causes have final=True so any Inject is ignored. cost_budget and other extensions can layer on the same hook."
    design: "designs/sub-agent-lifecycle.md"
    related_concepts: [agent_loop, pluggable_architecture, extension_as_scenario, single_file_extension_contract, artifact_system, agent_team]
    plans: []
    tasks: []

  artifact_system:
    description: "Append-only typed artifact store for sub-agent findings — replaces lossy 'final_text blob' handoff with reference-based handoff. New extensions/builtin/artifact_store.py registers four tools (artifact_write, artifact_read, artifact_list, artifact_grep) backed by sqlite at <cwd>/.agentm/artifacts/<root_session_id>.db. Session-tree-scoped: every descendant of a root session shares one db; cross-root sharing deferred to evolution_substrate / git_backed_versioning. Data model: Artifact{artifact_id, parent_id, kind, title, body, created_by: ProvenanceRef{session_id, task_id, persona, timestamp}, tags, parent_artifact_ids}. Append-only by design — no artifact_edit / artifact_delete; revisions create new artifacts referencing predecessors. Integrates with sub_agent_lifecycle's notification block: workers return <summary>...</summary> + <artifacts><ref id=... kind=... title=.../></artifacts> instead of full final_text dump, so orchestrator context grows logarithmically rather than linearly with worker count. Personas declare expected artifact_kinds in frontmatter as documentation. Maps to MAST failure-mode taxonomy: defends context-loss-at-handoff, cascade context poisoning, supervisor context bloat, summarization drift, inconsistent shared state. Out of scope: binary artifacts, ACL beyond session-tree, transactional updates, reference-counted GC (uses time-based retention)."
    design: "designs/artifact-system.md"
    related_concepts: [sub_agent_lifecycle, agent_team, evolution_substrate, pluggable_architecture, single_file_extension_contract]
    plans: []
    tasks: []

  agent_team:
    description: "Composition pattern for multi-agent scenarios — explicitly NOT a Team SDK type, NOT a runtime mode switch. Built on four orthogonal pillars: (A) lifecycle floor from sub_agent_lifecycle, (B) shared memory tier from artifact_system, (C) brief contract via persona frontmatter input_schema (required/optional field-name list; sub_agent dispatch validates the prompt for <field>...</field> markers and rejects on missing required fields with structured error), (D) budget awareness via per-dispatch budget arg + scenario manifest team_profile (task_complexity: simple|comparison|deep_research → derived defaults for max_workers and per-worker max_tool_calls). Each pillar maps to specific named failure modes from the multi-agent literature (MAST taxonomy, Anthropic research-system lessons): context loss, cascade poisoning, supervisor context bloat, scope misinterpretation, token over/under-spend, etc. Core insight 'there is no mode switch': dispatch_agent + artifact_* + wait_subagent are always-loaded capabilities; LLM decides per-task whether to fan out, cache to artifacts, etc. — same shape as Claude Code's Agent tool. Runtime extension loading (api.reload_atom from self_modifiable_architecture) is orthogonal — for acquiring NEW capabilities mid-flight, not for switching team mode. Rejected: first-class Team type, peer-to-peer dispatch (orchestrator-only convention), built-in voting/arbitration (LLM does it), output schema enforcement (deferred), adaptive budget escalation. Persona frontmatter gains: input_schema, artifact_kinds, budget_defaults. Manifest gains: team_profile.task_complexity. All additions opt-in; existing scenarios continue to work."
    design: "designs/agent-team.md"
    related_concepts: [sub_agent_lifecycle, artifact_system, self_modifiable_architecture, extension_as_scenario, pluggable_architecture, single_file_extension_contract]
    plans: []
    tasks: []

  cognitive_audit:
    description: "Two-phase audit pipeline supervising a running main agent for semantic-level drift. Phase 1 (Extractor) runs per TurnEndEvent: a stateless child session reads the new-turn slice (including thinking blocks) plus a recent-graph slice for refs resolution and submits new Event records via submit_events; state lives on the parent session entry tree under llmharness.audit_event entries plus an llmharness.extractor_cursor pointer that records last_turn_index. Phase 2 (Auditor) runs every k turns (default 3, configurable via audit_interval_turns): a stateless child session sees the event graph + recent verdicts (not the raw trajectory) and submits a Verdict + optional Reminder via submit_verdict. Failure modes are visible — extractor_no_call / extractor_error / extractor_empty / audit_no_call / audit_error entries replace silent no-drift fallbacks. Event graph is append-only; invalidation carried as free-text relation in new event's summary + refs pointing at superseded id (per feedback_no_preset_subjective_labels.md). JSON-Schema enums for EventKind/DriftType derived from the enum classes; drift=true ⇒ type required enforced at the provider edge via if/then. Public contract preserved: schema.py Event/Verdict/Reminder/EventKind/DriftType + cards.py + cards_tools atom + inherit_provider builtin + BeforeAgentStartEvent injection. AFC card corpus at contrib/extensions/llmharness/references/papers/cards/ (42 cards) is the LLM judge's reference material, exposed via the cards_tools atom (cards_list / cards_get) — not a static prompt."
    design: "designs/llmharness-cognitive-audit.md"
    related_concepts: [extension_as_scenario, observability, sub_agent_lifecycle, self_modifiable_architecture, pluggable_architecture, agent_team]
    plans: []
    tasks: []

