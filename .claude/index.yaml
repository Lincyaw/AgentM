        covers:
          - "Mandatory field rejection — SystemConfig, AgentConfig, OrchestratorConfig, ScenarioConfig (§ Configuration — startup validation)"
          - "ScenarioConfig composition — accepts complete valid scenario (§ Configuration — scenario.yaml)"

  trajectory_system:
    description: "Hierarchical trace capture via TrajectoryCollector (JSONL event recording). Independent checkpoint chains per agent, linked by task_id. Export to RL training format. LLM input recording via TrajectoryMiddleware (on_llm_start, on_tool_call, on_llm_end hooks)."
    design: "designs/orchestrator.md"
    related_concepts: [system_architecture, orchestrator, recovery_system, memory_system, execution_runner, trajectory, debug_console, middleware_system]
    plans: []
    tasks: []

  recovery_system:
    description: "Four-layer error handling: Worker self-heal, API retry (ChatOpenAI max_retries + SimpleAgentLoop._invoke_with_retry() logic), Orchestrator decision (with error summary + last steps), manual system recovery via checkpoint resume. Debug replay via checkpoint fork."
    design: "designs/system-design-overview.md"
    related_concepts: [system_architecture, trajectory_system, orchestrator, sub_agent, execution_runner]
    plans: []
    tasks: []
    tests:
      - file: "tests/snapshot/test_error_recovery.py"
        covers:
          - "Inject/abort workflows (§ Recovery Layer 3)"

  execution_runner:
    description: "AgentRuntime: manages async worker execution. Provides dispatch_agent/check_tasks/inject_instruction/abort_task tools. Spawns workers as AgentHandle instances, bidirectional communication via inbox queues. Streams events to frontend WebSocket."
    design: "designs/orchestrator.md"
    related_concepts: [orchestrator, sub_agent, frontend_architecture, trajectory_system, trajectory, debug_console]
    plans: []
    tasks: []
    tests:
      - file: "tests/snapshot/test_tool_pipeline.py"
        covers:
          - "dispatch_agent creates worker task (§ Orchestrator Tools)"
          - "check_tasks returns completed/failed results (§ Orchestrator Tools)"
      - file: "tests/snapshot/test_error_recovery.py"
        covers:
          - "inject_instruction rejected for non-running tasks (§ Instruction Injection)"
          - "abort_task cancels running worker (§ AgentRuntime)"

  frontend_architecture:
    description: "Read-only observation dashboard: Agent Topology (d3.js), Execution Monitor (timeline+detail), Conversation View (scenario plugin), Debug Panel (checkpoint browser). Single HTML file, React + WebSocket + d3.js. Scenario plugin architecture for extensibility. Backend streams events via AgentRuntime."
    design: "designs/frontend-architecture.md"
    related_concepts: [system_architecture, trajectory_system, orchestrator, execution_runner, configuration_system, debug_console]
    plans: []
    tasks: []

  trajectory:
    description: "TrajectoryCollector: structured event capture to JSONL with async/sync recording, fan-out listeners, thread safety, and context manager lifecycle"
    design: "designs/trajectory.md"
    related_concepts: [system_architecture, orchestrator, execution_runner, debug_console]
    plans: []
