# AgentM Concept Index
#
# This refactor intentionally keeps one consolidated SDK abstraction design.
# Add a separate concept only when it has an independently maintained contract;
# deleted implementations and proposals do not remain as index entries.

concepts:
  sdk_core_abstractions:
    description: >-
      Stable SDK contracts and implementation status for provider streaming,
      cancellation, tool execution, trajectory fork/resume/cache/compaction,
      persistence, resources, environments, extensions, and gateway boundaries.
      Exactly one selected TrajectoryStore is authoritative; optional telemetry
      is an independent diagnostic plane.
    design: "../docs/refactor-abstract-inventory.md"
    related_concepts: [observability]

  observability:
    description: >-
      Optional logs and spans correlated with, but never authoritative for,
      trajectory. OTLP is a diagnostic transport and ClickHouse is an optional
      collector-managed query backend; neither participates in resume, fork,
      cache, compaction, or trajectory fallback.
    design: "designs/observability.md"
    related_concepts: [sdk_core_abstractions]
