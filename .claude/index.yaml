# AgentM Concept Index
# Maintenance rules: see CLAUDE.md "Design docs (.claude/)"

concepts:
  # === ACTIVE ===
  # Live v2 architecture concepts. Edit these as the design evolves.

  pluggable_architecture:
    description: "First-principles pluggable architecture. Unreplaceable-substrate axiom: the only thing that cannot be a replaceable extension is the act of loading replacements itself; anything else — including defaults — lives as an atom that the substrate loads. Three-layer package boundary collapses harness back into core: agentm.core (substrate: abi + runtime + lib; AgentSession/EventBus/SessionManager/Loader live here) / agentm.extensions (atoms, including default policy impls like operations_local, llm_<provider>, session_state_memory) / agentm.cli (+ embedded SDK / future HTTP/RPC presenters). agentm.harness and agentm.llm as separate packages are dissolved; providers become atoms. Five pluggability axes as Protocol ports in core.abi: StreamFn (LLM), Tool+Operations (env; Operations registered by an atom via api.register_operations, not constitution-only), SessionManager/SessionStore (state), ResourceLoader (project context), EventBus+ExtensionAPI plus RetryPolicy (policy). Substrate provides register_* hooks and asserts at freeze time that required services exist; it never instantiates a default itself. The Jupyter-import contract is restated as 'zero side effects at import', not 'runtime classes excluded from core'."
    design: "designs/pluggable-architecture.md"
    related_concepts: [agent_loop, extension_as_scenario, operations_ports, observability, self_modifiable_architecture, evolution_substrate, git_backed_versioning, textual_tui, runtime_context_atom]

  agent_loop:
    description: >-
      Per-turn termination protocol for AgentLoop.run, expressed as sum types.
      ToolOutcome (ToolContinue|ToolTerminate) is what tools return;
      TerminationCause is a sealed hierarchy describing WHO ended the loop and
      WHY (ModelEndTurn, ToolTerminated{tool_name,reason}, MaxTurnsExhausted,
      SignalAborted, ProviderTruncated{kind}, ProviderProtocolViolation{detail},
      BudgetExhausted), with a class-var `final` that controls override
      semantics. LoopAction (Step|Stop(cause)|Inject(messages)) is what the
      kernel does next. Single decide_turn_action event fires every turn
      (including kernel-imposed terminations, for symmetric observability)
      carrying a TurnObservation snapshot; extensions return LoopAction|None to
      override. Resolution lattice: final causes shadow everything; otherwise
      Inject>Stop>Step with Inject messages concatenated in registration order.
      Tool calls go through the substrate executor instead of inline
      tool.execute: default `event_loop` gives an explicit asyncio.Task boundary,
      `thread` runs the tool coroutine in a worker-thread loop to protect the
      session event loop, `process` runs a pickleable/importable tool coroutine
      in a spawned child process that the parent can terminate/kill/join on
      signal or cancellation, and reserved `sandbox` fails loudly until
      resource-isolated execution lands. Replaces the old multi-flag
      (assistant.stop_reason + tool_calls presence + BeforeAgentEndEvent.stop_reason
      + cancel/append dict) protocol that silently masked provider/parser
      disagreements and buried multi-handler resolution rules in folklore
      comments. Hard-cut migration in PR #58 (no shims): tools wanting to
      terminate return ToolTerminate; before_agent_end handlers move to
      decide_turn_action returning Inject(messages=[...]). LLM preflight
      debugging is owned at this same loop boundary: env-gated prompt dump /
      dry-run fires after before_send_to_llm and before StreamFn so traces show
      the final system/messages/tools payload without provider-specific code.
    design: "designs/agent-loop.md"
    related_concepts: [pluggable_architecture, sub_agent_lifecycle, observability, extension_as_scenario, session_inbox, handler_priority]

  handler_priority:
    description: "Per-channel dispatch-order declaration on the event bus, decoupling handler order from atom install/registration order (previously coupled to filename via alphabetical auto-discovery). BusPriority symbolic tiers (core/abi/events.py) — PRE=100 (security gates / validation / sanitizers that must run before normal handlers), NORMAL=500 (default; business-logic atoms), POST=900 (audit / tracing / observability; sees final state). Lower number runs earlier. One knob covers both mutation channels (earlier handler sees state first) and replacement channels (last non-None return wins, e.g. decide_turn_action resolution lattice). Exposed via api.on(channel, handler, priority=...) / EventBus.on; raw integers between tiers are legal but discouraged — symbolic constants are the supported door. Backward compatible: existing atoms land in NORMAL. No dependency graph (no depends_on/before/after), no cross-channel priority, no handler-level disable. atom_reloader preserves tier ordering across reload."
    design: "designs/handler-priority.md"
    related_concepts: [agent_loop, pluggable_architecture, self_modifiable_architecture, observability, event_handler_convention]

  event_handler_convention:
    description: "Convention for bidirectional event handler communication: handlers mutate typed fields on the event object, runtime reads event after emit(). Return-dict protocols (return {'system': ...}, return {'block': True}) are deprecated to backward-compat fallback. Three field patterns: last-wins (str|None, handler overwrites), accumulator (list, handler appends), first-match (Optional, first setter claims). Eliminates silent-failure bugs from mismatched mutation/return channels. Applies to ALL event channels uniformly. Motivated by 5-handler system-prompt-drop bug and comparison with Gin/Express/Koa context patterns."
    design: "designs/event-handler-convention.md"
    related_concepts: [handler_priority, agent_loop, pluggable_architecture]

  session_inbox:
    description: "ACCEPTED (design resolved 2026-05-28; implementation starting step 1). One first-class SessionInbox as the single entry point for EVERY message that enters the agent loop — user input, background-task completion, ticker status, monitor/wakeup fires, subagent findings, cross-agent messages. Motivated by four requested affordances (per-tool-call foreground/background, auto-background after ~60s, ticker status report, agent-defined monitor/scheduled-wakeup — mirroring Claude Code's Bash run_in_background / BashOutput / Monitor / ScheduleWakeup) that all reduce to ONE question: how does an out-of-band event become a message inside the loop. The only clean seam today is decide_turn_action → Inject (abi/loop.py:599-620). Two orthogonal concepts must not be conflated: (A) background WORK = a tool/subagent running as an asyncio.Task while the agent keeps taking turns (sub_agent already proves this — dispatch spawns create_task + immediate ticket at sub_agent.py:737, polls via check_tasks/wait_subagent, injects via inject_instruction, aborts via signal, and a decide_turn_action floor refuses termination with unread findings at :834); (B) out-of-band SIGNAL injection = how that event lands as a message. Everything funnels through the inbox. InboxItem carries a mechanism-level `source` routing enum (user/background/ticker/monitor/subagent — objective plumbing, not a subjective classification, so it does not violate the no-preset-enums rule) deciding whether it lands as UserMessage / synthetic tool_result / system-reminder note, plus an optional dedup_key. CORE MODEL = one entry + one driver, kept orthogonal: ENTRY (how a message gets in) is always inbox.push; DRIVING (who runs the loop, how a caller learns 'this round finished') is always a single driver (no re-entrant AgentLoop.run). prompt() does NOT bypass the inbox or grab its own driver — it is sugar = push(source=user) + await the next agent_end + return messages, so CLI/SDK `messages = await session.prompt(...)` still works. One-shot CLI = start driver → push → await agent_end → close → exit; long-lived host may use prompt OR inbox.push + bus subscription (same mechanism, two usages, NOT two APIs). A runtime-owned (not atom) decide_turn_action handler drains at each turn boundary, renders per source, returns Inject — NO change to kernel AgentLoop. The drain rule GENERALIZES sub_agent's floor: at a turn boundary, inbox non-empty ⇒ drain+Inject+keep running instead of Stop ('unread findings' = special case 'finding landed in inbox'); final=True causes (budget/signal/max_turns) still hard-win. Completion boundary: prompt awaits real Stop+agent_end (inbox empty AND ModelEndTurn); floor re-runs emit no agent_end so prompt never returns early; well-defined under low-concurrency CLI, fuzzy under multi-source host where callers use push+subscribe. The earlier 'optional kernel Park' is ABSORBED by the driver's wait_nonempty (kernel loop stays pure 'one round to idle then return'; staying-alive lives in the driver's outer while). Routing user input through the inbox collapses prompt()/tick() (kills near-duplicate session.py:242-406), unifies idle-wakeup, and gives PENDING user input while the agent runs. send_user_message becomes a thin inbox.push(source=user) wrapper (ABI-compatible); pending_user_messages deleted. Inbox items are append-only new messages (prefix-cache friendly); ephemeral reminders still ride the last-message tail and do NOT go through the inbox. Producers are pure single-file atoms: background_exec (wraps api.tools; auto-backgrounds via timeout OR pending core inbox input, leaving the task running and returning a ticket as the immediate tool_result, real result arrives later as an inbox item; check_background/wait_background/cancel_background are companion controls that are never auto-backgrounded) and monitor (schedule_wakeup/create_monitor/list_monitors/cancel_monitor). sub_agent's registry+completion-injection extracted into core.lib (§11 forbids atom→atom import) so both background_exec (unit=coroutine) and sub_agent (unit=child session) sit on it; sub_agent's bespoke floor DELETED in favour of the generalized inbox rule; subagents get loop/monitor for free since a child is a full session loading the same atoms (recursion); inject_instruction IS SendMessage. One-shot `agentm \"<prompt>\"` (cli.py:530 asyncio.run-then-exit) is the WRONG home for tickers/monitors. RESOLVED DECISIONS: (1) default cooperative turn-boundary pending; interrupt key = abort turn via signal (abi/loop.py:440,667) + preserve context + resume with new input via inbox; (2) ticker = milestone-driven (completion/error/new-output/silence-warning) + sparse heartbeat fallback, dedup_key REPLACES same-key undrained item (never stacks); (3) one entry + one driver + prompt-as-sugar, no dual API, no separate Park, floor generalized; (4) FIFO no priority (drain-all injected as one arrival-ordered batch); (5) undrained-window persistence MVP none (transient signals regenerate on restart; items hit session log only once drained via message_persisted; TODO). IMPLEMENTATION ORDER: 1 spine (SessionInbox + runtime drain handler + single driver + prompt/tick collapse + send_user_message wrapper + delete pending_user_messages; does NOT touch sub_agent, floors coexist via Inject concatenation abi/loop.py:317); 2 extract sub_agent registry→core.lib + route findings through inbox + delete floor; 3 background_exec; 4 monitor; 5 long-lived host driver + interrupt-and-resume."
    design: "designs/session-inbox.md"
    related_concepts: [agent_loop, sub_agent_lifecycle, nested_session_task, extension_as_scenario, pluggable_architecture, single_process_gateway]

  self_modifiable_architecture:
    description: "Boundary refinement of pluggable_architecture: core/extensions split is drawn by 'what an agent can safely self-modify' rather than mechanism vs policy. Constitution layer is uniform on the modifiability axis (none of core/ is agent-modifiable) but split on the visibility axis into core/abi/ (types & Protocols, atom + llm import), core/lib/ (pure-function utilities, atom imports as stdlib), and core/_internal/ (stateful subsystems — skills, prompt_templates, catalog/, compaction engine — atoms reach exclusively via ExtensionAPI services: api.get_operations / api.skills / api.catalog / api.compaction (prompt registry now via api.get_service('prompt_templates')). The earlier operations_impl module was promoted to the operations_local atom (extensions/builtin/operations_local.py) — Stage 1 of pluggable_architecture §10; direct import forbidden by validator). Autonomy layer holds atoms + scenarios + skills + prompts (tier-1 free / tier-2 reviewable). Discovery layer = fs scan + reload + assert_active. Adds versioned ExtensionAPI (api_version with grace window), transactional reload (validator → snapshot → install → rollback on failure), Event HookContract annotations for machine-readable handler semantics, and a new ExtensionAPI surface (reload_atom, freeze_current, list_atoms, is_constitution_path). Tier-2 atoms (permission, cost_budget, tool_filter, llm_compaction) require propose_change approval to reload. Compaction prompts are the canonical mechanism→policy split: prompt strings moved out of core into the llm_compaction atom, engine in core/_internal/compaction/ takes prompt as a required parameter. Establishes that change is safe and atomic; evolution-substrate.md establishes that change is evidence-driven; per_task_evolution_loop establishes WHO drives the change (a tuner meta-scenario optimizing for a specific task class)."
    design: "designs/self-modifiable-architecture.md"
    related_concepts: [pluggable_architecture, extension_as_scenario, single_file_extension_contract, observability, evolution_substrate, git_backed_versioning, per_task_evolution_loop]

  evolution_substrate:
    description: "Constitution-owned data layer that binds every (atom, scenario) version to all observation data generated under it, so rollback / composition / optimization become evidence-driven, not error-driven. Adds .agentm/catalog/{atoms,scenarios}/<hash>/ with frozen source + manifest.yaml + metrics.jsonl + runs/ + decisions.jsonl. Active-set fingerprint in every observability session.start header binds traces to the exact loaded version set. Indexer (constitution-layer, idempotent, rebuildable from raw observability) aggregates per-(atom_hash, scenario, task_type) statistics. tool_catalog atom (tier-1 read API) exposes list_versions / get_manifest / runs_for / get_source_at / list_history / rollback_resource. Hard problems addressed: statistical power (CI + inconclusive enforcement), confounding (experiment-mode lock), Goodhart (universal guard metrics + regressed flag), replayability (LLM response cache, Phase 3), catalog corruption (constitution-layer write-protect on .agentm/catalog/**). Phased: MVP = fingerprint + freeze + browse; Phase 2 = compare + decisions; Phase 3 = replay cache + experiment lock. NOTE: per per_task_evolution_loop (2026-05-02), §6 compare/find_best are demoted to optional — the tuner agent in that loop does its own LLM-native analysis on raw observability JSONL; catalog metrics.jsonl stays as cross-scenario browsing index, not on the decision path."
    design: "designs/evolution-substrate.md"
    related_concepts: [self_modifiable_architecture, observability, pluggable_architecture, extension_as_scenario, git_backed_versioning, per_task_evolution_loop]

  per_task_evolution_loop:
    description: "Operational shape of self-modification: optimization target is a task class, not a user. A production agent runs the task; a separate tuner agent (a meta-scenario at scenarios/<name>/tuner/) reads observability JSONL traces filtered by (task_class, fingerprint), proposes mutations to atoms / prompts / scenario composition, validates them against a pinned eval set, and activates winners that beat the baseline on the scenario's primary metric without guard regression. Three load-bearing reframes: (1) JSONL is the source of truth — tuner reads raw $AGENTM_HOME/observability/<session_id>.jsonl files directly; catalog metrics.jsonl is demoted to optional cross-scenario browsing index, NOT decision input; (2) no predefined stats API — compare/find_best from evolution-substrate.md §6 are downgraded to optional because the tuner is itself an LLM agent that does LLM-native trace analysis (which counts as success is policy in the tuner's system prompt, not a stats library; analysis quality scales with model capability automatically); (3) confounding killed by an eval set, not by sample size — production user inputs vary, so any compare on production traces conflates atom effect with task difficulty; a pinned scenarios/<name>/eval/ task suite gives a fixed input distribution. New autonomy-layer pieces: scenarios/<name>/eval/ directory (task YAMLs + grader.md/grader.py); scenarios/<name>/tuner/ meta-scenario (manifest.yaml + prompt.md); three new tier-1 atoms tool_query_traces (filter trace_id by task_class+fingerprint, lightweight summaries; agent reads bodies on demand via existing read tool), tool_eval_run (run eval suite under a proposed fingerprint without permanently mutating worktree — sub-session source overrides OR shadow worktree, Plan-stage decision), tool_propose_change (signature requires eval_run_baseline + eval_run_proposed + decision in {activate, rollback, exploratory}; activate gate is four-floor: economic threshold (≥+5%) AND statistical 2σ noise floor AND guard envelope (±10%) AND holdout non-regression — all four independent; exploratory channel waives only the first two. Tier-2 atoms still pending_human_approval; thin policy wrapper over reload_atom. ChangeSpec generalizes target beyond atom_source — Phase 2 unlocks system_prompt/manifest_extensions/manifest_field/scenario_compose). Activations land in .agentm/decisions/<scenario>/activations.jsonl (constitution-write-protected; renamed from decisions.jsonl to make room for Phase 2 candidates/ pool directory). task_class field on session.fingerprint becomes populated (was schema-defined but unfilled). Phase 2 reshapes around GEPA (Agrawal et al. 2026, arxiv 2507.19457): MAP-Elites Pareto candidate pool replaces single-incumbent hill climbing; tool_reflect atom separates diagnosis from mutation reading μ_f.feedback_text natural-language signal; System Aware Merge crossover combines non-dominated parents; per-module credit assignment via μ_f.module_feedback drives round-robin selection; rollout budget tracking via .agentm/decisions/<scenario>/budget.json; the four-floor gate's role narrows from inclusion-gate to deployment-gate. Production agent does not know it is being optimized — tuner is async sibling, not parent. Reuses all existing constitution mechanism: reload_atom, ResourceWriter, observability sink, transactional rollback. Acceptance scenarios P1-P10 cover missing eval/, null task_class, evidence-missing rejection, ResourceWriter constitution rejection, post-activate production regression watching, tuner concurrency on shared atoms, eval budget exhaustion, tier-2 deferral, trace round-trip filtering, and git-backed activation history. Phase 2 IMPLEMENTED (2026-05-09): all 10 Layer B tasks shipped — Pareto candidate pool (B-1) with split inclusion/deployment gates, generalized ChangeSpec validators (B-3), rollout budget (B-6), tool_reflect diagnosis atom (B-2), per-module credit assignment (B-5), System Aware Merge (B-4) with parent_ids: list[str] schema, structural stop_after_no_improvement counter persisted via activations.jsonl (B-9), production-traffic auto-rollback via tool_guard_watch passive observer (B-7), opt-in cross-task transfer (B-8), baseline_fingerprint concurrent-tuner-race fix (B-10). Five new fail-stop test classes added: pareto inclusion correctness, stop-counter persistence, merge gate noise floor, stale-baseline rejection, auto-rollback evidence floor. No agentm.core.* modifications; §11 contract clean."
    design: "designs/per-task-evolution-loop.md"
    related_concepts: [evolution_substrate, self_modifiable_architecture, observability, extension_as_scenario, git_backed_versioning]

  self_evolving_skill_loop:
    description: "Offline loop that reads historical trajectories + GT, identifies recurring failure patterns at event-graph level, distills each into a SKILL.md, validates against held-out cases, and keeps or discards — agent improves over time without code changes. Only output is skill files; only channel is prompt injection via existing skill_loader. Quality over quantity: skills get retired when superseded or marginal. Orthogonal to strategy axes (A–E); measurable independently. Builds on per_task_evolution_loop philosophy (pinned eval, evidence-gated acceptance) but narrowed to skill-only mutations with GT-based scoring."
    design: "designs/self-evolving-skill-loop.md"
    related_concepts: [per_task_evolution_loop, evolution_substrate, skills, llmharness_cognitive_audit, hypothesis_driven_rca]

  git_backed_versioning:
    description: "Replaces bespoke per-atom version store with git as the version layer. Catalog keeps only what git does not provide — metrics.jsonl + runs/<trace_id> attribution. Source content, lineage (parent commits), authorship, timestamp, and rationale (commit message) all flow through git plumbing. New harness service ResourceWriter (constitution layer) is the single chokepoint for all managed writes: classifies path as constitution / managed / unmanaged from core-manifest.yaml's managed.globs section, rejects constitution writes, git-commits managed writes before mutation, passes through unmanaged writes uncommitted. tool_edit / tool_write / reload_atom retrofit to write through ResourceWriter; the freeze→tempfile→os.replace→rollback dance in atom_reloader collapses into writer.write + git restore on failure. Browse API becomes git-log/git-cat-file wrappers; version IDs become full git SHAs replacing compute_atom_hash content hashes. Rollback is ResourceWriter.restore(path, target_sha) routed through the same writer. On absent .git/ the writer auto-inits .agentm/repo/ as a shadow worktree; advisory mode if git binary missing. Skills, prompts, scenarios, and .claude/ docs all gain versioning for free. ~300 LoC deleted from freeze.py + _layout.py; parent_hash dead-code problem disappears (git provides it); direct-edit bypass closed."
    design: "designs/git-backed-versioning.md"
    related_concepts: [self_modifiable_architecture, evolution_substrate, pluggable_architecture, per_task_evolution_loop]

  textual_tui:
    description: "The agentm-terminal interactive frontend, rebuilt for channels-v2 as a WIRE CLIENT of the single-process gateway (not an in-process presenter — the AgentSession lives in the gateway daemon). Dual role: (1) composer-first conversation surface (streamed text, thinking, collapsible tool-call blocks, approvals, multi-line input, inline slash/file/help affordances) and (2) control + observability surface for AgentM runtime and workflows. 2026-07-03 Claude Code/CCR TTY study refined the UX target, and terminal-go now keeps the parent conversation primary while spawned workflow/sub-agent sessions surface as inline background task rows and picker entries only while they are actionable; completed rows disappear and their output remains in the parent transcript/task summary. The same bottom surface also renders structured background_exec / monitor activity (auto-backgrounded shell commands, wakeups, and monitors) from gateway wire events without promoting those units into tabs. Common controls are inline around the composer (`?`, `/`, `@`, `↓`, second-press Esc/Ctrl+C confirmations) rather than modal-first. The process boundary remains decisive: the TUI renders only what the gateway pushes over the wire; wire_driver projects bus events into outbound bodies via metadata.kind, ephemeral frames stream directly to connected peers, and durable frames go through outbox enqueue. Local use is split cleanly: `agentm daemon` owns the reloadable gateway supervisor lifecycle, `agentm-terminal` is a pure client that defaults to that socket, and `agentm terminal` composes them for one-command startup."
    design: "designs/textual-tui.md"
    related_concepts: [pluggable_architecture, observability, single_process_gateway, command_routing]

  observability:
    description: "Per-session OTel-flavored JSONL diagnostic stream complementary to trajectory. Single principle: every signal goes through the bus. EventBus exposes EventBusObserver + emit_sync (sync handlers only, async skipped). New bus events: ApiRegisterEvent / ApiSendUserMessageEvent (harness, emit_sync from ExtensionAPI), LlmRequestStartEvent / LlmRequestEndEvent (kernel, around stream_fn drain in AgentLoop with try/except for error path), ExtensionInstallEvent (harness, around load_extension). observability builtin is a pure subscriber + Observer installed via ExtensionAPI.add_observer; no EventBus or ExtensionAPI monkey-patching. Records: session.start/ready/end, extension.install, api.register, api.send_user_message, llm.request.start/end, event.dispatch, handler.invoke, turn.summary. Writes to $AGENTM_HOME/observability/<session_id>.jsonl by default, flushed per record. evolution_substrate extends session.start with active-set fingerprint binding the trace to exact (core, scenario, atom_versions) tuple."
    design: "designs/observability.md"
    related_concepts: [pluggable_architecture, extension_as_scenario, evolution_substrate, self_modifiable_architecture, textual_tui, per_task_evolution_loop, single_event_log]

  single_event_log:
    description: "LANDED 2026-05-24. Collapses the two parallel JSONL streams (SessionManager trajectory file under ~/.agentm/sessions/ and observability event file under $AGENTM_HOME/observability/) into one per-session OTLP/JSON ndjson event log at $AGENTM_HOME/observability/<session_id>.jsonl. One ResourceSpans / ResourceLogs element per line, produced via opentelemetry-sdk Tracer/LoggerProvider plumbing (canonical encoder from opentelemetry-exporter-otlp, MessageToDict'd into proto-JSON shape) so collector pipelines (filelog + otlpjson decoder) consume the file directly. Span vocabulary: invoke_agent / chat / execute_tool with gen_ai.* semconv attributes. Log vocabulary: agentm.session.{header,start,ready,fingerprint,end}, agentm.message.appended, agentm.turn.summary, agentm.agent.end, agentm.{extension,atom}.{install,reload,unload}, agentm.api.{register,send_user_message}, agentm.diagnostic, agentm.event.dispatch + agentm.handler.invoke. SessionManager._append_record no longer writes its own file; it dispatches MessageAppendedEvent through the EventBus, and the observability atom emits one agentm.message.appended log record (body = SessionEntry dict verbatim) via api.get_session_telemetry().logger. continue_recent walks scopeLogs filtering on eventName to rebuild the in-memory trajectory. All writes go through SDK BatchProcessor wrapped in PR-A's BlockingBatch* subclasses (block on overflow, not drop); the _SessionTelemetryHolder installs a SessionShutdownEvent handler at BusPriority.POST so observability emits agentm.session.end before the drain. Dispatch_id lives on the Event ABI as a real field (PR-E, `531378b`): Event is `@dataclass(slots=True)` with `dispatch_id: str = field(default_factory=lambda: uuid.uuid4().hex, kw_only=True)`; the EventBus reassigns the field on every emit; observability reads `event.dispatch_id` and stamps it onto agentm.event.dispatch + agentm.handler.invoke records so consumers recover the fanout join. before_send_to_llm stops carrying the full messages payload — canonical trajectory lives in agentm.message.appended records — making the chars+sha256_prefix redaction layer redundant for that channel (still serves LlmRequestStart/End when redact_prompts=True). Landed across PR-A (file exporters, be78860), Commit 1 (dispatch_id, 9bae7dc), Commit 2a (ExtensionAPI.get_session_telemetry service facade, ad6c5cb), Commit 2b (atomic writer + readers cutover, 1f9caa3), Commit 3 (this doc sync). Followups: PR-E landed (Event ABI dataclass with dispatch_id field, `531378b`), PR-G landed (TraceReader API in core.runtime.trace_reader, re-exported via agentm.core.abi — every reader site now depends on it; tests/unit/core/test_trace_reader.py locks the surface), PR-H landed 2026-05-24 (one TracerProvider + LoggerProvider per process carrying only service.name=agentm + service.version on the resource; agentm.session.id moved from resource attribute to per-span / per-log attribute, stamped by the observability atom and the SessionManager direct-write path; per-session BlockingBatchSpanProcessor / BlockingBatchLogRecordProcessor attached to the shared providers with a session_id_filter that drops cross-session records before they enter the queue; session shutdown drains and removes those processors via the SDK's internal multi-processor tuple; global providers torn down once via atexit; tests/unit/core/test_otel_export.py locks the contract — two sessions share a provider, shutdown of one leaves the other intact, scenario/session attrs no longer appear in the resource block), PR-F landed 2026-05-24 (declarative Event→OTel mapping: each concrete Event subclass declares its own to_otel(telemetry) translator and the observability atom collapses to a thin dispatcher that subscribes one uniform `event.to_otel(telemetry)` handler per typed channel; lifecycle pairing for Start/End span families goes through SessionTelemetry.open_span / pop_span / close_open_spans helpers keyed by (span_kind, correlator); SessionTelemetry gains obs_* fields stamped by the observability atom at install time so per-event translators have session-scoped metadata without reaching ExtensionAPI; observability still owns the bus-observer side — agentm.event.dispatch / agentm.handler.invoke / agentm.handler.mutated — plus the atom-hash bookkeeping for agentm.session.fingerprint and agentm.atom.reload; on-disk wire format unchanged, locked down by test_observability_semconv.py; coverage enforced by tests/unit/core/test_event_to_otel.py — every concrete Event subclass either overrides to_otel or appears in the explicit intentional no-op set, so new Event classes cannot silently drop off the wire)."
    design: "designs/single-event-log.md"
    related_concepts: [observability, pluggable_architecture, agent_loop, evolution_substrate]

  extension_as_scenario:
    description: "Pluggability model: a scenario is a *composition* of atomic extensions, expressed as data (YAML), not code. Atoms (one Python module, one responsibility) live in extensions/builtin/; scenario recipes live in extensions/scenarios/*.yaml; opt-in contrib packages may group multiple tier-2 single-file atoms under contrib/extensions/<package>/ and mount them explicitly. load_scenario(name) flattens and requires-sorts YAML to list[(module, config)] for AgentSession.create; list_scenarios() exposes cheap home-contrib manifest discovery for CLI/gateway pickers, while validate_scenario() fail-stops explicit selection before session start. Same mechanism for built-in and third-party scenarios — no privileged path. Legacy harness/scenarios/tools tree is deleted in Phase 2.5 single sweep. self_modifiable_architecture extends ExtensionManifest with api_version, affects, tier fields; evolution_substrate makes scenarios catalogable and queryable like atoms. RCA now uses a shared contrib rcabench_contract atom rather than duplicated scenario-local vendor loading."
    design: "designs/extension-as-scenario.md"
    related_concepts: [pluggable_architecture, operations_ports, single_file_extension_contract, self_modifiable_architecture, evolution_substrate, runtime_context_atom]

  single_file_extension_contract:
    description: "§11 hard rule: one new built-in extension = one new .py file under extensions/builtin/<name>.py with module-level MANIFEST: ExtensionManifest plus install(api, config). Auto-discovery (extensions.discover) and a mechanical validator (extensions.validate, 8 checks keyed to design §11.4) gate the catalog. Designed so future agent self-edits have a tiny, verifiable surface — atom-to-atom imports forbidden, harness.session import forbidden, allow-listed imports only, private ExtensionAPI reflection/attribute overwrites/mutable globals/dynamic agentm.* imports/concrete harness-service downcasts and undeclared peer-name string literals rejected. Phase 2.0c scaffolding landed; A/B/C/D1 atoms must conform. self_modifiable_architecture grows the manifest with api_version (integer ABI + grace window), affects (declared metric surface for catalog), tier (1 free / 2 reviewable). Validator gains api_version compatibility check and constitution-path rejection. Contrib package atoms keep the same per-atom contract while package-internal helpers handle shared parsing/rendering."
    design: "designs/extension-as-scenario.md#11-single-file-self-contained-extension-contract"
    related_concepts: [extension_as_scenario, pluggable_architecture, self_modifiable_architecture, evolution_substrate]

  runtime_context_atom:
    description: "Builtin atom at src/agentm/extensions/builtin/runtime_context.py that prepends a <runtime_context> block (workspace cwd from api.cwd + host platform/python from stdlib platform) to the system prompt via BeforeAgentStartEvent, plus a one-paragraph instruction telling the agent to answer cwd questions from this path rather than guessing. Generic — usable by any scenario by listing the module in extensions YAML; zero config (config_schema={} so a bare entry validates). §11-compliant single file; allowed imports stdlib + agentm.extensions + agentm.core.abi.events + agentm.core.abi.extension. Distinct from the system_prompt atom: system_prompt takes a static config string, runtime_context resolves at install-time from the live ExtensionAPI/host so scenario authors do not hand-build the workspace fact. Replaces the channel-side runtime_identity.py + extra_extensions injection from contrib/channels/, which violated layering by composing prompt content in the channel/gateway layer; the cwd-hallucination bug it addresses (agent answering with operator's $HOME instead of session cwd) is generic to every scenario, not Feishu-specific. Channel-format hints (chat surface prefers short paragraphs, no tables) stay in scenario system_prompt text where they are persona, not runtime fact."
    design: "designs/runtime-context-atom.md"
    related_concepts: [extension_as_scenario, pluggable_architecture, single_file_extension_contract]

  operations_ports:
    description: "FileOperations / BashOperations Protocols in src/agentm/core/abi/operations.py. Default LocalFileOperations / LocalBashOperations live as an atom in src/agentm/extensions/builtin/operations_local.py (Stage 1 of pluggable_architecture §10 landed 2026-05-11; the earlier core/_internal/operations_impl.py module has been deleted). The environment boundary is hybrid after issue #89: file_tools read consumes FileOperations through ExtensionAPI operations, file_tools write/edit consume ResourceWriter as the single mutation chokepoint, and tool_bash consumes BashOperations (which subsumes ls/find/grep — dedicated default search atoms are removed in favour of shell composition). Operations is registered like any other axis: an early atom in the default scenario calls api.register_operations(file=..., bash=...); the substrate enforces 'registered at most once before freeze' and 'must be registered by freeze time, else fail loud'. It is no longer a constitution-only axis."
    design: "designs/extension-as-scenario.md#10b6"
    related_concepts: [pluggable_architecture, extension_as_scenario]

  skills:
    description: "Filesystem-discovered SKILL.md files (YAML frontmatter + body) advertised in the system prompt as a compact <available_skills> XML index; LLM loads any specific skill on demand via the `read` tool. Implements progressive disclosure. Includes core/_internal/skills.py (loader + validator + diagnostics), core/lib/frontmatter.py (in-house parser, promoted from resource_loader._split_frontmatter), and extensions/builtin/skill_loader.py atom that injects the index via before_agent_start."
    design: "designs/skills.md"
    related_concepts: [prompt_templates, pluggable_architecture, extension_as_scenario, search_tools]

  prompt_templates:
    description: "Filesystem-discovered markdown templates with YAML frontmatter. /<name> args expansion with bash-style placeholders ($1, $@, $ARGUMENTS, ${@:N:L}). Loader, substituter, and the in-memory named-prompt registry all live in extensions/builtin/prompt_templates.py — the atom publishes itself under api.set_service('prompt_templates', ...) and consumers (compaction_prompts, llm_compaction) reach it via api.get_service('prompt_templates'). The atom claims the PROMPT_REGISTRY floor role so the session factory auto-mounts it whenever compaction_prompts/llm_compaction are loaded. Code-registered slash commands win over templates on name collision via the slash_commands atom and typed CommandDispatcher service facade; non-matching /-prefixed text falls through verbatim."
    design: "designs/prompt-templates.md"
    related_concepts: [skills, extension_as_scenario, pluggable_architecture, compaction]

  compaction:
    description: "Full-compress context compaction. When the durable branch crosses should_compact (context_tokens > context_window - reserve_tokens; disabled when reserve >= window), every turn since the previous compaction is summarized into ONE user message that replaces the whole prior context — no verbatim recent tail, so no cut-point/split-turn machinery. Materialized as a user message because the rebuilt context can be [summary] alone and a completion request must not end on an assistant turn. Incremental chaining: each pass folds only new turns (index > previous covered_through_turn) into the prior summary via an update/merge prompt (bounded, internally consistent, O(n) not O(n^2)); read_files/modified_files carry forward. Summary tags chunks [Turn N]; turns numbered by core.lib.enumerate_turns (a turn starts at each UserMessage; compaction/branch_summary entries skipped; indices stable because the tree only appends). get_branch() retains the full original trajectory; the read_history(start, end?) tool re-derives the same numbering and returns verbatim turn content on demand — in-session (live SessionManager), distinct from query_traces/agentm trace (cross-session observability JSONL). Engine in extensions/builtin/llm_compaction.py; value types in core/abi/compaction.py; prompts/materializer in extensions/builtin/compaction_prompts.py (kernel owns no prompt text, issue #76). Deferred: segmented summarization for very large backlogs; separate cheaper summary model."
    design: "designs/compaction.md"
    related_concepts: [prompt_templates, agent_loop, extension_as_scenario, pluggable_architecture, single_file_extension_contract, observability]

  search_tools:
    description: "Current search tool policy: AgentM does not expose default grep/find/ls/glob tool atoms or thin CLI wrappers. Local workspace search stays on tool_bash with mature commands such as rg, rg --files, find, and git ls-files. file_tools registers only guarded read/write/edit; future dedicated search atoms must justify non-CLI semantics such as remote FileOperations support or explicit safety/audit contracts."
    design: "designs/search-tools.md"
    related_concepts: [edit_diff, tool_event_narrowing, extension_as_scenario, operations_ports, pluggable_architecture]

  edit_diff:
    description: "Pure-function module core/lib/edit_diff.py owning the edit-application algorithm: line-ending detection/restoration, UTF-8 BOM handling, NFKC + smart-quote/dash/space fuzzy normalization, and multi-edit application pipeline (Edit{old,new} sequences). Consumed by the upgraded tool_edit atom in Tier 2."
    design: "designs/edit-diff.md"
    related_concepts: [search_tools, tool_event_narrowing, extension_as_scenario, operations_ports]

  tool_event_narrowing:
    description: "Per-tool typed event subclasses (BashToolCallEvent, ReadToolCallEvent, GrepToolCallEvent, ...) + isinstance-based TypeGuard helpers (is_bash_tool_call, ...) replacing the single ToolCallEvent with stringly-typed tool_name. Recommends Python match-statement dispatch as the idiomatic style. Custom user tools fall through to the base ToolCallEvent. Coordinated single-PR migration across all atoms that branch on tool_name."
    design: "designs/tool-event-narrowing.md"
    related_concepts: [search_tools, edit_diff, pluggable_architecture, extension_as_scenario]

  sub_agent_lifecycle:
    description: "Async sub-agent dispatch lifecycle: parent's kernel loop must not declare agent_end while a child has unread findings. After PR #58 the floor is implemented on the agent_loop redesign — sub_agent subscribes to decide_turn_action and, on a voluntary Stop(ModelEndTurn|ToolTerminated) when there are unread/running children, returns Inject(messages=[notification]) so the loop stays alive. Completed-but-unread children's final_text plus still-running children are concatenated into one synthesized user-role notification (<subagent_result task_id=... purpose=...>...</subagent_result> + <subagent_pending task_id=... purpose=... />). The parent then chooses: write final report, wait_subagent(id) to block on one, check_tasks to block until any one progresses, or abort_task. Single read flag per task is the source of truth (never reset; consumed by check_tasks / wait_subagent / decide_turn_action). Three usage patterns share one mechanism — fire-and-forget (passive collection at exit), explicit wait (synchronous wait_subagent), steered fan-out (loop check_tasks reading as ready). dispatch_agent describes work and returns task_id + child_session_id; parent-visible tools do not accept budget/max_turns/max_tool_calls overrides, because worker loop limits are persona/scenario/runtime policy. Rejects synchronous dispatch (would lose parallel fan-out absent kernel-level parallel tool execution) and dead-letter / re-delivery (consumed-but-unattended findings are on the agent, same as ignored user messages). max_turns / signal / budget still strictly enforced — those causes have final=True so any Inject is ignored. cost_budget and other extensions can layer on the same hook. Child extension inheritance supports config-by-name: when an available inherited extension names a parent atom without config, sub_agent copies the loaded parent atom's resolved config by manifest name."
    design: "designs/sub-agent-lifecycle.md"
    related_concepts: [agent_loop, pluggable_architecture, extension_as_scenario, single_file_extension_contract, artifact_system, agent_team, nested_session_task, session_inbox, interactive_subagent]

  interactive_subagent:
    description: "DESIGN (resolved 2026-06-16; impl pending). Let a human send messages to a subagent and read its trajectory, not just watch it. Key insight: a subagent IS a full AgentSession (spawn_child_session) with its own SessionInbox + session_id, and the gateway runs in ONE process with every session — so children are reachable, just not registered with the gateway today. So this is addressing+plumbing, NOT a new capability. Unified model = every session (main or child) registered with the gateway; an inbound is routed by session_id to that session; input is ALWAYS inbox.push(source='user') (renders as a real UserMessage); the loop is run by whoever owns it, and if no one is running it (idle) the gateway kicks it once. Both the main agent's inject_instruction AND the human's message land in the SAME child inbox — the subagent is caller-agnostic. Three situations collapse to one mechanism: main session (gateway-driven), live subagent (parent's sub_agent monitor drains the inbox — so the parent naturally PERCEIVES the human's input), done subagent (gateway kicks ≈ resume — 'it's just a session'). Model A (collaborative side-channel) chosen over takeover/dual-drive. The one real subtlety is loop-driving concurrency: input is never a direct prompt() on a session another driver owns; only the idle branch needs an 'is a turn running?' check (SessionInbox's one-entry-one-driver rule). Explicitly NOT needed: no new wire field (inbound's session_key set to the child's id is the whole addressing story — no target_child_id), no special inject service/atom, no parent-ExtensionAPI hop (direct gateway registration replaces it). Impl surface: (1) gateway registers children (gateway-provided child-session registry service, mirrors child_wire_forwarder; §11-clean) + routes inbound by session_id to inbox + kicks iff idle + done-child falls through to resolve_session_state(resume=child_id); (2) sub_agent keeps children resumable (no teardown on finalize); (3) Go terminal sidebar lists registered sessions (main+subagents) with status, selecting one binds the input box to that session_id, reuses existing child view for the trajectory — tabs hold ONLY the main agent now (supersedes one-tab-per-child). Open decisions: idle detection (per-session driver-active flag), done-child eviction policy, race-safe kick guard."
    design: "designs/interactive-subagent.md"
    related_concepts: [session_inbox, sub_agent_lifecycle, single_process_gateway, textual_tui, nested_session_task, agent_team]

  artifact_system:
    description: "Append-only typed artifact store for sub-agent findings — replaces lossy 'final_text blob' handoff with reference-based handoff. New extensions/builtin/artifact_store.py registers four tools (artifact_write, artifact_read, artifact_list, artifact_grep) backed by sqlite at <cwd>/.agentm/artifacts/<root_session_id>.db. Session-tree-scoped: every descendant of a root session shares one db; cross-root sharing deferred to evolution_substrate / git_backed_versioning. Data model: Artifact{artifact_id, parent_id, kind, title, body, created_by: ProvenanceRef{session_id, task_id, persona, timestamp}, tags, parent_artifact_ids}. Append-only by design — no artifact_edit / artifact_delete; revisions create new artifacts referencing predecessors. Integrates with sub_agent_lifecycle's notification block: workers return <summary>...</summary> + <artifacts><ref id=... kind=... title=.../></artifacts> instead of full final_text dump, so orchestrator context grows logarithmically rather than linearly with worker count. Personas declare expected artifact_kinds in frontmatter as documentation. Maps to MAST failure-mode taxonomy: defends context-loss-at-handoff, cascade context poisoning, supervisor context bloat, summarization drift, inconsistent shared state. Out of scope: binary artifacts, ACL beyond session-tree, transactional updates, reference-counted GC (uses time-based retention)."
    design: "designs/artifact-system.md"
    related_concepts: [sub_agent_lifecycle, agent_team, evolution_substrate, pluggable_architecture, single_file_extension_contract]

  agent_team:
    description: "Composition pattern for multi-agent scenarios — explicitly NOT a Team SDK type, NOT a runtime mode switch. Built on four orthogonal pillars: (A) lifecycle floor from sub_agent_lifecycle, (B) shared memory tier from artifact_system, (C) brief contract via persona frontmatter input_schema advisory + persona-body self-rejection, (D) budget awareness via persona budget_defaults + runtime/scenario caps. Each pillar maps to specific named failure modes from the multi-agent literature (MAST taxonomy, Anthropic research-system lessons): context loss, cascade poisoning, supervisor context bloat, scope misinterpretation, token over/under-spend, etc. Core insight 'there is no mode switch': dispatch_agent + artifact_* + wait_subagent are always-loaded capabilities; LLM decides per-task whether to fan out, cache to artifacts, etc. — same shape as Claude Code's Agent tool. Runtime extension loading (api.reload_atom from self_modifiable_architecture) is orthogonal — for acquiring NEW capabilities mid-flight, not for switching team mode. Rejected: first-class Team type, peer-to-peer dispatch (orchestrator-only convention), built-in voting/arbitration (LLM does it), output schema enforcement (deferred), adaptive budget escalation by parent tool arguments. Persona frontmatter gains: input_schema, artifact_kinds, budget_defaults. All additions opt-in; existing scenarios continue to work."
    design: "designs/agent-team.md"
    related_concepts: [sub_agent_lifecycle, artifact_system, self_modifiable_architecture, extension_as_scenario, pluggable_architecture, single_file_extension_contract]

  dynamic_workflow:
    description: "LLM-authored deterministic orchestration as a tool — the model writes an async PYTHON script at runtime that fans out many child agent sessions (loops/branches/budget-driven scaling as code); the atom runs it as one tool call and only the final result returns to the model's context. Inverse of the turn-by-turn agent loop; composes with model-driven sub_agent (deterministic within a phase, adaptive between). Distinct from already-shipped PRE-WRITTEN orchestrators (tool_eval_run's for-task/for-sample loop): here the model authors the orchestration at runtime. KEY REVERSAL (was JS): the script runs as plain async Python on the host loop in a CURATED NAMESPACE, not in a QuickJS isolate. The original JS-isolate decision was reversed because the 'untrusted script' threat model does not hold — the script runs at the agent's OWN authority (the agent can already call bash/install_atom), and AgentM already runs LLM-authored Python via install_atom (self_modifiable_architecture), so sandboxing the orchestration script is both unnecessary and self-inconsistent; JS also cost native async, making a real pipeline impossible. The curated namespace (data-only __builtins__, no open/import/eval; time/random simply NOT injected for resume determinism) is a GUARDRAIL not a sandbox; hard isolation when needed = operations agent_env backend / process boundary, same as bash. SDK injected (per-run-bound closures, NOT an importable module → stays one atom): agent(prompt,*,scenario=,isolation=,tool_allowlist=)→str (spawn_child_session→child.prompt→last AssistantMessage text→shutdown); parallel(aws)=asyncio.gather (each agent self-limits via Semaphore); pipeline(items,*stages)=per-item chain, NO cross-item barrier (REAL native-async, not a parallel alias); budget(.total/.spent()/.remaining()); args; log/phase=fire-and-forget WorkflowPhaseEvent. WORKER MODEL (option A): a worker defaults its scenario to the orchestrator's own (api.scenario) — clean reload of that curated set — NOT scenario=None which auto-discovers ALL builtins (heavy toolset + the workflow tool itself + breaks Ark tool-call grammar). Anti-recursion: workers stamped purpose='workflow'; install() skips registering the workflow tool when api.purpose=='workflow'. Do NOT use tool_allowlist=[] to slim workers — it starves extensions that require their tools at install (file_mutation_queue needs edit/write). NET-NEW: workflow.py atom + curated-namespace runner (Semaphore min(16,cpu-2), 1000-agent backstop); _BudgetService summing each child's OWN bus TurnEndEvent.usage (child turn_end does NOT bubble to parent); workflow-local journal in artifact_store keyed by hash(prompt,opts) (NOT SessionStore.open). operations agent_env backend is a SOFT dep (runtime list_atoms() guard + derive bare name from module path to stay off the D4 peer-literal check, not MANIFEST.requires). Validated: 457 unit + real E2E on doubao (workflow→[Bonjour,hola] via 2 real children, trace-verified) + litellm/deepseek. Ark guided-decoding quirk (minItems>prefixItems on bloated worker toolset) is provider-internal, mitigated by slim workers. No Workflow SDK type, no mode switch (consistent with agent_team). Deferred: agent() schema/structured-output, per-child env (needs AgentSessionConfig field)."
    design: "designs/dynamic-workflow.md"
    related_concepts: [agent_team, sub_agent_lifecycle, artifact_system, single_process_gateway, operations_ports, pluggable_architecture, single_file_extension_contract, observability]

  shared_presenter_rendering:
    description: "Shared headless rendering contract for presenter surfaces: core/lib/render.py owns AssistantMessage text extraction, tool result text extraction, raw token UsageReport/FinalReport summaries, and tool result format selection from metadata or registered renderer hints. Cost remains a policy service (`cost_query`) registered by cost_budget and consumed opportunistically by CLI/TUI; missing service yields token-only output. Presenters map headless output to their own UI widgets without importing atom-private pricing or string-matching builtin tool identities."
    design: "designs/pluggable-architecture.md"
    related_concepts: [pluggable_architecture, self_modifiable_architecture, tool_event_narrowing]

  llmharness_cognitive_audit:
    description: "Two-phase cognitive-audit pipeline for the llmharness contrib extension (Lincyaw/AgentM issue #134), redesigned to v3 (2026-05-10). Static-analysis lens: trajectory is source code, extractor is lex+parse+type-check, the graph is the IR (closer to a PDG than a CFG), the auditor is the verifier. Phase 1 extractor LLM builds the graph by witness-required tool calls — register_event registers one event per ReAct cycle; add_edge constructs data/ref edges with literal cited_entities (data) or cited_quote (ref) verified at tool-call time after case+whitespace normalization; submit_extraction terminates the loop. Edges are first-class records, not embedded Event.refs. Witness retry budget = 2 per (src, dst, kind) tuple; on exhaustion the edge is dropped into extractor_partial without fail-stopping the firing. Phase 2 auditor consumes the validated graph plus advisory findings from scenario-registered checks (api.get_service('llmharness.audit_registry').register_check(...) — atom-only, never SDK-fixed); switches from full-payload to summary-only at audit_summary_threshold=30 events with on-demand drill-down via get_event_detail. The trust-asymmetry axiom (thought = testimony, tool_call/tool_result = evidence) is stated explicitly in both prompts. Verdict shape (surface_reminder + reminder_text + continuation_notes + matched_event_ids + cited_cards) is preserved from V2 — replacement is upstream of the auditor only. Public surface (Event sans refs / Edge / EdgeKind / Finding / api.audit registry) is breaking — rca-autorl backwards-compat explicitly waived."
    design: "designs/llmharness-cognitive-audit.md"
    related_concepts: [extension_as_scenario, pluggable_architecture, observability, single_file_extension_contract, audit_check_registry, per_task_evolution_loop, harness_runner]

  harness_runner:
    status: proposed
    description: "Single driver for the llmharness cognitive-audit pipeline; collapses the duplicated implementations (`_drain_extractor`/`_drain_auditor` in adapters/agentm.py, `replay_extractor_record`/`replay_auditor_record` in replay/runner.py, plus the now-deleted `run_offline_auditor_over_control` in replay/strict_ab.py) of 'fold the op log + window the trajectory + compose the payload + invoke the child + persist the result'. Parametrised by two Protocols (ChildRunner for live `api.spawn_child_session` vs offline `run_phase_standalone`; OpSink for live `api.session.append_entry(AUDIT_GRAPH_OP, ...)` vs offline `InMemorySink` / `NoopSink`) and one in-memory state holder (CumulativeAuditState — folds GraphOp log on demand, threads recent_graph/recent_edges/next_event_id across firings; hydrate_from_session_log for live restart, fresh() for offline). Single public entry point HarnessRunner.on_trajectory_progress(messages, turn_count) owns cadence (extractor_interval, audit_interval) and returns a StepResult with both extractor_record and auditor_record populated even when the sidecar writer is None. Unlocks the user-facing fork-tree pipeline (`replay/fork_tree.py::run_fork_tree_experiment`, P6): a producer-consumer self-feeding work queue where consuming one ForkTask (a backbone rollout + `stop_on_first_surface=False` offline replay) emits a ForkNode and produces one child task per auditor surface — the parallel-universe tree (intervene vs continue) rather than the old single greedy chain. `replay_pipeline_over_trajectory(seed_cumulative=..., start_turn=...)` threads each parent node's CumulativeAuditState (`SurfaceFiring.cumulative_snapshot`, an independent deep copy taken at the surface) into its children; `write_fork_tree_replay` materialises one root-keyed `<root_sid>.chained.jsonl` with a `__fork_tree_header__` and per-record `extras{node_id, parent_node_id}`. Old linear chain = `surfaces[:1]` policy; star = `max_depth=1`. Three diff-testable acceptance invariants: (1) live ≡ offline equivalence on a fixed trajectory + same model — same sidecar byte-for-byte modulo ts_ns/uuid/LLM-nondet, proving windowing+payload composition exists in exactly one place; (2) single-firing replay is a degenerate case of fire_extractor_once with hydrate_from_replay_record; (3) sidecar is an artefact not a seed — runner never reads ReplayRecord. Migration: P1 live adapter rerouted through runner (wrappers preserve behaviour); P2 land replay_pipeline_over_trajectory + chain_replay reimplemented with cumulative threading; P3 collapse run_offline_auditor_over_control + replay_{extractor,auditor}_record become thin wrappers; P4 (superseded) wired baseline_fork to rca:baseline → rca:baseline; P5 (2026-05-24) replaced strict-A/B `baseline_fork` with N-segment `chained_fork` — `replay/strict_ab.py` deleted, `_HARNESS_VARIANT_TO_CONTROL` deleted, agentm_rca constructor narrowed to `chained_fork: bool` + `max_interventions: int`; P6 (2026-05-25) generalised the linear chain into the producer-consumer fork tree (`chained_fork.py` → `fork_tree.py`), added `OfflineRunResult.surfaces` / `SurfaceFiring` / `CumulativeAuditState.snapshot()`, fixed the cadence to step per agent turn not per message, and made the sidecar root-keyed + tree-shaped (`__fork_tree_header__`); `--ak chained_fork=true` retained (→ `max_depth`). Non-goals: cross-case state sharing, ReplayRecord schema changes, auditor verdict semantics (in-case parallelism is now structurally supported via the work queue's `max_workers`, default 1)."
    design: "designs/harness-runner.md"
    related_concepts: [llmharness_cognitive_audit, audit_check_registry, pluggable_architecture, sub_agent_lifecycle, observability, single_file_extension_contract, nested_session_task]

  nested_session_task:
    status: implemented
    description: "Unifies the duplicated 'spawn a nested AgentSession, send one prompt, drive to completion, scrape its result' copies INSIDE llmharness onto one convenience helper layered over the api.spawn_child_session ABI seam. Initial hypothesis (three copies sharable across the sub_agent/llmharness package boundary) was half wrong: copies 2+3 (llmharness LiveChildRunner.run_{extractor,auditor} live + tools.engine.run_phase_standalone embedded) ARE the same single-shot shape and were genuinely duplicated; copy 1 (sub_agent._ChildTaskManager._run_child) only looked similar — it is an interactive, multi-turn, injectable driver over a PRE-spawned session with its own finalize/abort/artifact bookkeeping and a different (dict-tolerant, return_response-aware, newline-joined) collect contract, NOT a single-shot spawn-collect. Forcing it onto the shared helper would push injection-loop policy into the helper (rejected). So the real duplication was WITHIN llmharness. HOME decision: §11 forbids cross-contrib imports, so a helper shared by two PACKAGES must live in core; but the sole consumer is llmharness, so the two-package trigger never fires and 'keep core small / compose existing ABI in contrib' governs — run_child_task is composed entirely from public core.abi (spawn_child_session/AgentSessionConfig/messages), adding no core capability, so both child_collect + child_task live in llmharness (contrib), NOT core. (They were briefly placed in agentm.extensions on the sub_agent-will-consume assumption, then relocated when that was falsified.) Layering: api.spawn_child_session (core ABI, the real pluggability seam) < run_child_task (llmharness convenience, single-shot, terminal_tool knob: None->free-text, set->tool-arg) < ChildRunner Protocol (llmharness live/offline swap — LiveChildRunner over spawn_child_session, StandaloneChildRunner over create_agent_session; earns its keep, two impls + multiple consumers) < child_collect pure scrapers (flatten_assistant_blocks/terminal_tool_arguments/final_assistant_text/serialize_block — single replay-sidecar block-shape definition). run_child_task is a convenience layer, NOT a new pluggability axis (the axis is spawn_child_session itself); promote to a registered service (api.set_service/get_service, zero cross-package import) only if a real second in-session consumer with a swap need appears. sub_agent stays its own interactive driver over spawn_child_session — declined unification, not deferred. Core change: none (seam + create_agent_session already existed)."
    design: "designs/nested-session-task.md"
    related_concepts: [sub_agent_lifecycle, harness_runner, llmharness_cognitive_audit, pluggable_architecture, agent_loop, single_file_extension_contract]

  audit_check_registry:
    description: "ExtensionAPI service that lets scenarios plug graph-health checks into the llmharness Phase-2 auditor. Registry lives at contrib/extensions/llmharness/src/llmharness/audit/registry.py (mechanism only — Check Protocol + CheckContext + AuditCheckRegistry). Concrete checks ship as one-file §11 atoms under llmharness/extensions/ (check_repeated_actions, check_open_branches, check_premature_conclusion as worked examples). Atoms call api.get_service('llmharness.audit_registry').register_check(check) from install(api, config). Idempotent on (name, id(check)); raising checks captured non-fatally; zero-checks → empty findings, no error. Fed into the auditor prompt as advisory findings; never gates the firing. Canonical example of 'scenario-registered behaviour through ExtensionAPI', the SDK-vs-scenario separation rule's preferred shape."
    design: "designs/llmharness-cognitive-audit.md"
    related_concepts: [llmharness_cognitive_audit, extension_as_scenario, pluggable_architecture, single_file_extension_contract]

  llm_native_judges:
    status: proposed
    description: "Architectural refactor of hypothesis_driven_rca's gate decision logic away from structural rules (regex on free-text verdict fields, mechanical observation→prediction→hypothesis chain-walks, literal worker_session_id equality, structural 'at least one negative prediction checked' rule) toward pluggable LLM judgment ports. First principle: structural enforcement is the wrong primitive for semantic judgments — the gate's job is to be the only writer, but its decision logic should be LLM judgment, not regex/structural rules. Three true invariants remain non-LLM: (1) typed graph state (data shape), (2) single-writer property (enforcement), (3) two-column WorkerReturn contract (interface). Everything else — what counts as satisfied / covered / independent / genuinely-falsified / explains — becomes Judge protocol calls. New Judge port: api.set_service('rca.judge.<kind>', impl); each judge is a §11 atom with config.mode: 'llm' | 'stub' (llm uses LLM tool_use for structured output, stub returns scripted verdicts for tests). Phase 2 ships 4 judges (judge.satisfied / judge.coverage / judge.independence / judge.falsified_genuinely) which together remove every regex/structural-rule branch in Phase 1's falsification gate. Downgrade-application semantics flip: gate returns UpdateResult.downgraded(suggested=..., applied_id=None) and the refine is NOT auto-applied — orchestrator decides next steps based on judge.reason. Failure modes: LLM failure / malformed structured output → retry-once → verdict='unclear' (first-class verdict, no structural fallback). Per-session LRU cache keyed by sha256(canonical_json(context)). N-small-judges over one-big-judge for: independent eval (per-judge data localizes the weak link), independent swap (§11 atom contract pays off), independent caching (higher hit rates on focused contexts). Future judges (Phase 3+) collapse §9/§10 features from hypothesis-driven-rca into the same Protocol: judge.find_contradiction (devil's advocate), judge.propose_alternatives (isolated hypothesis generator), judge.what_can_be_dropped (state-triggered compaction), judge.next_to_verify (information-gain scheduler replacement). Bias telemetry stops being separate machinery — every judge call writes inputs+verdict to observability JSONL, and telemetry is just queries over that stream. Acceptance: zero regex/string-matching in gate source (test_gate_no_regex.py greps the file); all 50 Phase 1 fail-stop tests pass with stub judges mounted (behavior preservation); each judge has both stub and llm modes tested; 10-case eval run against contrib/scenarios/rca/eval/ produces honest results report at contrib/scenarios/rca/ (hfsm subpackage at agentm_rca.hfsm, manifest variant rca:hfsm)eval/phase2_results.md. Pass rate is NOT in the acceptance gate — Phase 2 ships the refactor + measurement; tuning is downstream."
    design: "designs/llm-native-judges.md"
    related_concepts: [hypothesis_driven_rca, pluggable_architecture, extension_as_scenario, single_file_extension_contract, per_task_evolution_loop, observability]

  hypothesis_driven_rca:
    status: phase_1_landed
    description: "Methodologically disciplined RCA scenario built on the scientific hypothesis-verify cycle, sibling (not replacement) to contrib/scenarios/rca/. Three structural commitments that lift it above prompt-level guidance: (1) hypothesis lifecycle is a DAG of update operators (propose / confirm / refute / refine / split / merge / supersede / suspend), not confirm-or-refute binary — verifications produce graph mutations, not terminal verdicts; (2) Popperian falsification enforced at gate time, not asked for in prompts — confirm requires ≥1 satisfied negative prediction AND ≥1 independent positive check AND coverage of every unexplained symptom; refute requires either a triggered negative prediction or a failed steelman attempt; failing preconditions downgrade to refine instead of hard-erroring; (3) semantic structure (FSM: INTAKE/OBSERVE/HYPOTHESIZE/VERIFY/JUDGE/FINALIZE/BLOCKED) is orthogonal to context structure (sessions) — the scenario picks L1+L2+L3 layered context: L1 persistent HypothesisGraph + ObservationLog + SymptomSet survives all sessions; L2 orchestrator session contains only L1 derived views + recent hypothesis events (grows linear in cognitive operations, not tool calls); L3 worker sessions are ephemeral per-verification, briefed from L1, transcript discarded on return. Worker→Orchestrator contract is two-column: observations[] (facts, enter graph) vs interpretation (advisory, audit-only) — orchestrator re-derives the update from observations alone, structurally preventing 'worker uses rhetoric to replace evidence' bias. ObservationLog doubles as memoization keyed by tool_signature (idempotent tools only) so independent workers don't re-query. Anti-bias mechanisms tiered by cost: cheap and always-on = two-column return + falsification-framed briefs + blinded hypothesis identity + negative-prediction-required + information-gain verification scheduler + isolated hypothesis_generator session that doesn't see existing HypothesisGraph; heavyweight and gated to critical mutations (would trigger FINALIZE or close last open branch) = twin verifier with non-overlapping brief slices, devil's-advocate persona, tool-heterogeneous workers. Single-writer property: only rca_falsification_gate atom can mutate the graph (write API not exposed on the public store service). State-triggered compaction at JUDGE transitions provides semantically-justified compression rather than token-count truncation. New atoms (all single-file §11): rca_hgraph_store (session-state axis), rca_evidence_tools (tool-environment axis), rca_fsm_policy / rca_brief_builder / rca_falsification_gate / rca_bias_audit (policy axis). Reuses duckdb_sql, worker_skills, skill_loader, rcabench_contract, sub_agent from existing rca scenario; shares its eval/ suite for direct A/B comparison. No core changes, no new ExtensionAPI surface. Phased: Phase 1 = graph + gate + two-column contract + FSM + layered context (no compaction); Phase 2 = state-triggered compaction + independent corroboration + bias telemetry; Phase 3 = cross-trace skill learning + multi-incident memory + concurrent verification (parked until data demands them). Implementation target: contrib/scenarios/rca/ (hfsm subpackage at agentm_rca.hfsm, manifest variant rca:hfsm) (provisional name). Acceptance: 10 fail-stop scenarios covering negative-prediction requirement, confirm/refute gate downgrades, observation/interpretation separation, memoization, single-writer property, FINALIZE coverage, L2 sub-linear growth, independent-worker brief disjointness, hypothesis-generator blinding."
    design: "designs/hypothesis-driven-rca.md"
    related_concepts: [pluggable_architecture, extension_as_scenario, sub_agent_lifecycle, observability, llmharness_cognitive_audit, per_task_evolution_loop, single_file_extension_contract, agent_team, artifact_system]

  gateway_agent_proxy:
    status: proposed
    description: "Architecture review and roadmap for treating the gateway as an Agent Proxy over existing AgentM Core primitives, not as a second runtime and not as a client-specific API source. Core already exposes the composable mechanisms needed for live intervention: AgentSession.prompt/tick/interrupt/idle, SessionInbox.push, persistent driver events, ExtensionAPI.post_inbox/send_user_message/spawn_child_session. The current UX gap is gateway semantics: root input still goes through await sess.prompt(...) while child input uses inbox.push; inbound is implicit content/button_value/control rather than explicit submit/interrupt/interaction intent; clients lack a durable read model/snapshot for active turn, capabilities, pending interactions, and child session state. Proposed direction: add a gateway-internal AgentProxy/SessionHandle facade, derive an internal AgentTarget from envelope session_key (no body target), route all user input through SessionInbox with submit policies (cooperative vs interrupt_first), emit request acknowledgements with request_id idempotency for explicit mutating actions, build a gateway-owned session snapshot/read model, and normalize approvals/elicitation/OAuth/review gates into interaction_request/interaction_response. Core API additions are last resort only: possible structured interrupt result or tiny read-only driver state if gateway cannot derive it; rejected Core APIs include interrupt_then_submit, enqueue_user_message, client_queue_policy, and terminal/Feishu-specific controls. Roadmap phases: inventory/tests, proxy facade, structured wire intent, read model snapshots, unified human interaction, terminal-go UX adaptation, cross-client hardening."
    design: "designs/gateway-agent-proxy.md"
    related_concepts: [pluggable_architecture, session_inbox, single_process_gateway, command_routing, interactive_subagent, textual_tui]

  single_process_gateway:
    description: "channels v2. Single-process gateway: one agentm gateway process holds all sessions in memory and serves all chat-client peers. Wire protocol exists only for chat-client vendor SDK isolation (lark_oapi, Textual). No distributed worker pool — earlier daemon/worker split carried v1 abstractions whose isolation/distribution properties were not actually needed at this codebase's scale. For local development, `agentm daemon` wraps this same gateway process in a thin Python supervisor that restarts the whole gateway worker on source/config changes; `agentm terminal` composes daemon startup with the Go terminal client; the daemon defaults to a private unix socket but can bind ws/wss for remote clients, with token-file auth generated/enforced by default unless anonymous mode is explicit. This is process lifecycle reload, not a second runtime or cross-process session execution model. The gateway imports agentm.core directly. Sessions live as dict[session_key, AgentSession] in gateway memory; persistence via ChatSessionMap (session_key → session_id) for crash recovery and schedules.json for durable gateway-owned scheduled prompts. session_key is chat-client-computed (channel:chat_id default, optionally thread_id/sender_id), opaque to gateway. wire_driver atom (~150 LoC, §11 contract) is the only new code: translates session events to outbound envelopes via api.set_service / api.get_service / @api.on. peer_send is removed (not ported): no users, and its same-process wait_for_reply semantics are a redundant sibling of sub_agent; cross-peer/a2a messaging is out of scope until a concrete need appears. sub_agent works unchanged (child sessions in same dict). Three pluggability Protocols: OutboxStore, InboxLog, Authenticator — all with default impls, no hidden optional-method surfaces. Seven wire kinds (down from 11): hello/welcome, inbound/outbound, ack, ping/pong, error. Envelope is minimal: v, id, kind, ts, session_key, scenario, body; routing primitives (to/correlation_id/hops/root_session_key/session_id) all deleted because there's no cross-process routing. No worker pool, no spawn-on-demand, no inactivity timeout, no --resume normal path, no --inproc-worker mode. Approval: same-process Future map in ApprovalManager; identity check against original requester's sender_id; chat-client renders card. Commands: /help, /status synthesised locally; /new shuts down session keeping ChatSessionMap (next message resumes from transcript); /end shuts down + clears map (fresh session); /model and /scenario are per-session_key overrides, not gateway globals; /schedule manages durable gateway prompts, and the same schedule store is exposed to the monitor atom through a session-bound gateway_scheduler service while non-cron monitor timers stay session-local; /skill:X and /<markdown> expanded server-side and fall through to session; /atom:install/uninstall mutates session atom registry directly. CLI: agentm gateway and agentm daemon subcommands alongside existing agentm prompt and agentm trace; agentm-feishu and agentm-terminal stay as separate binaries (vendor SDK isolation only); agentm-worker deleted. Single-jump rewrite — no compat with v0 or v1; v1 hello → error{unsupported_wire_version}. Fail-stop test set is ~40 tests covering wire round-trip, outbox/inbox semantics, Router three-case dispatch, SessionManager get_or_create + resume, CommandRouter handler classes, ApprovalManager identity check + timeout, wire_driver atom translation, auth, wire version negotiation."
    design: "designs/single-process-gateway.md"
    related_concepts: [pluggable_architecture, command_routing, single_file_extension_contract, sub_agent_lifecycle, session_inbox, textual_tui, gateway_agent_proxy]

  command_routing:
    description: "Slash command layer for the gateway. User-typed messages starting with '/' are intercepted before reaching the LLM — control commands mutate gateway/session state, prompt commands expand a template and fall through to session.prompt(). A command the gateway registry doesn't own is forwarded to the session so the in-session slash_commands atom can dispatch session-registered commands (e.g. /compact); only a name unknown to BOTH the gateway and the session is rejected (never silently forwarded to the model as a command). The gateway distinguishes the two using a per-session known-command set learned from the session_ready frame, which also feeds a 'session' group in /help. Four handler kinds under one CommandHandler Protocol: BuiltinControl (Python in commands/builtins/), MarkdownPrompt (cwd/.agentm/commands/*.md with frontmatter+$ARGUMENTS), SkillCommand (auto-generated from skill directories; expands SKILL.md as one-turn injection), AtomCommand (PR #2; MANIFEST opt-in via mountable_via_command + gateway whitelist; mounts/unmounts atoms against a per-session runtime scenario overlay copied from contrib/scenarios/<name>/manifest.yaml into <state_dir>/scenarios/<session_key>/ so kernel mutations never touch source files). Namespacing: /name for builtin/markdown, /skill:name and /atom:name for the others — provenance visible in /help. Discovery is data-driven for non-builtin kinds (filesystem walk, MANIFEST lookup). Parallels Claude Code's slash-command + skill + plugin design but keeps AgentM's atom concept explicit and auditable (every mount produces a catalog event via self_modifiable_architecture's existing reload primitive)."
    design: "designs/command-routing.md"
    related_concepts: [single_process_gateway, pluggable_architecture, self_modifiable_architecture, single_file_extension_contract, textual_tui]

  mcp_integration:
    status: draft
    description: "MCP (Model Context Protocol) client bridge as a package-form contrib atom at contrib/extensions/mcp_bridge/. Talks the MCP wire via the official `mcp` Python SDK (stdio + streamable-HTTP transports; SSE / prompts / resources / sampling deferred). Lives on the Tool Environment pluggability axis — no new ABI. `install(api, config)` is async: connects every configured server, calls tools/list ONCE per server (install-time snapshot), wraps each remote tool as an MCPTool registered via api.register_tool with name mcp__<server>__<tool>, publishes an MCPSessionManager via api.set_service('mcp', manager) for follow-up atoms to reuse, and subscribes SessionShutdownEvent for transport teardown. Snapshot semantics chosen over runtime discovery — aligns with AgentM's freeze/atom-hash model; any connect or schema failure raises so partial tool sets never reach the catalog; `notifications/tools/list_changed` is intentionally ignored (logged then discarded; users restart the session to pick up new tools). MCPTool.execute races call_tool against both the cancellation signal and a configurable timeout (`timeout_seconds`, default 30s) so a hung server cannot stall the loop. ${VAR} interpolation in server config reads from os.environ for header/env secrets. Permission integration is deny-by-default — scenarios must explicitly allow mcp__* prefixes (not auto-registered by the bridge). Test seam is module-level (set_test_session_factory) so the public config schema stays clean. Ships with contrib/scenarios/mcp_demo/ as a smoke-test composition over local. NOT enrolled in the default scenario."
    design: "designs/mcp-integration.md"
    related_concepts: [pluggable_architecture, extension_as_scenario, single_file_extension_contract]

  control_loop_harness:
    status: proposed
    description: "Control-theory model for workbuddy agent dispatch. Maps the workbuddy coordinator to a closed-loop controller (C) that observes the LLM agent (plant G) through a post-condition sensor (H) checking ground-truth world state (git remote, GitHub API), computes the error signal (r - y), and feeds it back as a resume message into the same AgentM session. Five principles: goal-oriented prompts (WHAT not HOW), observe ground truth (never trust self-report), resume-not-restart (same session via --resume, preserving context), no fallbacks (harness never acts on behalf of the agent), sandbox lifecycle = control loop lifecycle (pod alive until post-conditions pass or max rounds). Post-condition observer checks: files modified, committed, pushed, PR created, label flipped -- all via external queries, never parsed from agent output. Termination: all pass (success), no progress for N rounds (stuck, status:blocked), or max rounds exhausted. Removes autoSubmitAgentChanges, _on_shutdown auto-submit, RESULT: structured output, and step-by-step bash templates. The dev-review-merge state machine is a higher-order control loop: dev-agent is the plant, review-agent is the sensor + secondary controller (review rejection = error signal), merge gate is the final quality check. External to agentm.core -- the control loop lives in the workbuddy coordinator (Go); AgentM provides only the resume and observability mechanisms."
    design: "designs/control-loop-harness.md"
    related_concepts: [agent_loop, agent_team, session_inbox, single_process_gateway]
