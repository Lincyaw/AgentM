name: chatbot
description: |
  Conversational-assistant scenario, here in its **maximal test** form: it
  mounts every builtin atom that can be safely enabled together, so the
  scenario doubles as a load/smoke harness for the atom set. Drive it through
  ``agentm-gateway --scenario chatbot`` (chat channels) or ``agentm --scenario
  chatbot -p …``.

  The scenario keeps durable memory across sessions, but a fresh workspace
  should not grow SOUL.md / IDENTITY.md / USER.md just because ``agentm -p``
  was invoked as an external tool. User atoms under ``<cwd>/.agentm/atoms/``
  still merge on top of this list so ``api.install_atom`` / ``/atom:install``
  calls persist across restarts.

  Excluded on purpose (see the commented block at the bottom): provider atoms
  (factory-injected via ``--model``), terminal/structured-output, OTLP export
  (needs a live collector), and the evolution self-improvement cluster (tied
  to eval suites + has trace-scanning / auto-rollback side effects).

extensions:
  # === environment ports: local-FS / asyncio-bash Operations bundle. =======
  # Listed first so tool atoms calling ``api.get_operations()`` at install
  # see a registered bundle.
  - module: agentm.extensions.builtin.operations
    config:
      backend: local

  # === resilience: exponential-backoff retry policy the provider layer wraps.
  - module: agentm.extensions.builtin.retry_policy

  # === tool-result hygiene ==================================================
  # tool_result_budget is the legacy name for a middle-out token limiter. It is
  # a fallback if cap cannot spill; cap is mounted after it so its recoverable
  # spill-path replacement wins when both handlers fire.
  - module: agentm.extensions.builtin.tool_result_budget
    config:
      max_tokens: 50000
      error_floor_tokens: 256
  - module: agentm.extensions.builtin.tool_result_cap
    config:
      max_tokens: 50000
      preview_tokens: 50000
  # Default English text for kernel-emitted ToolErrorEvent.
  - module: agentm.extensions.builtin.tool_error_messages

  # === file I/O + shell tool floor =========================================
  - module: agentm.extensions.builtin.file_tools
  # Serialize file-mutation tools with per-path locks (requires file_tools).
  - module: agentm.extensions.builtin.file_mutation_queue
  - module: agentm.extensions.builtin.tool_bash
  # Block destructive in-place shell edits (sed -i, awk inplace).
  - module: agentm.extensions.builtin.tool_bash_guard

  # === tool-call gating ====================================================
  # Block recently repeated tool calls within a sliding window.
  - module: agentm.extensions.builtin.dedup
  # allow/deny tool-call gate — empty lists = allow-all (no-op by default).
  - module: agentm.extensions.builtin.permission
  # allow/deny catalog filter — empty lists = expose-all (no-op by default).
  - module: agentm.extensions.builtin.tool_filter
  # Append an <available_tools> index to the system prompt.
  - module: agentm.extensions.builtin.tool_index

  # === observability: every turn lands in the trace store ==================
  - module: agentm.extensions.builtin.observability
  # Agent-defined wakeups (schedule_wakeup) + bus subscriptions (create_monitor).
  - module: agentm.extensions.builtin.monitor
    config:
      event_summary_max_tokens: 80

  # === prompt assembly: a conversational base frame ========================
  - module: agentm.extensions.builtin.system_prompt
    config:
      prompt: |
        You are a conversational assistant reachable over a chat channel.
        Replies are read in a chat client, so be concise and direct; lead
        with the answer, expand only when asked. You can use memory tools to
        remember durable facts the user tells you across turns and sessions.
        You have real file and shell tools in the workspace; use them when
        a request needs action rather than narrating what you would do. To wipe
        the conversation and start fresh, the user can send /new.
  - module: agentm.extensions.builtin.runtime_context

  # === skill / template auto-discovery =====================================
  - module: agentm.extensions.builtin.skill_loader
  - module: agentm.extensions.builtin.prompt_templates
  # Floor atoms — auto-mounted anyway, listed here so the test scenario is a
  # complete catalog of what's active.
  - module: agentm.extensions.builtin.compaction_prompts
  - module: agentm.extensions.builtin.slash_commands

  # === context compaction ===================================================
  # Summarize older turns into one structured checkpoint; read_history lets
  # the agent recover the verbatim content of any [Turn N] the summary cites.
  - module: agentm.extensions.builtin.llm_compaction
    config:
      tool_result_max_tokens: 8000
  - module: agentm.extensions.builtin.read_history
    config:
      tool_result_max_tokens: 20000
      total_max_tokens: 50000

  # === project-local persistent memory ======================================
  - module: agentm.extensions.builtin.memory

  # === session-scoped task tracking ==========================================
  - module: agentm.extensions.builtin.task_tracking

  # === condition-driven session continuation =================================
  - module: agentm.extensions.builtin.goal

  # === budgets / runway =====================================================
  # Loop turn / tool-call budget for the session.
  - module: agentm.extensions.builtin.loop_budget
  # Inject a budget runway warning as the loop approaches its caps.
  - module: agentm.extensions.builtin.turn_reminder
  # Track LLM spend from provider usage tokens; emit cost_budget_exceeded on
  # overflow.
  - module: agentm.extensions.builtin.cost_budget
    config:
      limit: 5.0
      pricing:
        openai: [0.55, 2.2]
  # Retry the turn when the assistant message is thinking-only (no text/tools).
  - module: agentm.extensions.builtin.thinking_retry

  # === self-modification ====================================================
  # install_atom / unload_atom / list_atoms — agent-driven atom self-install,
  # live (hot) registration + persistence under <cwd>/.agentm/atoms/.
  - module: agentm.extensions.builtin.atom_management

  # === orchestration ========================================================
  # Discover .claude/agents/*.md and resolve them for dispatch_agent.
  - module: agentm.extensions.builtin.claude_agents
  # Spawn nested AgentSession workers.
  - module: agentm.extensions.builtin.sub_agent
    config:
      inherit_extensions:
        - operations
        - file_tools
        - tool_bash
        - tool_bash_guard
        - tool_result_budget
        - tool_result_cap
        - observability
        - skill_loader
      available_inherited_extensions:
        operations:
          module: agentm.extensions.builtin.operations
        file_tools:
          module: agentm.extensions.builtin.file_tools
        tool_bash:
          module: agentm.extensions.builtin.tool_bash
        tool_bash_guard:
          module: agentm.extensions.builtin.tool_bash_guard
        tool_result_budget:
          module: agentm.extensions.builtin.tool_result_budget
          config:
            max_tokens: 50000
            error_floor_tokens: 256
        tool_result_cap:
          module: agentm.extensions.builtin.tool_result_cap
          config:
            max_tokens: 50000
            preview_tokens: 50000
        observability:
          module: agentm.extensions.builtin.observability
        skill_loader:
          module: agentm.extensions.builtin.skill_loader
  # LLM-authored JS workflow orchestration over child sessions (needs artifact_store).
  - module: agentm.extensions.builtin.artifact_store
  - module: agentm.extensions.builtin.workflow

  # === auto-background long tools ===========================================
  # A foreground tool call that overruns ``timeout`` is moved to the background.
  - module: agentm.extensions.builtin.background_exec
    config:
      timeout: 120

  # === TUI snapshot capture =================================================
  - module: agentm.extensions.builtin.tui_snapshot

  # === OPT-IN / deliberately excluded ======================================
  # These exist but are NOT enabled here. Uncomment per test, mind the notes.
  #
  # Provider atoms — injected by the session factory from ``--model`` /
  # config.toml, never listed in a scenario manifest. Listing them here
  # double-registers the provider.
  #   - module: agentm.extensions.builtin.llm_openai
  #   - module: agentm.extensions.builtin.llm_anthropic
  #   - module: agentm.extensions.builtin.inherit_provider   # child-session role; requires `provider` config
  #
  # Terminal structured output — registers a submit_result tool that ENDS the
  # turn; conflicts with open-ended chat. Needs a `result_schema` to be useful.
  #   - module: agentm.extensions.builtin.structured_output
  #
  # OTLP export — attaches process-level span/log exporters; needs a live
  # collector endpoint or it just adds connection-failure noise.
  #   - module: agentm.extensions.builtin.otlp_export
  #     config: { endpoint: "http://localhost:4317" }
  #
  # Gateway wire translation — the single-process gateway wires this itself;
  # not a scenario-level atom.
  #   - module: agentm.extensions.builtin.wire_driver
  #
  # Evolution / self-improvement cluster — tied to eval suites + a
  # `target_scenario`, with trace-scanning and (guard_watch) AUTO-ROLLBACK
  # side effects at session_ready. Enable only when testing evolution.
  #   - module: agentm.extensions.builtin.query_tools
  #   - module: agentm.extensions.builtin.tool_eval_run
  #   - module: agentm.extensions.builtin.tool_reflect
  #   - module: agentm.extensions.builtin.tool_propose_change
  #   - module: agentm.extensions.builtin.tool_guard_watch
