<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgentM Dashboard</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    :root {
      --bg: #05080a;
      --panel: rgba(5, 8, 10, 0.85);
      --line: #2a3640;
      --text: #c0cdd6;
      --muted: #5a6b7c;
      --orange: #ff6b35;
      --teal: #4db4b9;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #f59e0b;
      --purple: #a855f7;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace;
      font-size: 13px;
      line-height: 1.5;
      overflow: hidden;
      height: 100vh;
    }
    #root { height: 100vh; display: flex; flex-direction: column; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.5; }
      100% { opacity: 1; }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

// ═══════════════════════════════════════════════════════════════════════
// Design tokens
// ═══════════════════════════════════════════════════════════════════════
const C = {
  bg:     '#05080a',
  panel:  'rgba(5, 8, 10, 0.85)',
  line:   '#2a3640',
  text:   '#c0cdd6',
  muted:  '#5a6b7c',
  orange: '#ff6b35',
  teal:   '#4db4b9',
  green:  '#22c55e',
  red:    '#ef4444',
  yellow: '#f59e0b',
  purple: '#a855f7',
};

const PHASE_COLORS = {
  exploration: C.teal,
  generation: C.purple,
  verification: C.orange,
  confirmation: C.green,
};

const STATUS_COLORS = {
  pending: C.muted,
  running: C.teal,
  completed: C.green,
  failed: C.red,
};

// ═══════════════════════════════════════════════════════════════════════
// useWebSocket hook
// ═══════════════════════════════════════════════════════════════════════
function useWebSocket(onEvent) {
  const [status, setStatus] = useState('disconnected');
  const wsRef = useRef(null);
  const retryRef = useRef(1000);
  const onEventRef = useRef(onEvent);
  onEventRef.current = onEvent;

  useEffect(() => {
    let mounted = true;
    let timer = null;

    function connect() {
      if (!mounted) return;
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const ws = new WebSocket(`${proto}//${location.host}/ws`);
      wsRef.current = ws;

      ws.onopen = () => {
        if (!mounted) return;
        setStatus('connected');
        retryRef.current = 1000;
      };
      ws.onmessage = (e) => {
        try {
          const event = JSON.parse(e.data);
          onEventRef.current(event);
        } catch {}
      };
      ws.onclose = () => {
        if (!mounted) return;
        setStatus('disconnected');
        timer = setTimeout(() => {
          retryRef.current = Math.min(retryRef.current * 1.5, 10000);
          connect();
        }, retryRef.current);
      };
      ws.onerror = () => ws.close();
    }
    connect();

    return () => {
      mounted = false;
      if (timer) clearTimeout(timer);
      if (wsRef.current) wsRef.current.close();
    };
  }, []);

  return status;
}

// ═══════════════════════════════════════════════════════════════════════
// Shared Components
// ═══════════════════════════════════════════════════════════════════════

function Tag({ text, color }) {
  return (
    <span style={{
      display: 'inline-block',
      padding: '1px 8px',
      borderRadius: 3,
      fontSize: 11,
      fontWeight: 600,
      color: color || C.teal,
      background: (color || C.teal) + '20',
      border: `1px solid ${(color || C.teal)}40`,
    }}>{text}</span>
  );
}

function CollapsibleContent({ title, children, defaultOpen = false }) {
  const [open, setOpen] = useState(defaultOpen);
  return (
    <div style={{ borderBottom: `1px solid ${C.line}` }}>
      <div
        onClick={() => setOpen(!open)}
        style={{
          padding: '6px 10px',
          cursor: 'pointer',
          display: 'flex',
          alignItems: 'center',
          gap: 6,
          color: C.muted,
          userSelect: 'none',
        }}
      >
        <span style={{ fontSize: 10, transition: 'transform 0.2s', transform: open ? 'rotate(90deg)' : 'rotate(0)' }}>&#9654;</span>
        <span style={{ color: C.text, fontSize: 12 }}>{title}</span>
      </div>
      {open && <div style={{ padding: '0 10px 8px 24px' }}>{children}</div>}
    </div>
  );
}

function CopyButton({ text }) {
  const [copied, setCopied] = useState(false);
  const handleCopy = () => {
    navigator.clipboard.writeText(typeof text === 'string' ? text : JSON.stringify(text, null, 2));
    setCopied(true);
    setTimeout(() => setCopied(false), 1500);
  };
  return (
    <button
      onClick={handleCopy}
      style={{
        background: 'none',
        border: `1px solid ${C.line}`,
        color: copied ? C.green : C.muted,
        padding: '2px 8px',
        borderRadius: 3,
        cursor: 'pointer',
        fontSize: 11,
        fontFamily: 'inherit',
      }}
    >{copied ? 'Copied!' : 'Copy'}</button>
  );
}

function JsonHighlighter({ data, depth = 0 }) {
  if (data === null || data === undefined) return <span style={{ color: C.muted }}>null</span>;
  if (typeof data === 'boolean') return <span style={{ color: C.purple }}>{data.toString()}</span>;
  if (typeof data === 'number') return <span style={{ color: C.yellow }}>{data}</span>;
  if (typeof data === 'string') {
    const truncated = data.length > 200 ? data.slice(0, 200) + '...' : data;
    return <span style={{ color: C.green }}>"{truncated}"</span>;
  }
  if (Array.isArray(data)) {
    if (data.length === 0) return <span style={{ color: C.muted }}>[]</span>;
    return (
      <span>
        <span style={{ color: C.muted }}>[</span>
        {data.map((item, i) => (
          <div key={i} style={{ paddingLeft: 16 }}>
            <JsonHighlighter data={item} depth={depth + 1} />
            {i < data.length - 1 && <span style={{ color: C.muted }}>,</span>}
          </div>
        ))}
        <span style={{ color: C.muted }}>]</span>
      </span>
    );
  }
  if (typeof data === 'object') {
    const keys = Object.keys(data);
    if (keys.length === 0) return <span style={{ color: C.muted }}>{'{}'}</span>;
    return (
      <span>
        <span style={{ color: C.muted }}>{'{'}</span>
        {keys.map((key, i) => (
          <div key={key} style={{ paddingLeft: 16 }}>
            <span style={{ color: C.teal }}>"{key}"</span>
            <span style={{ color: C.muted }}>: </span>
            <JsonHighlighter data={data[key]} depth={depth + 1} />
            {i < keys.length - 1 && <span style={{ color: C.muted }}>,</span>}
          </div>
        ))}
        <span style={{ color: C.muted }}>{'}'}</span>
      </span>
    );
  }
  return <span style={{ color: C.text }}>{String(data)}</span>;
}

function StatusDot({ status, size = 8 }) {
  const color = STATUS_COLORS[status] || C.muted;
  const isRunning = status === 'running';
  return (
    <span style={{
      display: 'inline-block',
      width: size,
      height: size,
      borderRadius: '50%',
      background: color,
      animation: isRunning ? 'pulse 1.5s infinite' : 'none',
    }} />
  );
}

function DragHandle({ onDrag }) {
  const handleMouseDown = (e) => {
    e.preventDefault();
    const move = (e2) => onDrag(e2.clientX);
    const up = () => {
      document.removeEventListener('mousemove', move);
      document.removeEventListener('mouseup', up);
    };
    document.addEventListener('mousemove', move);
    document.addEventListener('mouseup', up);
  };
  return (
    <div
      onMouseDown={handleMouseDown}
      style={{
        width: 6,
        cursor: 'col-resize',
        background: C.line,
        flexShrink: 0,
        display: 'flex',
        alignItems: 'center',
        justifyContent: 'center',
      }}
    >
      <div style={{ width: 2, height: 30, background: C.muted, borderRadius: 1 }} />
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════
// Page 1: Agent Topology
// ═══════════════════════════════════════════════════════════════════════

function TopologyPage({ agents, topology, scenarioState, plugin }) {
  const svgRef = useRef(null);
  const simRef = useRef(null);
  const [dimensions, setDimensions] = useState({ width: 800, height: 500 });

  useEffect(() => {
    const el = svgRef.current?.parentElement;
    if (el) {
      setDimensions({ width: el.clientWidth, height: el.clientHeight - 40 });
      const obs = new ResizeObserver(entries => {
        const { width, height } = entries[0].contentRect;
        setDimensions({ width, height: height - 40 });
      });
      obs.observe(el);
      return () => obs.disconnect();
    }
  }, []);

  useEffect(() => {
    if (!svgRef.current || !topology) return;
    const svg = d3.select(svgRef.current);
    svg.selectAll('*').remove();

    const { width, height } = dimensions;
    const g = svg.append('g');

    // Build nodes
    const nodes = [
      { id: 'orchestrator', label: 'Orchestrator', isOrchestrator: true },
      ...topology.agents.map(a => ({ id: a.agent_id, label: a.agent_id, maxSteps: a.max_steps })),
    ];
    const links = topology.agents.map(a => ({ source: 'orchestrator', target: a.agent_id }));

    // Force simulation
    const sim = d3.forceSimulation(nodes)
      .force('link', d3.forceLink(links).id(d => d.id).distance(160))
      .force('charge', d3.forceManyBody().strength(-400))
      .force('center', d3.forceCenter(width / 2, height / 2))
      .force('y', d3.forceY(height / 2).strength(0.05));

    simRef.current = sim;

    // Edges
    const link = g.selectAll('.link')
      .data(links).enter().append('line')
      .attr('class', 'link')
      .attr('stroke', C.line)
      .attr('stroke-width', 1.5);

    // Node groups
    const node = g.selectAll('.node')
      .data(nodes).enter().append('g')
      .attr('class', 'node')
      .call(d3.drag()
        .on('start', (e, d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
        .on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; })
        .on('end', (e, d) => { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; })
      );

    // Node box
    node.append('rect')
      .attr('width', 140).attr('height', 56).attr('rx', 6)
      .attr('x', -70).attr('y', -28)
      .attr('fill', C.panel).attr('stroke', C.line).attr('stroke-width', 1);

    // Agent name
    node.append('text')
      .attr('text-anchor', 'middle').attr('y', -6)
      .attr('fill', C.text).attr('font-size', 13).attr('font-family', 'inherit')
      .text(d => d.label);

    // Status text
    node.append('text')
      .attr('class', 'status-text')
      .attr('text-anchor', 'middle').attr('y', 12)
      .attr('fill', C.muted).attr('font-size', 11).attr('font-family', 'inherit')
      .text('pending');

    // Status dot
    node.append('circle')
      .attr('class', 'status-dot')
      .attr('cx', -56).attr('cy', -16).attr('r', 4)
      .attr('fill', C.muted);

    sim.on('tick', () => {
      link
        .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
        .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
      node.attr('transform', d => `translate(${d.x},${d.y})`);
    });

    // Zoom
    svg.call(d3.zoom().scaleExtent([0.3, 3]).on('zoom', (e) => g.attr('transform', e.transform)));

    return () => sim.stop();
  }, [topology, dimensions]);

  // Update node appearances from live agent state
  useEffect(() => {
    if (!svgRef.current || !topology) return;
    const svg = d3.select(svgRef.current);

    svg.selectAll('.node').each(function(d) {
      const agent = agents[d.id];
      const status = agent?.status || 'pending';
      const color = STATUS_COLORS[status] || C.muted;

      d3.select(this).select('rect').attr('stroke', color);
      d3.select(this).select('.status-dot').attr('fill', color);

      let statusText = status;
      if (status === 'running' && agent?.currentStep) {
        const max = agent.maxSteps || d.maxSteps;
        statusText = max ? `${agent.currentStep}/${max}` : `step ${agent.currentStep}`;
      }
      if (status === 'completed' && agent?.durationSeconds) {
        statusText = `${agent.durationSeconds.toFixed(1)}s`;
      }
      if (status === 'failed' && agent?.error) {
        statusText = agent.error.slice(0, 15);
      }

      // Plugin decoration
      if (plugin?.decorateTopologyNode) {
        const dec = plugin.decorateTopologyNode(d.id, scenarioState);
        if (dec?.sublabel) statusText = dec.sublabel;
      }

      d3.select(this).select('.status-text').text(statusText).attr('fill', color);
    });

    // Update edge colors
    svg.selectAll('.link').each(function(d) {
      const agent = agents[d.target.id || d.target];
      const status = agent?.status || 'pending';
      d3.select(this).attr('stroke', STATUS_COLORS[status] || C.line);
    });
  }, [agents, scenarioState, plugin, topology]);

  return (
    <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
      <div style={{ padding: '10px 16px', borderBottom: `1px solid ${C.line}`, display: 'flex', justifyContent: 'space-between' }}>
        <span style={{ fontWeight: 600 }}>Agent Topology</span>
        <TopologyLegend />
      </div>
      <div style={{ flex: 1, overflow: 'hidden' }}>
        <svg ref={svgRef} width={dimensions.width} height={dimensions.height} />
      </div>
    </div>
  );
}

function TopologyLegend() {
  const items = [
    { label: 'completed', color: C.green, icon: '\u25CF' },
    { label: 'running', color: C.teal, icon: '\u25CC' },
    { label: 'failed', color: C.red, icon: '\u2717' },
    { label: 'pending', color: C.muted, icon: '\u25CB' },
  ];
  return (
    <div style={{ display: 'flex', gap: 12, fontSize: 11, color: C.muted }}>
      {items.map(i => (
        <span key={i.label} style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
          <span style={{ color: i.color }}>{i.icon}</span> {i.label}
        </span>
      ))}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════
// Page 2: Execution Monitor
// ═══════════════════════════════════════════════════════════════════════

function ExecutionPage({ agents, events }) {
  const [splitX, setSplitX] = useState(null);
  const [selectedAgent, setSelectedAgent] = useState(null);
  const [searchText, setSearchText] = useState('');
  const [searchVisible, setSearchVisible] = useState(false);
  const [selectedIdx, setSelectedIdx] = useState(-1);
  const timelineRef = useRef(null);
  const autoScrollRef = useRef(true);
  const containerRef = useRef(null);

  const leftWidth = splitX || 400;

  const handleDrag = useCallback((x) => {
    const el = containerRef.current;
    if (!el) return;
    const rect = el.getBoundingClientRect();
    const newLeft = Math.max(200, Math.min(x - rect.left, rect.width - 200));
    setSplitX(newLeft);
  }, []);

  // Auto-scroll
  useEffect(() => {
    const el = timelineRef.current;
    if (el && autoScrollRef.current) {
      el.scrollTop = el.scrollHeight;
    }
  }, [events]);

  const handleTimelineScroll = () => {
    const el = timelineRef.current;
    if (!el) return;
    autoScrollRef.current = el.scrollTop + el.clientHeight >= el.scrollHeight - 50;
  };

  // Filter events
  const filteredEvents = useMemo(() => {
    if (!searchText) return events;
    const q = searchText.toLowerCase();
    return events.filter(ev => {
      const agent = (ev.agent_path || []).join(' ');
      const data = JSON.stringify(ev.data || {}).toLowerCase();
      return agent.includes(q) || data.includes(q);
    });
  }, [events, searchText]);

  // Keyboard shortcuts
  useEffect(() => {
    const handler = (e) => {
      if (e.target.tagName === 'INPUT') return;
      if (e.key === '/') { e.preventDefault(); setSearchVisible(true); }
      if (e.key === 'Escape') { setSelectedAgent(null); setSearchVisible(false); setSearchText(''); }
      if (e.key === 'j') setSelectedIdx(i => Math.min(i + 1, filteredEvents.length - 1));
      if (e.key === 'k') setSelectedIdx(i => Math.max(i - 1, 0));
      if (e.key === 'Enter' && selectedIdx >= 0) {
        const ev = filteredEvents[selectedIdx];
        if (ev?.agent_path?.[0]) setSelectedAgent(ev.agent_path[0]);
      }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [filteredEvents, selectedIdx]);

  const startTime = events.length > 0 ? new Date(events[0].timestamp) : null;

  function formatRelativeTime(ts) {
    if (!startTime) return '00:00';
    const diff = Math.floor((new Date(ts) - startTime) / 1000);
    const m = String(Math.floor(diff / 60)).padStart(2, '0');
    const s = String(diff % 60).padStart(2, '0');
    return `${m}:${s}`;
  }

  function getEventInfo(ev) {
    const agent = (ev.agent_path || [])[0] || 'unknown';
    const data = ev.data || {};
    const isOrch = agent === 'orchestrator';

    // Determine event type and color
    if (isOrch && data.notebook) {
      return { icon: '\u25B8', label: `orchestrator`, detail: `phase: ${data.notebook.current_phase || '?'}`, color: C.teal };
    }
    if (isOrch) {
      const msgs = data.messages || Object.values(data).find(v => Array.isArray(v)) || [];
      const lastMsg = msgs[msgs.length - 1];
      if (lastMsg?.tool_calls?.length) {
        const names = lastMsg.tool_calls.map(tc => tc.name).join(', ');
        return { icon: '\u25B8', label: 'orchestrator', detail: names, color: C.orange };
      }
      return { icon: '\u25B8', label: 'orchestrator', detail: '', color: C.teal };
    }

    const agentState = agents[agent];
    const status = agentState?.status || 'running';
    if (status === 'completed') {
      const dur = agentState?.durationSeconds;
      return { icon: '\u25CF', label: agent, detail: dur ? `${dur.toFixed(1)}s done` : 'done', color: C.green };
    }
    if (status === 'failed') {
      return { icon: '\u2717', label: agent, detail: agentState?.error || 'error', color: C.red };
    }
    return { icon: '\u25B8', label: agent, detail: '', color: C.teal };
  }

  return (
    <div ref={containerRef} style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
      <div style={{ padding: '10px 16px', borderBottom: `1px solid ${C.line}`, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <span style={{ fontWeight: 600 }}>Execution Monitor</span>
        {searchVisible && (
          <input
            autoFocus
            value={searchText}
            onChange={e => setSearchText(e.target.value)}
            onKeyDown={e => { if (e.key === 'Escape') { setSearchVisible(false); setSearchText(''); } }}
            placeholder="Search..."
            style={{
              background: C.bg, color: C.text, border: `1px solid ${C.line}`,
              padding: '4px 10px', borderRadius: 3, fontFamily: 'inherit', fontSize: 12, width: 200,
            }}
          />
        )}
      </div>
      <div style={{ flex: 1, display: 'flex', overflow: 'hidden' }}>
        {/* Timeline */}
        <div
          ref={timelineRef}
          onScroll={handleTimelineScroll}
          style={{ width: selectedAgent ? leftWidth : '100%', overflowY: 'auto', borderRight: selectedAgent ? `1px solid ${C.line}` : 'none' }}
        >
          {filteredEvents.map((ev, i) => {
            const info = getEventInfo(ev);
            const isSelected = i === selectedIdx;
            return (
              <div
                key={i}
                onClick={() => { setSelectedAgent(ev.agent_path?.[0]); setSelectedIdx(i); }}
                style={{
                  padding: '6px 12px',
                  borderBottom: `1px solid ${C.line}22`,
                  cursor: 'pointer',
                  background: isSelected ? C.line + '40' : 'transparent',
                  display: 'flex',
                  gap: 10,
                  alignItems: 'flex-start',
                  animation: 'fadeIn 0.2s ease',
                }}
              >
                <span style={{ color: C.muted, minWidth: 40, fontSize: 11 }}>{formatRelativeTime(ev.timestamp)}</span>
                <span style={{ color: info.color }}>{info.icon}</span>
                <div>
                  <span style={{ color: info.color, fontWeight: 600 }}>{info.label}</span>
                  {info.detail && <span style={{ color: C.muted, marginLeft: 8, fontSize: 12 }}>{info.detail}</span>}
                </div>
              </div>
            );
          })}
          {filteredEvents.length === 0 && (
            <div style={{ padding: 40, textAlign: 'center', color: C.muted }}>
              {events.length === 0 ? 'Waiting for events...' : 'No matching events'}
            </div>
          )}
          {!autoScrollRef.current && events.length > 0 && (
            <div
              onClick={() => { autoScrollRef.current = true; timelineRef.current.scrollTop = timelineRef.current.scrollHeight; }}
              style={{
                position: 'sticky', bottom: 8, margin: '0 auto', width: 'fit-content',
                background: C.teal, color: C.bg, padding: '4px 16px', borderRadius: 12,
                fontSize: 11, fontWeight: 600, cursor: 'pointer',
              }}
            >&#8595; BOTTOM</div>
          )}
        </div>

        {/* Drag + Detail */}
        {selectedAgent && (
          <>
            <DragHandle onDrag={handleDrag} />
            <AgentDetailPanel agent={agents[selectedAgent]} agentId={selectedAgent} events={events} onClose={() => setSelectedAgent(null)} />
          </>
        )}
      </div>
      <div style={{ padding: '4px 12px', borderTop: `1px solid ${C.line}`, color: C.muted, fontSize: 11 }}>
        j/k: navigate &nbsp; /: search &nbsp; Esc: close panel &nbsp; Enter: select
      </div>
    </div>
  );
}

function AgentDetailPanel({ agent, agentId, events, onClose }) {
  const agentEvents = useMemo(() => {
    return events.filter(ev => (ev.agent_path || [])[0] === agentId);
  }, [events, agentId]);

  const status = agent?.status || 'pending';

  return (
    <div style={{ flex: 1, overflowY: 'auto', padding: 0 }}>
      {/* Header */}
      <div style={{ padding: '12px 16px', borderBottom: `1px solid ${C.line}`, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          <StatusDot status={status} />
          <span style={{ fontWeight: 600, fontSize: 14 }}>{agentId}</span>
          <Tag text={status} color={STATUS_COLORS[status]} />
        </div>
        <button onClick={onClose} style={{ background: 'none', border: 'none', color: C.muted, cursor: 'pointer', fontSize: 14, fontFamily: 'inherit' }}>[ESC]</button>
      </div>

      {/* Tool calls */}
      {agent?.toolCalls?.length > 0 && (
        <div style={{ padding: '8px 0' }}>
          <div style={{ padding: '4px 16px', color: C.muted, fontSize: 11, fontWeight: 600 }}>Tool Calls</div>
          {agent.toolCalls.map((tc, i) => (
            <div key={i} style={{ padding: '4px 16px', display: 'flex', gap: 10, alignItems: 'center', fontSize: 12 }}>
              <span style={{ color: C.muted, minWidth: 20 }}>{i + 1}.</span>
              <span style={{ color: C.yellow }}>{tc.name}</span>
              <span style={{ color: tc.status === 'success' ? C.green : tc.status === 'error' ? C.red : C.teal }}>
                {tc.status === 'success' ? '\u2713' : tc.status === 'error' ? '\u2717' : '\u25CC'}
              </span>
              {tc.durationSeconds && <span style={{ color: C.muted }}>{tc.durationSeconds.toFixed(1)}s</span>}
            </div>
          ))}
        </div>
      )}

      {/* Messages */}
      {agent?.messages?.length > 0 && (
        <div style={{ padding: '8px 0' }}>
          <div style={{ padding: '4px 16px', color: C.muted, fontSize: 11, fontWeight: 600 }}>Messages</div>
          {agent.messages.slice(-10).map((msg, i) => (
            <CollapsibleContent key={i} title={`${msg.type}${msg.toolCallId ? ` (${msg.toolCallId.slice(0, 8)})` : ''}`}>
              <pre style={{ whiteSpace: 'pre-wrap', wordBreak: 'break-all', fontSize: 11, color: C.text }}>
                {typeof msg.content === 'string' ? msg.content.slice(0, 1000) : JSON.stringify(msg.content, null, 2)}
              </pre>
            </CollapsibleContent>
          ))}
        </div>
      )}

      {/* Raw events fallback */}
      {(!agent?.messages || agent.messages.length === 0) && agentEvents.length > 0 && (
        <div style={{ padding: '8px 0' }}>
          <div style={{ padding: '4px 16px', color: C.muted, fontSize: 11, fontWeight: 600 }}>Raw Events ({agentEvents.length})</div>
          {agentEvents.slice(-10).map((ev, i) => (
            <CollapsibleContent key={i} title={`Event ${i + 1}`}>
              <div style={{ fontSize: 11 }}>
                <JsonHighlighter data={ev.data} />
              </div>
            </CollapsibleContent>
          ))}
        </div>
      )}

      {agentEvents.length === 0 && (!agent?.toolCalls || agent.toolCalls.length === 0) && (
        <div style={{ padding: 40, textAlign: 'center', color: C.muted }}>No data for this agent yet</div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════
// Page 3: Conversation View (RCA Plugin)
// ═══════════════════════════════════════════════════════════════════════

// ── RCA Scenario Plugin ──────────────────────────────────────────────

function RCAConversationView({ state, events }) {
  const [phaseFilter, setPhaseFilter] = useState('all');
  const [liveMode, setLiveMode] = useState(true);
  const scrollRef = useRef(null);

  const notebook = state.notebook || {};
  const phases = ['exploration', 'generation', 'verification', 'confirmation'];

  useEffect(() => {
    if (liveMode && scrollRef.current) {
      scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
    }
  }, [state, liveMode]);

  const handleScroll = () => {
    const el = scrollRef.current;
    if (!el) return;
    if (el.scrollTop + el.clientHeight < el.scrollHeight - 50) setLiveMode(false);
  };

  // Build phase data
  const phaseData = useMemo(() => {
    const result = [];

    // Exploration
    if (notebook.exploration_history?.length > 0 || notebook.collected_data) {
      result.push({
        phase: 'exploration',
        label: 'Phase 1: Exploration',
        content: { agents: notebook.collected_data || {}, history: notebook.exploration_history || [] },
      });
    }

    // Generation
    if (notebook.hypotheses && Object.keys(notebook.hypotheses).length > 0) {
      result.push({
        phase: 'generation',
        label: 'Phase 2: Hypothesis Generation',
        content: { hypotheses: notebook.hypotheses },
      });
    }

    // Verification
    const verifying = notebook.hypotheses
      ? Object.values(notebook.hypotheses).filter(h => h.status === 'INVESTIGATING' || h.status === 'CONFIRMED' || h.status === 'REJECTED')
      : [];
    if (verifying.length > 0) {
      result.push({
        phase: 'verification',
        label: 'Phase 3: Verification',
        content: { hypotheses: verifying },
      });
    }

    // Confirmation
    if (notebook.confirmed_hypothesis) {
      const confirmed = notebook.hypotheses?.[notebook.confirmed_hypothesis];
      result.push({
        phase: 'confirmation',
        label: 'Phase 4: Confirmation',
        content: { confirmed, id: notebook.confirmed_hypothesis },
      });
    }

    return result;
  }, [notebook]);

  const visiblePhases = phaseFilter === 'all' ? phaseData : phaseData.filter(p => p.phase === phaseFilter);

  return (
    <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
      <div style={{ padding: '10px 16px', borderBottom: `1px solid ${C.line}`, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <span style={{ fontWeight: 600 }}>Conversation View</span>
        <div style={{ display: 'flex', gap: 12, alignItems: 'center' }}>
          <span style={{ fontSize: 11, color: C.muted }}>Phase:</span>
          <select
            value={phaseFilter}
            onChange={e => setPhaseFilter(e.target.value)}
            style={{ background: C.bg, color: C.text, border: `1px solid ${C.line}`, padding: '3px 8px', borderRadius: 3, fontFamily: 'inherit', fontSize: 12 }}
          >
            <option value="all">All</option>
            {phases.map(p => <option key={p} value={p}>{p}</option>)}
          </select>
          <button
            onClick={() => setLiveMode(!liveMode)}
            style={{
              background: liveMode ? C.green + '20' : 'transparent',
              border: `1px solid ${liveMode ? C.green : C.line}`,
              color: liveMode ? C.green : C.muted,
              padding: '3px 10px', borderRadius: 3, cursor: 'pointer', fontSize: 11, fontFamily: 'inherit',
            }}
          >{liveMode ? '\u21BB Live' : '\u21BB Paused'}</button>
        </div>
      </div>
      <div ref={scrollRef} onScroll={handleScroll} style={{ flex: 1, overflowY: 'auto', padding: 16 }}>
        {/* User message */}
        {notebook.task_description && (
          <div style={{ background: C.panel, border: `1px solid ${C.line}`, borderRadius: 6, padding: '10px 14px', marginBottom: 16 }}>
            <div style={{ fontSize: 11, color: C.muted, marginBottom: 4 }}>User</div>
            <div>{notebook.task_description}</div>
          </div>
        )}

        {visiblePhases.map((pd, i) => (
          <PhaseCard key={i} phase={pd.phase} label={pd.label}>
            {pd.phase === 'exploration' && <ExplorationContent data={pd.content} />}
            {pd.phase === 'generation' && <HypothesisTable hypotheses={pd.content.hypotheses} />}
            {pd.phase === 'verification' && <VerificationContent hypotheses={pd.content.hypotheses} />}
            {pd.phase === 'confirmation' && <ConfirmationContent confirmed={pd.content.confirmed} id={pd.content.id} />}
          </PhaseCard>
        ))}

        {visiblePhases.length === 0 && (
          <div style={{ padding: 40, textAlign: 'center', color: C.muted }}>
            {notebook.current_phase ? `Current phase: ${notebook.current_phase}` : 'Waiting for conversation data...'}
          </div>
        )}
      </div>
    </div>
  );
}

function PhaseCard({ phase, label, children }) {
  return (
    <div style={{
      borderLeft: `3px solid ${PHASE_COLORS[phase] || C.muted}`,
      background: C.panel,
      border: `1px solid ${C.line}`,
      borderLeftWidth: 3,
      borderLeftColor: PHASE_COLORS[phase] || C.muted,
      borderRadius: 6,
      padding: '12px 14px',
      marginBottom: 16,
    }}>
      <div style={{ fontWeight: 600, color: PHASE_COLORS[phase] || C.text, marginBottom: 10, fontSize: 13 }}>{label}</div>
      {children}
    </div>
  );
}

function ExplorationContent({ data }) {
  const agents = data.agents || {};
  return (
    <div>
      {data.history?.length > 0 && (
        <div style={{ color: C.muted, fontSize: 12, marginBottom: 8 }}>
          Dispatched agents: {data.history.map(h => h.agent_id || h.agent).filter(Boolean).join(', ')}
        </div>
      )}
      {Object.entries(agents).map(([name, result]) => (
        <CollapsibleContent key={name} title={`${name} (result)`}>
          <div style={{ fontSize: 11 }}><JsonHighlighter data={result} /></div>
        </CollapsibleContent>
      ))}
    </div>
  );
}

function HypothesisTable({ hypotheses }) {
  const entries = typeof hypotheses === 'object' && !Array.isArray(hypotheses)
    ? Object.values(hypotheses) : (hypotheses || []);
  if (entries.length === 0) return <div style={{ color: C.muted }}>No hypotheses yet</div>;

  const statusColor = (s) => {
    const sc = { FORMED: C.muted, INVESTIGATING: C.teal, CONFIRMED: C.green, REJECTED: C.red, REFINED: C.purple, INCONCLUSIVE: C.yellow };
    return sc[s] || C.muted;
  };

  return (
    <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 12 }}>
      <thead>
        <tr style={{ borderBottom: `1px solid ${C.line}` }}>
          <th style={{ textAlign: 'left', padding: '4px 8px', color: C.muted, fontWeight: 500 }}>ID</th>
          <th style={{ textAlign: 'left', padding: '4px 8px', color: C.muted, fontWeight: 500 }}>Description</th>
          <th style={{ textAlign: 'left', padding: '4px 8px', color: C.muted, fontWeight: 500 }}>Status</th>
        </tr>
      </thead>
      <tbody>
        {entries.map((h, i) => (
          <tr key={h.id || i} style={{ borderBottom: `1px solid ${C.line}22` }}>
            <td style={{ padding: '4px 8px', color: C.purple }}>{h.id || `H${i + 1}`}</td>
            <td style={{ padding: '4px 8px' }}>{h.description}</td>
            <td style={{ padding: '4px 8px' }}><Tag text={h.status} color={statusColor(h.status)} /></td>
          </tr>
        ))}
      </tbody>
    </table>
  );
}

function VerificationContent({ hypotheses }) {
  return (
    <div>
      {hypotheses.map((h, i) => (
        <div key={h.id || i} style={{ marginBottom: 10 }}>
          <div style={{ fontWeight: 600, color: C.orange, marginBottom: 4 }}>
            Verifying {h.id}: {h.description}
          </div>
          {h.evidence?.length > 0 && (
            <div style={{ fontSize: 12, color: C.green, marginLeft: 8 }}>
              Supporting: {h.evidence.join('; ')}
            </div>
          )}
          {h.counter_evidence?.length > 0 && (
            <div style={{ fontSize: 12, color: C.red, marginLeft: 8 }}>
              Rejecting: {h.counter_evidence.join('; ')}
            </div>
          )}
          <div style={{ marginTop: 4, marginLeft: 8 }}>
            <Tag
              text={h.status === 'CONFIRMED' ? 'CONFIRMED' : h.status === 'REJECTED' ? 'REJECTED' : 'INVESTIGATING'}
              color={h.status === 'CONFIRMED' ? C.green : h.status === 'REJECTED' ? C.red : C.teal}
            />
          </div>
        </div>
      ))}
    </div>
  );
}

function ConfirmationContent({ confirmed, id }) {
  if (!confirmed) return <div style={{ color: C.muted }}>Awaiting confirmation...</div>;
  return (
    <div>
      <div style={{ color: C.green, fontWeight: 600, marginBottom: 8 }}>
        Root cause confirmed: {id} &mdash; {confirmed.description}
      </div>
      {confirmed.evidence?.length > 0 && (
        <div style={{ fontSize: 12 }}>
          <div style={{ color: C.muted, marginBottom: 4 }}>Evidence:</div>
          {confirmed.evidence.map((e, i) => (
            <div key={i} style={{ paddingLeft: 8, color: C.text }}>&#9656; {e}</div>
          ))}
        </div>
      )}
    </div>
  );
}

// Plugin definition
const RCAPlugin = {
  id: 'rca_hypothesis',
  label: 'RCA Hypothesis-Driven',
  ConversationView: RCAConversationView,
  parseState: (data) => ({
    notebook: data.notebook || data,
    hypotheses: data.notebook?.hypotheses || data.hypotheses,
    currentPhase: data.notebook?.current_phase || data.current_phase,
    explorationHistory: data.notebook?.exploration_history,
    collectedData: data.notebook?.collected_data,
    phaseSummaries: data.notebook?.phase_summaries,
  }),
  decorateTopologyNode: (agentId, state) => {
    if (agentId === 'orchestrator' && state?.currentPhase) {
      return { sublabel: `phase: ${state.currentPhase}` };
    }
    return {};
  },
};

const SCENARIO_PLUGINS = {
  rca_hypothesis: RCAPlugin,
};

// ── Conversation Page (plugin mount) ─────────────────────────────────

function ConversationPage({ state, events, plugin }) {
  if (!plugin) {
    return (
      <div style={{ height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', color: C.muted }}>
        No scenario plugin loaded
      </div>
    );
  }
  const View = plugin.ConversationView;
  return <View state={state} events={events} />;
}

// ═══════════════════════════════════════════════════════════════════════
// Page 4: Debug Panel
// ═══════════════════════════════════════════════════════════════════════

function DebugPage({ threadId }) {
  const [checkpoints, setCheckpoints] = useState([]);
  const [selectedCp, setSelectedCp] = useState(null);
  const [cpState, setCpState] = useState(null);
  const [splitX, setSplitX] = useState(null);
  const [loading, setLoading] = useState(false);
  const [actionMsg, setActionMsg] = useState('');
  const containerRef = useRef(null);

  const leftWidth = splitX || 280;

  useEffect(() => {
    if (!threadId) return;
    fetch(`/api/tasks/${threadId}/history`)
      .then(r => r.json())
      .then(setCheckpoints)
      .catch(() => {});
  }, [threadId]);

  const selectCheckpoint = async (cp) => {
    setSelectedCp(cp);
    if (!threadId) return;
    setLoading(true);
    try {
      const r = await fetch(`/api/tasks/${threadId}/history/${cp.checkpoint_id}`);
      const data = await r.json();
      setCpState(data);
    } catch {
      setCpState(null);
    }
    setLoading(false);
  };

  const handleReplay = async () => {
    if (!threadId || !selectedCp) return;
    setActionMsg('Replaying...');
    try {
      const r = await fetch(`/api/tasks/${threadId}/resume`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ checkpoint_id: selectedCp.checkpoint_id }),
      });
      const data = await r.json();
      setActionMsg(`Replay: ${data.status || 'done'}`);
    } catch (e) {
      setActionMsg(`Replay error: ${e.message}`);
    }
    setTimeout(() => setActionMsg(''), 3000);
  };

  const handleExport = () => {
    if (!threadId) return;
    window.open(`/api/tasks/${threadId}/trajectory`, '_blank');
  };

  const handleDrag = useCallback((x) => {
    const el = containerRef.current;
    if (!el) return;
    const rect = el.getBoundingClientRect();
    setSplitX(Math.max(180, Math.min(x - rect.left, rect.width - 200)));
  }, []);

  // Keyboard
  useEffect(() => {
    const handler = (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
        e.preventDefault();
        const idx = checkpoints.findIndex(c => c.checkpoint_id === selectedCp?.checkpoint_id);
        const next = e.key === 'ArrowDown' ? Math.min(idx + 1, checkpoints.length - 1) : Math.max(idx - 1, 0);
        if (checkpoints[next]) selectCheckpoint(checkpoints[next]);
      }
      if (e.key === 'r') handleReplay();
      if (e.key === 'e') handleExport();
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [checkpoints, selectedCp, threadId]);

  return (
    <div ref={containerRef} style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
      <div style={{ padding: '10px 16px', borderBottom: `1px solid ${C.line}`, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <span style={{ fontWeight: 600 }}>Debug Panel</span>
        <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
          {actionMsg && <span style={{ color: C.teal, fontSize: 11 }}>{actionMsg}</span>}
          <button
            onClick={handleExport}
            style={{ background: 'none', border: `1px solid ${C.line}`, color: C.muted, padding: '3px 10px', borderRadius: 3, cursor: 'pointer', fontSize: 11, fontFamily: 'inherit' }}
          >Export</button>
        </div>
      </div>
      <div style={{ flex: 1, display: 'flex', overflow: 'hidden' }}>
        {/* Checkpoint list */}
        <div style={{ width: leftWidth, overflowY: 'auto', borderRight: `1px solid ${C.line}` }}>
          {checkpoints.length === 0 && (
            <div style={{ padding: 20, color: C.muted, textAlign: 'center', fontSize: 12 }}>
              {threadId ? 'No checkpoints found' : 'No thread ID — start an investigation'}
            </div>
          )}
          {checkpoints.map((cp, i) => {
            const isSelected = selectedCp?.checkpoint_id === cp.checkpoint_id;
            return (
              <div
                key={cp.checkpoint_id || i}
                onClick={() => selectCheckpoint(cp)}
                style={{
                  padding: '6px 12px',
                  cursor: 'pointer',
                  background: isSelected ? C.teal + '15' : 'transparent',
                  borderLeft: isSelected ? `2px solid ${C.teal}` : '2px solid transparent',
                  display: 'flex',
                  gap: 8,
                  alignItems: 'center',
                  fontSize: 12,
                }}
              >
                <span style={{ color: isSelected ? C.teal : C.muted }}>{isSelected ? '\u25CF' : '\u25CB'}</span>
                <span>Step {cp.step ?? i}</span>
                <span style={{ color: C.muted }}>{cp.node_name}</span>
                {cp.source && <span style={{ color: C.muted, fontSize: 10 }}>{cp.source}</span>}
              </div>
            );
          })}
          {selectedCp && (
            <div style={{ padding: '12px', borderTop: `1px solid ${C.line}` }}>
              <div style={{ fontSize: 11, color: C.muted, marginBottom: 8 }}>Actions:</div>
              <button
                onClick={handleReplay}
                style={{
                  display: 'block', width: '100%', marginBottom: 6, padding: '6px',
                  background: 'transparent', border: `1px solid ${C.teal}`, color: C.teal,
                  borderRadius: 3, cursor: 'pointer', fontSize: 11, fontFamily: 'inherit',
                }}
              >&#9664; Replay from here</button>
            </div>
          )}
        </div>

        <DragHandle onDrag={handleDrag} />

        {/* State inspector */}
        <div style={{ flex: 1, overflowY: 'auto', padding: 12 }}>
          {loading && <div style={{ color: C.muted, textAlign: 'center', padding: 20 }}>Loading...</div>}
          {!loading && !cpState && (
            <div style={{ color: C.muted, textAlign: 'center', padding: 40 }}>Select a checkpoint to inspect</div>
          )}
          {!loading && cpState && (
            <div>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
                <div>
                  <span style={{ fontWeight: 600 }}>Step {cpState.step}</span>
                  <span style={{ color: C.muted, marginLeft: 8 }}>&mdash; {cpState.node_name}</span>
                  {cpState.source && <span style={{ color: C.muted, marginLeft: 8, fontSize: 11 }}>({cpState.source})</span>}
                </div>
                <CopyButton text={cpState} />
              </div>

              {cpState.values && Object.entries(cpState.values).map(([key, val]) => (
                <CollapsibleContent key={key} title={key} defaultOpen={key === 'notebook'}>
                  <div style={{ fontSize: 11 }}><JsonHighlighter data={val} /></div>
                </CollapsibleContent>
              ))}

              {!cpState.values && cpState.error && (
                <div style={{ color: C.red, padding: 12 }}>{cpState.error}</div>
              )}
            </div>
          )}
        </div>
      </div>
      <div style={{ padding: '4px 12px', borderTop: `1px solid ${C.line}`, color: C.muted, fontSize: 11 }}>
        &#8593;&#8595;: select step &nbsp; Enter: inspect &nbsp; r: replay &nbsp; e: export
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════
// App Shell
// ═══════════════════════════════════════════════════════════════════════

const NAV_ITEMS = [
  { id: 'topology', icon: '\u2B21', label: 'Topology' },
  { id: 'execution', icon: '\u25B6', label: 'Execution' },
  { id: 'conversation', icon: '\u25C8', label: 'Conversation' },
  { id: 'debug', icon: '\u2699', label: 'Debug' },
];

function App() {
  const [page, setPage] = useState('topology');
  const [agents, setAgents] = useState({});
  const [events, setEvents] = useState([]);
  const [topology, setTopology] = useState(null);
  const [scenarioState, setScenarioState] = useState({});
  const [threadId, setThreadId] = useState(null);

  // Determine active plugin
  const plugin = useMemo(() => {
    if (topology?.scenario_id && SCENARIO_PLUGINS[topology.scenario_id]) {
      return SCENARIO_PLUGINS[topology.scenario_id];
    }
    return SCENARIO_PLUGINS.rca_hypothesis;
  }, [topology]);

  // Fetch topology on mount
  useEffect(() => {
    fetch('/api/topology').then(r => r.json()).then(setTopology).catch(() => {});
  }, []);

  // WebSocket event handler
  const handleEvent = useCallback((event) => {
    setEvents(prev => [...prev, event]);

    const agentId = (event.agent_path || [])[0];
    if (!agentId) return;
    const data = event.data || {};
    const ts = event.timestamp;

    // Update agent state
    setAgents(prev => {
      const existing = prev[agentId] || {
        agentId, status: 'pending', currentStep: 0, maxSteps: null,
        startedAt: null, completedAt: null, durationSeconds: null,
        toolCalls: [], messages: [],
      };

      const updated = { ...existing };

      // Mark as running on first event
      if (updated.status === 'pending') {
        updated.status = 'running';
        updated.startedAt = ts;
      }

      // Extract messages
      const messages = data.messages || [];
      for (const msg of messages) {
        if (!msg) continue;

        // Tool calls from AI messages
        if (msg.tool_calls?.length) {
          for (const tc of msg.tool_calls) {
            updated.toolCalls = [...updated.toolCalls, {
              name: tc.name,
              status: 'running',
              startedAt: ts,
              completedAt: null,
              durationSeconds: null,
              argsPreview: JSON.stringify(tc.args || {}).slice(0, 100),
              resultPreview: null,
            }];
          }
          updated.currentStep = updated.toolCalls.length;
        }

        // Tool results
        if (msg.type === 'tool' && msg.tool_call_id) {
          updated.toolCalls = updated.toolCalls.map(tc => {
            if (tc.status === 'running') {
              const dur = tc.startedAt ? (new Date(ts) - new Date(tc.startedAt)) / 1000 : null;
              return { ...tc, status: 'success', completedAt: ts, durationSeconds: dur, resultPreview: (msg.content || '').slice(0, 200) };
            }
            return tc;
          });
        }

        updated.messages = [...updated.messages, {
          type: msg.type || 'unknown',
          content: msg.content || '',
          toolCallId: msg.tool_call_id || null,
          timestamp: ts,
        }];
      }

      // For non-message data (e.g., state updates with notebook)
      if (!messages.length) {
        // Check for nested node data
        for (const [nodeName, nodeData] of Object.entries(data)) {
          if (nodeData?.messages) {
            for (const msg of nodeData.messages) {
              updated.messages = [...updated.messages, {
                type: msg.type || 'unknown',
                content: msg.content || '',
                toolCallId: msg.tool_call_id || null,
                timestamp: ts,
              }];
            }
          }
        }
      }

      return { ...prev, [agentId]: updated };
    });

    // Update scenario state via plugin
    if (agentId === 'orchestrator' && plugin?.parseState) {
      const parsed = plugin.parseState(data);
      if (parsed && Object.keys(parsed).some(k => parsed[k] !== undefined)) {
        setScenarioState(prev => ({ ...prev, ...parsed }));
      }
    }

    // Try to extract thread_id from data
    if (data.task_id && !threadId) {
      setThreadId(data.task_id);
    }
  }, [plugin, threadId]);

  const wsStatus = useWebSocket(handleEvent);

  // Global keyboard shortcuts
  useEffect(() => {
    const handler = (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      if (e.key === '1') setPage('topology');
      if (e.key === '2') setPage('execution');
      if (e.key === '3') setPage('conversation');
      if (e.key === '4') setPage('debug');
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, []);

  return (
    <>
      {/* Header */}
      <div style={{
        height: 40,
        padding: '0 16px',
        display: 'flex',
        alignItems: 'center',
        justifyContent: 'space-between',
        borderBottom: `1px solid ${C.line}`,
        flexShrink: 0,
      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          <span style={{ fontWeight: 700, color: C.teal, fontSize: 14 }}>AgentM</span>
          <span style={{ color: C.muted, fontSize: 12 }}>Dashboard</span>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
          {plugin && <Tag text={plugin.label} color={C.purple} />}
          <div style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 11 }}>
            <span style={{
              width: 8, height: 8, borderRadius: '50%',
              background: wsStatus === 'connected' ? C.green : C.red,
            }} />
            <span style={{ color: wsStatus === 'connected' ? C.green : C.red }}>
              {wsStatus === 'connected' ? 'CONNECTED' : 'DISCONNECTED'}
            </span>
          </div>
        </div>
      </div>

      <div style={{ flex: 1, display: 'flex', overflow: 'hidden' }}>
        {/* NavBar */}
        <div style={{
          width: 48,
          borderRight: `1px solid ${C.line}`,
          display: 'flex',
          flexDirection: 'column',
          alignItems: 'center',
          paddingTop: 8,
          gap: 4,
          flexShrink: 0,
        }}>
          {NAV_ITEMS.map(item => {
            const isActive = page === item.id;
            return (
              <button
                key={item.id}
                onClick={() => setPage(item.id)}
                title={item.label}
                style={{
                  width: 36,
                  height: 36,
                  display: 'flex',
                  alignItems: 'center',
                  justifyContent: 'center',
                  border: 'none',
                  borderRadius: 6,
                  cursor: 'pointer',
                  fontSize: 16,
                  fontFamily: 'inherit',
                  background: isActive ? C.teal + '20' : 'transparent',
                  color: isActive ? C.teal : C.muted,
                  transition: 'all 0.15s',
                }}
              >{item.icon}</button>
            );
          })}
        </div>

        {/* Main content */}
        <div style={{ flex: 1, overflow: 'hidden' }}>
          {page === 'topology' && <TopologyPage agents={agents} topology={topology} scenarioState={scenarioState} plugin={plugin} />}
          {page === 'execution' && <ExecutionPage agents={agents} events={events} />}
          {page === 'conversation' && <ConversationPage state={scenarioState} events={events} plugin={plugin} />}
          {page === 'debug' && <DebugPage threadId={threadId} />}
        </div>
      </div>
    </>
  );
}

// ═══════════════════════════════════════════════════════════════════════
// Mount
// ═══════════════════════════════════════════════════════════════════════
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
