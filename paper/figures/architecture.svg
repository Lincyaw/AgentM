<svg viewBox="0 0 720 520" xmlns="http://www.w3.org/2000/svg">
  <title>AgentM Three-Layer Architecture</title>
  <desc>Three-layer architecture: substrate, atoms (policy), and presenters, with five pluggability axes shown as protocol interfaces between layers.</desc>

  <defs>
    <filter id="shadow-sm">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.10"/>
    </filter>
    <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748b"/>
    </marker>
    <linearGradient id="substrate-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0fdf4;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#dcfce7;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="atom-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#eff6ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#dbeafe;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="presenter-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fefce8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#fef9c3;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Layer 3: Presenters (top) -->
  <g filter="url(#shadow-sm)">
    <rect x="40" y="20" width="640" height="90" rx="12" fill="url(#presenter-bg)" stroke="#ca8a04" stroke-width="2"/>
    <text x="60" y="50" font-family="sans-serif" font-size="15" font-weight="700" fill="#854d0e">Presenters</text>
    <rect x="60" y="62" width="100" height="34" rx="6" fill="white" stroke="#ca8a04" stroke-width="1.5"/>
    <text x="110" y="84" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#854d0e">CLI</text>
    <rect x="175" y="62" width="100" height="34" rx="6" fill="white" stroke="#ca8a04" stroke-width="1.5"/>
    <text x="225" y="84" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#854d0e">SDK</text>
    <rect x="290" y="62" width="100" height="34" rx="6" fill="white" stroke="#ca8a04" stroke-width="1.5"/>
    <text x="340" y="84" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#854d0e">Gateway</text>
  </g>

  <!-- Layer 2: Atoms (middle) -->
  <g filter="url(#shadow-sm)">
    <rect x="40" y="130" width="640" height="150" rx="12" fill="url(#atom-bg)" stroke="#2563eb" stroke-width="2"/>
    <text x="60" y="160" font-family="sans-serif" font-size="15" font-weight="700" fill="#1e40af">Atoms (policy layer)</text>
    <!-- Atom boxes row 1 -->
    <rect x="60" y="172" width="108" height="40" rx="6" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="114" y="197" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#1e40af">llm_openai</text>
    <rect x="178" y="172" width="108" height="40" rx="6" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="232" y="197" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#1e40af">tool_bash</text>
    <rect x="296" y="172" width="108" height="40" rx="6" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="350" y="197" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#1e40af">compaction</text>
    <rect x="414" y="172" width="108" height="40" rx="6" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="468" y="197" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#1e40af">sub_agent</text>
    <rect x="532" y="172" width="108" height="40" rx="6" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="586" y="197" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#1e40af">permission</text>
    <!-- Atom boxes row 2 -->
    <rect x="60" y="222" width="108" height="40" rx="6" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="114" y="247" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#1e40af">file_tools</text>
    <rect x="178" y="222" width="108" height="40" rx="6" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="232" y="247" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#1e40af">memory</text>
    <rect x="296" y="222" width="108" height="40" rx="6" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="350" y="247" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#1e40af">observability</text>
    <rect x="414" y="222" width="108" height="40" rx="6" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="468" y="247" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#1e40af">cost_budget</text>
    <text x="586" y="247" font-family="sans-serif" font-size="13" text-anchor="middle" fill="#6b7280">... (47 total)</text>
  </g>

  <!-- Protocol interface labels between atoms and substrate -->
  <g>
    <line x1="100" y1="290" x2="100" y2="310" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,3"/>
    <line x1="230" y1="290" x2="230" y2="310" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,3"/>
    <line x1="360" y1="290" x2="360" y2="310" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,3"/>
    <line x1="490" y1="290" x2="490" y2="310" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,3"/>
    <line x1="620" y1="290" x2="620" y2="310" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,3"/>
  </g>

  <!-- Five protocol badges -->
  <rect x="52" y="296" width="96" height="22" rx="4" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
  <text x="100" y="311" font-family="sans-serif" font-size="9" text-anchor="middle" fill="#475569">StreamFn</text>
  <rect x="182" y="296" width="96" height="22" rx="4" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
  <text x="230" y="311" font-family="sans-serif" font-size="9" text-anchor="middle" fill="#475569">Operations</text>
  <rect x="312" y="296" width="96" height="22" rx="4" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
  <text x="360" y="311" font-family="sans-serif" font-size="9" text-anchor="middle" fill="#475569">SessionMgr</text>
  <rect x="442" y="296" width="96" height="22" rx="4" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
  <text x="490" y="311" font-family="sans-serif" font-size="9" text-anchor="middle" fill="#475569">ResourceLdr</text>
  <rect x="572" y="296" width="96" height="22" rx="4" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
  <text x="620" y="311" font-family="sans-serif" font-size="9" text-anchor="middle" fill="#475569">EventBus</text>

  <!-- Layer 1: Substrate (bottom) -->
  <g filter="url(#shadow-sm)">
    <rect x="40" y="330" width="640" height="170" rx="12" fill="url(#substrate-bg)" stroke="#16a34a" stroke-width="2"/>
    <text x="60" y="360" font-family="sans-serif" font-size="15" font-weight="700" fill="#166534">Substrate (mechanism layer)</text>
    <!-- Substrate components -->
    <rect x="60" y="375" width="180" height="55" rx="8" fill="white" stroke="#22c55e" stroke-width="1.5"/>
    <text x="150" y="399" font-family="sans-serif" font-size="13" text-anchor="middle" font-weight="600" fill="#166534">ABI</text>
    <text x="150" y="418" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#6b7280">Protocols, Events</text>
    <rect x="260" y="375" width="180" height="55" rx="8" fill="white" stroke="#22c55e" stroke-width="1.5"/>
    <text x="350" y="399" font-family="sans-serif" font-size="13" text-anchor="middle" font-weight="600" fill="#166534">Runtime</text>
    <text x="350" y="418" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#6b7280">Agent Loop, EventBus</text>
    <rect x="460" y="375" width="180" height="55" rx="8" fill="white" stroke="#22c55e" stroke-width="1.5"/>
    <text x="550" y="399" font-family="sans-serif" font-size="13" text-anchor="middle" font-weight="600" fill="#166534">Lib</text>
    <text x="550" y="418" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#6b7280">Pure Helpers</text>

    <!-- Constitution lock icon (simple padlock shape) -->
    <rect x="60" y="445" width="580" height="40" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1" stroke-dasharray="6,3"/>
    <text x="360" y="470" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#166534">Write-protected by core-manifest.yaml (constitution layer)</text>
  </g>
</svg>
