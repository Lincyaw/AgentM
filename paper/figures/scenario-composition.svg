<svg viewBox="0 0 720 400" xmlns="http://www.w3.org/2000/svg">
  <title>Scenario Composition for Single-Axis Ablation</title>
  <desc>Three scenario manifest variants share most atoms but differ in one axis (compaction strategy), enabling controlled ablation.</desc>

  <defs>
    <filter id="shadow-sm">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="360" y="24" font-family="sans-serif" font-size="14" text-anchor="middle" font-weight="700" fill="#1e293b">Scenario Manifests for Single-Axis Ablation (Compaction Strategy)</text>

  <!-- Manifest A: Full Context -->
  <g filter="url(#shadow-sm)" transform="translate(20, 40)">
    <rect width="210" height="340" rx="10" fill="white" stroke="#2563eb" stroke-width="2"/>
    <rect width="210" height="32" rx="10" fill="#2563eb"/>
    <rect y="22" width="210" height="10" fill="#2563eb"/>
    <text x="105" y="22" font-family="sans-serif" font-size="12" text-anchor="middle" font-weight="700" fill="white">Condition A</text>
    <text x="105" y="58" font-family="sans-serif" font-size="11" text-anchor="middle" font-weight="600" fill="#1e40af">Full context (no compaction)</text>
    <!-- Shared atoms (same color) -->
    <rect x="14" y="72" width="182" height="26" rx="5" fill="#e0f2fe" stroke="#93c5fd" stroke-width="1"/>
    <text x="105" y="90" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#1e40af">operations (local)</text>
    <rect x="14" y="104" width="182" height="26" rx="5" fill="#e0f2fe" stroke="#93c5fd" stroke-width="1"/>
    <text x="105" y="122" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#1e40af">tool_bash</text>
    <rect x="14" y="136" width="182" height="26" rx="5" fill="#e0f2fe" stroke="#93c5fd" stroke-width="1"/>
    <text x="105" y="154" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#1e40af">file_tools</text>
    <rect x="14" y="168" width="182" height="26" rx="5" fill="#e0f2fe" stroke="#93c5fd" stroke-width="1"/>
    <text x="105" y="186" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#1e40af">system_prompt</text>
    <rect x="14" y="200" width="182" height="26" rx="5" fill="#e0f2fe" stroke="#93c5fd" stroke-width="1"/>
    <text x="105" y="218" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#1e40af">observability</text>
    <!-- Variable atom: absent -->
    <rect x="14" y="240" width="182" height="42" rx="5" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5" stroke-dasharray="5,3"/>
    <text x="105" y="258" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#dc2626" font-style="italic">(no compaction atom)</text>
    <text x="105" y="272" font-family="sans-serif" font-size="9" text-anchor="middle" fill="#9ca3af">removed</text>
    <!-- Shared tail -->
    <rect x="14" y="296" width="182" height="26" rx="5" fill="#e0f2fe" stroke="#93c5fd" stroke-width="1"/>
    <text x="105" y="314" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#1e40af">cost_budget (limit: 5.0)</text>
  </g>

  <!-- Manifest B: Standard Compaction -->
  <g filter="url(#shadow-sm)" transform="translate(255, 40)">
    <rect width="210" height="340" rx="10" fill="white" stroke="#2563eb" stroke-width="2"/>
    <rect width="210" height="32" rx="10" fill="#2563eb"/>
    <rect y="22" width="210" height="10" fill="#2563eb"/>
    <text x="105" y="22" font-family="sans-serif" font-size="12" text-anchor="middle" font-weight="700" fill="white">Condition B</text>
    <text x="105" y="58" font-family="sans-serif" font-size="11" text-anchor="middle" font-weight="600" fill="#1e40af">Standard compaction (8K)</text>
    <!-- Shared atoms -->
    <rect x="14" y="72" width="182" height="26" rx="5" fill="#e0f2fe" stroke="#93c5fd" stroke-width="1"/>
    <text x="105" y="90" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#1e40af">operations (local)</text>
    <rect x="14" y="104" width="182" height="26" rx="5" fill="#e0f2fe" stroke="#93c5fd" stroke-width="1"/>
    <text x="105" y="122" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#1e40af">tool_bash</text>
    <rect x="14" y="136" width="182" height="26" rx="5" fill="#e0f2fe" stroke="#93c5fd" stroke-width="1"/>
    <text x="105" y="154" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#1e40af">file_tools</text>
    <rect x="14" y="168" width="182" height="26" rx="5" fill="#e0f2fe" stroke="#93c5fd" stroke-width="1"/>
    <text x="105" y="186" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#1e40af">system_prompt</text>
    <rect x="14" y="200" width="182" height="26" rx="5" fill="#e0f2fe" stroke="#93c5fd" stroke-width="1"/>
    <text x="105" y="218" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#1e40af">observability</text>
    <!-- Variable atom: standard -->
    <rect x="14" y="240" width="182" height="42" rx="5" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
    <text x="105" y="256" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#166534" font-weight="600">llm_compaction</text>
    <text x="105" y="272" font-family="sans-serif" font-size="9" text-anchor="middle" fill="#166534">max_tokens: 8000</text>
    <!-- Shared tail -->
    <rect x="14" y="296" width="182" height="26" rx="5" fill="#e0f2fe" stroke="#93c5fd" stroke-width="1"/>
    <text x="105" y="314" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#1e40af">cost_budget (limit: 5.0)</text>
  </g>

  <!-- Manifest C: Aggressive Compaction -->
  <g filter="url(#shadow-sm)" transform="translate(490, 40)">
    <rect width="210" height="340" rx="10" fill="white" stroke="#2563eb" stroke-width="2"/>
    <rect width="210" height="32" rx="10" fill="#2563eb"/>
    <rect y="22" width="210" height="10" fill="#2563eb"/>
    <text x="105" y="22" font-family="sans-serif" font-size="12" text-anchor="middle" font-weight="700" fill="white">Condition C</text>
    <text x="105" y="58" font-family="sans-serif" font-size="11" text-anchor="middle" font-weight="600" fill="#1e40af">Aggressive compaction (2K)</text>
    <!-- Shared atoms -->
    <rect x="14" y="72" width="182" height="26" rx="5" fill="#e0f2fe" stroke="#93c5fd" stroke-width="1"/>
    <text x="105" y="90" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#1e40af">operations (local)</text>
    <rect x="14" y="104" width="182" height="26" rx="5" fill="#e0f2fe" stroke="#93c5fd" stroke-width="1"/>
    <text x="105" y="122" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#1e40af">tool_bash</text>
    <rect x="14" y="136" width="182" height="26" rx="5" fill="#e0f2fe" stroke="#93c5fd" stroke-width="1"/>
    <text x="105" y="154" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#1e40af">file_tools</text>
    <rect x="14" y="168" width="182" height="26" rx="5" fill="#e0f2fe" stroke="#93c5fd" stroke-width="1"/>
    <text x="105" y="186" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#1e40af">system_prompt</text>
    <rect x="14" y="200" width="182" height="26" rx="5" fill="#e0f2fe" stroke="#93c5fd" stroke-width="1"/>
    <text x="105" y="218" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#1e40af">observability</text>
    <!-- Variable atom: aggressive -->
    <rect x="14" y="240" width="182" height="42" rx="5" fill="#fefce8" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="105" y="256" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#854d0e" font-weight="600">llm_compaction</text>
    <text x="105" y="272" font-family="sans-serif" font-size="9" text-anchor="middle" fill="#854d0e">max_tokens: 2000</text>
    <!-- Shared tail -->
    <rect x="14" y="296" width="182" height="26" rx="5" fill="#e0f2fe" stroke="#93c5fd" stroke-width="1"/>
    <text x="105" y="314" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#1e40af">cost_budget (limit: 5.0)</text>
  </g>

  <!-- Bracket annotations -->
  <!-- "Shared" bracket on left -->
  <line x1="12" y1="112" x2="12" y2="280" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="12" y1="112" x2="18" y2="112" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="12" y1="280" x2="18" y2="280" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="8" y="200" font-family="sans-serif" font-size="9" fill="#64748b" text-anchor="middle" transform="rotate(-90, 8, 200)">shared across conditions</text>

</svg>
