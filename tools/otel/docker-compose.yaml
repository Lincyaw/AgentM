# Local OTel collector + ClickHouse + Postgres for AgentM development.
#
# Usage:
#   docker compose -f tools/otel/docker-compose.yaml up -d
#   open http://localhost:8123/play # ClickHouse HTTP playground
#   psql postgresql://agentm:agentm@localhost:55432/agentm_test
#
# Stop:
#   docker compose -f tools/otel/docker-compose.yaml down

services:
  collector:
    image: otel/opentelemetry-collector-contrib:0.152.1
    container_name: agentm-otel-collector
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC (default for AgentM)
      - "4318:4318"   # OTLP HTTP
    depends_on:
      clickhouse:
        condition: service_healthy

  clickhouse:
    image: clickhouse/clickhouse-server:25.6
    container_name: agentm-clickhouse
    environment:
      CLICKHOUSE_DB: otel
      CLICKHOUSE_USER: default
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "8123:8123"   # HTTP interface / playground
      # Native TCP 9000 only needs internal access (collector → clickhouse)
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  postgres:
    image: postgres:16-alpine
    container_name: agentm-postgres
    environment:
      POSTGRES_USER: agentm
      POSTGRES_PASSWORD: agentm
      POSTGRES_DB: agentm_test
    ports:
      - "55432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentm -d agentm_test"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  clickhouse-data:
  postgres-data:
