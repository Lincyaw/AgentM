# Local OTel collector + Jaeger UI for AgentM development.
#
# Usage:
#   docker compose -f tools/otel/docker-compose.yaml up -d
#   uv run agentm --extension agentm.extensions.builtin.otlp_export "hello"
#   open http://localhost:16686     # Jaeger UI
#
# Stop:
#   docker compose -f tools/otel/docker-compose.yaml down

services:
  collector:
    image: otel/opentelemetry-collector-contrib:0.152.1
    container_name: agentm-otel-collector
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC (default for AgentM)
      - "4318:4318"   # OTLP HTTP
    depends_on:
      - jaeger

  jaeger:
    image: jaegertracing/all-in-one:1.76.0
    container_name: agentm-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # Jaeger UI
