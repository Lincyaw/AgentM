# OpenTelemetry Collector config for local AgentM tracing.
#
# Receives OTLP from AgentM, exports to:
#   * ClickHouse (HTTP playground at http://localhost:8123/play)
#   * debug exporter (writes a span-summary line per batch to collector stdout
#     — set `verbosity: detailed` if you want full attributes printed).
#
# Run via `tools/otel/docker-compose.yaml`.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    send_batch_size: 512
    timeout: 2s

exporters:
  clickhouse:
    endpoint: tcp://clickhouse:9000?dial_timeout=10s
    database: otel
    create_schema: true
    ttl: 720h
    logs_table_name: otel_logs
    traces_table_name: otel_traces
    timeout: 10s
    sending_queue:
      enabled: true
      num_consumers: 4
      queue_size: 1000
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s

  debug:
    verbosity: normal

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [clickhouse, debug]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [clickhouse, debug]
