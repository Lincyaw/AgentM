version: 1

labels:
  secret:
    source:
      tool: "read|bash"
      result_matches: '(?:API[_-]?KEY|TOKEN|SECRET|PASSWORD)\s*[=:]\s*(\S{8,})'
    clears_on: never
    min_length: 8

rules:
  # --- Enforce (validated, always active) ---

  - name: edit-without-read
    on: tool_call_pre
    match: {tool: edit}
    when: "not file_state.get(event.args.get('path', ''))"
    effect: notify
    mode: enforce
    reason: "Editing {event.args[path]} without reading it first."

  - name: dangerous-bash
    on: tool_call_pre
    match: {tool: bash}
    when: |
      any(p in event.args.get('cmd', '') for p in [
        'rm -rf', 'git push --force', 'git reset --hard',
        'git clean -f', 'DROP TABLE', 'DROP DATABASE',
        'kubectl delete', '> /dev/', 'dd if=', 'mkfs'
      ])
    effect: block
    mode: enforce
    reason: "Blocked destructive command: {event.args[cmd]}"

  - name: budget-warning
    on: turn_end
    when: "lookup('context_state', session.turn_count, 'context_usage_pct') > 80"
    effect: notify
    mode: enforce
    reason: "Context budget above 80% — prioritize completing the task."

  - name: spawn-storm
    on: session_spawn
    when: "lookup('session_tree', session.id, 'concurrent_siblings') > 5"
    effect: block
    mode: enforce
    reason: "Too many concurrent sub-agents. Complete existing ones first."

  # --- Observe (ship but measure before enforcing) ---

  - name: test-before-commit
    on: tool_call_pre
    match: {tool: bash}
    when: |
      'git commit' in event.args.get('cmd', '')
      and not tool_log.exists(
        where={tool: "bash", cmd: "pytest*|go test*|npm test*|make test*", exit_code: 0},
        since=tool_log.last(where={tool: "edit|write"}).turn
      )
    effect: block
    mode: observe
    reason: "Tests haven't passed since last edit. Run tests first."

  - name: stuck-loop
    on: turn_end
    when: |
      tool_log.count(last=5, where={exit_code: "!=0"}) >= 3
      and tool_log.distinct("args_hash", last=5) < 2
    effect: escalate
    mode: observe
    cooldown: 5 turns
    reason: "Agent stuck — repeated failures with no strategy change."

  - name: weak-grounding-edit
    on: tool_call_pre
    match: {tool: edit}
    when: "not entity_evidence(event.args.get('path', '')).has(type='tool_success')"
    effect: escalate
    mode: observe
    escalate_context: "entity_evidence(event.args.get('path', ''))"
    reason: "Editing {event.args[path]} with no tool-confirmed evidence of existence."

  - name: premature-irreversible
    on: tool_call_pre
    match: {tool: bash}
    when: |
      any(p in event.args.get('cmd', '') for p in ['git push', 'rm -rf'])
      and session.turn_count <= 4
      and tool_log.count(where={tool: "read"}) < 3
    effect: escalate
    mode: observe
    reason: "Irreversible action at turn {session.turn_count} with insufficient reads."

  - name: exploration-not-converging
    on: tool_call_post
    match: {tool: "read|edit|write"}
    when: "ifg.intervention.became_expanding()"
    effect: escalate
    mode: observe
    escalate_context: "ifg.intervention.summary()"
    reason: "The file frontier is still expanding faster than interventions can resolve it."

  - name: mutation-target-drift
    on: tool_call_post
    match: {tool: "edit|write"}
    when: "ifg.intervention.became_target_drifting()"
    effect: escalate
    mode: observe
    escalate_context: "ifg.intervention.summary()"
    reason: "Mutations are spreading across an adaptively large set of targets."

  - name: unvalidated-intervention
    on: tool_call_post
    match: {tool: "read|bash|glob|find"}
    when: "ifg.intervention.became_unvalidated()"
    effect: escalate
    mode: observe
    escalate_context: "ifg.intervention.summary()"
    reason: "The active intervention has exceeded its adaptive validation horizon."

  - name: unchanged-anchor-reentry
    on: tool_call_post
    match: {tool: "bash|read|edit|write"}
    when: "ifg.investigation.became_unchanged_reentry()"
    effect: notify
    mode: observe
    escalate_context: "ifg.investigation.summary()"
    reason: "Structural evidence: an unchanged repository anchor was re-entered."

  - name: created-artifact-replacement
    on: tool_call_post
    match: {tool: bash}
    when: "ifg.investigation.became_artifact_replacement()"
    effect: notify
    mode: observe
    escalate_context: "ifg.investigation.summary()"
    reason: "Structural evidence: one write-first executed artifact followed another without a repository mutation."

  - name: unchanged-investigation-state-cycle
    on: tool_call_post
    match: {tool: bash}
    when: "ifg.investigation.became_state_cycle()"
    effect: notify
    mode: observe
    escalate_context: "ifg.investigation.summary()"
    reason: "Structural evidence: an investigation phase returned to an unchanged repository state."

  - name: repeated-region-reading
    on: tool_call_post
    match: {tool: read}
    when: |
      ifg.region_reads.overlap_count(
        last=20,
        min_ratio=0.8,
        min_lines=10
      ) >= 3
      and ifg.region_reads.overlap_ratio(last=20) >= 0.15
    effect: escalate
    mode: observe
    cooldown: 5 turns
    escalate_context: |
      ifg.region_reads.summary(
        last=20,
        min_ratio=0.8,
        min_lines=10
      )
    reason: "Agent repeatedly read active, unchanged source regions."

  - name: cross-session-repeat
    on: tool_call_post
    when: |
      event.result.get('error', '')
      and tool_log.count(
        scope=user,
        where={error_fingerprint: "placeholder"},
        ttl="14d"
      ) >= 3
    effect: escalate
    mode: observe
    reason: "This error pattern has appeared in 3+ previous sessions."

  - name: no-secrets-to-network
    on: tool_call_pre
    match: {tool: bash}
    when: "'secret' in event.taint"
    effect: abort
    mode: enforce
    reason: "Secret material flowing to network via bash command."

  # --- Meta (queries effect_log) ---

  - name: abort-on-persistent-stagnation
    on: turn_end
    when: |
      effect_log.count(where={rule_id: "stuck-loop", effect: "escalate"}, last=10) >= 2
    effect: abort
    mode: enforce
    reason: "Stagnation persists after two escalations. Aborting."
