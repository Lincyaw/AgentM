symbol_kinds:
  entity: A named entity — person, organization, place
  event: A named event, conference, incident, or dated occurrence
  source: A URL, document, paper, or database consulted during research
  query: A search or retrieval query issued to a tool
  tool: An agent tool or function (web_search, code_interpreter, etc.)
  fact: A specific claim, data point, or statement of fact
  constraint: A requirement or condition from the original question
  concept: An abstract idea, category, or domain term
  error: An execution error, failed retrieval, or tool failure
  unknown: Cannot be classified into the above

reference_kinds:
  tool_input: Entity targeted in a tool call (named in arguments, search query)
  tool_output: Entity appeared in a tool result (search results, execution output)
  mention: Entity referenced in agent or user text outside of tool calls/results

relation_types:
  retrieved_from: A was found/retrieved from source B (observed in tool results)
