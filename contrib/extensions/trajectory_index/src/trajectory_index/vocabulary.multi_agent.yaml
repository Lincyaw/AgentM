# Symbol kinds for multi-agent trajectories (math / coding / agentic).
# `kind` is the TYPE axis and is orthogonal to `entity_class` (the name/value axis).
# The set is deliberately small and non-overlapping — pick the single best fit.
# No kind name collides with an entity_class value (identifier / value / unknown).
symbol_kinds:
  agent: A named agent role in the system.
  tool: A tool or function the agent invokes.
  code: A function, class, or snippet the agent writes or tests.
  test: A test case, test suite, or validation check.
  expression: A math or logical expression or equation being evaluated.
  result: A produced status, verdict, answer, or computed output.
  metric: A measurable quantity or indicator.
  entity: A real-world person, place, work, or object named in the task.
  file: A file, document, or data source.
  table: A database table, view, dataset, or result set.
  api: An API, RPC method, endpoint, or route.
  error: An execution error, tool failure, or incorrect result.
  concept: An abstract domain term — use only when nothing more specific fits.
  unknown: Cannot be classified into the above.

# Reference kinds are assigned by code from message structure (NOT chosen by the
# model); listed here for reference only.
reference_kinds:
  tool_input: The entity is named in a tool call — arguments, query, expression to compute.
  tool_output: The entity appears in a tool result — computation output, search result, test verdict.
  mention: The entity is referenced in agent reasoning text, outside tool calls/results.

relation_types:
  produces: Agent A produces result B (observed in a tool result).
  verifies: Agent A verifies or checks claim/result B.
  contradicts: Result A contradicts claim or result B.
