symbol_kinds:
  agent: A named agent role in the multi-agent system (e.g. MathSolver, Verifier, CodeWriter, Manager)
  assistant: An agent or assistant role (alias for agent)
  role: An agent role (alias for agent)
  tool: An agent tool or function that can be invoked (e.g. compute, web_search, verify_answer)
  function: A named function, method, or callable (e.g. factorint, final_answer)
  computation: A specific calculation, formula, or expression evaluated by a tool
  expression: A mathematical or logical expression
  equation: A mathematical equation or formula
  variable: A named variable, parameter, or intermediate value
  value: A numeric or computed value
  fact: A specific data point, numeric result, or factual claim produced during execution
  claim: An assertion or statement made by an agent
  constraint: A requirement or condition from the original task
  condition: A logical condition or predicate
  entity: A named entity — person, place, concept, or object mentioned in the task
  code: A function, class, or code snippet written or tested by an agent
  test: A test case, test suite, or validation check
  error: An execution error, incorrect result, or tool failure
  concept: An abstract idea or domain term
  relation: A relationship between entities or concepts
  service: A running service, process, or API endpoint
  metric: A measurable quantity or indicator
  file: A file, document, or data source
  query: A search or retrieval query
  unknown: Cannot be classified into the above

reference_kinds:
  tool_input: Entity targeted in a tool call (named in arguments, search query, expression to compute)
  tool_output: Entity appeared in a tool result (computation result, search result, test output)
  mention: Entity referenced in agent reasoning outside of tool calls/results
  claim: Agent asserts this entity as part of its answer or conclusion

relation_types:
  produces: Agent A produces result B (observed in tool results)
  verifies: Agent A verifies or checks claim B
  contradicts: Result A contradicts claim or result B
