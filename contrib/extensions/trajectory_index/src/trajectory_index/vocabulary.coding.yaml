symbol_kinds:
  function: A named function, method, or subroutine defined or modified in source code
  file: A source file, header file, build file, or spec document
  variable: A global variable, struct field, array, or named constant
  type: A struct, class, enum, or typedef
  macro: A preprocessor macro or constant definition (e.g. PTE_COW, PGSIZE)
  error: A compilation error, runtime error, panic, or test failure
  test: A test case, test suite, or test program
  tool: An agent tool or function that can be invoked
  build_target: A Makefile target, CMake target, or build artifact
  concept: An abstract programming concept or algorithm (e.g. copy-on-write, reference counting)
  spec_requirement: A specific requirement from the task specification
  unknown: Cannot be classified into the above

reference_kinds:
  tool_input: Entity targeted in a tool call (file path in read/edit, command in bash)
  tool_output: Entity appeared in a tool result (file content, compiler output, test result)
  mention: Entity referenced in agent reasoning outside of tool calls/results
  definition: Entity is defined or declared at this point
  modification: Entity is modified or edited at this point
  caller: Entity calls or invokes another entity

relation_types:
  calls: Function A calls function B (observed in source code or call chain analysis)
  modifies: Function A modifies or writes to entity B
  includes: File A includes or imports file B
  tests: Test A tests or validates function/feature B
  requires: Spec requirement A requires implementation of entity B
