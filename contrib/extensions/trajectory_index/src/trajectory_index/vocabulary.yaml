symbol_kinds:
  service: A running service, process, or deployment unit
  tool: An agent tool or function that can be invoked
  skill: An agent skill or capability (e.g. diagnose-sql, traces, logs)
  file: A file, document, or data source
  api: An API, RPC method, endpoint, or route
  metric: A measurable quantity or time-series indicator
  error: An error condition, exception, or failure symptom
  config: A configuration value, setting, or flag
  query: A SQL query, search expression, or diagnostic query
  table: A database table, view, or result set
  concept: An abstract idea or domain term
  unknown: Cannot be classified into the above

reference_kinds:
  tool_input: Entity targeted in a tool call (named in arguments, SQL WHERE clause, search query)
  tool_output: Entity appeared in a tool result (data rows, error messages, return values)
  mention: Entity referenced in agent or user text outside of tool calls/results

relation_types:
  calls: A invokes or sends requests to B (observed in trace/call-graph data)
