name: entity_extractor
description: >
  Extract semantic entities, mentions, and relations from agent trajectory
  steps. Designed for small/fast models (Qwen 3.5 2B).

extensions:
  - module: agentm.extensions.builtin.operations
    config:
      backend: local
  - module: agentm.extensions.builtin.observability
  - module: trajectory_index.agents.entity_extractor.context
