<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Trajectory Index Viewer</title>
<style>
:root {
  --bg: #1e1e2e;
  --bg2: #282840;
  --bg3: #313150;
  --fg: #cdd6f4;
  --fg2: #a6adc8;
  --accent: #89b4fa;
  --accent2: #f5c2e7;
  --green: #a6e3a1;
  --red: #f38ba8;
  --yellow: #f9e2af;
  --peach: #fab387;
  --teal: #94e2d5;
  --mauve: #cba6f7;
  --border: #45475a;
  --sym-hover: rgba(137,180,250,0.3);
  --claim-bg: rgba(249,226,175,0.15);
  --obs-bg: rgba(148,226,213,0.12);
  --ref-highlight: rgba(166,227,161,0.25);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; font-size: 13px; background: var(--bg); color: var(--fg); display: flex; height: 100vh; overflow: hidden; }

#sidebar {
  width: 320px; min-width: 260px; background: var(--bg2); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
}
#sidebar-header { padding: 12px 16px; border-bottom: 1px solid var(--border); }
#sidebar-header h2 { font-size: 14px; color: var(--accent); font-weight: 600; }
#sidebar-header .stats { font-size: 11px; color: var(--fg2); margin-top: 4px; }

#tabs { display: flex; border-bottom: 1px solid var(--border); }
.tab {
  flex: 1; padding: 8px 4px; text-align: center; font-size: 11px; cursor: pointer;
  color: var(--fg2); border-bottom: 2px solid transparent; transition: all 0.15s;
}
.tab:hover { color: var(--fg); background: var(--bg3); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

#symbol-list, #claim-list, #constraint-list, #dep-list, #refs-panel-list {
  flex: 1; overflow-y: auto; padding: 4px 0;
}
.panel { display: none; flex: 1; flex-direction: column; overflow: hidden; }
.panel.active { display: flex; }

.sym-item, .claim-item, .con-item, .dep-item, .ref-item {
  padding: 6px 16px; cursor: pointer; border-left: 3px solid transparent; transition: all 0.1s;
}
.sym-item:hover, .claim-item:hover, .con-item:hover, .dep-item:hover, .ref-item:hover { background: var(--bg3); }
.sym-item.selected { border-left-color: var(--accent); background: var(--bg3); }
.claim-item.selected { border-left-color: var(--yellow); background: var(--bg3); }
.dep-item.selected { border-left-color: var(--green); background: var(--bg3); }
.con-item.selected { border-left-color: var(--mauve); background: var(--bg3); }
.ref-item.selected { border-left-color: var(--accent); background: var(--bg3); }

.sym-name { color: var(--accent); font-size: 12px; }
.sym-kind { color: var(--fg2); font-size: 10px; margin-left: 6px; }
.sym-refs { color: var(--fg2); font-size: 10px; float: right; }
.claim-text { color: var(--yellow); font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.claim-step { color: var(--fg2); font-size: 10px; }
.dep-label { color: var(--green); font-size: 11px; }
.dep-risk { font-size: 10px; padding: 1px 5px; border-radius: 3px; margin-left: 4px; }
.dep-risk.grounded { background: rgba(166,227,161,0.2); color: var(--green); }
.dep-risk.ungrounded { background: rgba(243,139,168,0.2); color: var(--red); }
.dep-risk.premature { background: rgba(249,226,175,0.2); color: var(--yellow); }

.con-text { color: var(--mauve); font-size: 11px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.con-status { font-size: 10px; padding: 1px 5px; border-radius: 3px; margin-left: 4px; }
.con-status.satisfied { background: rgba(166,227,161,0.2); color: var(--green); }
.con-status.violated { background: rgba(243,139,168,0.2); color: var(--red); }
.con-status.omitted { background: rgba(249,226,175,0.2); color: var(--yellow); }
.con-status.unknown { background: rgba(166,173,200,0.2); color: var(--fg2); }
.con-meta { font-size: 10px; color: var(--fg2); margin-top: 2px; }

.obs-span { background: var(--obs-bg); border-bottom: 2px solid var(--teal); border-radius: 2px; }

#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#toolbar {
  padding: 8px 16px; background: var(--bg2); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px;
}
#toolbar label { font-size: 11px; color: var(--fg2); }
#file-input { font-size: 11px; color: var(--fg); }
#search { background: var(--bg3); border: 1px solid var(--border); color: var(--fg); padding: 4px 8px; border-radius: 4px; font-size: 12px; width: 200px; }

#trajectory { flex: 1; overflow-y: auto; padding: 0 16px 40px 16px; }
.step { margin: 8px 0; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
.step-header {
  padding: 6px 12px; background: var(--bg3); display: flex; align-items: center; gap: 8px;
  font-size: 11px; cursor: pointer; user-select: none;
}
.step-header:hover { background: var(--bg2); }
.step-role { font-weight: 600; min-width: 80px; }
.step-role.user { color: var(--accent2); }
.step-role.assistant { color: var(--accent); }
.step-role.tool_result { color: var(--green); }
.step-tool { color: var(--peach); }
.step-idx { color: var(--fg2); }
.step-body {
  padding: 8px 12px; white-space: pre-wrap; word-wrap: break-word; line-height: 1.5;
  max-height: 400px; overflow-y: auto; font-size: 12px;
}
.step.collapsed .step-body { display: none; }

.ref-span { border-bottom: 2px solid var(--accent); cursor: pointer; transition: background 0.1s; border-radius: 2px; }
.ref-span:hover { background: var(--sym-hover); }
.ref-span.tool_input { border-bottom-color: var(--peach); }
.ref-span.tool_output { border-bottom-color: var(--green); }
.ref-span.mention { border-bottom-color: var(--accent); }
.ref-span.highlighted { background: var(--ref-highlight); }
.ref-span.current { background: rgba(137,180,250,0.4); outline: 2px solid var(--accent); }

.claim-span { background: var(--claim-bg); border-bottom: 2px solid var(--yellow); cursor: pointer; border-radius: 2px; }

/* action bar: floating popover on ref click */
#action-bar {
  position: fixed; background: var(--bg2); border: 1px solid var(--border);
  border-radius: 6px; padding: 0; z-index: 200; box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  display: none; min-width: 220px;
}
#action-bar-header {
  padding: 8px 12px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 6px;
}
#action-bar-header .ab-name { color: var(--accent); font-weight: 600; font-size: 12px; }
#action-bar-header .ab-kind { color: var(--fg2); font-size: 10px; }
#action-bar-header .ab-class { color: var(--peach); font-size: 10px; }
#action-bar-items { padding: 4px 0; }
.ab-item {
  padding: 5px 12px; cursor: pointer; font-size: 11px; color: var(--fg);
  display: flex; align-items: center; gap: 8px;
}
.ab-item:hover { background: var(--bg3); }
.ab-item .ab-key {
  color: var(--fg2); font-size: 9px; background: var(--bg3); padding: 1px 4px;
  border-radius: 3px; border: 1px solid var(--border); min-width: 20px; text-align: center;
}
.ab-item .ab-label { flex: 1; }
.ab-item .ab-count { color: var(--fg2); font-size: 10px; }
.ab-item.disabled { color: var(--fg2); opacity: 0.5; cursor: default; }

/* ref-navigation bar */
#ref-nav {
  padding: 6px 12px; background: var(--bg2); border-bottom: 1px solid var(--border);
  display: none; align-items: center; gap: 8px; font-size: 11px;
}
#ref-nav.active { display: flex; }
#ref-nav .rn-name { color: var(--accent); font-weight: 600; }
#ref-nav .rn-counter { color: var(--fg2); }
.rn-btn {
  background: var(--bg3); border: 1px solid var(--border); color: var(--fg);
  padding: 2px 8px; border-radius: 3px; cursor: pointer; font-size: 11px; font-family: inherit;
}
.rn-btn:hover { background: var(--border); }
#ref-nav .rn-close { margin-left: auto; cursor: pointer; color: var(--fg2); }
#ref-nav .rn-close:hover { color: var(--fg); }

.ref-item-step { color: var(--fg2); font-size: 10px; }
.ref-item-text { font-size: 11px; color: var(--fg); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ref-item-kind { color: var(--peach); font-size: 10px; }

.ref-tooltip {
  position: fixed; background: var(--bg3); border: 1px solid var(--border);
  padding: 6px 10px; border-radius: 4px; font-size: 11px; pointer-events: none;
  z-index: 100; max-width: 350px;
}
.ref-tooltip .tt-sym { color: var(--accent); font-weight: 600; }
.ref-tooltip .tt-kind { color: var(--fg2); }
.ref-tooltip .tt-ref-kind { color: var(--peach); }

.scroll-target { animation: flash 0.6s ease-out; }
@keyframes flash { 0% { background: rgba(137,180,250,0.3); } 100% { background: transparent; } }

#filter-bar { padding: 6px 12px; border-bottom: 1px solid var(--border); }
#filter-bar input {
  width: 100%; background: var(--bg3); border: 1px solid var(--border);
  color: var(--fg); padding: 4px 8px; border-radius: 4px; font-size: 11px;
}
</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <h2>Trajectory Index</h2>
    <div class="stats" id="stats-line">Load an index.json to begin</div>
  </div>
  <div id="tabs">
    <div class="tab active" data-panel="symbols-panel">Symbols</div>
    <div class="tab" data-panel="claims-panel">Claims</div>
    <div class="tab" data-panel="constraints-panel">Constraints</div>
    <div class="tab" data-panel="deps-panel">Deps</div>
  </div>
  <div id="symbols-panel" class="panel active">
    <div id="filter-bar"><input id="sym-filter" placeholder="Filter symbols..." /></div>
    <div id="symbol-list"></div>
  </div>
  <div id="claims-panel" class="panel">
    <div id="claim-list"></div>
  </div>
  <div id="constraints-panel" class="panel">
    <div id="constraint-list"></div>
  </div>
  <div id="deps-panel" class="panel">
    <div id="dep-list"></div>
  </div>
  <!-- References panel (shown when "Find All References" is triggered) -->
  <div id="refs-panel" class="panel">
    <div id="refs-panel-header" style="padding:8px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px">
      <span style="color:var(--accent);font-weight:600;font-size:12px" id="refs-panel-name"></span>
      <span style="color:var(--fg2);font-size:10px" id="refs-panel-count"></span>
      <span style="margin-left:auto;cursor:pointer;color:var(--fg2);font-size:12px" id="refs-panel-close">&times;</span>
    </div>
    <div id="refs-panel-list"></div>
  </div>
</div>

<div id="main">
  <div id="toolbar">
    <label>index.json:</label>
    <input type="file" id="file-input" accept=".json" />
    <input type="text" id="search" placeholder="Search in trajectory..." />
  </div>
  <div id="ref-nav">
    <span class="rn-name" id="rn-name"></span>
    <button class="rn-btn" id="rn-prev" title="Previous (&#x2190;)">&larr;</button>
    <span class="rn-counter" id="rn-counter"></span>
    <button class="rn-btn" id="rn-next" title="Next (&#x2192;)">&rarr;</button>
    <button class="rn-btn" id="rn-def" title="Go to Definition (D)">Definition</button>
    <span class="rn-close" id="rn-close" title="Close (Esc)">&times;</span>
  </div>
  <div id="trajectory"></div>
</div>

<div id="tooltip" class="ref-tooltip" style="display:none"></div>
<div id="action-bar">
  <div id="action-bar-header">
    <span class="ab-name" id="ab-name"></span>
    <span class="ab-kind" id="ab-kind"></span>
    <span class="ab-class" id="ab-class"></span>
  </div>
  <div id="action-bar-items"></div>
</div>

<script>
let DATA = null;
let stepElements = {};
let refElements = {};

// navigation state
let navState = null; // { symId, refs: [...sorted], currentIdx }

document.getElementById('file-input').addEventListener('change', e => {
  const f = e.target.files[0];
  if (!f) return;
  const reader = new FileReader();
  reader.onload = ev => { DATA = JSON.parse(ev.target.result); render(); };
  reader.readAsText(f);
});

(function() {
  const params = new URLSearchParams(location.search);
  const file = params.get('file');
  if (!file) return;
  fetch(file)
    .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
    .then(d => { DATA = d; render(); })
    .catch(e => { document.getElementById('stats-line').textContent = `Failed to load ${file}: ${e.message}`; });
})();

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(tab.dataset.panel).classList.add('active');
  });
});

function render() {
  if (!DATA) return;
  const { steps, symbols, references, claims, dependencies } = DATA;
  const constraints = DATA.constraints || [];
  const constraintFindings = DATA.constraint_findings || [];

  const stepsById = {};
  steps.forEach(s => stepsById[s.step_id] = s);
  const refsByStep = {};
  references.forEach(r => { (refsByStep[r.step_id] = refsByStep[r.step_id] || []).push(r); });
  const refsBySym = {};
  references.forEach(r => { (refsBySym[r.symbol_id] = refsBySym[r.symbol_id] || []).push(r); });
  const symsById = {};
  symbols.forEach(s => symsById[s.id] = s);
  const claimsByStep = {};
  claims.forEach(c => { (claimsByStep[c.step_id] = claimsByStep[c.step_id] || []).push(c); });
  const findingsByCon = {};
  constraintFindings.forEach(f => { (findingsByCon[f.constraint_id] = findingsByCon[f.constraint_id] || []).push(f); });

  window._refsBySym = refsBySym;
  window._symsById = symsById;
  window._stepsById = stepsById;
  window._references = references;

  document.getElementById('stats-line').textContent =
    `${steps.length} steps | ${symbols.length} syms | ${references.length} refs | ${claims.length} claims | ${constraints.length} cons | ${dependencies.length} deps`;

  const trajEl = document.getElementById('trajectory');
  trajEl.innerHTML = '';
  stepElements = {};
  refElements = {};

  const sortedSteps = [...steps].sort((a, b) => a.index - b.index);
  sortedSteps.forEach(step => {
    const div = document.createElement('div');
    div.className = 'step';
    div.id = `step-${step.step_id}`;
    stepElements[step.step_id] = div;

    const header = document.createElement('div');
    header.className = 'step-header';
    header.innerHTML = `
      <span class="step-idx">#${step.index}</span>
      <span class="step-role ${step.role}">${step.role}</span>
      ${step.tool_name ? `<span class="step-tool">${step.tool_name}</span>` : ''}
      <span style="flex:1"></span>
      <span style="color:var(--fg2);font-size:10px">${step.content.length} chars</span>
    `;
    header.addEventListener('click', () => div.classList.toggle('collapsed'));

    const body = document.createElement('div');
    body.className = 'step-body';
    const content = step.content;
    const annotations = [];

    (step.obs_regions || []).forEach(span => {
      if (span.length === 2 && span[0] >= 0 && span[1] <= content.length && span[0] < span[1])
        annotations.push({ start: span[0], end: span[1], type: 'obs', data: null, priority: 0 });
    });
    (refsByStep[step.step_id] || []).forEach(r => {
      if (r.start >= 0 && r.end <= content.length && r.start < r.end)
        annotations.push({ start: r.start, end: r.end, type: 'ref', data: r, priority: 2 });
    });
    (claimsByStep[step.step_id] || []).forEach(c => {
      const idx = content.indexOf(c.text);
      if (idx >= 0)
        annotations.push({ start: idx, end: idx + c.text.length, type: 'claim', data: c, priority: 1 });
    });

    annotations.sort((a, b) => a.start - b.start || b.priority - a.priority || (b.end - b.start) - (a.end - a.start));
    const used = [], filtered = [];
    annotations.forEach(a => {
      if (!used.some(u => a.start < u.end && a.end > u.start)) { filtered.push(a); used.push(a); }
    });

    let html = '', pos = 0;
    filtered.forEach(a => {
      if (a.start > pos) html += escapeHtml(content.slice(pos, a.start));
      const text = escapeHtml(content.slice(a.start, a.end));
      if (a.type === 'ref') {
        const r = a.data, sym = symsById[r.symbol_id];
        html += `<span class="ref-span ${r.kind}" data-ref-id="${r.id}" data-sym-id="${r.symbol_id}">${text}</span>`;
      } else if (a.type === 'claim') {
        html += `<span class="claim-span" data-claim-id="${a.data.id}">${text}</span>`;
      } else if (a.type === 'obs') {
        html += `<span class="obs-span">${text}</span>`;
      }
      pos = a.end;
    });
    if (pos < content.length) html += escapeHtml(content.slice(pos));
    body.innerHTML = html;

    body.querySelectorAll('.ref-span').forEach(el => { refElements[el.dataset.refId] = el; });
    div.appendChild(header);
    div.appendChild(body);
    if (step.role === 'tool_result' && content.length > 500) div.classList.add('collapsed');
    trajEl.appendChild(div);
  });

  // click on ref → show action bar
  trajEl.addEventListener('click', e => {
    const refSpan = e.target.closest('.ref-span');
    if (refSpan) {
      e.stopPropagation();
      const symId = refSpan.dataset.symId;
      const refId = refSpan.dataset.refId;
      showActionBar(symId, refId, refSpan);
      return;
    }
    const claimSpan = e.target.closest('.claim-span');
    if (claimSpan) {
      document.querySelector('[data-panel="claims-panel"]').click();
      const item = document.querySelector(`.claim-item[data-claim-id="${claimSpan.dataset.claimId}"]`);
      if (item) { item.classList.add('selected'); item.scrollIntoView({ block: 'center' }); }
    }
  });

  // hover tooltip
  trajEl.addEventListener('mouseover', e => {
    const refSpan = e.target.closest('.ref-span');
    if (!refSpan) { hideTooltip(); return; }
    const sym = symsById[refSpan.dataset.symId];
    const ref = references.find(r => r.id === refSpan.dataset.refId);
    if (!sym || !ref) return;
    const tt = document.getElementById('tooltip');
    tt.innerHTML = `<span class="tt-sym">${sym.name}</span> <span class="tt-kind">${sym.kind}</span><br><span class="tt-ref-kind">${ref.kind}</span> | step ${ref.step_id} | ${ref.grounded ? 'grounded' : 'ungrounded'}`;
    tt.style.display = 'block';
    const rect = refSpan.getBoundingClientRect();
    tt.style.left = rect.left + 'px';
    tt.style.top = (rect.bottom + 4) + 'px';
  });
  trajEl.addEventListener('mouseout', e => { if (!e.target.closest('.ref-span')) hideTooltip(); });

  renderSymbolList(symbols, refsBySym);
  renderClaimList(claims, stepsById);
  renderConstraintList(constraints, findingsByCon, stepsById);
  renderDepList(dependencies, symsById, stepsById);

  document.getElementById('sym-filter').addEventListener('input', e => {
    const q = e.target.value.toLowerCase();
    document.querySelectorAll('.sym-item').forEach(el => {
      el.style.display = el.dataset.name.toLowerCase().includes(q) ? '' : 'none';
    });
  });

  document.getElementById('search').addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    const q = e.target.value.toLowerCase();
    if (!q) return;
    for (const step of sortedSteps) {
      if (step.content.toLowerCase().includes(q)) { scrollToStep(step.step_id); break; }
    }
  });
}

// ---- Action Bar (LSP-style context menu) ----

function showActionBar(symId, clickedRefId, anchorEl) {
  hideActionBar();
  hideTooltip();
  const sym = window._symsById[symId];
  if (!sym) return;
  const refs = (window._refsBySym[symId] || []).sort((a, b) => {
    const sa = window._stepsById[a.step_id], sb = window._stepsById[b.step_id];
    return ((sa ? sa.index : 0) - (sb ? sb.index : 0)) || a.start - b.start;
  });

  document.getElementById('ab-name').textContent = sym.name;
  document.getElementById('ab-kind').textContent = sym.kind;
  document.getElementById('ab-class').textContent = sym.entity_class !== 'identifier' ? sym.entity_class : '';

  const items = document.getElementById('action-bar-items');
  items.innerHTML = '';

  const defRefId = sym.definition_ref_id;
  const hasDef = defRefId && refElements[defRefId];

  addAbItem(items, 'Go to Definition', 'F12', hasDef, () => {
    hideActionBar();
    goToDefinition(symId);
  });

  addAbItem(items, 'Find All References', '⇧F12', refs.length > 0, () => {
    hideActionBar();
    showRefsPanel(symId, refs, clickedRefId);
  });

  const clickedIdx = refs.findIndex(r => r.id === clickedRefId);
  addAbItem(items, `Navigate References`, '←→', refs.length > 1, () => {
    hideActionBar();
    startNavigation(symId, refs, clickedIdx >= 0 ? clickedIdx : 0);
  });

  if (refs.length > 1) {
    const sep = document.createElement('div');
    sep.style.cssText = 'border-top:1px solid var(--border);margin:2px 0';
    items.appendChild(sep);

    const depRefs = refs.filter(r => r.kind === 'tool_input' || r.kind === 'tool_output');
    if (depRefs.length) {
      addAbItem(items, `Tool I/O only`, '', true, () => {
        hideActionBar();
        showRefsPanel(symId, depRefs, clickedRefId);
      });
    }
  }

  const bar = document.getElementById('action-bar');
  bar.style.display = 'block';
  const rect = anchorEl.getBoundingClientRect();
  let top = rect.bottom + 4, left = rect.left;
  if (top + 200 > window.innerHeight) top = rect.top - 200;
  if (left + 240 > window.innerWidth) left = window.innerWidth - 250;
  bar.style.top = top + 'px';
  bar.style.left = left + 'px';

  highlightAllRefs(symId);
}

function addAbItem(container, label, key, enabled, onClick) {
  const div = document.createElement('div');
  div.className = 'ab-item' + (enabled ? '' : ' disabled');
  div.innerHTML = `${key ? `<span class="ab-key">${key}</span>` : ''}<span class="ab-label">${label}</span>`;
  if (enabled) div.addEventListener('click', onClick);
  container.appendChild(div);
}

function hideActionBar() {
  document.getElementById('action-bar').style.display = 'none';
}

// ---- Go to Definition ----

function goToDefinition(symId) {
  const sym = window._symsById[symId];
  if (!sym || !sym.definition_ref_id) return;
  const ref = window._references.find(r => r.id === sym.definition_ref_id);
  if (!ref) return;
  scrollToStep(ref.step_id);
  const el = refElements[ref.id];
  if (el) {
    clearCurrent();
    el.classList.add('current');
  }
}

// ---- Find All References (sidebar panel) ----

function showRefsPanel(symId, refs, highlightRefId) {
  const sym = window._symsById[symId];
  document.getElementById('refs-panel-name').textContent = sym ? sym.name : symId;
  document.getElementById('refs-panel-count').textContent = `${refs.length} references`;

  const list = document.getElementById('refs-panel-list');
  list.innerHTML = '';

  refs.forEach((r, i) => {
    const step = window._stepsById[r.step_id];
    const div = document.createElement('div');
    div.className = 'ref-item' + (r.id === highlightRefId ? ' selected' : '');
    const ctx = step ? step.content.slice(Math.max(0, r.start - 20), r.end + 40).trim() : r.text;
    div.innerHTML = `
      <div style="display:flex;align-items:center;gap:6px">
        <span class="ref-item-step">#${step ? step.index : '?'} ${step ? step.role : ''}</span>
        <span class="ref-item-kind">${r.kind}</span>
        ${r.grounded ? '<span style="color:var(--green);font-size:9px">grounded</span>' : '<span style="color:var(--red);font-size:9px">ungrounded</span>'}
      </div>
      <div class="ref-item-text">${escapeHtml(ctx)}</div>
    `;
    div.addEventListener('click', () => {
      list.querySelectorAll('.ref-item.selected').forEach(el => el.classList.remove('selected'));
      div.classList.add('selected');
      scrollToRef(r);
    });
    list.appendChild(div);
  });

  // show refs panel, hide others
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('refs-panel').classList.add('active');

  highlightAllRefs(symId);
}

document.getElementById('refs-panel-close').addEventListener('click', () => {
  document.getElementById('refs-panel').classList.remove('active');
  document.querySelector('.tab[data-panel="symbols-panel"]').click();
  clearHighlights();
});

// ---- Reference Navigation (top bar) ----

function startNavigation(symId, refs, startIdx) {
  navState = { symId, refs, currentIdx: startIdx };
  highlightAllRefs(symId);
  updateNavBar();
  navigateTo(startIdx);
}

function updateNavBar() {
  if (!navState) { document.getElementById('ref-nav').classList.remove('active'); return; }
  const sym = window._symsById[navState.symId];
  document.getElementById('rn-name').textContent = sym ? sym.name : '';
  document.getElementById('rn-counter').textContent = `${navState.currentIdx + 1} / ${navState.refs.length}`;
  document.getElementById('ref-nav').classList.add('active');
}

function navigateTo(idx) {
  if (!navState) return;
  idx = ((idx % navState.refs.length) + navState.refs.length) % navState.refs.length;
  navState.currentIdx = idx;
  updateNavBar();
  scrollToRef(navState.refs[idx]);
}

function scrollToRef(ref) {
  const stepEl = stepElements[ref.step_id];
  if (stepEl) stepEl.classList.remove('collapsed');
  const el = refElements[ref.id];
  if (el) {
    clearCurrent();
    el.classList.add('current');
    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  } else {
    scrollToStep(ref.step_id);
  }
}

function stopNavigation() {
  navState = null;
  document.getElementById('ref-nav').classList.remove('active');
  clearHighlights();
  clearCurrent();
}

document.getElementById('rn-prev').addEventListener('click', () => { if (navState) navigateTo(navState.currentIdx - 1); });
document.getElementById('rn-next').addEventListener('click', () => { if (navState) navigateTo(navState.currentIdx + 1); });
document.getElementById('rn-def').addEventListener('click', () => { if (navState) goToDefinition(navState.symId); });
document.getElementById('rn-close').addEventListener('click', stopNavigation);

// ---- Keyboard shortcuts ----

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;

  // Escape: close action bar or stop navigation
  if (e.key === 'Escape') {
    if (document.getElementById('action-bar').style.display !== 'none') { hideActionBar(); return; }
    if (navState) { stopNavigation(); return; }
    if (document.getElementById('refs-panel').classList.contains('active')) {
      document.getElementById('refs-panel-close').click(); return;
    }
  }
  // navigation shortcuts
  if (navState) {
    if (e.key === 'ArrowLeft' || e.key === '[') { e.preventDefault(); navigateTo(navState.currentIdx - 1); }
    if (e.key === 'ArrowRight' || e.key === ']') { e.preventDefault(); navigateTo(navState.currentIdx + 1); }
    if (e.key === 'd' || e.key === 'D') { e.preventDefault(); goToDefinition(navState.symId); }
  }
});

// close action bar on outside click
document.addEventListener('click', e => {
  if (!e.target.closest('#action-bar') && !e.target.closest('.ref-span'))
    hideActionBar();
});

// ---- Render helpers (sidebar lists) ----

function renderSymbolList(symbols, refsBySym) {
  const list = document.getElementById('symbol-list');
  list.innerHTML = '';
  [...symbols].sort((a, b) => (refsBySym[b.id]||[]).length - (refsBySym[a.id]||[]).length).forEach(sym => {
    const nrefs = (refsBySym[sym.id] || []).length;
    const div = document.createElement('div');
    div.className = 'sym-item';
    div.dataset.symId = sym.id;
    div.dataset.name = sym.name;
    div.innerHTML = `<span class="sym-name">${sym.name}</span><span class="sym-kind">${sym.kind}</span><span class="sym-refs">${nrefs} refs</span>`;
    div.addEventListener('click', () => {
      const refs = (window._refsBySym[sym.id] || []).sort((a, b) => {
        const sa = window._stepsById[a.step_id], sb = window._stepsById[b.step_id];
        return ((sa ? sa.index : 0) - (sb ? sb.index : 0)) || a.start - b.start;
      });
      if (refs.length) startNavigation(sym.id, refs, 0);
    });
    list.appendChild(div);
  });
}

function renderClaimList(claims, stepsById) {
  const list = document.getElementById('claim-list');
  list.innerHTML = '';
  if (!claims.length) { list.innerHTML = '<div style="padding:16px;color:var(--fg2);font-size:11px">No claims extracted</div>'; return; }
  claims.forEach(c => {
    const div = document.createElement('div');
    div.className = 'claim-item';
    div.dataset.claimId = c.id;
    div.innerHTML = `<div class="claim-step">step ${c.step_id} ${c.role ? '(' + c.role + ')' : ''}</div><div class="claim-text">${c.text}</div>`;
    div.addEventListener('click', () => { scrollToStep(c.step_id); });
    list.appendChild(div);
  });
}

function renderDepList(dependencies, symsById, stepsById) {
  const list = document.getElementById('dep-list');
  list.innerHTML = '';
  if (!dependencies.length) { list.innerHTML = '<div style="padding:16px;color:var(--fg2);font-size:11px">No dependencies</div>'; return; }
  dependencies.forEach(d => {
    const sym = symsById[d.symbol_id];
    const div = document.createElement('div');
    div.className = 'dep-item';
    div.innerHTML = `
      <span class="dep-label">${sym ? sym.name : d.symbol_id}</span>
      <span class="dep-risk ${d.risk}">${d.risk}</span>
      <div style="font-size:10px;color:var(--fg2);margin-top:2px">
        def@step${d.def_step_id} v${d.def_version} &rarr; use@step${d.use_step_id}
      </div>
    `;
    div.addEventListener('click', () => {
      clearHighlights(); clearCurrent();
      [d.def_ref_id, d.use_ref_id].forEach(rid => { const el = refElements[rid]; if (el) el.classList.add('highlighted'); });
      scrollToStep(d.use_step_id);
      const useEl = stepElements[d.use_step_id];
      if (useEl) useEl.classList.remove('collapsed');
    });
    list.appendChild(div);
  });
}

function renderConstraintList(constraints, findingsByCon, stepsById) {
  const list = document.getElementById('constraint-list');
  list.innerHTML = '';
  if (!constraints.length) { list.innerHTML = '<div style="padding:16px;color:var(--fg2);font-size:11px">No constraints extracted</div>'; return; }
  constraints.forEach(c => {
    const findings = findingsByCon[c.id] || [];
    const div = document.createElement('div');
    div.className = 'con-item';
    let statusHtml = findings.map(f => `<span class="con-status ${f.status}">${f.status}</span>`).join('');
    let metaHtml = '';
    if (findings.length) {
      const f = findings[0];
      if (f.candidate) metaHtml += `candidate: ${f.candidate}`;
      if (f.reason) metaHtml += (metaHtml ? ' — ' : '') + f.reason;
    }
    div.innerHTML = `
      <div style="display:flex;align-items:center;gap:4px">
        <div class="con-text" style="flex:1">${escapeHtml(c.description)}</div>
        ${statusHtml}
      </div>
      ${metaHtml ? `<div class="con-meta">${escapeHtml(metaHtml)}</div>` : ''}
    `;
    div.addEventListener('click', () => {
      clearHighlights();
      document.querySelectorAll('.con-item.selected').forEach(el => el.classList.remove('selected'));
      div.classList.add('selected');
      const text = c.description;
      const sorted = Object.values(stepsById).sort((a, b) => a.index - b.index);
      for (const step of sorted) {
        if (step.content.includes(text) || step.content.toLowerCase().includes(text.toLowerCase().slice(0, 40))) {
          scrollToStep(step.step_id); break;
        }
      }
    });
    list.appendChild(div);
  });
}

// ---- Utilities ----

function highlightAllRefs(symId) {
  clearHighlights();
  (window._refsBySym[symId] || []).forEach(r => {
    const el = refElements[r.id];
    if (el) el.classList.add('highlighted');
  });
  const sideItem = document.querySelector(`.sym-item[data-sym-id="${symId}"]`);
  if (sideItem) { sideItem.classList.add('selected'); sideItem.scrollIntoView({ block: 'center' }); }
}

function clearHighlights() {
  document.querySelectorAll('.ref-span.highlighted').forEach(el => el.classList.remove('highlighted'));
  document.querySelectorAll('.sym-item.selected,.claim-item.selected,.con-item.selected,.dep-item.selected').forEach(el => el.classList.remove('selected'));
}

function clearCurrent() {
  document.querySelectorAll('.ref-span.current').forEach(el => el.classList.remove('current'));
}

function scrollToStep(stepId) {
  const el = stepElements[stepId];
  if (!el) return;
  el.classList.remove('collapsed');
  el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  el.classList.add('scroll-target');
  setTimeout(() => el.classList.remove('scroll-target'), 600);
}

function hideTooltip() { document.getElementById('tooltip').style.display = 'none'; }

function escapeHtml(text) {
  return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
</script>
