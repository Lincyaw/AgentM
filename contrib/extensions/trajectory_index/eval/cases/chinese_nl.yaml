# Case: Chinese natural language conversation about architecture
id: chinese_nl
description: Chinese-language discussion with concept-heavy entities, no tool calls

steps:
  - index: 0
    role: user
    content: "我们的认证系统目前用的是 JWT，但是 token 刷新机制有问题。用户经常反馈说登录态会莫名丢失。"
    tool_name: null
  - index: 1
    role: assistant
    content: "这个问题通常和 refresh_token 的过期时间以及并发刷新竞争有关。建议检查几个方面：1) refresh_token 的 TTL 设置是否合理；2) 是否有并发请求同时刷新导致旧 token 被覆盖；3) Redis 里 session 数据的一致性。"
    tool_name: null
  - index: 2
    role: user
    content: "我们的 refresh_token TTL 是 7 天，但有些用户说 2-3 天就过期了。会不会是 Redis 的 maxmemory-policy 把 key 驱逐了？"
    tool_name: null
  - index: 3
    role: assistant
    content: "很有可能。如果 Redis 配置了 allkeys-lru 策略，在内存压力大的时候确实会驱逐还没过期的 key。建议用 volatile-lru 策略，只驱逐设了过期时间的 key，或者把认证相关的 key 放到独立的 Redis 实例里。"
    tool_name: null

expected:
  entities:
    - name: JWT
      kind: concept
    - name: refresh_token
      kind: concept
    - name: Redis
      kind: tool
    - name: maxmemory-policy
      kind: state_field
    - name: allkeys-lru
      kind: state_field
    - name: volatile-lru
      kind: state_field
    - name: TTL
      kind: state_field
  relations:
    - from: refresh_token
      to: TTL
      type: uses
    - from: Redis
      to: maxmemory-policy
      type: uses
