# Case: agent reads a file and explains a function
id: code_read
description: Simple file reading task — agent uses read_file to inspect code

messages:
  - id: m0
    role: user
    content:
      - type: text
        text: "Please read the file src/main.py and find the parse_config function."
  - id: m1
    role: assistant
    content:
      - type: text
        text: "I will use the read_file tool to look at src/main.py."
      - type: tool_call
        id: call_1
        name: read_file
        arguments: {"path": "src/main.py"}
  - id: m2
    role: tool_result
    content:
      - type: tool_result
        tool_call_id: call_1
        content:
          - type: text
            text: |
              def parse_config(path: str) -> Config:
                  with open(path) as f:
                      data = json.load(f)
                  return Config(**data)
  - id: m3
    role: assistant
    content:
      - type: text
        text: "The parse_config function reads a JSON file and returns a Config object. It uses json.load to parse the file contents."

expected:
  entities:
    - name: src/main.py
      kind: file
    - name: parse_config
      kind: api
    - name: read_file
      kind: tool
    - name: Config
      kind: variable
    - name: json.load
      kind: api
  relations:
    - from: src/main.py
      to: parse_config
      type: defines
