# Case: agent debugs a failing test
id: debug_flow
description: Multi-step debugging — read error, diagnose, edit, verify

messages:
  - id: m0
    role: user
    content:
      - type: text
        text: "The test test_user_auth is failing. Can you fix it?"
  - id: m1
    role: assistant
    content:
      - type: text
        text: "Let me run the test first to see the error."
      - type: tool_call
        id: call_1
        name: bash
        arguments: {"command": "pytest tests/test_auth.py::test_user_auth -v"}
  - id: m2
    role: tool_result
    content:
      - type: tool_result
        tool_call_id: call_1
        content:
          - type: text
            text: "FAILED tests/test_auth.py::test_user_auth - AssertionError: expected status_code 200, got 401\nauth_token was None because get_token() returns None when REDIS_URL is not set"
  - id: m3
    role: assistant
    content:
      - type: text
        text: "The test fails because get_token() returns None when REDIS_URL is not configured. I need to check the auth module."
      - type: tool_call
        id: call_2
        name: read_file
        arguments: {"path": "src/auth.py"}
  - id: m4
    role: tool_result
    content:
      - type: tool_result
        tool_call_id: call_2
        content:
          - type: text
            text: "def get_token(user_id: str) -> str | None:\n    redis_url = os.environ.get(\"REDIS_URL\")\n    if not redis_url:\n        return None\n    client = redis.from_url(redis_url)\n    return client.get(f\"token:{user_id}\")"
  - id: m5
    role: assistant
    content:
      - type: text
        text: "I'll add a fallback to in-memory storage."
      - type: tool_call
        id: call_3
        name: edit_file
        arguments: {"path": "src/auth.py", "old": "return None", "new": "return _memory_store.get(f\"token:{user_id}\")"}
  - id: m6
    role: tool_result
    content:
      - type: tool_result
        tool_call_id: call_3
        content:
          - type: text
            text: "File edited successfully."
  - id: m7
    role: assistant
    content:
      - type: text
        text: "Fixed. The get_token function now falls back to in-memory storage when REDIS_URL is not set."

expected:
  entities:
    - name: test_user_auth
      kind: concept
    - name: get_token
      kind: api
    - name: REDIS_URL
      kind: state_field
    - name: src/auth.py
      kind: file
    - name: tests/test_auth.py
      kind: file
    - name: bash
      kind: tool
    - name: read_file
      kind: tool
    - name: edit_file
      kind: tool
    - name: auth_token
      kind: variable
    - name: _memory_store
      kind: variable
  relations:
    - from: get_token
      to: REDIS_URL
      type: uses
    - from: src/auth.py
      to: get_token
      type: defines
    - from: tests/test_auth.py
      to: test_user_auth
      type: defines
