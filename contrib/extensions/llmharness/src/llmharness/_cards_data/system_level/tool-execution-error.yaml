id: AFC-0031
name: "Tool execution error"
schema_version: 1
last_reviewed: "2026-05-07"

defect:
  class: system_fault
  subclass: tool_runtime_error
  mechanism: |
    External tool / API misbehaves: throws, returns 5xx, returns
    truncated output, times out. Agent reasoning is correct, action is
    correct, but the tool layer fails. Important to track separately
    because the fix is infrastructure-side, not agent-side. AgentDebug
    classifies these as system-level because "they are not the agent's
    fault."

activation:
  required:
    - "agent emits a syntactically and semantically valid tool call"
    - "tool layer returns an error or unusable output"
  amplifying:
    - "rate-limited / flaky external services"
    - "tool versions drift between training and deployment"
  timescale: seconds

observable:
  metrics:
    - predicate: system.tool.error
      direction: up
      shape: spike
  logs:
    - pattern: "tool returns 5xx / connection refused / timeout"
    - pattern: "tool returns truncated payload"
  traces:
    - pattern: "tool_call span has runtime error annotation, action span itself well-formed"
  detection_difficulty: easy

downstream_effects:
  - predicate: trajectory.step.repeated
    confidence: medium
    delay: seconds
  - predicate: system.budget.exhausted
    confidence: medium
    delay: minutes_to_hours

system_requirements:
  - has_component: tool_use
  - has_component: external_api

evidence:
  - source: "AgentDebug (arXiv 2509.25370) §A.2 Table 2: System.Tool Execution Error"
    type: paper
    extracted_by: subagent_synthesis
    human_reviewed: true

reproducibility:
  confirmed_in_chaos: false
