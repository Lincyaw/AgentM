id: AFC-0018
name: "Goal drift"
schema_version: 1
last_reviewed: "2026-05-07"

defect:
  class: specification_fault
  subclass: goal_drift
  mechanism: |
    Agent starts on the correct task but progressively wanders into
    irrelevant tangents — chasing interesting-but-unrelated subproblems,
    polishing details that don't affect the goal, exploring unrequested
    extensions. Distinct from AFC-0016 (instant abandonment of the
    task): drift accumulates across many small steps. AEGIS FM-2.3.

activation:
  required:
    - "long horizon (many steps)"
    - "weak periodic re-grounding against the original task"
  amplifying:
    - "rich tool environment that rewards exploration"
    - "task with vague success criterion (objective quality issue)"
  timescale: minutes_to_hours

observable:
  metrics:
    - predicate: outcome.task.drifted
      direction: up
      shape: slow_ramp
  logs:
    - pattern: "agent's reasoning increasingly mentions topics absent from the task statement"
  traces:
    - pattern: "semantic distance between current step and task statement grows over time"
  detection_difficulty: silent

downstream_effects:
  - predicate: outcome.task.budget_exhausted
    confidence: high
    delay: minutes_to_hours
  - predicate: outcome.task.failed
    confidence: high
    delay: minutes_to_hours

system_requirements:
  - has_component: long_horizon_loop

evidence:
  - source: "AEGIS (arXiv 2509.14295) Appendix E.2 FM-2.3 'Deviate from main goal'"
    type: paper
    extracted_by: subagent_synthesis
    human_reviewed: true

reproducibility:
  confirmed_in_chaos: false
