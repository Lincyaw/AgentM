id: AFC-0029
name: "Tool-output override"
schema_version: 1
last_reviewed: "2026-05-07"

defect:
  class: cognitive_fault
  subclass: tool_reasoning_mismatch
  mechanism: |
    Agent overrides accurate tool feedback with its own analytical
    intuition. Tool returned a value (e.g., 'no real roots in the
    domain' from a numeric solver); agent rejects it and proceeds with
    a wrong analytical conclusion. ELPO's qualitative case study calls
    this 'tool-reasoning mismatch' and observes it correlates with
    irrecoverable failure on AIME problems.

activation:
  required:
    - "agent has access to a tool whose output disagrees with its prior belief"
    - "agent's next reasoning step ignores or contradicts the tool output"
  amplifying:
    - "tasks where the agent has strong priors (math, code)"
    - "tools that return terse output with no explanation"
  timescale: seconds

observable:
  metrics:
    - predicate: agent_state.tool_output.overridden
      direction: up
      shape: spike
  logs:
    - pattern: "agent statement contradicts the just-returned tool result"
    - pattern: "'the tool seems wrong, let me reason analytically...'"
  traces:
    - pattern: "tool_result span and subsequent reasoning span have opposite claims"
  detection_difficulty: silent

downstream_effects:
  - predicate: outcome.task.failed
    confidence: high
    delay: seconds

system_requirements:
  - has_component: tool_use
  - has_component: free_form_reasoning_after_tool

evidence:
  - source: "ELPO (arXiv 2602.09598) Appendix I, Fig 9 & 11: 'tool-override hallucination' on AIME"
    type: paper
    extracted_by: subagent_synthesis
    human_reviewed: true

reproducibility:
  confirmed_in_chaos: false
