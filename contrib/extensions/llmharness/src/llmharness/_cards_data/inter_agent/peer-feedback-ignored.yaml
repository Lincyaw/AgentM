id: AFC-0022
name: "Peer feedback ignored"
schema_version: 1
last_reviewed: "2026-05-07"

defect:
  class: coordination_fault
  subclass: peer_feedback_ignored
  mechanism: |
    Peer agent provides correction, critique, or alternative — and the
    receiving agent does not incorporate it. Subsequent action is
    identical to the pre-feedback action. Common when the peer's role
    is 'critic' but the actor agent has higher status / decisiveness
    bias. Distinct from AFC-0021 (information not shared): here
    information is shared and discarded.

activation:
  required:
    - "peer emits a critique / correction / alternative to agent A's action"
    - "agent A's next action is identical (or trivially-modified) compared to its pre-feedback action"
  amplifying:
    - "system prompts that emphasize 'be decisive' over 'incorporate feedback'"
    - "long context dilutes the feedback message"
  timescale: seconds

observable:
  metrics:
    - predicate: coordination.peer.ignored
      direction: up
      shape: spike
  logs:
    - pattern: "agent A's action after feedback semantically matches pre-feedback action"
  traces:
    - pattern: "feedback span exists; subsequent reasoning span doesn't reference it"
  detection_difficulty: medium

downstream_effects:
  - predicate: trajectory.step.repeated
    confidence: high
    delay: seconds
  - predicate: outcome.task.failed
    confidence: medium
    delay: minutes_to_hours

system_requirements:
  - has_component: multi_agent
  - has_component: critique_or_review_role

evidence:
  - source: "AEGIS (arXiv 2509.14295) Appendix E.2 FM-2.5 'Ignore other agents'"
    type: paper
    extracted_by: subagent_synthesis
    human_reviewed: true

reproducibility:
  confirmed_in_chaos: false
