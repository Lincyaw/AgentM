id: AFC-0009
name: "Constraint ignorance"
schema_version: 1
last_reviewed: "2026-05-07"

defect:
  class: planning_fault
  subclass: constraints_ignored
  mechanism: |
    The agent forms a plan that ignores stated limits — time, budget,
    space, allowed tools, allowed actions. The plan may be locally
    valid but inevitably violates a hard constraint at execution time
    (e.g., enumerate all 10^9 inputs under a 1-minute budget). Often
    coupled with AFC-0011 (inefficient plan).

activation:
  required:
    - "task statement includes explicit constraints (budget, deadline, forbidden tools, etc.)"
    - "planner step does not enumerate or check those constraints"
  amplifying:
    - "implicit constraints (the LLM has to infer them from the task)"
    - "fast-thinking generation without an explicit cost model"
  timescale: seconds

observable:
  metrics:
    - predicate: quality.plan.infeasible
      direction: up
      shape: step
  logs:
    - pattern: "plan step references action whose cost / time / space exceeds the stated cap"
  traces:
    - pattern: "downstream tool call hits budget/timeout"
  detection_difficulty: medium

downstream_effects:
  - predicate: outcome.task.terminated_early
    confidence: high
    delay: seconds
  - predicate: system.budget.exhausted
    confidence: high
    delay: minutes_to_hours

system_requirements:
  - has_component: planner_module
  - has_component: bounded_budget_or_deadline

evidence:
  - source: "AgentDebug (arXiv 2509.25370) §A.2 Table 2: Planning.Constraint Ignorance"
    type: paper
    extracted_by: subagent_synthesis
    human_reviewed: true
  - source: "AgentDebug Fig 3: 14/200 trajectories"
    type: paper
    extracted_by: subagent_synthesis
    human_reviewed: true

reproducibility:
  confirmed_in_chaos: false
