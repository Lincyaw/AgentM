id: AFC-0038
name: "Hypothesis-irrelevant tool invocation"
schema_version: 1
last_reviewed: "2026-05-07"

defect:
  class: planning_fault
  subclass: hypothesis_action_decoupled
  mechanism: |
    In an evidence-seeking / abductive trajectory, the agent has an
    explicitly articulated current hypothesis but selects a tool whose
    output cannot confirm or refute that hypothesis. The action is
    well-formed and domain-plausible — distinguishing it from AFC-0014
    (format error) and AFC-0013 (plan-action translation break) — but
    semantically decoupled from the focused hypothesis. GoS example:
    agent suspects CPU saturation, then queries memory metrics. Distinct
    from AFC-0011 (whole plan inefficient): the plan may be sound, only
    this step's tool choice fails to probe the hypothesis. Distinct from
    AFC-0028 (wrong-location fixation): the agent is *not* anchored —
    the hypothesis itself is correct in direction, only the verification
    instrument is wrong. GoS reports this as the dominant residual
    failure mode (55.9% of GoS's failure cases) once structural defects
    (Evidence Fabrication, Context Drift) are suppressed by FSM and
    typed graph constraints — i.e. it surfaces as the *domain-knowledge*
    bottleneck.

activation:
  required:
    - "task involves multi-step evidence acquisition under a current hypothesis"
    - "agent emits a tool call whose output, by construction, cannot support or refute the stated hypothesis"
  amplifying:
    - "specialized domain (medicine, distributed-systems diagnosis) where tool-hypothesis mapping requires expert intuition"
    - "many available tools with overlapping superficial relevance to symptoms"
  timescale: seconds

observable:
  metrics:
    - predicate: trajectory.tool_call.misjudged
      direction: up
      shape: step
  logs:
    - pattern: "agent's reasoning text states hypothesis H but the next tool call returns a signal type irrelevant to H"
  traces:
    - pattern: "current_hypothesis field and tool_target field belong to disjoint diagnostic categories"
  detection_difficulty: silent

downstream_effects:
  - predicate: outcome.task.budget_exhausted
    confidence: high
    delay: minutes_to_hours
  - predicate: outcome.task.failed
    confidence: high
    delay: minutes_to_hours

system_requirements:
  - has_component: hypothesis_state_explicit
  - has_component: multi_tool_repertoire

evidence:
  - source: "GoS (ICML 2026, arXiv 2603.21250) §error analysis: 'Wrong Action Selection' — 55.90% of GoS failures, 47.22% of pooled baselines"
    type: paper
    extracted_by: subagent_synthesis
    human_reviewed: true
  - source: "GoS Table 1 + appendix case study — persists even after Evidence Fabrication is structurally eliminated, identifying it as a domain-knowledge bottleneck rather than a structural defect"
    type: paper
    extracted_by: subagent_synthesis
    human_reviewed: true

reproducibility:
  confirmed_in_chaos: false
