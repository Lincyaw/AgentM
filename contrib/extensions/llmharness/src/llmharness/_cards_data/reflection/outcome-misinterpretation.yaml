id: AFC-0006
name: "Outcome misinterpretation"
schema_version: 1
last_reviewed: "2026-05-07"

defect:
  class: reflection_fault
  subclass: observation_misread
  mechanism: |
    The agent executes an action correctly but misreads the immediate
    result or environment feedback. The action's exit text or returned
    DOM/state is parsed into a wrong claim ("the file does not exist"
    when the tool returned a 200-byte body), and that wrong claim drives
    the next plan step.

activation:
  required:
    - "tool/environment returns structured or partly-structured output"
    - "agent reads the output via free-form LLM parsing rather than a deterministic schema"
  amplifying:
    - "tool output is verbose / contains partial errors mixed with success"
    - "long context dilutes the latest observation"
  timescale: seconds

observable:
  metrics:
    - predicate: quality.observation.misread
      direction: up
      shape: spike
  logs:
    - pattern: "agent's restatement of tool result contradicts the actual returned bytes"
  traces:
    - pattern: "tool_result span and subsequent reasoning span disagree on key field"
  detection_difficulty: silent

downstream_effects:
  - predicate: quality.plan.infeasible
    confidence: medium
    delay: seconds
  - predicate: trajectory.step.repeated
    confidence: medium
    delay: seconds

system_requirements:
  - has_component: tool_use
  - has_component: free_form_observation_parsing

evidence:
  - source: "AgentDebug (arXiv 2509.25370) §A.2 Table 2: Reflection.Outcome Misinterpretation"
    type: paper
    extracted_by: subagent_synthesis
    human_reviewed: true
  - source: "AgentDiagnose (EMNLP 2025 demos.15) §3 'observation reading' competency"
    type: paper
    extracted_by: subagent_synthesis
    human_reviewed: true

reproducibility:
  confirmed_in_chaos: false
