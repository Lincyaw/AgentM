id: AFC-0001
name: "Memory over-simplification"
schema_version: 1
last_reviewed: "2026-05-07"

defect:
  class: memory_fault
  subclass: incomplete_summary
  mechanism: |
    The agent compresses prior conversation / observations into a summary
    that drops details necessary for the current decision. Subsequent
    reasoning operates on the lossy summary instead of the original
    context, so decisions look locally coherent but ignore information
    that would have changed the action.

activation:
  required:
    - "agent invokes a summarize-memory step or a context-window-truncating policy"
    - "current decision depends on a detail that was elided by the summary"
  amplifying:
    - "long horizon (mid-trajectory steps 5-15)"
    - "context window pressure"
    - "tasks with many constraints (WebShop)"
  timescale: seconds

observable:
  metrics:
    - predicate: agent_state.memory.dropped
      direction: up
      shape: step
    - predicate: quality.observation.misread
      shape: bursty
  logs:
    - pattern: "summary mentions topic at low specificity, original observation had concrete value"
  traces:
    - pattern: "agent reasoning references summary token but not source token"
  detection_difficulty: silent

downstream_effects:
  - predicate: quality.plan.inefficient
    confidence: medium
    delay: seconds
  - predicate: outcome.task.failed.amplified
    confidence: high
    delay: minutes_to_hours

system_requirements:
  - has_component: memory_compression_or_summarization
  - has_component: long_horizon_loop

evidence:
  - source: "AgentDebug (arXiv 2509.25370) §A.2 Table 2: Memory.Over-simplification"
    type: paper
    extracted_by: subagent_synthesis
    human_reviewed: true
  - source: "AgentDebug Fig 3: 22/200 trajectories on AgentErrorBench"
    type: paper
    extracted_by: subagent_synthesis
    human_reviewed: true

reproducibility:
  confirmed_in_chaos: false
