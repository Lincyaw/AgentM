id: AFC-0025
name: "Premature termination"
schema_version: 1
last_reviewed: "2026-05-07"

defect:
  class: termination_fault
  subclass: terminated_early
  mechanism: |
    Agent declares the task done and stops before all required steps
    are completed. Often paired with AFC-0005 (progress over-optimism)
    or AFC-0024 (incorrect verification): the agent believes it has
    succeeded. AEGIS injection FM-3.1 forces this by rewriting the
    output to "STOP just before success".

activation:
  required:
    - "agent emits a termination signal (TERMINATE, FINISH, return final answer)"
    - "task's success criterion is not yet satisfied"
  amplifying:
    - "tasks with implicit subgoals (verifier doesn't know they exist)"
    - "system prompts that reward concise / fast output"
  timescale: seconds

observable:
  metrics:
    - predicate: outcome.task.terminated_early
      direction: up
      shape: spike
  logs:
    - pattern: "agent emits 'TERMINATE' / 'final answer' before all required artifacts produced"
  traces:
    - pattern: "termination span occurs while subgoal-completion checks are still negative"
  detection_difficulty: medium

downstream_effects:
  - predicate: outcome.task.failed
    confidence: high
    delay: seconds

system_requirements:
  - has_component: self_initiated_termination

evidence:
  - source: "AEGIS (arXiv 2509.14295) Appendix E.2 FM-3.1 'Premature termination'"
    type: paper
    extracted_by: subagent_synthesis
    human_reviewed: true

reproducibility:
  confirmed_in_chaos: false
