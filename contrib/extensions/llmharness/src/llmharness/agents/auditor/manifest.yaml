name: auditor
description: >
  Cognitive audit auditor: judges reasoning drift over the context index.
  Emits a verdict via submit_verdict.

extensions:
  - module: agentm.extensions.builtin.observability
  - module: agentm.extensions.builtin.operations
  # Read-only workspace access so the auditor can verify a claim against
  # the actual repo before surfacing it. The allow-list (not a deny-list)
  # also keeps out dynamically named tools leaked from the parent scenario
  # (e.g. adapt-created rt_bash/direct_bash), which would let the auditor
  # mutate the agent's sandbox.
  - module: agentm.extensions.builtin.tool_result_cap
    config:
      max_tokens: 2000
      preview_tokens: 2000
  - module: agentm.extensions.builtin.tool_filter
    config:
      allow:
        - search_symbols
        - get_symbol_context
        - get_insights
        - submit_verdict
  # After tool_filter (registration order = handler order on
  # before_agent_start): injects the FILTERED catalog into the system
  # prompt so the model sees exactly which tools exist — no hallucinated
  # bash/grep calls.
  - module: agentm.extensions.builtin.tool_index
  # Hard turn cap + runway warning so a long verification pass still ends
  # in a submit_verdict instead of an exhausted context and no verdict.
  - module: agentm.extensions.builtin.loop_budget
    config:
      max_turns: 30
  - module: agentm.extensions.builtin.turn_reminder
    config:
      finalize_tool: submit_verdict
      warn_within: 5
  - module: llmharness.agents.auditor.context
  - module: llmharness.agents.auditor.tools
  # Query the persisted trajectory index (search_symbols / get_symbol_context /
  # get_insights). Loaded read-only from index_path, provided per session via
  # atom_config_overrides (see llmharness.atom.build_auditor_config).
  - module: trajectory_index.query_atom
