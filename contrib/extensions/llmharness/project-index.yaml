  # V2 redirection — issue #134 (2026-05-10). LLM-led judgment, free-text
  # verdict shape, Phase 1 graph validator, branches as first-class audit
  # objects. Plan: .claude/plans/2026-05-10-llmharness-issue-134-redirection.md

  - id: REQ-025
    title: V2 verdict schema — surface_reminder + continuation_notes
    description: |
      Issue #134 PR 1 (P0). The submit_verdict terminal tool uses the V2
      JSON Schema shape (design §6.2): surface_reminder bool,
      reminder_text str, continuation_notes list[str], matched_event_ids
      list[int], cited_cards list[str]. No drift field, no DriftType
      enum, no if/then clause. Adapter gate changes from
      ``verdict.drift and verdict.type`` to
      ``verdict.surface_reminder and verdict.reminder_text``.
      continuation_notes are forwarded into the next auditor child's
      context so the auditor can track what it asked itself to recheck.
      Auditor prompt rewritten with backward continuity / forward
      fulfillment / content correctness / branch quality as framing
      lenses (not rules). pyproject version bump along with this PR.
    priority: P0
    status: tested
    code:
      - src/llmharness/schema.py
      - src/llmharness/audit/_enum_schema.py
      - src/llmharness/audit/auditor/submit_tool.py
      - src/llmharness/audit/auditor/output.py
      - src/llmharness/audit/auditor/prompt.py
      - src/llmharness/adapters/agentm.py
    tests:
      - tests/test_smoke.py
      - tests/test_two_phase_audit_integration.py
    depends_on: [REQ-001, REQ-021, REQ-023]

  - id: REQ-026
    title: Phase 1 graph validator (SUPERSEDED by v3 witness pipeline)
    description: |
      v2 introduced a pure-Python mechanical validator that ran after
      each ``submit_events`` call (five checks: ref resolution, no
      cycles, kind↔source_turns rules, task and conclusion
      reachability). Failure wrote a ``llmharness.extractor_invalid``
      entry and skipped the auditor.

      Superseded in v3 (issue #134, 2026-05-10). ``Event.refs`` is
      gone; ref-graph checks no longer apply. Edges are constructed
      via ``add_edge`` with a witness pipeline that performs case +
      whitespace normalisation and substring/entity checks at edge-
      build time (design §4.c, §6). The v2 validator and its
      ``EXTRACTOR_INVALID`` entry-type are deleted in commit 2; the
      adapter's partial-extraction flow writes ``EXTRACTOR_PARTIAL``
      entries instead. Commit 1 keeps a no-op stub at
      audit/extractor/validator.py to preserve the import surface.
    priority: P1
    status: deprecated
    code:
      - src/llmharness/audit/extractor/validator.py
      - src/llmharness/audit/entry_types.py
      - src/llmharness/adapters/agentm.py
    tests:
      - tests/test_extractor_validator.py
      - tests/test_two_phase_audit_integration.py
    depends_on: [REQ-020, REQ-022]

  - id: REQ-027
    title: Advisory hints module (SUPERSEDED by scenario check registry)
    description: |
      v2 module audit/hints.py with five pure functions over
      list[Event] (repeated_actions, convergence_ratio,
      reachability_gaps, open_branches, multi_branch_syntheses) plus a
      compute(graph) -> str renderer.

      Superseded in v3 (issue #134, 2026-05-10) by REQ-029
      (scenario-registered audit checks). All v2 hint signals walked
      ``Event.refs``, which is removed in v3; the equivalent signals
      now ship as one-file Check atoms under
      ``llmharness.extensions``, registered through the
      AuditCheckRegistry service and surfaced as Finding records to
      the auditor. The v2 module is deleted in commit 2; commit 1
      keeps a no-op stub to preserve the import surface.
    priority: P1
    status: deprecated
    code:
      - src/llmharness/audit/hints.py
      - src/llmharness/audit/auditor/prompt.py
      - src/llmharness/adapters/agentm.py
    tests:
      - tests/test_audit_hints.py
      - tests/test_two_phase_audit_integration.py
    depends_on: [REQ-021, REQ-026]

  - id: REQ-028
    title: get_turn(idx) tool for auditor
    description: |
      Issue #134 PR 4 (P1). New tool registered in the auditor child
      session (design §6.3). Returns the serialized raw conversation
      turn at index idx — role, content, thinking blocks — so the
      auditor can verify event source_turns references against the
      actual trajectory text without bulk-loading the full trajectory
      into the auditor context. Module: audit/auditor/get_turn_tool.py.
      Registered via compose_auditor_extensions(trajectory_snapshot=...).
      Out-of-range idx returns a structured tool-result error
      (is_error=True), not a crash. bool idx also rejected (bool is a
      subclass of int in Python). Snapshot captured per firing via
      _serialize_full_trajectory in adapters/agentm.py; _with_trajectory_snapshot
      appends the get_turn module to the static auditor_extensions list
      inside _drain_auditor on each call — never cached, never mutates
      the shared base list.
    priority: P1
    status: tested
    code:
      - src/llmharness/audit/auditor/get_turn_tool.py
      - src/llmharness/audit/auditor/extensions.py
      - src/llmharness/adapters/agentm.py
    tests:
      - tests/test_get_turn_tool.py
      - tests/test_two_phase_audit_integration.py
    depends_on: [REQ-021]

  # ---------------------------------------------------------------------------
  # V3 redesign — issue #134 (2026-05-10). Schema break, scenario-registered
  # audit checks, witness-pipeline extractor, partial-extraction adapter.
  # Plan: .claude/plans/2026-05-10-llmharness-issue-134-v3.md

  - id: REQ-029
    title: scenario-registered audit checks via llmharness.audit_registry service
    description: |
      Scenarios register graph-health checks that the auditor consumes
      as advisory findings (design §4.c). Mechanism in
      ``audit/registry.py``: ``AuditCheckRegistry`` is owned by the
      adapter and published to ExtensionAPI under
      ``SERVICE_KEY = "llmharness.audit_registry"``. Registration is
      idempotent on ``(check.name, id(check))`` and fail-fast on
      non-callable input. ``run_all`` tolerates raising checks — each
      exception is captured by check name in an errors dict; other
      checks still run. Concrete check atoms ship in commit 5 as
      one-file extensions; the auditor wiring (CheckContext → Finding
      → prompt block) lands in commit 4.
    priority: P0
    status: tested
    code:
      - src/llmharness/audit/registry.py
      - src/llmharness/audit/__init__.py
    tests:
      - tests/test_audit_registry.py
    depends_on: [REQ-001]

