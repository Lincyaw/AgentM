project:
  name: llmharness
  description: |
    Cognitive-audit AgentM extension that supervises a running main agent
    via TurnEndEvent → child diagnostic session → BeforeAgentStart reminder
    injection. Persistence rides on the AgentM session entry tree; no file
    store, no subprocess CLI, no Claude Code hook protocol. Single SDK-native
    consumer of AgentSessionConfig + ExtensionAPI.

requirements:
  # ---------------------------------------------------------------------------
  # Core typed payloads (P0 — load-bearing for the audit loop)

  - id: REQ-001
    title: Event/Edge/Finding/Verdict/Reminder schema (V3 — breaking change)
    description: |
      Closed-enum types for event and edge kinds; serializable Event,
      Edge, Finding, Verdict, Reminder dataclasses. Stable JSON shape —
      every payload round-trips through the AgentM session entry tree
      (``api.session.append_entry``).

      V3 schema break (issue #134, 2026-05-10):
        - EventKind values are short-form: task / hyp / evid / act /
          dec / concl. The v2 long-form values and the REFLECTION
          member are gone (design §3 lists six kinds).
        - Event.refs is REMOVED. Edges are first-class records: the
          extractor emits Edge instances via ``add_edge`` and the
          adapter persists each one as a ``llmharness.audit_edge``
          entry. Edge carries witness fields (cited_entities,
          cited_quote) plus per-side source-turn tuples.
        - New EdgeKind enum (data | ref) and EDGE_KIND_VALUES
          constant in audit/validation/enum_schema.py.
        - New Finding dataclass — output shape for scenario-registered
          audit checks (see audit/registry.py, design §4.c).

      Verdict shape (v4, design §6.2):
        surface_reminder: bool
        reminder_text: str
        continuation_notes: list[str]
        matched_event_ids: list[int]

      DriftType / Reminder.type stay removed. Breaking changes —
      pyproject version bump required; rca-autorl backwards-
      compatibility explicitly waived.
    priority: P0
    status: tested
    code: [src/llmharness/schema.py]
    tests: [tests/test_smoke.py]

  # ---------------------------------------------------------------------------
  # Cognitive-audit pipeline (P0 — the entire feature)

  - id: REQ-016
    title: cards.py loader + cards_list/cards_get tools + axis_hint (REMOVED)
    description: |
      Removed 2026-05-25. The 42-card AFC library, its loader, the
      cards_tools atom, and the ``cited_cards`` verdict field were
      deleted: the subsystem was wired through compose / extensions /
      runner / adapter but no scenario ever activated it (always
      ``cards_tools_config=None``) and no observed verdict ever
      populated ``cited_cards``. Wire-breaking removal — version bump
      accompanies. Downstream consumers (rca-autorl test, aegis-ui
      schema) need follow-up edits.
    priority: P0
    status: deprecated
    code: []
    tests: []
    depends_on: [REQ-001]

  - id: REQ-017
    title: AgentM adapter — single-pass TurnEnd cognitive audit (SUPERSEDED)
    description: |
      Superseded 2026-05-08 by REQ-019 (two-phase orchestrator). The V0
      adapter spawned one child per TurnEndEvent that did extraction +
      verdict in a single pass and parsed trailing JSON via
      ``RawAuditOutput``. Replaced by the two-phase rewrite of
      ``adapters/agentm.py`` that runs Phase 1 (extractor) every turn and
      Phase 2 (auditor) every k turns. Pointer: design
      ``.claude/designs/llmharness-cognitive-audit.md`` §2, §6, §7.1.
    priority: P0
    status: deprecated
    code: []
    tests: []
    depends_on: [REQ-001, REQ-016, REQ-018]

  - id: REQ-018
    title: audit/ flat subpackage — single-pass diagnostic engine (SUPERSEDED)
    description: |
      Superseded 2026-05-08 by REQ-020 (extractor) + REQ-021 (auditor).
      The V0 flat layout (``audit/prompt.py``, ``audit/submit_tool.py``,
      ``audit/output.py``, ``audit/extensions.py``) and its
      ``compose_extensions`` / ``AUDIT_SYSTEM_PROMPT`` /
      ``SUBMIT_AUDIT_TOOL_NAME`` / ``RawAuditOutput`` symbols were deleted
      in the hard-cut migration to the two-phase split (extractor +
      auditor disjoint subpackages). Pointer: design
      ``.claude/designs/llmharness-cognitive-audit.md`` §2, §7.1.
    priority: P0
    status: deprecated
    code: []
    tests: []
    depends_on: [REQ-001, REQ-016]

  # ---------------------------------------------------------------------------
  # V1 two-phase cognitive-audit pipeline (P0 — replaces REQ-017 / REQ-018)
  # Design: .claude/designs/llmharness-cognitive-audit.md

  - id: REQ-019
    title: Two-phase orchestrator — v3 adapter (witness pipeline + partial flow)
    description: |
      ``adapters/agentm.py`` rewired for the v3 extractor flow (design
      §4.f, §6, §7.1). Single TurnEndEvent handler dispatches Phase 1
      every turn and Phase 2 every k turns (default
      ``audit_interval_turns=3``).

      Phase 1 (v3, issue #134): the adapter constructs a per-firing
      ``ExtractionState``, populates ``turn_texts`` with rendered text
      for each turn in the new-turn window, and binds the state into
      the extractor extension's config (state crosses the spawn
      boundary via the ``state`` knob because child sessions get a
      fresh service registry). The extractor child registers
      ``register_event`` / ``add_edge`` / ``submit_extraction``
      closed over the state; after the child loop terminates the
      adapter snapshots ``RawExtractorOutput.from_state(state)`` and
      writes one ``llmharness.audit_event`` per accepted event, one
      ``llmharness.audit_edge`` per accepted edge, one
      ``llmharness.extractor_partial`` (once) if any edges were
      dropped after the witness retry budget, and one
      ``llmharness.extractor_cursor`` to advance the cursor.

      Cursor advances on success or partial; stays put on
      ``extractor_no_call`` / ``extractor_empty`` / ``extractor_error``
      so the next firing re-attempts the same window.

      Phase 2 (auditor) is unchanged in this commit; commit 4 of the
      v3 plan rewires the auditor prompt to consume v3 events + edges
      directly. The adapter also publishes the
      ``llmharness.audit_registry`` service on the parent session so
      check atoms (commit 5) can register from their own ``install``.
    priority: P0
    status: tested
    code: [src/llmharness/adapters/agentm.py]
    tests:
      - tests/test_smoke.py
      - tests/test_two_phase_audit_integration.py
    depends_on: [REQ-001, REQ-016, REQ-020, REQ-021, REQ-022, REQ-023, REQ-029, REQ-030]

  - id: REQ-020
    title: Phase 1 extractor subpackage — v3 witness pipeline
    description: |
      ``audit/extractor/`` subpackage (design §4.b, §4.f, §7.1). V3
      replaces the v2 single-shot ``submit_events`` payload tool with
      a per-firing graph-builder tool flow:

      - ``register_event(turn_indices, kind, summary)`` — append an
        Event, return its monotonic id.
      - ``add_edge(src_event_id, dst_event_id, kind, reason,
        src_turns, dst_turns, cited_entities=[], cited_quote="")`` —
        validate witness + cycle + turn-subset rules in fail-fast
        order (existence -> src!=dst -> turns subset -> cycle ->
        per-kind witness). The witness layer runs case+whitespace
        normalized substring checks (no edit-distance, no stemming).
        Up to 3 attempts per ``(src, dst, kind)`` tuple; the 3rd
        failure drops the edge with the terminal error
        ``"giving up on this edge"`` and records the dropped edge
        into the partial-payload buffer.
      - ``submit_extraction()`` — terminal tool, no arguments. The
        per-firing ``ExtractionState`` IS the output;
        ``RawExtractorOutput.from_state(state)`` snapshots it.

      Single-file extension (§11): ``extensions.py`` reads the
      adapter-published ``ExtractionState`` from
      ``EXTRACTOR_STATE_SERVICE_KEY`` and registers the closed-over
      tool trio. The v2 ``validator.py`` and ``hints.py`` modules
      are deleted (no v3 callers).
    priority: P0
    status: tested
    code:
      - src/llmharness/audit/extractor/__init__.py
      - src/llmharness/audit/extractor/prompt.py
      - src/llmharness/audit/extractor/extensions.py
      - src/llmharness/audit/extractor/output.py
      - src/llmharness/audit/extractor/state/
      - src/llmharness/audit/extractor/tools/
      - src/llmharness/audit/extractor/witness.py
    tests:
      - tests/test_extractor_witness.py
      - tests/test_extractor_plan_structure.py
    depends_on: [REQ-001, REQ-016, REQ-023]

  - id: REQ-021
    title: Phase 2 auditor subpackage — v3 prompt + degradation + findings
    description: |
      ``audit/auditor/`` subpackage (design §2, §4.g, §5, §7.1, §8). Public
      surface: ``AUDITOR_SYSTEM_PROMPT``, ``build_auditor_system_prompt``,
      ``compose_auditor_extensions``, ``RawVerdictOutput`` (with
      ``AuditorOutputError``), ``SUBMIT_VERDICT_TOOL_NAME``.

      V3 prompt (issue #134 commit 4, 2026-05-10):
      - Trust-asymmetry block: thought = testimony,
        tool_call / tool_result = evidence. Mirrors the extractor side.
      - Inputs: GRAPH (events + edges, full or degraded form),
        FINDINGS (advisory only — never directives) from registered
        checks, optional CHECKS_FAILED non-blocking line,
        CONTINUATION_NOTES (auditor's own prior-firing notes), and
        DRILL-DOWN TOOLS instructions.
      - Reminder bar: high; default silent; concrete trigger list.
      - Continuation notes are written for the next auditor firing,
        not for the main agent.

      Degradation rule (design §4.g, locked at N=30):
      - len(events) ≤ summary_threshold → full Event.to_dict() +
        Edge.to_dict() (with witness fields) embedded inline.
      - len(events) > summary_threshold → degraded events
        ``{id, kind, summary, source_turns}`` + degraded edges
        ``{src, dst, kind, reason}``; auditor uses
        ``get_event_detail([ids])`` to recover full records.
      - Threshold configurable via ``audit_summary_threshold`` knob;
        default 30.

      ``submit_verdict`` JSON Schema enforces V2 shape (design §6.2 /
      decision #9): no drift field, no DriftType enum.
      surface_reminder + continuation_notes are required fields.

      Drill-down tools registered in compose_auditor_extensions():
      - ``get_turn(idx)`` (REQ-028) for raw trajectory access.
      - ``get_event_detail([event_ids])`` (REQ-031) for full event +
        edge records when the prompt is degraded.
    priority: P0
    status: tested
    code:
      - src/llmharness/audit/auditor/__init__.py
      - src/llmharness/audit/auditor/prompt.py
      - src/llmharness/audit/auditor/extensions.py
      - src/llmharness/audit/auditor/output.py
      - src/llmharness/audit/auditor/submit_verdict.py
    tests:
      - tests/test_auditor_degradation.py
      - tests/test_auditor_findings.py
    depends_on: [REQ-001, REQ-016, REQ-023, REQ-029, REQ-031]

  - id: REQ-022
    title: Typed failure entries — outage vs clean trajectory distinguishable
    description: |
      Design §4. V0's silent ``([], Verdict(drift=False))`` fallback
      is replaced by typed failure entries written to the session tree:
      ``extractor_no_call`` / ``extractor_error`` / ``extractor_empty``
      for Phase 1, ``audit_no_call`` / ``audit_error`` for Phase 2. The
      orchestrator (REQ-019) catches each failure mode and persists the
      typed entry so downstream graph queries can tell outage from a
      genuinely clean trajectory.
    priority: P0
    status: implemented
    code: [src/llmharness/adapters/agentm.py]
    depends_on: [REQ-001, REQ-020, REQ-021]

  - id: REQ-023
    title: Schema enum-parity helper — single source of truth for EventKind
    description: |
      Design §7.2. ``audit/validation/enum_schema.py`` derives the JSON-Schema
      ``enum`` array for ``EventKind`` directly from the enum class,
      so the extractor's ``submit_events`` schema cannot drift away
      from ``schema.py``.

      DriftType and DRIFT_TYPE_VALUES are REMOVED (issue #134,
      2026-05-10). EVENT_KIND_VALUES carries the v3 short-form values
      (task / hyp / evid / act / dec / concl). EDGE_KIND_VALUES is
      added in v3 (data | ref) so the extractor's ``add_edge`` schema
      stays in lockstep with EdgeKind. The auditor's submit_verdict
      schema uses no drift-type enum — the verdict shape is defined
      in full in audit/auditor/submit_verdict.py without referencing
      validation/enum_schema.py for drift classification.
    priority: P0
    status: implemented
    code: [src/llmharness/audit/validation/enum_schema.py]
    depends_on: [REQ-001]

  - id: REQ-024
    title: V3 fail-stop integration test — Phase 1 happy/no_call/salvage/empty
    description: |
      ``tests/test_two_phase_audit_integration.py`` drives the v3
      Phase 1 flow against a stub provider through the public
      ``AgentSession`` API and asserts the load-bearing transitions of
      the witness pipeline under commit-on-stop semantics:

      1. Happy — ``upsert_node``×N + ``upsert_edge`` (witness passes)
         + ``finalize_extraction`` ⇒ N ``audit_graph_op`` node upserts
         + 1 edge upsert + 1 ``extractor_cursor``, no
         ``extractor_partial``.
      3. No-call (empty) — child ends its turn without applying any op
         AND without calling the terminator on a non-trivial window ⇒
         nothing to salvage, so 1 ``extractor_no_call`` entry, cursor
         held.
      3b. Salvage (no-call with ops) — child applies graph ops but its
         turn ends WITHOUT calling ``finalize_extraction``. Commit-on-
         stop persists the accumulated ops as ``audit_graph_op`` entries
         and advances the cursor; NO ``extractor_no_call`` entry is
         recorded. The terminator is an optional fast-exit, not a commit
         gate.
      4. Empty — child calls the terminator immediately with no ops on a
         non-trivial window ⇒ 1 ``extractor_empty`` entry, cursor held.

      Phase 2 (auditor) is out of scope for this test; commit 4 of
      the v3 plan adds matching auditor coverage.
    priority: P0
    status: tested
    code:
      - src/llmharness/adapters/agentm.py
      - src/llmharness/audit/runner/runner.py
      - src/llmharness/audit/extractor/prompts/extractor_default.md
    tests: [tests/test_two_phase_audit_integration.py]
    depends_on: [REQ-019, REQ-020, REQ-021, REQ-022, REQ-030]

  # ---------------------------------------------------------------------------
  # V2 redirection — issue #134 (2026-05-10). LLM-led judgment, free-text
  # verdict shape, Phase 1 graph validator, branches as first-class audit
  # objects. Plan: .claude/plans/2026-05-10-llmharness-issue-134-redirection.md

  - id: REQ-025
    title: V2 verdict schema — surface_reminder + continuation_notes
    description: |
      Issue #134 PR 1 (P0). The submit_verdict terminal tool uses the
      JSON Schema shape (design §6.2): surface_reminder bool,
      reminder_text str, continuation_notes list[str], matched_event_ids
      list[int]. No drift field, no DriftType enum, no if/then clause.
      Adapter gate changes from
      ``verdict.drift and verdict.type`` to
      ``verdict.surface_reminder and verdict.reminder_text``.
      continuation_notes are forwarded into the next auditor child's
      context so the auditor can track what it asked itself to recheck.
      Auditor prompt rewritten with backward continuity / forward
      fulfillment / content correctness / branch quality as framing
      lenses (not rules). pyproject version bump along with this PR.
    priority: P0
    status: tested
    code:
      - src/llmharness/schema.py
      - src/llmharness/audit/validation/enum_schema.py
      - src/llmharness/audit/auditor/submit_verdict.py
      - src/llmharness/audit/auditor/output.py
      - src/llmharness/audit/auditor/prompt.py
      - src/llmharness/adapters/agentm.py
    tests:
      - tests/test_smoke.py
      - tests/test_two_phase_audit_integration.py
    depends_on: [REQ-001, REQ-021, REQ-023]

  - id: REQ-026
    title: Phase 1 graph validator (REMOVED in v3 commit 2)
    description: |
      v2 introduced a pure-Python mechanical validator that ran after
      each ``submit_events`` call (ref resolution, no cycles,
      kind↔source_turns rules, task / conclusion reachability).
      Failure wrote ``llmharness.extractor_invalid`` and skipped the
      auditor.

      Removed in v3 commit 2 (issue #134, 2026-05-10). ``Event.refs``
      is gone; the validator was incompatible with the new edge model.
      Witness checks now run inline at edge-construction time inside
      ``ExtractionState.add_edge``; the adapter rewrite in commit 3
      will switch to ``EXTRACTOR_PARTIAL`` entries.
    priority: P1
    status: deprecated
    code: []
    tests: []
    depends_on: [REQ-020, REQ-022]

  - id: REQ-027
    title: Advisory hints module (REMOVED in v3 commit 2)
    description: |
      v2 module audit/hints.py with five pure functions over
      list[Event] (repeated_actions, convergence_ratio,
      reachability_gaps, open_branches, multi_branch_syntheses) plus
      compute(graph) -> str.

      Removed in v3 commit 2 (issue #134, 2026-05-10). All v2 hint
      signals walked ``Event.refs``, which is gone. The equivalent
      signals ship in v3 as one-file Check atoms under
      ``llmharness.extensions`` registered through the
      ``AuditCheckRegistry`` service (see REQ-029 in the v3 plan)
      and surfaced as ``Finding`` records to the auditor.
    priority: P1
    status: deprecated
    code: []
    tests: []
    depends_on: [REQ-021, REQ-026]

  - id: REQ-028
    title: get_turn(idx) tool for auditor
    description: |
      Issue #134 PR 4 (P1). New tool registered in the auditor child
      session (design §6.3). Returns the serialized raw conversation
      turn at index idx — role, content, thinking blocks — so the
      auditor can verify event source_turns references against the
      actual trajectory text without bulk-loading the full trajectory
      into the auditor context. Module: audit/auditor/get_turn.py.
      Registered via compose_auditor_extensions(trajectory_snapshot=...).
      Out-of-range idx returns a structured tool-result error
      (is_error=True), not a crash. bool idx also rejected (bool is a
      subclass of int in Python). Snapshot captured per firing via
      _serialize_full_trajectory in adapters/agentm.py and bridged into
      the auditor child via the ``trajectory_snapshot`` config knob on
      compose_auditor_extensions(...) — rebuilt fresh each firing,
      never cached.
    priority: P1
    status: tested
    code:
      - src/llmharness/audit/auditor/get_turn.py
      - src/llmharness/audit/auditor/extensions.py
      - src/llmharness/adapters/agentm.py
    tests:
      - tests/test_get_turn_tool.py
      - tests/test_two_phase_audit_integration.py
    depends_on: [REQ-021]

  # ---------------------------------------------------------------------------
  # V3 redesign — issue #134 (2026-05-10). Schema break, scenario-registered
  # audit checks, witness-pipeline extractor, partial-extraction adapter.
  # Plan: .claude/plans/2026-05-10-llmharness-issue-134-v3.md

  - id: REQ-029
    title: scenario-registered audit checks via llmharness.audit_registry service
    description: |
      Scenarios register graph-health checks that the auditor consumes
      as advisory findings (design §4.c). Mechanism in
      ``audit/registry.py``: ``AuditCheckRegistry`` is owned by the
      adapter and published to ExtensionAPI under
      ``SERVICE_KEY = "llmharness.audit_registry"``. Registration is
      idempotent on ``(check.name, id(check))`` and fail-fast on
      non-callable input. ``run_all`` tolerates raising checks — each
      exception is captured by check name in an errors dict; other
      checks still run. Concrete check atoms ship as one-file
      extensions under ``src/llmharness/extensions/`` (REQ-032 —
      worked examples for downstream scenarios); the auditor wiring
      (CheckContext → Finding → prompt block) landed in commit 4.
    priority: P0
    status: tested
    code:
      - src/llmharness/audit/registry.py
      - src/llmharness/audit/__init__.py
    tests:
      - tests/test_audit_registry.py
    depends_on: [REQ-001]

  - id: REQ-030
    title: extractor_partial + audit_edge entry types — v3 partial flow
    description: |
      v3 (issue #134) replaces the v2 ``extractor_invalid`` failure
      entry with a partial-success entry. Witness validation now runs
      inline at edge-construction time inside ``ExtractionState`` with
      a per-tuple retry budget (3 attempts on the same
      ``(src, dst, kind)`` tuple); the third failure drops the edge
      and the firing still commits its events.

      Two new entry-type constants in ``audit/entry_types.py``:

      - ``AUDIT_EDGE = "llmharness.audit_edge"`` — one per accepted
        edge, payload is ``Edge.to_dict()``.
      - ``EXTRACTOR_PARTIAL = "llmharness.extractor_partial"`` —
        written at most once per firing when any edges were dropped,
        payload ``{"dropped_edges": list[dict], "turn_window":
        [int, int]}``.

      The adapter writes both via the orchestrator (REQ-019); the
      integration test pins the four load-bearing transitions
      (happy / partial / no_call / empty).
      ``EXTRACTOR_INVALID`` is removed as part of v3 commit 2.
    priority: P0
    status: tested
    code:
      - src/llmharness/audit/entry_types.py
      - src/llmharness/adapters/agentm.py
    tests:
      - tests/test_two_phase_audit_integration.py
    depends_on: [REQ-001, REQ-020, REQ-022]

  - id: REQ-031
    title: get_event_detail([ids]) drill-down tool for the auditor
    description: |
      Issue #134 commit 4 (P0). New §11 single-file extension at
      ``audit/auditor/get_event_detail.py`` registered in the
      auditor child session. Returns the full ``Event.to_dict()`` plus
      outgoing+incoming ``Edge.to_dict()`` lists (with witness fields)
      for every requested event id. Used by the auditor when the prompt
      is degraded (more events than ``audit_summary_threshold``,
      design §4.g) to recover the witness fields the prompt stripped.

      Contract for unknown ids: a top-level ``"missing"`` list (not
      a per-key ``null``). Known ids appear under their stringified
      id key. Out-of-shape input (negative id, non-int id, empty
      event_ids list) returns a structured ``ToolResult`` with
      ``is_error=True`` rather than raising — the auditor child loop
      must never crash from a malformed drill-down call. bool ids are
      rejected (bool is a subclass of int in Python).

      Bridging follows the commit-3 pattern: the adapter passes
      ``events`` and ``edges`` through
      ``compose_auditor_extensions(events=..., edges=...)`` which
      forwards them via the atom's ``config`` dict at install time.
    priority: P0
    status: tested
    code:
      - src/llmharness/audit/auditor/get_event_detail.py
      - src/llmharness/audit/auditor/extensions.py
      - src/llmharness/adapters/agentm.py
    tests:
      - tests/test_get_event_detail.py
    depends_on: [REQ-001]

  - id: REQ-032
    title: Reference check atoms — repeated_actions / open_branches / premature_conclusion
    description: |
      Issue #134 commit 5 (P1). Three §11 single-file check atoms
      under ``src/llmharness/extensions/`` that ship as worked
      examples of how downstream scenarios register graph checks
      via the audit registry service (REQ-029):

      - ``check_repeated_actions`` — flags ≥2 ``act`` events sharing
        an identical summary (heuristic: the v3 extractor prompt
        does not prescribe a fixed ``tool_name(args)`` summary
        shape, so summary equality is the most defensible signature
        without an inline arg-hash on Event).
      - ``check_open_branches`` — flags ``dec`` / ``hyp`` events
        with no outgoing ``data`` edge (the v3-graph approximation
        of "discarded alternative without closing evidence").
      - ``check_premature_conclusion`` — flags ``concl`` events
        with strictly fewer than two incoming edges (data + ref
        combined). Threshold deliberately conservative; checks are
        advisory.

      Each atom: exports MANIFEST + install(api, config); resolves
      the audit registry via api.get_service(SERVICE_KEY) and
      raises RuntimeError fail-fast if absent; registers a pure,
      side-effect-free callable. §11 contract: one file per atom,
      no atom-to-atom imports, no core._internal / harness.session
      import.
    priority: P1
    status: tested
    code:
      - src/llmharness/extensions/__init__.py
      - src/llmharness/extensions/check_repeated_actions.py
      - src/llmharness/extensions/check_open_branches.py
      - src/llmharness/extensions/check_premature_conclusion.py
    tests:
      - tests/test_reference_check_atoms.py
    depends_on: [REQ-001, REQ-029]

  - id: REQ-033
    title: Extractor refs are required (genesis exception for id=1)
    description: |
      SUPERSEDED BY v4 (2026-05): the hard-reject below was softened to
      an advisory. v4 replaced the ``submit_events`` / ``commit`` flow
      with incremental ``upsert_node`` / ``upsert_edge`` ops.

      v4.1 (2026-05-27) commit-on-stop: ``finalize_extraction`` is no
      longer a commit gate. The runner commits whatever ops the firing
      accumulated in ``state.pending_ops`` whenever the extractor child's
      turn ends (ModelEndTurn or tool-call budget), regardless of whether
      the terminator fired. ``finalize_extraction`` is an OPTIONAL fast-
      exit that ends the firing early and surfaces the chain-link
      (disconnected-event) advisory as a SOFT warning. A firing is only
      discarded (cursor held) when zero ops were applied; chain-link is
      encouraged, not enforced. Kept for history; needs a supersede/
      rewrite decision.

      --- original v3.1 requirement ---

      Tighten the v3.1 single-tool extractor contract so the auditor
      always receives a connected graph from each firing.

      ``submit_events`` JSON Schema now lists ``refs`` in the per-event
      ``required`` array — the field must always be present (may still
      be an empty array, see exception). ``ExtractionState.commit``
      additionally rejects empty refs on any event with ``id >= 2``
      with a hard error string, so the LLM gets a corrective tool
      result and may retry within the caller's attempt budget.

      Genesis exception: events[0] (``id=1``) has no in-window
      predecessor (refs may only point to earlier events in THIS
      firing, not into prior firings' recent_graph), so empty refs is
      legitimate and accepted.

      Motivation: rca:harness.sync E2E (2026-05-11) showed late
      extractor firings producing 3 events with refs=[] on every
      event; the resulting graph was disconnected and the auditor
      could not trace causal structure across the window.
    priority: P1
    status: tested
    code:
      - src/llmharness/audit/extractor/state/
      - src/llmharness/audit/extractor/tools/
    tests:
      - tests/test_extractor_plan_structure.py
    depends_on: [REQ-020]

  - id: REQ-034
    title: Unified reminder delivery via DecideTurnAction.Inject
    description: |
      Replace the ``BeforeSendToLlmEvent``-based reminder injector
      with a single ``DecideTurnActionEvent`` handler that drains
      ``pending_reminders`` and returns ``Inject([reminder_msgs])``.

      One path covers both delivery cases:
      - Mid-trajectory turn (default action ``Step``): ``Inject``
        extends ``messages`` so the next turn's LLM call sees the
        reminder as a synthetic user message — same visible effect
        as the previous before_send_to_llm append.
      - Terminal turn (default action ``Stop`` with non-final cause
        such as ``ToolTerminated`` from ``submit_final_report`` or
        ``ModelEndTurn`` from a no-tool assistant message): ``Inject``
        overrides the kernel default and re-opens the loop so the
        model can revise its conclusion with the reminder in hand.
      - Final-cause stops (``MaxTurnsExhausted`` / ``SignalAborted`` /
        any cause with ``final=True``): kernel ignores overrides;
        handler logs a warning and leaves the reminder pending —
        nothing safe to do then.

      Manifest ``registers`` / ``affects`` updated from
      ``event:before_send_to_llm`` to ``event:decide_turn_action``.

      Motivation: rca:harness.sync E2E (2026-05-11) showed the final
      auditor firing produced an actionable reminder ("compare against
      normal baseline; verify propagation chain") that exactly named
      the reason the case lost points, but it landed after the main
      agent had already returned ``submit_final_report`` and the
      reminder was queued with no consumer. User feedback: terminal
      and mid-trajectory delivery should have the same logic.
    priority: P1
    status: tested
    code:
      - src/llmharness/adapters/agentm.py
    tests:
      - tests/test_reminder_injector.py
    depends_on: [REQ-019, REQ-021]

  - id: REQ-035
    title: Prefix replay from auditor verdict
    description: |
      Iterate on auditor / reminder behaviour without re-running the
      whole trajectory: given a recorded ``ReplayRecord`` whose
      auditor surfaced a reminder at turn ``t``, materialise a new
      persisted session whose entry tree mirrors the original prefix
      and resume it with the reminder seeded as the first injection of
      turn ``t+1``.

      Decomposition:

      - ``llmharness.replay.reminder_seed`` — §11 single-file atom,
        one-shot ``DecideTurnActionEvent`` handler that drains the
        configured ``text`` exactly once and then unsubscribes.
        Mirrors the live adapter's Inject path (including the
        final-cause Stop guard) and persists a
        ``REMINDER_DELIVERED`` entry. Train/inference parity is
        enforced by sourcing the message format from the shared
        ``audit/toolkit/reminder_format.py`` helper.

      - ``llmharness.tools.prefix_replay`` — orchestration helpers.
        Picks the auditor record at ``turn=t`` whose
        ``output.surface_reminder`` is set, locates the source session
        file under ``<session-dir>/*_<session_id>.jsonl``, finds
        the leaf entry that ends turn ``t`` (the ``t``-th ``message``
        entry on the active branch — same indexing convention as
        ``adapters.agentm``), and calls
        ``SessionManager.create_branched_session(leaf_id)``. Non-
        message entries on the branch (audit_event, audit_edge, ...)
        are copied through verbatim — the audit context up to that
        point is part of the prefix.

      - ``llmharness-replay agent-from-reminder`` — typer subcommand
        that drives the above and prints (and optionally writes) the
        ``agentm --resume`` command shape that re-runs the tail with
        the seed atom mounted. The composed command pairs
        ``enable_reminders:false`` (so the live auditor does not
        inject a second reminder over the seed) with
        ``enable_auditor:true`` (so the still-active auditor keeps
        observing for downstream evidence).

      No ``agentm.core`` change required: existing
      ``SessionManager.create_branched_session`` already does
      persisted truncation + entry-id rewrite + ``parent_session``
      header linkage.

      Test fail-stop: branch length of the new session must equal the
      expected prefix length. Wrong → student model sees a different
      prefix at inference than at training, breaking the whole
      iteration loop's purpose.
      Identity vocabulary note (v0.6.0): the source session is relocated
      by ``ReplayRecord.session_id`` — the per-session id that also names
      the persisted ``.agentm/observability/<session_id>.jsonl`` file.
      This replaced the ambiguous ``root_session_id`` field, which the
      meta sidecar had keyed by the OTel ``trace_id`` instead, breaking
      stem-pairing on live runs. ``record.py`` now carries explicit
      ``session_id`` + ``trace_id`` fields and the shared
      ``audit_session_id(api)`` helper.
    priority: P1
    status: tested
    code:
      - src/llmharness/replay/reminder_seed.py
      - src/llmharness/replay/record.py
      - src/llmharness/tools/prefix_replay.py
      - src/llmharness/replay/cli.py
      - src/llmharness/audit/toolkit/reminder_format.py
    tests:
      - tests/test_reminder_seed_atom.py
      - tests/test_prefix_replay_cli.py
      - tests/test_replay_record.py
      - tests/test_audit_session_id.py
    depends_on: [REQ-019, REQ-034]

  - id: REQ-036
    title: Fork-tree counterfactual experiment orchestration
    description: |
      Own the host-side stitching of fork-tree counterfactual
      experiments inside llmharness so downstream eval drivers (rca,
      others) become thin callers that supply only their session-factory
      policy.

      A fork-tree experiment is a producer-consumer work queue. Each
      surface point (an auditor firing with ``surface_reminder=True``) on
      a backbone trajectory is a parallel-universe split: "don't
      intervene" continues the backbone (free), "intervene" forks a NEW
      child rollout at that point with the reminder seeded. Consuming one
      :class:`ForkTask` produces a :class:`ForkNode` plus a child task per
      surface, so the queue feeds itself and drains when every branch's
      auditor goes silent. Degenerate policies fall out of the same
      engine: ``max_surfaces_per_node=1`` ⇒ the old linear chain;
      ``max_depth=1`` ⇒ a star; default (all surfaces, soft guards
      ``max_depth=8`` / ``max_total_nodes=64``) ⇒ the full tree.

      Entry points:

      - :func:`llmharness.run_fork_tree_experiment` — drains the queue.
        Calls a host-supplied :data:`SessionFactory` to obtain each
        backbone trajectory, then replays the cognitive-audit pipeline
        offline against it with ``stop_on_first_surface=False`` so EVERY
        surface is captured (each carrying an independent deep snapshot of
        :class:`CumulativeAuditState`), seeding the parent snapshot +
        ``start_turn`` floor via :func:`replay_pipeline_over_trajectory`.

      - :func:`llmharness.write_fork_tree_replay` +
        :func:`forktree_replay_path` — materialise a single
        ``<root_session_log_id>.chained.jsonl`` sidecar covering every
        node's [turn_lo, +inf) window, tagging each record with its
        ``node_id`` / ``parent_node_id`` and rewriting ``session_id``
        to the root node's id. The first line is a
        :data:`FORK_TREE_HEADER_KEY` topology bundle read back by
        :func:`read_fork_tree_header`.

      Fail-stop positions: (1) per-surface cumulative snapshots must be
      INDEPENDENT deep copies (a child fork must not have its seed mutated
      by the continuing backbone); (2) ``seed_cumulative`` / ``start_turn``
      threading — wrong values compare apples to oranges; (3) fan-out +
      tree recoverability from ``parent_id``.
    priority: P1
    status: tested
    code:
      - src/llmharness/replay/fork_tree.py
      - src/llmharness/replay/offline_driver.py
    tests:
      - tests/replay/test_fork_tree.py
    depends_on: [REQ-019, REQ-034, REQ-035]

  - id: REQ-037
    title: Empty-turn nudge — re-prompt a child that emitted zero tool calls
    description: |
      A reasoning-heavy child (e.g. glm-5.1) can end its turn producing
      only prose — ZERO tool calls — so the terminal tool
      (``finalize_extraction`` / ``submit_verdict``) is never called and
      nothing is recorded; the firing reports ``no_call``. Commit-on-stop
      (REQ-022 / REQ-024) salvages a firing that applied ops without the
      terminator, but cannot help when NO tool call was emitted at all.

      Both "run a child to completion" seams gain a bounded empty-turn
      nudge so they stay behaviourally identical (the design's
      live ≡ offline invariant): after the initial ``prompt(...)`` returns
      and before the terminal-args scrape, if the child made zero tool
      calls across all collected messages
      (:func:`llmharness.child_collect.has_any_tool_call`) and a terminal
      tool is expected, the SAME live session is re-prompted with
      :func:`build_empty_turn_nudge` (parametrised on the terminal tool
      name) and the returned messages appended. Bounded by the shared
      constant ``MAX_EMPTY_TURN_NUDGES = 1``; a nudge ``prompt()``
      exception breaks the loop and falls through with whatever messages
      exist (a nudge never turns a result into a hard error). The
      extractor prompt also states explicitly that the graph is built
      ONLY through tool calls and a reasoning-only turn records nothing.

      Fail-stop positions: (1) the nudge converts a would-be ``no_call``
      first turn into a recorded firing when the nudge turn emits the
      terminal tool; (2) a genuinely-empty firing (zero tool calls even
      after the nudge) still records ``no_call`` — the bound holds; (3)
      both seams construct the same nudge text from the same helper.
    priority: P1
    status: tested
    code:
      - src/llmharness/child_collect.py
      - src/llmharness/child_task.py
      - src/llmharness/tools/engine.py
      - src/llmharness/audit/extractor/prompts/extractor_default.md
    tests:
      - tests/test_two_phase_audit_integration.py
    depends_on: [REQ-019, REQ-020, REQ-022, REQ-024]

