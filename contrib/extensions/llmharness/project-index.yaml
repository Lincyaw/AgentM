project:
  name: llmharness
  description: |
    Cognitive-audit AgentM extension that supervises a running main agent
    via TurnEndEvent → child diagnostic session → BeforeAgentStart reminder
    injection. Persistence rides on the AgentM session entry tree; no file
    store, no subprocess CLI, no Claude Code hook protocol. Single SDK-native
    consumer of AgentSessionConfig + ExtensionAPI.

requirements:
  # ---------------------------------------------------------------------------
  # Core typed payloads (P0 — load-bearing for the audit loop)

  - id: REQ-001
    title: Event/Verdict/Reminder schema (V2 — breaking change)
    description: |
      Closed-enum type for event kinds; serializable Event, Verdict,
      Reminder dataclasses. Stable JSON shape — Verdict and Event
      payloads round-trip through the AgentM session entry tree
      (``api.session.append_entry``).

      V2 Verdict shape (issue #134, 2026-05-10):
        surface_reminder: bool
        reminder_text: str
        continuation_notes: list[str]   # replaces V1 downstream_reaction
        matched_event_ids: list[int]
        cited_cards: list[str]

      DriftType enum is REMOVED. It was a preset enum for a subjective
      dimension (which "type" of drift the auditor detected), violating
      the project's no-preset-enum-for-subjective-dimensions principle.
      The LLM's free-text reminder_text + continuation_notes carry the
      same information with better fidelity. Reminder.type field also
      removed. Breaking change — pyproject version bump required;
      rca-autorl backwards-compatibility explicitly waived.
    priority: P0
    status: tested
    code: [src/llmharness/schema.py]
    tests: [tests/test_smoke.py]

  # ---------------------------------------------------------------------------
  # Cognitive-audit pipeline (P0 — the entire feature)

  - id: REQ-016
    title: cards.py loader + cards_list/cards_get tools + axis_hint
    description: |
      Module exposing the 42 AFC cards as searchable tools to the
      cognitive-audit diagnostic agent (design: .claude/designs/llmharness-cognitive-audit.md §2).
      ``cards_list()`` returns one CardSummary per YAML on disk (id, name,
      axis_hint, one_line_mechanism). ``cards_get(card_id)`` returns the
      full CardFull payload; raises KeyError on unknown id. ``_AXIS_HINT``
      is curated in Python code, NOT a YAML field. Lazy load (no import-time
      I/O); cache after first call; ``LLMHARNESS_CARDS_ROOT`` env override
      supported. Coverage: all 42 cards across memory/reflection/planning/
      action/specification/inter_agent/verification/termination/cognitive/
      system_level/. Distribution: axis 1 = 13, axis 2 = 14, axis 3 = 13,
      None = 2 (AFC-0032 / AFC-0033 — pure infra failures).
    priority: P0
    status: implemented
    code: [src/llmharness/cards.py]
    depends_on: [REQ-001]

  - id: REQ-017
    title: AgentM adapter — single-pass TurnEnd cognitive audit (SUPERSEDED)
    description: |
      Superseded 2026-05-08 by REQ-019 (two-phase orchestrator). The V0
      adapter spawned one child per TurnEndEvent that did extraction +
      verdict in a single pass and parsed trailing JSON via
      ``RawAuditOutput``. Replaced by the two-phase rewrite of
      ``adapters/agentm.py`` that runs Phase 1 (extractor) every turn and
      Phase 2 (auditor) every k turns. Pointer: design
      ``.claude/designs/llmharness-cognitive-audit.md`` §2, §6, §7.1.
    priority: P0
    status: deprecated
    code: []
    tests: []
    depends_on: [REQ-001, REQ-016, REQ-018]

  - id: REQ-018
    title: audit/ flat subpackage — single-pass diagnostic engine (SUPERSEDED)
    description: |
      Superseded 2026-05-08 by REQ-020 (extractor) + REQ-021 (auditor).
      The V0 flat layout (``audit/prompt.py``, ``audit/submit_tool.py``,
      ``audit/output.py``, ``audit/extensions.py``) and its
      ``compose_extensions`` / ``AUDIT_SYSTEM_PROMPT`` /
      ``SUBMIT_AUDIT_TOOL_NAME`` / ``RawAuditOutput`` symbols were deleted
      in the hard-cut migration to the two-phase split (extractor +
      auditor disjoint subpackages). Pointer: design
      ``.claude/designs/llmharness-cognitive-audit.md`` §2, §7.1.
    priority: P0
    status: deprecated
    code: []
    tests: []
    depends_on: [REQ-001, REQ-016]

  # ---------------------------------------------------------------------------
  # V1 two-phase cognitive-audit pipeline (P0 — replaces REQ-017 / REQ-018)
  # Design: .claude/designs/llmharness-cognitive-audit.md

  - id: REQ-019
    title: Two-phase orchestrator — adapter rewrite (extractor + auditor)
    description: |
      ``adapters/agentm.py`` rewritten for the two-phase split (design
      ``llmharness-cognitive-audit.md`` §2, §6). Single TurnEndEvent
      handler dispatches Phase 1 every turn and Phase 2 every k turns
      (default ``audit_interval_turns=3``). Phase 1 spawns a child whose
      extensions come from ``compose_extractor_extensions``, slices the
      new turns since ``llmharness.extractor_cursor``, persists each
      submitted event as an ``llmharness.audit_event`` entry, and updates
      the cursor. Phase 2 spawns a child whose extensions come from
      ``compose_auditor_extensions``, feeds the event graph + recent
      verdicts (NOT the raw trajectory), and persists the resulting
      ``Verdict`` plus a single pending Reminder in adapter closure state.
      ``BeforeAgentStartEvent`` injection unchanged from REQ-017's design.
    priority: P0
    status: implemented
    code: [src/llmharness/adapters/agentm.py]
    tests: [tests/test_smoke.py]
    depends_on: [REQ-001, REQ-016, REQ-020, REQ-021, REQ-022, REQ-023]

  - id: REQ-020
    title: Phase 1 extractor subpackage — per-turn event extraction
    description: |
      ``audit/extractor/`` subpackage (design §2, §4, §7.1). Public
      surface: ``EXTRACTOR_SYSTEM_PROMPT``, ``compose_extractor_extensions``,
      ``RawExtractorOutput`` (with ``ExtractorOutputError``),
      ``SUBMIT_EVENTS_TOOL_NAME``. The terminal tool ``submit_events``
      forces structured Event output; thinking blocks are kept this time
      so causal/ref reasoning can rely on them. Stateless: the adapter
      slices new turns and passes them in.
    priority: P0
    status: implemented
    code:
      - src/llmharness/audit/extractor/__init__.py
      - src/llmharness/audit/extractor/prompt.py
      - src/llmharness/audit/extractor/extensions.py
      - src/llmharness/audit/extractor/output.py
      - src/llmharness/audit/extractor/submit_tool.py
    depends_on: [REQ-001, REQ-016, REQ-023]

  - id: REQ-021
    title: Phase 2 auditor subpackage — every-k-turn graph audit (V2 redirect)
    description: |
      ``audit/auditor/`` subpackage (design §2, §5, §7.1). Public
      surface: ``AUDITOR_SYSTEM_PROMPT``, ``compose_auditor_extensions``,
      ``RawVerdictOutput`` (with ``AuditorOutputError``),
      ``SUBMIT_VERDICT_TOOL_NAME``. Auditor consumes the event graph +
      recent verdicts + advisory hint block (NOT the raw trajectory).

      V2 prompt principles (issue #134 redirection, 2026-05-10):
      - LLM is primary judge; backward continuity / forward fulfillment /
        content correctness / branch quality are framing lenses, not
        a sequenced rule set.
      - Hints block (from audit/hints.py, REQ-027) is scaffolding in
        the prompt; auditor may ignore or contradict it and may flag
        concerns hints missed.
      - Branch fork and merge moments receive explicit framing
        (design §5.5).

      ``submit_verdict`` JSON Schema enforces V2 shape (design §6.2):
      no drift field, no DriftType enum, no if/then clause.
      surface_reminder + continuation_notes are required fields.

      ``get_turn(idx)`` tool (audit/auditor/get_turn_tool.py, REQ-028)
      is registered in compose_auditor_extensions() for on-demand
      raw-turn access.
    priority: P0
    status: implemented
    code:
      - src/llmharness/audit/auditor/__init__.py
      - src/llmharness/audit/auditor/prompt.py
      - src/llmharness/audit/auditor/extensions.py
      - src/llmharness/audit/auditor/output.py
      - src/llmharness/audit/auditor/submit_tool.py
    depends_on: [REQ-001, REQ-016, REQ-023]

  - id: REQ-022
    title: Typed failure entries — outage vs clean trajectory distinguishable
    description: |
      Design §4. V0's silent ``([], Verdict(drift=False))`` fallback
      is replaced by typed failure entries written to the session tree:
      ``extractor_no_call`` / ``extractor_error`` / ``extractor_empty``
      for Phase 1, ``audit_no_call`` / ``audit_error`` for Phase 2. The
      orchestrator (REQ-019) catches each failure mode and persists the
      typed entry so downstream graph queries can tell outage from a
      genuinely clean trajectory.
    priority: P0
    status: implemented
    code: [src/llmharness/adapters/agentm.py]
    depends_on: [REQ-001, REQ-020, REQ-021]

  - id: REQ-023
    title: Schema enum-parity helper — single source of truth for EventKind
    description: |
      Design §7.2. ``audit/_enum_schema.py`` derives the JSON-Schema
      ``enum`` array for ``EventKind`` directly from the enum class,
      so the extractor's ``submit_events`` schema cannot drift away
      from ``schema.py``.

      DriftType and DRIFT_TYPE_VALUES are REMOVED (issue #134,
      2026-05-10). Only EVENT_KIND_VALUES remains. The auditor's
      submit_verdict schema (V2) uses no drift-type enum — the
      verdict shape is defined in full in audit/auditor/submit_tool.py
      without referencing _enum_schema.py for drift classification.
    priority: P0
    status: implemented
    code: [src/llmharness/audit/_enum_schema.py]
    depends_on: [REQ-001]

  - id: REQ-024
    title: V1 fail-stop integration test — 4-turn k=3 stub-provider trajectory
    description: |
      Design §2, §4. Single integration test pinned to a 4-turn k=3 dialog
      that asserts Phase 1 fires 4× and Phase 2 fires 1× at turn 3, with
      the expected entry-tree shape (``llmharness.audit_event`` count,
      ``llmharness.extractor_cursor`` final value, single ``Verdict``).
      Owned by task 07; placeholder so the index already names the
      requirement that the V1 fail-stop discharges.
    priority: P0
    status: pending
    code: []
    tests: []
    depends_on: [REQ-019, REQ-020, REQ-021, REQ-022]

  # ---------------------------------------------------------------------------
  # V2 redirection — issue #134 (2026-05-10). LLM-led judgment, free-text
  # verdict shape, Phase 1 graph validator, branches as first-class audit
  # objects. Plan: .claude/plans/2026-05-10-llmharness-issue-134-redirection.md

  - id: REQ-025
    title: V2 verdict schema — surface_reminder + continuation_notes
    description: |
      Issue #134 PR 1 (P0). The submit_verdict terminal tool uses the V2
      JSON Schema shape (design §6.2): surface_reminder bool,
      reminder_text str, continuation_notes list[str], matched_event_ids
      list[int], cited_cards list[str]. No drift field, no DriftType
      enum, no if/then clause. Adapter gate changes from
      ``verdict.drift and verdict.type`` to
      ``verdict.surface_reminder and verdict.reminder_text``.
      continuation_notes are forwarded into the next auditor child's
      context so the auditor can track what it asked itself to recheck.
      Auditor prompt rewritten with backward continuity / forward
      fulfillment / content correctness / branch quality as framing
      lenses (not rules). pyproject version bump along with this PR.
    priority: P0
    status: tested
    code:
      - src/llmharness/schema.py
      - src/llmharness/audit/_enum_schema.py
      - src/llmharness/audit/auditor/submit_tool.py
      - src/llmharness/audit/auditor/output.py
      - src/llmharness/audit/auditor/prompt.py
      - src/llmharness/adapters/agentm.py
    tests:
      - tests/test_smoke.py
      - tests/test_two_phase_audit_integration.py
    depends_on: [REQ-001, REQ-021, REQ-023]

  - id: REQ-026
    title: Phase 1 graph validator
    description: |
      Issue #134 PR 2 (P1). Pure-Python mechanical validation step that
      runs in the adapter after each submit_events call (design §5.4).
      Five checks: ref resolution, no cycles, kind↔source_turns rules
      (evidence requires tool_result/user/assistant.thinking source;
      action requires tool_call source), task reachability for every
      event, conclusion reachability from task. Failure: no events
      committed; ``llmharness.extractor_invalid`` entry written with
      violations list; auditor skipped. New module
      audit/extractor/validator.py. New entry-type constant
      ``EXTRACTOR_INVALID`` added to audit/entry_types.py.
    priority: P1
    status: tested
    code:
      - src/llmharness/audit/extractor/validator.py
      - src/llmharness/audit/entry_types.py
      - src/llmharness/adapters/agentm.py
    tests:
      - tests/test_extractor_validator.py
      - tests/test_two_phase_audit_integration.py
    depends_on: [REQ-020, REQ-022]

  - id: REQ-027
    title: Advisory hints module — pure signals for auditor scaffolding
    description: |
      Issue #134 PR 3 (P1). New module audit/hints.py with five pure
      functions over list[Event]: repeated_actions(graph),
      convergence_ratio(graph), reachability_gaps(graph),
      open_branches(graph), multi_branch_syntheses(graph), plus a
      compute(graph) -> str renderer. Output is a compact textual
      block injected into the auditor JSON payload as the "hints" key.
      The auditor may ignore any signal. No async I/O; no new storage.
      Hints are phrased as "consider …" rather than "concern: …" to
      avoid anchoring (design §7.5). Prompt cleanup (Option A):
      removed the dead {hints} format-placeholder from auditor prompt;
      prompt is now a static string with no .format() calls.
    priority: P1
    status: tested
    code:
      - src/llmharness/audit/hints.py
      - src/llmharness/audit/auditor/prompt.py
      - src/llmharness/adapters/agentm.py
    tests:
      - tests/test_audit_hints.py
      - tests/test_two_phase_audit_integration.py
    depends_on: [REQ-021, REQ-026]

  - id: REQ-028
    title: get_turn(idx) tool for auditor
    description: |
      Issue #134 PR 4 (P1). New tool registered in the auditor child
      session (design §6.3). Returns the serialized raw conversation
      turn at index idx — role, content, thinking blocks — so the
      auditor can verify event source_turns references against the
      actual trajectory text without bulk-loading the full trajectory
      into the auditor context. Module: audit/auditor/get_turn_tool.py.
      Registered via compose_auditor_extensions(trajectory_snapshot=...).
      Out-of-range idx returns a structured tool-result error
      (is_error=True), not a crash. bool idx also rejected (bool is a
      subclass of int in Python). Snapshot captured per firing via
      _serialize_full_trajectory in adapters/agentm.py; _with_trajectory_snapshot
      appends the get_turn module to the static auditor_extensions list
      inside _drain_auditor on each call — never cached, never mutates
      the shared base list.
    priority: P1
    status: tested
    code:
      - src/llmharness/audit/auditor/get_turn_tool.py
      - src/llmharness/audit/auditor/extensions.py
      - src/llmharness/adapters/agentm.py
    tests:
      - tests/test_get_turn_tool.py
      - tests/test_two_phase_audit_integration.py
    depends_on: [REQ-021]

