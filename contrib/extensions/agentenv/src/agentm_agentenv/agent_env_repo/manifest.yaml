name: agent_env_repo
description: |
  Autonomous agent sandbox with full git/gh access. The sandbox pod provides
  environment isolation (OS, toolchains, dependencies) while the agent has
  complete autonomy: it clones the repo, edits code, runs tests, commits,
  pushes, creates PRs, writes issue comments, and flips labels ��� exactly
  like Claude/Codex runtimes but in an isolated container.

  On startup the sandbox automatically:
    1. Clones the target repo (from WORKBUDDY_REPO + GH_TOKEN)
    2. Checks out the issue branch if it exists (workbuddy/issue-N)
    3. Configures git identity
    4. Uploads skill files from host PVC

  The agent then works with full git/gh capabilities inside /workspace.
  No sync-back needed — the agent pushes its own changes.

extensions:
  - module: agentm_agentenv.operations_agent_env
    config:
      work_dir: /workspace

  - module: agentm.extensions.builtin.tool_read
  - module: agentm.extensions.builtin.tool_edit
  - module: agentm.extensions.builtin.tool_bash
