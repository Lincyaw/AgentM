[project]
name = "agentm-harbor"
version = "0.1.0"
description = "Harbor agent adapter — installs agentm from PyPI and runs it in Harbor evaluation containers"
requires-python = ">=3.12"
dependencies = [
    "harbor>=0.1.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agentm_harbor"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "W"]
