name: ale:arl
description: |
  Agents' Last Exam tasks via ARL sandbox. The agent runs on the host;
  bash/file tools execute inside a remote ARL sandbox pod that the eval
  harness pre-created and staged with the task's input data (the harness
  passes attach_session/work_dir via atom_config_overrides). The hidden
  reference and the grader run only after the agent session ends.

extensions:
  - module: agentm.extensions.builtin.operations
    config:
      backend: agent_env
      attach_session: ${AGENTM_AGENT_ENV_ATTACH_SESSION}
      work_dir: /workspace
      delete_on_shutdown: false
  - module: agentm.extensions.builtin.tool_result_cap
    config:
      max_tokens: 50000
      preview_tokens: 50000
  - module: agentm.extensions.builtin.file_tools
    config:
      verify_readback: true
  - module: agentm.extensions.builtin.tool_bash
    config:
      default_timeout: 1200
  - module: agentm.extensions.builtin.observability
  - module: agentm.extensions.builtin.system_prompt
    config:
      prompt: |
        You are completing one unit of real professional work inside a
        Linux sandbox. The task statement gives absolute paths for its
        input, software, and output directories — follow them exactly.
        Do not modify anything under the task's input/ directory; write
        final deliverables only into the task's output/ directory. The
        sandbox has no GUI and no internet access: rely only on staged
        files and the provided software wrappers. Long commands can be
        slow — use generous timeouts rather than shell-level timeout
        wrappers. Finish by verifying your outputs against the task's
        stated output contract.
  - module: agentm.extensions.builtin.llm_compaction
    config:
      tool_result_max_tokens: 8000
  - module: agentm.extensions.builtin.read_history
    config:
      tool_result_max_tokens: 20000
      total_max_tokens: 50000
  - module: agentm.extensions.builtin.background_exec
    config:
      timeout: 120
