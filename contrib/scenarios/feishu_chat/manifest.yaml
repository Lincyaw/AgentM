name: feishu_chat
description: |
  Interactive chat scenario driven by the Feishu / Lark gateway
  (``contrib/channels/feishu/``).

  Optimised for *conversational* interaction: the user types into a
  Feishu chat, the agent replies one turn at a time, and tool calls
  surface as messages back into the same chat.

  Power-user posture: bash, edit, write, and propose_change are all
  enabled and pass through unchallenged. Untrusted-input scenarios
  should fork this manifest and re-add a ``permission`` deny list or
  configure ``GatewayConfig.approval_policy.require_approval`` so the
  approval bridge gates write-class calls.

extensions:
  # --- environment ports: register the local-FS / asyncio-bash Operations
  # bundle. Must be listed first so any subsequent tool atom that calls
  # ``api.get_operations()`` during install sees a registered bundle. ---
  - module: agentm.extensions.builtin.operations_local

  # --- read-side tooling: agent reads files directly; navigation /
  # search (ls / find / grep) is delegated to ``bash`` below. ---
  - module: agentm.extensions.builtin.tool_read

  # --- write-side tooling: agent can mutate the workspace directly.
  # bash for shell, edit for file diffs, write for whole-file rewrites,
  # propose_change for evolution-substrate atom edits. The Feishu
  # gateway's approval bridge can still gate any of these via
  # ``GatewayConfig.approval_policy.require_approval`` — empty by
  # default for this scenario, so calls pass through unchallenged. ---
  - module: agentm.extensions.builtin.tool_bash
  - module: agentm.extensions.builtin.tool_edit
  - module: agentm.extensions.builtin.tool_write
  - module: agentm.extensions.builtin.tool_propose_change

  # --- meta-tools: agent can self-extend by installing new atoms.
  # Source lands at ``<cwd>/.agentm/atoms/<name>.py`` and the scenario
  # loader auto-merges that directory on every session start, so the
  # agent's installs persist across restarts without editing this
  # manifest. ``tool_propose_change`` is still the path for *modifying*
  # existing atoms with eval evidence; this pair is the lightweight
  # path for adding/removing helpers on demand. ---
  - module: agentm.extensions.builtin.tool_list_atoms
  - module: agentm.extensions.builtin.tool_install_atom
  - module: agentm.extensions.builtin.tool_unload_atom

  # --- skills: SKILL.md auto-discovery so feishu-cli (and any future
  # Feishu-shaped skill the operator drops into .claude/skills/) is
  # picked up. Rely on Claude Code-style skill format. ---
  - module: agentm.extensions.builtin.skill_loader

  # --- prompt templates + system prompt suited to a chat surface ---
  - module: agentm.extensions.builtin.prompt_templates
  - module: agentm.extensions.builtin.system_prompt
    config:
      prompt: |
        You are talking to a user inside a Feishu / Lark chat. Speak
        like a coworker: short, concrete, low ceremony. No headers or
        bulleted lists when one or two sentences suffice. State results
        and decisions directly; skip running summaries of your own
        thinking.

        When the user wants you to operate Feishu resources (their
        calendar / messages / docs / bitable), invoke `lark-cli`
        through `bash` — see the `feishu-cli` skill for usage rules,
        identity model (`--as user` vs `--as bot`), and write-call
        safety. Read schemas with `lark-cli schema <api>` rather than
        guessing argument shape.

        You have full read and write access to the workspace via
        bash, edit, write, and propose_change. No approval cards by
        default — execute when the request is clear. Still: announce
        non-trivial fan-out writes (mass renames, recursive deletes,
        long-running scripts) before launching them, and never paste
        credentials or token values back into the chat.

  # --- runtime facts: workspace cwd + host platform. Listed AFTER
  # ``system_prompt`` so its prepend runs last under EventBus FIFO,
  # placing the runtime block at the very top of the assembled
  # system prompt. See `.claude/designs/runtime-context-atom.md`. ---
  - module: agentm.extensions.builtin.runtime_context

  # --- observability: every chat turn lands in the JSONL trace so
  # operators can review what the agent actually did. ---
  - module: agentm.extensions.builtin.observability

# Surfaces verbatim on session.fingerprint.task_meta.task_class so
# trace-filtering / eval pipelines can isolate Feishu-driven traffic.
task_class: feishu_chat
