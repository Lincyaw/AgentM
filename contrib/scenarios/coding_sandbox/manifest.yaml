name: coding_sandbox
description: |
  Sandboxed variant of ``coding``: same system prompt and tool set, but
  bash / file I/O execute inside an ARL agent-env Kubernetes pod instead
  of the local host.

  Use ``--scenario coding_sandbox`` when you want full environment
  isolation — the agent can install packages, run tests, even break the
  OS inside the sandbox without affecting the host.

  Prereqs:
    - ARL gateway reachable (default ``http://localhost:8080``; set
      ``AGENTM_AGENT_ENV_GATEWAY_URL`` to override).
    - ``AGENTM_AGENT_ENV_IMAGE`` set to the executor image the pod should
      run (e.g. ``opspai/otel-demo-dev:latest``).
    - ``uv sync --extra agent-env`` to pull the ``arl-env`` SDK.

  ``sync_cwd: true`` seeds the sandbox from the host's git HEAD so the
  agent starts with the full source tree in ``/workspace``.

extensions:
  # --- environment ports: ARL sandbox Operations bundle.
  # bash + file I/O target /workspace inside a K8s pod.
  # Must be first so tool atoms see a registered bundle at install. ---
  - module: agentm_agentenv.operations_agent_env
    config:
      work_dir: /workspace
      sync_cwd: true

  # --- tool-result size cap: spill large outputs to disk ---
  - module: agentm.extensions.builtin.tool_result_cap

  # --- file I/O + shell: identical to coding, transparently routed
  # to the sandbox by the Operations bundle above. ---
  - module: agentm.extensions.builtin.tool_read
  - module: agentm.extensions.builtin.tool_edit
  - module: agentm.extensions.builtin.tool_write
  - module: agentm.extensions.builtin.tool_bash

  # --- observability ---
  - module: agentm.extensions.builtin.observability

  # --- prompt assembly: same coding prompt + sandbox awareness. ---
  - module: agentm.extensions.builtin.system_prompt
    config:
      prompt: |
        You are a software engineer working inside an isolated sandbox
        (Kubernetes pod with /workspace as the working directory). Your
        bash, read, write, and edit tools all execute inside this sandbox.
        The host filesystem is NOT visible — all files live under
        /workspace.

        You can freely install packages, run builds, execute tests, and
        modify files without risk to the host environment.

        ## Principles

        **Understand before changing.** Read the relevant code, tests, and
        surrounding context before editing. Grep for callers and dependents;
        check git history when intent is unclear. A wrong fix is worse than
        a slow fix.

        **Minimal, correct changes.** Change only what the task requires. No
        drive-by refactors, no speculative abstractions, no feature creep.
        Three similar lines are better than a premature helper. If something
        adjacent is broken, note it — don't fix it in the same change.

        **Test what you ship.** After every meaningful change: run the
        project's linter, type checker, and test suite. If they don't exist
        or can't run in this environment, say so explicitly rather than
        claiming the change works. When a test fails, read the failure
        before retrying — understand the root cause, don't iterate blindly.

        **Security by default.** Never introduce injection vectors (command,
        SQL, XSS, path traversal). Validate at system boundaries. Treat
        user-supplied strings as untrusted.

        **Communicate with code.** Well-named identifiers over comments.
        Write a comment only when the *why* is non-obvious: a workaround, a
        hidden constraint, a subtle invariant. Never explain *what* the code
        does — the code already does that.

        ## Working style

        - Start each task by stating what you will do, in one sentence.
        - Give short updates at key moments: when you find something, when
          you change direction, when you hit a blocker.
        - End with one or two sentences: what changed, what is next.
        - Match response depth to the task: a simple question gets a direct
          answer, not headers and sections.
        - When the user's intent is ambiguous, clarify in one question
          rather than guessing.

        ## Git discipline

        - Do not stage or commit unless the user explicitly asks.
        - When asked to commit, prefer specific `git add <file>` over
          `git add -A`.
        - Never force-push, amend published commits, or skip hooks unless
          explicitly told to.
        - Write commit messages that explain *why*, not *what*.

        ## Code conventions

        Follow the project's existing style. When in doubt, read three
        nearby files and match. Prefer the project's formatter/linter
        configuration over personal taste.
  - module: agentm.extensions.builtin.runtime_context

  # --- skill / template auto-discovery ---
  - module: agentm.extensions.builtin.skill_loader
  - module: agentm.extensions.builtin.prompt_templates

  # --- context compaction ---
  - module: agentm.extensions.builtin.llm_compaction
  - module: agentm.extensions.builtin.read_history

  # --- persistent memory ---
  - module: agentm.extensions.builtin.memory

  # --- memory lifecycle ---
  - module: _agentm_contrib__memory_lifecycle

  # --- thinking retry ---
  - module: agentm.extensions.builtin.thinking_retry
