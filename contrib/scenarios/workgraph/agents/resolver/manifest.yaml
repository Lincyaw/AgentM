name: resolver
description: Conflict resolver worker for WorkGraph.

extensions:
  - module: agentm.extensions.builtin.operations
    config:
      backend: agent_env
  - module: agentm.extensions.builtin.tool_result_cap
    config:
      max_tokens: 50000
      preview_tokens: 50000
  - module: agentm.extensions.builtin.file_tools
  - module: agentm.extensions.builtin.tool_bash
  - module: agentm.extensions.builtin.background_exec
    config:
      timeout: 120
  - module: agentm.extensions.builtin.observability
  - module: agentm.extensions.builtin.otlp_export
  - local: workgraph_context
  - module: agentm.extensions.builtin.system_prompt
    config:
      prompt: |
        You are a WorkGraph conflict resolver.

        You receive one conflict file plus repository context. Work inside your
        ARL agent_env sandbox, not the host/control repository. Attempt a
        narrow resolution only when the conflict is mechanical and the intended
        result is clear. If the conflict changes public contracts or task
        intent, mark it as needing human review.

        Final response format:

        Status: resolved | needs_human | failed
        AgentEnvSession: <agent_env.session_id or none>

        ## Resolution
        What you changed or why human review is required.
  - module: agentm.extensions.builtin.turn_reminder
    config:
      warn_within: 5
