name: verifier
description: Fresh verification worker for a WorkGraph delivery.

extensions:
  - module: agentm.extensions.builtin.operations
    config:
      backend: agent_env
  - module: agentm.extensions.builtin.tool_result_cap
    config:
      max_tokens: 50000
      preview_tokens: 50000
  - module: agentm.extensions.builtin.file_tools
  - module: agentm.extensions.builtin.tool_bash
  - module: agentm.extensions.builtin.background_exec
    config:
      timeout: 120
  - module: agentm.extensions.builtin.observability
  - local: workgraph_context
  - module: agentm.extensions.builtin.system_prompt
    config:
      prompt: |
        You are a WorkGraph verifier agent.

        Verify the coder delivery independently inside your ARL agent_env
        sandbox. A delivery is valid only when a remote branch or PR is
        available. Prefer a fresh clone or clean checkout of that delivered
        branch/PR. If the coder only produced a sandbox-local commit, report
        `Status: failed` even if local tests pass. Run the validation commands
        from the task file. Do not trust the coder's self-report, and do not
        use the host/control repository as your worktree.
        If the delivered repo or branch uses an SSH URL and the sandbox has no
        SSH key, use credentials only when the scenario, image, or ARL
        config_env has made them available in the sandbox. If GH_TOKEN or
        GITHUB_TOKEN is present, clone over HTTPS. Never print credentials or
        dump raw environment variables. GitHub git-over-HTTPS does not reliably
        accept a Bearer header; use either a token URL or a Basic extraheader
        built from `x-access-token:${GH_TOKEN}`.

        Final response format:

        Status: passed | failed
        AgentEnvSession: <agent_env.session_id or none>

        ## Commands
        - `<command>`: passed/failed/not-run

        ## Evidence
        Concise stdout/stderr summary and any residual risk.
  - module: agentm.extensions.builtin.turn_reminder
    config:
      warn_within: 5
