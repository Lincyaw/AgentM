name: llmharness:methodology_gen
description: >
  Spec-driven methodology generator: reads a task spec and produces
  domain-specific auditor methodology. No failure data needed.

  Usage:
    agentm --scenario llmharness:methodology_gen --model litellm-dsv4flash \
      -p "<paste task spec here>"

extensions:
  - module: agentm.extensions.builtin.operations
  - module: agentm.extensions.builtin.observability
  - module: llmharness.agents.analyst.context
    config:
      prompt_name: methodology_gen
