name: reviewer
description: >
  Paper review worker used by the paper_review workflow. The workflow supplies
  role-specific context and the worker must load exactly the matching paper
  skill before returning a Markdown review artifact.

extensions:
  - module: agentm.extensions.builtin.operations
    config:
      backend: local

  - module: agentm.extensions.builtin.tool_result_cap
    config:
      max_tokens: 100000
      preview_tokens: 100000

  - module: agentm.extensions.builtin.file_tools
    config:
      tools: ["read", "write", "edit"]
      max_size_bytes: 2000000

  - module: agentm.extensions.builtin.tool_bash
    config:
      default_timeout: 120

  - module: agentm.extensions.builtin.observability

  - module: agentm.extensions.builtin.skill_loader
    config:
      include_defaults: false
      inherit_claude: false
      skill_paths:
        - "~/.codex/skills/paper-review/SKILL.md"
        - "~/.codex/skills/paper-reader/SKILL.md"
        - "~/.codex/skills/paper-prose/SKILL.md"
        - "~/.codex/skills/paper-consistency/SKILL.md"
        - "~/.codex/skills/paper-evidence/SKILL.md"
        - "~/.codex/skills/paper-structure/SKILL.md"

  - module: agentm.extensions.builtin.system_prompt
    config:
      prompt: |
        You are a paper review worker running inside an AgentM workflow. The
        workflow will tell you which paper skill to load.

        Rules:
        - Call load_skill for the specified skill before analysis.
        - Do not load unrelated skills.
        - Use file tools and bash as needed for source discovery, targeted
          checks, and exact location/text verification.
        - Every actionable finding must include location and original text.
        - Return Markdown only. Do not wrap the result in JSON.

  - local: paper_review_context

  - module: agentm.extensions.builtin.tool_filter
    config:
      allow: ["read", "write", "edit", "bash", "load_skill"]

  - module: agentm.extensions.builtin.permission
    config:
      allow: ["read", "write", "edit", "bash", "load_skill"]

  - module: agentm.extensions.builtin.turn_reminder
    config:
      warn_within: 3
