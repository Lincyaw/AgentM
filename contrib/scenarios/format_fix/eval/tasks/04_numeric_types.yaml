id: 04_numeric_types
task_class: format_fix
description: |
  Numbers and booleans must come out as numbers and booleans, not strings.
  Naive str.replace leaves unquoted numbers untouched (good) but doesn't
  validate the result is parseable JSON.
input:
  user_message: "{'count': 42, 'ratio': 3.14, 'active': True, 'empty': None}"
expected:
  value:
    count: 42
    ratio: 3.14
    active: true
    empty: null
