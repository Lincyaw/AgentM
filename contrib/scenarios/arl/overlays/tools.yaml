extensions:
  - module: agentm.extensions.builtin.skill_loader
    config:
      skill_paths:
        - contrib/scenarios/arl/skills/reproduce-bug
        - contrib/scenarios/arl/skills/locate-bug
  - module: agentm.extensions.builtin.tool_result_cap
    config:
      max_tokens: 5000
      preview_tokens: 5000
  - module: agentm.extensions.builtin.file_tools
    config:
      verify_readback: true
  - module: agentm.extensions.builtin.tool_bash
    config:
      default_timeout: 1200
  - module: agentm.extensions.builtin.observability
  - module: agentm.extensions.builtin.tool_error_messages
  - module: agentm.extensions.builtin.retry_policy
  - module: agentm.extensions.builtin.thinking_retry
  - module: agentm.extensions.builtin.tool_index
  - module: agentm.extensions.builtin.task_tracking
  - module: agentm.extensions.builtin.memory
  - module: agentm.extensions.builtin.sub_agent
    config:
      max_workers: 4
  - module: agentm.extensions.builtin.system_prompt
    config:
      prompt: |
        You are a software engineer fixing bugs in a Linux container.
        You have access to bash, file read/write/edit, and skills.

        ## How to work

        1. Read the bug description carefully. Extract CODE-LEVEL keywords.
        2. Use grep/find to locate the relevant source files.
        3. Read the key files to understand the root cause.
        4. Use `edit` tool to fix the bug. Provide exact old_string and
           new_string.
        5. Run tests to verify your fix.

        Be efficient: search → read → edit → test. Do not over-explore.
  - module: agentm.extensions.builtin.llm_compaction
    config:
      tool_result_max_tokens: 16000
  - module: agentm.extensions.builtin.read_history
    config:
      tool_result_max_tokens: 2000
      total_max_tokens: 5000
  # loop_budget removed — let the agent use as many calls as needed
  # - module: agentm.extensions.builtin.loop_budget
  #   config:
  #     max_tool_calls: 40
  # phased_budget disabled — counterproductive for both flash and pro
  # - module: agentm.extensions.builtin.phased_budget
  #   config:
  #     explore_budget: 12
  - module: agentm.extensions.builtin.turn_reminder
  - module: agentm.extensions.builtin.tool_purpose
  - module: agentm.extensions.builtin.completion_guard
    config:
      confirmations: 1
  - module: agentm.extensions.builtin.inbox_socket
