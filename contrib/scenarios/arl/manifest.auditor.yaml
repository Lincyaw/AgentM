name: arl:auditor
description: Baseline + async llmharness auditor with trajectory index.

includes:
  - overlays/base.yaml

extensions:
  - module: llmharness.atom
    config:
      mode: async
      audit_interval_turns: 10
      auditor_prompt: swe
      auditor_model: litellm-dsv4flash
      enable_reminders: true
      enable_methodology: false
      enable_index: true
      index_model: local-indexer
