name: arl:full
description: Full oversight stack — adapt + goal + async llmharness auditor.

includes:
  - overlays/base.yaml

extensions:
  - module: agentm.extensions.builtin.adapt
  - module: agentm.extensions.builtin.tool_index
  - module: llmharness.atom
    config:
      mode: async
      audit_interval_turns: 10
      auditor_prompt: swe
      auditor_model: litellm-dsv4flash
      enable_reminders: true
      enable_methodology: false
      enable_index: true
      index_model: local-indexer
  - module: agentm.extensions.builtin.goal
    config:
      auto_init: true
      auto_init_scenario: arl:goal_deriver
      auto_init_max_turns: 60
      checker_scenario: arl:goal_checker
      checker_max_turns: 15
