name: arl:index_audit
description: Baseline + index-grounded auditor that fires on finish.

includes:
  - overlays/base.yaml

extensions:
  - module: llmharness.atom
    config:
      mode: sync
      enable_index: true
      index_vocabulary: coding
      enable_auditor: true
      enable_reminders: true
      audit_on_finish: true
      auditor_prompt: index
