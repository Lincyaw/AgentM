name: arl:harness_methgen
description: Sync llmharness auditor + auto-generated methodology.

includes:
  - overlays/base.yaml
  - overlays/tools.yaml

extensions:
  - module: llmharness.atom
    config:
      mode: sync
      audit_interval_turns: 5
      auditor_prompt: swe
      enable_reminders: true
      enable_methodology: true
      methodology_model: litellm-dsv4flash
