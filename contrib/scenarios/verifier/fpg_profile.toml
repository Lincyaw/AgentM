# Vocabulary profile for the verifier testbed family (chaos-injected
# microservice benchmarks: hs / otel-demo / clickhouse pedestals).
#
# The verifier natively produces fpg scenarios: hop agents classify the
# observed symptom with one of these predicates (enforced as the enum of
# submit_hop_verdict), edges carry these mechanisms, and the final
# fpg_scenario.json is validated against the schema this profile binds:
#
#     schema = build_schema(load_profile("contrib/scenarios/verifier/fpg_profile.toml"))
#
# Conventions: values are lowercase snake_case; "other" is reserved and
# auto-injected by the fpg factory as the escape hatch.

name = "microservices"
version = "0.4.0"
extends = "core"

# --- node predicates ----------------------------------------------------------
# Failure modes a service can exhibit. Organised in three layers:
#
#   Resource / environment — what physically happened (typical on seeds)
#   Application behaviour  — what the service's responses look like
#   Propagation effect     — patterns that emerge across the dependency chain

# -- Resource / environment layer --

[node_predicates.process_killed]
brief = "Service process terminated, not running"

[node_predicates.network_partitioned]
brief = "Process running but network completely severed"

[node_predicates.network_degraded]
brief = "Network path quality reduced (added delay, packet loss, corruption, bandwidth limit)"

[node_predicates.cpu_saturated]
brief = "CPU fully consumed, all request handling starved"

[node_predicates.memory_exhausted]
brief = "Memory under sustained pressure or OOM"

[node_predicates.gc_pressure]
brief = "GC storms causing repeated stop-the-world pauses"

[node_predicates.dns_broken]
brief = "DNS resolution fails or returns wrong addresses"

[node_predicates.clock_skewed]
brief = "System clock offset relative to the cluster"

# -- Application behaviour layer --

[node_predicates.latency_degraded]
brief = "Specific request paths slow, local resources normal"

[node_predicates.error_rate_elevated]
brief = "Error rate higher than normal (timeouts, connection refused, exceptions)"

[node_predicates.data_corrupted]
brief = "Output data incorrect without explicit errors"

# -- Propagation effect layer --

[node_predicates.flow_interrupted]
brief = "A specific request path through this service stopped; other endpoints healthy"

[node_predicates.resource_pool_exhausted]
brief = "Thread or connection pool fully occupied; all endpoints slow despite normal CPU/memory"

[node_predicates.traffic_amplification]
brief = "Abnormal request volume surge (retry storms, failover stampede)"

# --- edge mechanisms ----------------------------------------------------------
# Mapped deterministically from the relationship type of the verified
# edge (REL_MECHANISM in lib/fpg.py).

[edge_mechanisms.sync_call_blocking]
brief = "Degraded callee blocks its callers through synchronous calls (callee -> caller)"

[edge_mechanisms.request_flow_disruption]
brief = "Faulty caller distorts the request flow its callees receive (caller -> callee)"

[edge_mechanisms.co_deployment_contention]
brief = "Services on the same k8s node contend for node resources affected by the fault"

[edge_mechanisms.shared_infra_dependency]
brief = "Degradation transfers through a shared backing component (DB/cache/broker)"

# --- entity types ---------------------------------------------------------------
# The verifier works at service granularity; backing components
# (mysql, mongodb-profile, ...) are also addressed as services.

[entity_types.svc]
brief = "A service in the benchmark system, instrumented or backing (e.g. svc:frontend, svc:mongodb-profile)"
