name: audit
description: >
  Parallel audit agents for verifier two-pass + exploration control.
  Roles: reachability (seed -> entry), coverage (entry alarm -> seed),
  and free exploration. Each produces re-dispatch requests, never graph
  edits.

extensions:
  - module: agentm.extensions.builtin.operations
    config:
      backend: local
  - module: agentm.extensions.builtin.retry_policy
  - module: rca.default.duckdb_sql
    config:
      exclude:
        - conclusion.parquet
      token_limit: 10000
  - local: audit_context
  - module: agentm.extensions.builtin.observability
  - module: agentm.extensions.builtin.tool_index
  - module: agentm.extensions.builtin.turn_reminder
    config:
      warn_within: 5
  - module: agentm.extensions.builtin.system_prompt
    config:
      prompt_file: prompts/audit.md
