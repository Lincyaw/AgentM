name: seed
description: >
  Verify that a fault injection actually took effect on its target
  service. Queries normal vs abnormal data to confirm degradation
  and discover the actual failure mode.

extensions:
  - module: agentm.extensions.builtin.operations
    config:
      backend: local
  - module: agentm.extensions.builtin.retry_policy
  - module: rca.default.duckdb_sql
    config:
      exclude:
        - conclusion.parquet
      token_limit: 10000
  - local: seed_finalize
  - module: agentm.extensions.builtin.observability
  - module: agentm.extensions.builtin.tool_index
  - module: agentm.extensions.builtin.turn_reminder
    config:
      warn_within: 5
  - module: agentm.extensions.builtin.system_prompt
    config:
      prompt_file: prompts/seed.md
