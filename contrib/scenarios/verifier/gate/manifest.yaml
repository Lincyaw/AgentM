name: gate
description: >
  Completeness gate for verifier discovery agents. Reviews one seed or
  hop result, including its evidence and optional child trajectory, and
  decides whether the local investigation is complete enough to reduce.

extensions:
  - module: agentm.extensions.builtin.operations
    config:
      backend: local
  - module: agentm.extensions.builtin.retry_policy
  - module: rca.default.duckdb_sql
    config:
      exclude:
        - conclusion.parquet
      token_limit: 10000
  - local: gate_context
  - module: agentm.extensions.builtin.observability
  - module: agentm.extensions.builtin.tool_index
  - module: agentm.extensions.builtin.turn_reminder
    config:
      warn_within: 5
  - module: agentm.extensions.builtin.system_prompt
    config:
      prompt_file: prompts/gate.md
