# Cognitive-audit overlay: llmharness adapter in synchronous mode.
# Extractor + auditor fire every 5 main-agent turns; auditor reminders
# are disabled by default (opinions-only). To enable reminder injection,
# override enable_reminders in the consuming manifest's extensions.
extensions:
  - module: llmharness.atom
    config:
      mode: sync
      extractor_interval_turns: 5
      audit_interval_turns: 5
      enable_reminders: false
