# Shared investigator stack: operations + SQL + finalize + observability +
# rcabench contract + prompt loader (investigator.md, single-agent mode).
# Used by baseline and harness strategies.
extensions:
  - module: agentm.extensions.builtin.operations
    config:
      backend: local
  - module: rca.default.duckdb_sql
    config:
      exclude:
        - conclusion.parquet
  - module: rca.default.finalize
  - module: agentm.extensions.builtin.observability
  - module: rca.default.rcabench_contract
  - module: rca.default.prompt_loader
    config:
      prompt: default/default.md
      personas: false
  - module: agentm.extensions.builtin.tool_index
