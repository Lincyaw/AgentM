name: rca:hfsm
description: >-
  Falsification-gated, hypothesis-driven RCA scenario (Phase 2). Sibling — not
  replacement — of contrib/scenarios/rca/. The atom stack is composed in
  dependency order: the store publishes the write-handle token first; the
  4 LLM-native judges register their ``rca.judge.*`` services; the gate
  claims the handle and starts emitting rca.graph.mutated; the evidence
  tools route every mutation through the gate; the observation cache wraps
  idempotent tools at agent_start; the FSM policy subscribes to graph
  mutations and injects per-state prompt fragments; the brief builder and
  finalize atom complete the L2/L3 surface. Data-access (``duckdb_sql``)
  is reused verbatim from the existing rca/ scenario per design §13 — the
  investigator must be able to query parquet fixtures.

extensions:
  # --- environment port (local FS + asyncio bash). Listed first so any later
  # atom that needs ``api.get_operations()`` finds it published.
  - module: agentm.extensions.builtin.operations_local

  # --- L1 store. Publishes ``rca.hgraph.read`` + a one-shot
  # ``rca.hgraph.write_token`` the gate claims at install time.
  - module: agentm_rca.hfsm.atoms.rca_hgraph_store

  # --- LLM-native judges (Phase 2). Each atom registers exactly one
  # ``rca.judge.<kind>`` service. The gate's install fetches all four,
  # so the judges MUST install before the gate. ``mode: llm`` is the
  # production default; tests substitute Phase-1 mimic judges via the
  # fixture in tests/_gate_fixtures.py. No ``config.model`` override —
  # the LLM judge falls through to ``api.provider`` so a single model
  # change in ``.env`` re-points every judge.
  - module: agentm_rca.hfsm.atoms.judge_satisfied
    config:
      mode: llm
  - module: agentm_rca.hfsm.atoms.judge_coverage
    config:
      mode: llm
  - module: agentm_rca.hfsm.atoms.judge_independence
    config:
      mode: llm
  - module: agentm_rca.hfsm.atoms.judge_falsified_genuinely
    config:
      mode: llm
  # C5 — investigation-genuine judge. Consulted by rca_finalize at
  # submit_final_report time (not by the gate). Mounted alongside the
  # other 4 judges so the worker-inherit list stays a single block.
  - module: agentm_rca.hfsm.atoms.judge_investigation_genuine
    config:
      mode: llm

  # --- single writer of the graph. Must install AFTER the store so the
  # token claim succeeds, AFTER the judges so it can resolve their
  # ``rca.judge.*`` services at install time, and BEFORE every tool
  # atom so the tools can resolve ``rca.gate``.
  - module: agentm_rca.hfsm.atoms.rca_falsification_gate

  # --- LLM-facing tool surface (record_symptom / record_observation /
  # propose_hypothesis / attach_check / propose_update).
  - module: agentm_rca.hfsm.atoms.rca_evidence_tools

  # --- L1 memoization. Wraps idempotent tools at AgentStartEvent; the
  # evidence tools register with ``idempotent=False`` and pass through.
  - module: agentm_rca.hfsm.atoms.rca_observation_cache

  # --- behavioural spine. Subscribes to ``rca.graph.mutated``; injects
  # per-state prompt fragments via BeforeAgentStartEvent; filters the
  # visible tool catalog on FINALIZE.
  - module: agentm_rca.hfsm.atoms.rca_fsm_policy

  # --- worker brief construction (L2 → L3 boundary).
  - module: agentm_rca.hfsm.atoms.rca_brief_builder

  # --- the only legal exit from FINALIZE; coverage-gated submit_final_report.
  - module: agentm_rca.hfsm.atoms.rca_finalize

  # --- data-access for the orchestrator. Reused verbatim from
  # contrib/scenarios/rca/manifest.yaml — same exclude rule so the
  # ground-truth ``conclusion.parquet`` (when present in a fixture
  # directory) cannot be queried to shortcut the eval. ``data_dir``
  # falls through to the ``AGENTM_RCA_DATA_DIR`` env var which the
  # eval harness sets per-case.
  - module: agentm_rca.tools.duckdb_sql
    config:
      exclude:
        - conclusion.parquet

  # --- observability sink (JSONL OTLP via the Event.to_otel pipeline). ---
  - module: agentm.extensions.builtin.observability

  # --- L3 worker dispatch. The investigator persona uses dispatch_agent
  # to fan out verification briefs (built by rca_brief_builder) onto
  # ephemeral worker sessions. Worker-side inheritance MUST preserve
  # the same dependency order as the orchestrator: store → judges →
  # gate → evidence tools, plus duckdb_sql so workers can actually
  # gather evidence, plus worker_finalize so they can terminate
  # cleanly via ``return_response`` (otherwise they loop until budget
  # exhaustion and the orchestrator sees no observations).
  - module: agentm.extensions.builtin.sub_agent
    config:
      max_workers: 2
      inherit_extensions:
        - operations_local
        - rca_hgraph_store
        - judge_satisfied
        - judge_coverage
        - judge_independence
        - judge_falsified_genuinely
        - judge_investigation_genuine
        - rca_falsification_gate
        - rca_evidence_tools
        - duckdb_sql
        - observability
        - worker_finalize
      available_inherited_extensions:
        operations_local:
          module: agentm.extensions.builtin.operations_local
        rca_hgraph_store:
          module: agentm_rca.hfsm.atoms.rca_hgraph_store
        judge_satisfied:
          module: agentm_rca.hfsm.atoms.judge_satisfied
        judge_coverage:
          module: agentm_rca.hfsm.atoms.judge_coverage
        judge_independence:
          module: agentm_rca.hfsm.atoms.judge_independence
        judge_falsified_genuinely:
          module: agentm_rca.hfsm.atoms.judge_falsified_genuinely
        judge_investigation_genuine:
          module: agentm_rca.hfsm.atoms.judge_investigation_genuine
        rca_falsification_gate:
          module: agentm_rca.hfsm.atoms.rca_falsification_gate
        rca_evidence_tools:
          module: agentm_rca.hfsm.atoms.rca_evidence_tools
        duckdb_sql:
          module: agentm_rca.tools.duckdb_sql
        observability:
          module: agentm.extensions.builtin.observability
        worker_finalize:
          module: agentm_rca.tools.worker_finalize

  # --- system prompt. Empty body — the FSM policy atom injects per-state
  # fragments via BeforeAgentStartEvent so the live prompt always reflects
  # the current trace state. The investigator persona file (agents/) is
  # surfaced separately by sub_agent dispatch, not as the orchestrator's
  # opening message.
  - module: agentm.extensions.builtin.system_prompt
    config:
      prompt: ""
