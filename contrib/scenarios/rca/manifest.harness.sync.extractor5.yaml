name: rca:harness.sync.extractor5
description: Extractor-only variant (no auditor); extractor fires every 5 turns.
task_class: rca_baseline

includes:
  - overlays/base-investigator.yaml
  - overlays/runtime-context.yaml

extensions:
  - module: llmharness.atom
    config:
      mode: sync
      extractor_interval_turns: 5
      audit_interval_turns: 5
      extractor_tool_call_budget: 10
      enable_auditor: false
      enable_reminders: false
