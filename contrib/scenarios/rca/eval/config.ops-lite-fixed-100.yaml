# Frozen 50-sample ops-lite eval — the exact case set used to baseline
# AgentM ``rca:harness.sync`` (Doubao-Seed-2.0-pro, 5-way concurrent
# rollout) on 2026-05-11. Re-run this config after every strategy
# iteration so before/after metrics are directly comparable.
#
# The 50 case names live in
# ``contrib/scenarios/rca/eval/fixtures/ops-lite-fixed-100.txt`` and are
# stamped onto ``data.tags`` as ``ops-lite-fixed-100`` by
# ``scripts/retag_fixed_set.py``. This config simply filters by that
# tag — no list-of-sources knob is needed in rcabench-platform.
#
# One-liner:
#   bash contrib/scenarios/rca/eval/scripts/rerun_opslite_fixed_50.sh
#
# Or manually:
#   set -a; source .env; set +a
#   export RCA_DATASET_ROOT=$PWD/datasets/ops-lite/cases \
#          MODEL_NAME=Doubao-Seed-2.0-pro \
#          JUDGE_MODEL=Doubao-Seed-2.0-pro
#   uv run python contrib/scenarios/rca/eval/scripts/retag_fixed_set.py
#   envsubst < contrib/scenarios/rca/eval/config.ops-lite-fixed-100.yaml \
#     > /tmp/opslite-fixed-50.yaml
#   uv run rca llm-eval run /tmp/opslite-fixed-50.yaml \
#     -a agentm --ak scenario=rca:harness.sync \
#     -n 5 --exp-id agentm-rca-opslite-fixed-50-<your_strategy_tag>

exp_id: "agentm-rca-opslite-fixed-50-baseline"
agent_type: "agentm"
model_name: "${MODEL_NAME}"

data:
  dataset: "ops-lite"
  type: "single"
  question_field: "question"
  gt_field: "answer"
  # The fixed-50 tag is the contract — drift between the on-disk
  # fixture file and the DB is impossible because retag_fixed_set.py
  # idempotently strips the tag from any non-fixture row.
  tags: ["ops-lite-fixed-100"]

source_path: "${RCA_DATASET_ROOT}"
source_path_pattern: "{source_path}/{source}"

concurrency: 5
judge_concurrency: 5

judge_model:
  model_provider:
    type: "chat.completions"
    model: "${JUDGE_MODEL}"
    api_format: "openai"
    base_url: "${OPENAI_BASE_URL}"
    extra_query:
      warpgate-ticket: "${WARPGATE_TICKET}"
    verify_ssl: false
