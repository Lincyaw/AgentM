# DSv4pro baseline over ops-lite-clean (500 cases).
#
# Ingest first (idempotent):
#   uv run python contrib/scenarios/rca/eval/baseline/ingest_ops_lite_clean.py
#
# Run:
#   uv run rca llm-eval run \
#     contrib/scenarios/rca/eval/baseline/config_ops_lite_clean_dsv4pro.yaml \
#     -a agentm --ak scenario=rca:baseline --ak model=litellm-dsv4pro \
#     -n 15

exp_id: "dsv4pro-baseline-ops-lite-clean-500"
agent_type: "agentm"
model_name: "DeepSeek-V4-pro"

data:
  dataset: "ops-lite-clean"
  type: "single"
  question_field: "question"
  gt_field: "answer"
  tags: ["ops-lite-clean"]

concurrency: 15
judge_concurrency: 5

judge_model:
  model_provider:
    type: "chat.completions"
    model: "DeepSeek-V4-pro"
    api_format: "openai"
    base_url: "http://101.96.215.245:8088/v1"
    api_key: "sk-DLbuXPx8tzeb29atiigWEIXoU9P0xkh_2amQNqJHpMk"
    verify_ssl: false
