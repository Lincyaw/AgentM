name: rca:baseline.briefed
description: |
  ``rca:baseline`` with the investigator pre-briefed on auditor reminders.
  Identical tool surface and atom stack — only the system prompt differs:
  an "Automated review" section tells the agent that it will receive
  mid-investigation reminders and instructs it to change direction when
  one arrives, rather than simply acknowledging and continuing.

  Use with replay-fork to test whether explicit follow-instructions
  improve the agent's response to auditor interventions compared to the
  unbriefed baseline.

task_class: rca_baseline

extensions:
  - module: agentm.extensions.builtin.operations_local
  - module: agentm_rca.tools.thinkdepth_sql
  - module: agentm_rca.tools.finalize
  - module: agentm.extensions.builtin.observability
  - module: contrib.extensions.rcabench_contract
  - module: agentm_rca.prompt_loader
    config:
      prompt: investigator-briefed.md
      personas: false
