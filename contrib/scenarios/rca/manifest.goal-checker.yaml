name: rca:goal-checker
description: >
  Minimal RCA checker: SQL query tools + turn reminder for submit_verdict.
  No skills, no prompt injection — checker verifies, not investigates.

includes:
  - overlays/runtime-context.yaml

extensions:
  - module: agentm.extensions.builtin.operations
    config:
      backend: local
  - module: rca.default.duckdb_sql
    config:
      exclude:
        - conclusion.parquet
  - module: agentm.extensions.builtin.observability
  - module: agentm.extensions.builtin.turn_reminder
    config:
      finalize_tool: submit_verdict
      warn_within: 5
