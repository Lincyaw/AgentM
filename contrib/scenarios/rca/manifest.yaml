name: rca
description: Root-cause analysis over parquet observability data via DuckDB SQL.
# NOTE: ``tool_eval_run`` (the generic eval runner) deliberately does NOT
# translate a task's ``input.fixtures[0]`` into ``AGENTM_RCA_DATA_DIR`` —
# that scenario-specific wire is RCA's responsibility. If we need to ferry
# per-task fixture paths into child eval sessions, add a small atom under
# ``contrib/scenarios/rca/`` that pre-sets the env from the task YAML (or
# extend AgentSessionConfig with a child-env field).
extensions:
  # --- environment ports: register the local-FS / asyncio-bash Operations
  # bundle. Must be listed first because ``file_tools`` (below) and sub_agent
  # children consume ``api.get_operations()``. ---
  - module: agentm.extensions.builtin.operations
    config:
      backend: local

  # Orchestrator-side: the lead investigator now does the investigation
  # itself (single-critic flow). Earlier 3-persona dispatch caused error
  # cascades — biased subagent verdicts steered the orchestrator and the
  # role distinction (scout / deep_analyze / verify) was too thin to be
  # worth the routing overhead. The orchestrator carries the data tools
  # directly and only delegates ONE thing: adversarial review by `critic`.
  - module: agentm_rca.tools.hypothesis_tools
  - module: agentm_rca.tools.duckdb_sql
    config:
      exclude:
        - conclusion.parquet
  - module: agentm_rca.tools.finalize
  - module: agentm.extensions.builtin.artifact_store
  - module: agentm.extensions.builtin.observability
  - module: agentm_rca.worker_skills
  - module: agentm.extensions.builtin.skill_loader
    config:
      include_defaults: false
      inherit_claude: false
  - module: agentm.extensions.builtin.file_tools
    # ``read`` is exposed only to drill into the diagnose-sql / rca-worker
    # SKILL.md body files. Lock the path scope so the agent cannot reach
    # ground-truth labels co-located with eval data
    # (``dataset/<case>/label.txt``, ``injection.json``, ``causal_graph.json``)
    # via ``read("/abs/path/...")`` and shortcut the eval.
    config:
      allow_globs:
        - contrib/scenarios/rca/skills/**
  - module: contrib.extensions.rcabench_contract

  # Multi-agent wiring. ``prompt_loader`` (shared with rca:baseline) loads
  # ``prompts/orchestrator.md`` into the system prompt; ``personas: true``
  # also appends the available-agents block and answers
  # ``ResolveSubagentEvent.CHANNEL`` for the personas under ``agents/``
  # (now only ``critic``).
  - module: agentm_rca.prompt_loader
    config:
      prompt: orchestrator.md
      personas: true
  - module: agentm.extensions.builtin.system_prompt
    config:
      prompt: ""
  - module: agentm.extensions.builtin.sub_agent
    config:
      max_workers: 2
      inherit_extensions:
        - operations
        - duckdb_sql
        - artifact_store
        - observability
        # Critic-only skills: ``worker_skills`` publishes the
        # ``contrib/scenarios/rca/skills/`` directory via
        # ``ResourcesDiscoverEvent``; ``skill_loader`` (builtin) reads
        # that hook and injects the diagnose-sql / rca-worker-guide
        # SKILL.md content into the critic's system prompt. ``file_tools``
        # lets the critic drill into the skill body files
        # (correlation.md, traces.md, ...).
        - worker_skills
        - skill_loader
        - file_tools
        # ``worker_finalize`` registers ``return_response`` — the only
        # sanctioned worker-termination tool. Without it, the critic
        # loops on query_sql until its budget runs out and ``final_text``
        # comes back null to the orchestrator.
        - worker_finalize
      available_inherited_extensions:
        operations:
          module: agentm.extensions.builtin.operations
        duckdb_sql:
          module: agentm_rca.tools.duckdb_sql
        artifact_store:
          module: agentm.extensions.builtin.artifact_store
        observability:
          module: agentm.extensions.builtin.observability
        worker_skills:
          module: agentm_rca.worker_skills
        skill_loader:
          module: agentm.extensions.builtin.skill_loader
        file_tools:
          module: agentm.extensions.builtin.file_tools
        worker_finalize:
          module: agentm_rca.tools.worker_finalize
