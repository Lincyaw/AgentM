name: rca
description: Root-cause analysis over parquet observability data via DuckDB SQL.
# NOTE: ``tool_eval_run`` (the generic eval runner) deliberately does NOT
# translate a task's ``input.fixtures[0]`` into ``AGENTM_RCA_DATA_DIR`` —
# that scenario-specific wire is RCA's responsibility. If we need to ferry
# per-task fixture paths into child eval sessions, add a small atom under
# ``contrib/scenarios/rca/`` that pre-sets the env from the task YAML (or
# extend AgentSessionConfig with a child-env field).
extensions:
  - module: agentm.extensions.builtin.operations
    config:
      backend: local
  - module: agentm_rca.hypothesis_tools
  - module: agentm_rca.duckdb_sql
    config:
      exclude:
        - conclusion.parquet
  - module: agentm_rca.finalize
  - module: agentm.extensions.builtin.artifact_store
  - module: agentm.extensions.builtin.observability
  - module: agentm_rca.worker_skills
  - module: agentm.extensions.builtin.skill_loader
    config:
      include_defaults: false
      inherit_claude: false
  - module: agentm_rca.rcabench_contract

  # Multi-agent wiring. ``prompt_loader`` (shared with rca:baseline) loads
  # ``prompts/orchestrator.md`` into the system prompt; ``personas: true``
  # also appends the available-agents block and answers
  # ``ResolveSubagentEvent.CHANNEL`` for the personas under ``agents/``
  # (now only ``critic``).
  - module: agentm_rca.prompt_loader
    config:
      prompt: orchestrator.md
      personas: true
  - module: agentm.extensions.builtin.system_prompt
    config:
      prompt: ""
  - module: agentm.extensions.builtin.sub_agent
    config:
      max_workers: 2
      inherit_extensions:
        - operations
        - duckdb_sql
        - artifact_store
        - observability
        - worker_skills
        - skill_loader
        # ``worker_finalize`` registers ``return_response`` — the only
        # sanctioned worker-termination tool. Without it, the critic
        # loops on query_sql until its budget runs out and ``final_text``
        # comes back null to the orchestrator.
        - worker_finalize
      available_inherited_extensions:
        operations:
          module: agentm.extensions.builtin.operations
        duckdb_sql:
          module: agentm_rca.duckdb_sql
        artifact_store:
          module: agentm.extensions.builtin.artifact_store
        observability:
          module: agentm.extensions.builtin.observability
        worker_skills:
          module: agentm_rca.worker_skills
        skill_loader:
          module: agentm.extensions.builtin.skill_loader
        worker_finalize:
          module: agentm_rca.worker_finalize
