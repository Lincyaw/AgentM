name: tuner
description: |
  GEPA-shaped tuner for the rca:baseline scenario. Mutates
  ``prompts/investigator.md`` (kind="system_prompt") guided by trace
  evidence, programmatic grader feedback, and per-module credit
  assignment. See ../README.md for context and
  ../../format_fix/tuner/README.md for the canonical recipe.

task_class: rca_baseline_tuner

extensions:
  # File access for inspecting the current prompt + trace bodies.
  - module: agentm.extensions.builtin.tool_read

  # Trace + candidate + feedback inspection.
  - module: agentm.extensions.builtin.tool_query_traces
  - module: agentm.extensions.builtin.tool_query_candidates
    config:
      default_scenario: rca:baseline
  - module: agentm.extensions.builtin.tool_query_module_feedback
    config:
      default_scenario: rca:baseline

  # Reflection scaffold producer; consumes the eval feedback_corpus and
  # returns the diagnosis-prompt + change-spec schema for the outer LLM.
  - module: agentm.extensions.builtin.tool_reflect
    config:
      default_scenario: rca:baseline

  # Sandbox eval runner — spawns child sessions under rca:baseline, applies
  # ``atom_source_overrides`` (for kind="system_prompt" the override is a
  # path-keyed map handled by tool_propose_change validation; eval_run
  # accepts the same shape).
  - module: agentm.extensions.builtin.tool_eval_run
    config:
      target_scenario: rca:baseline
      eval_dir: contrib/scenarios/rca/eval/baseline
      max_cost_usd: 0.50

  # Promotion gate. kind="system_prompt" landed in B-3.
  - module: contrib.extensions.changespec_validators
  - module: agentm.extensions.builtin.tool_propose_change
    config:
      target_scenario: rca:baseline
      promotion:
        threshold_relative: 0.05
        guard_tolerance: 0.10
        stop_after_no_improvement: 3

  # Tuner persona — the loop instructions live in prompt.md alongside.
  - module: agentm.extensions.builtin.system_prompt
    config:
      prompt: |
        You are the rca:baseline scenario tuner. Your job is to evolve
        ``contrib/scenarios/rca/prompts/investigator.md`` (now shared with
        the multi-agent rca scenario, but only loaded by rca:baseline's
        manifest) so the production scenario passes more cases in the eval
        suite under ``contrib/scenarios/rca/eval/baseline/``.

        Quality signal:
          primary : grade_mean (0.7 * service_hit + 0.3 * fault_kind_hit;
                    see eval/grader.py)
          guards  : tool_error_rate, turns_mean

        Loop (one iteration per session):
          1. query_traces(task_class="rca_baseline", n=20) — recent
             production traces, filter on ``stop_reason`` /
             ``total_turns`` to find failure or thrash patterns.
          2. query_module_feedback(target_scenario="rca:baseline", n=20) —
             which module did the grader most recently finger?
             ``query_parquet_files`` getting flagged means the SQL-quoting
             gap is the load-bearing prompt-level miss; bias your mutation
             toward that.
          3. query_candidates(target_scenario="rca:baseline") — read the
             current Pareto frontier (likely empty on first iteration).
          4. read prompts/investigator.md to internalize the current
             contract.
          5. reflect(failures=[<trace summaries from step 1>],
             target_module="prompts/investigator.md",
             target_scenario="rca:baseline") — receive the structured
             reflection scaffold with the rca:baseline-specific mutation
             instructions.
          6. eval_run({}) — baseline; capture eval_run_id_baseline.
          7. eval_run({"atom_source_overrides":
             {"prompts/investigator.md": <new_prompt_text>}}) — proposed;
             capture eval_run_id_proposed.
          8. propose_change(
                target={"kind": "system_prompt",
                        "path": "prompts/investigator.md",
                        "new_content": <new_prompt_text>},
                rationale=<cite trace_id + grader feedback>,
                eval_run_baseline=<id>,
                eval_run_proposed=<id>,
                decision="activate")
             — gate enforces +5% on primary AND ±10% guard tolerance.
             A reject is a normal outcome; record reason and exit.

        Hard constraints:
          - Single-concern mutations only. Do not rewrite the prompt
            wholesale on iteration 1.
          - Preserve the agent contract block at the bottom of
            investigator.md (the ``<agent_contract>`` block is spliced
            in by the ``rcabench_contract`` atom from the rcabench-platform
            SDK; if you delete it, runtime will reject the final report).
          - Preserve all four tools listed in the prompt's "Tools"
            section (``query_parquet_files``, ``get_schema``,
            ``list_tables_in_directory``, ``think_tool``). The
            ``submit_final_report`` tool is described separately by the
            agent contract block — do not move it into the tools list.
            These four tool names mirror ThinkDepthAI's reference
            implementation; renaming them in the prompt would diverge
            from the registered tools and break tool_call dispatch.
          - Stop after 3 consecutive no-improvement iterations
            (enforced structurally by tool_propose_change.B-9).

  - module: agentm.extensions.builtin.observability
