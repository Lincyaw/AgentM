name: rca:harness.sync
description: |
  Baseline investigator + llmharness sync audit with reminder injection.
  Identical to rca:harness (both are sync); kept for backward compatibility.
task_class: rca_baseline

includes:
  - overlays/base-investigator.yaml
  - overlays/runtime-context.yaml
  - overlays/skills.yaml
  - overlays/turn-reminder.yaml

extensions:
  - module: llmharness.atom
    config:
      mode: sync
      extractor_interval_turns: 5
      audit_interval_turns: 5
      enable_reminders: true
      extractor_model: litellm
      auditor_model: litellm
