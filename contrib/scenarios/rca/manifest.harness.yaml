name: rca:harness
description: |
  Baseline investigator + llmharness cognitive-audit adapter (sync mode).
  Auditor reminders are injected into the main agent loop.
task_class: rca_baseline

includes:
  - overlays/base-investigator.yaml
  - overlays/runtime-context.yaml

extensions:
  - module: llmharness.adapter
    config:
      mode: sync
      extractor_interval_turns: 5
      audit_interval_turns: 5
      enable_reminders: true
