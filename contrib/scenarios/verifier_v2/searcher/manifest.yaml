name: searcher
description: >
  Evidence searcher for fault propagation verification. Has DuckDB SQL
  access to case telemetry data. Submits structured evidence dossiers
  without making verdict judgments.

extensions:
  - module: agentm.extensions.builtin.operations
    config:
      backend: local
  - module: agentm.extensions.builtin.retry_policy
  - module: rca.default.duckdb_sql
    config:
      exclude:
        - conclusion.parquet
      max_tokens: 10000
  - module: agentm.extensions.builtin.structured_output
  - module: agentm.extensions.builtin.observability
  - module: agentm.extensions.builtin.tool_index
  - module: agentm.extensions.builtin.turn_reminder
    config:
      warn_within: 5
  - module: agentm.extensions.builtin.system_prompt
    config:
      prompt_file: prompts/searcher.md
