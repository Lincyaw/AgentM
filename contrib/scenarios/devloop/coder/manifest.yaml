name: coder
description: >
  Coding agent with file and shell access. Used for test writing,
  implementation, test running, and code review. Receives its task
  and context via atom_config (devloop_context atom).

extensions:
  - module: agentm.extensions.builtin.operations
    config:
      backend: local
  - module: agentm.extensions.builtin.tool_result_cap
  - module: agentm.extensions.builtin.file_tools
  - module: agentm.extensions.builtin.tool_bash
  - module: agentm.extensions.builtin.observability
  - module: agentm.extensions.builtin.system_prompt
    config:
      prompt: |
        You are a software developer. Read the context sections below
        for your specific assignment. Use the available tools to
        complete the task. Work in the current directory.
  - local: devloop_context

  - module: agentm.extensions.builtin.turn_reminder
    config:
      warn_within: 3
