name: interrupt_demo
description: |
  Demonstrates the SDK interrupt mechanism. Includes a slow_compute tool
  that cooperatively responds to cancellation signals. Use Ctrl+C during
  a running turn to test interrupt behavior.

extensions:
  - module: agentm.extensions.builtin.observability
  - module: agentm.extensions.builtin.operations
    config:
      backend: local
  - module: agentm.extensions.builtin.local_resources
  - module: agentm.extensions.builtin.retry_policy
  - module: agentm.extensions.builtin.tool_result_cap
  - module: agentm.extensions.builtin.tool_error_messages
  - module: agentm.extensions.builtin.file_tools
  - module: agentm.extensions.builtin.tool_bash
  - local: slow_tool
  - module: agentm.extensions.builtin.system_prompt
    config:
      prompt: |
        You are a helpful assistant with shell access and a slow_compute tool.
        The slow_compute tool simulates a long-running computation — use it
        when the user asks you to compute something slow. Be concise.
        Reply in the user's language.
