# Single-agent rca eval — 100 cases on the anon-ops/ops-lite HF dataset.
# Ingest first (idempotent):
#   uv run python contrib/scenarios/rca_single/eval/ingest_ops_lite.py
# Then run:
#   uv run rca llm-eval run \
#     contrib/scenarios/rca_single/eval/config_ops_lite_100.yaml \
#     -a agentm -l 100 --ak scenario=rca_single

exp_id: "agentm-rca-single-ops-lite-100"
agent_type: "agentm"
model_name: "Doubao-Seed-2.0-pro"

data:
  dataset: "ops-lite"
  type: "single"
  question_field: "question"
  gt_field: "answer"
  tags: ["ops-lite"]

# Each ops-lite case carries an absolute path on its DatasetSample.meta.path,
# so source_path / source_path_pattern aren't strictly needed — but the
# RCABenchProcesser falls back to meta["path"] when no source_path_fn is
# provided, so we leave them out and let the meta path drive resolution.

concurrency: 5
judge_concurrency: 5

judge_model:
  model_provider:
    type: "chat.completions"
    model: "Doubao-Seed-2.0-pro"
    api_format: "anthropic"
