name: sandbox
description: |
  Tools execute inside an isolated K8s sandbox pod.

  The sandbox pod provides environment isolation (OS, toolchains,
  dependencies) while the agent has complete autonomy inside /workspace.
  The operations atom only creates or attaches the ARL environment; task
  policy such as cloning a repository, configuring git identity, providing
  credentials, pushing branches, or uploading skills belongs in the scenario,
  prompt, image, or ARL config_env payload.

extensions:
  - module: agentm.extensions.builtin.operations
    config:
      backend: agent_env
      work_dir: /workspace

  - module: agentm.extensions.builtin.file_tools
  - module: agentm.extensions.builtin.tool_bash
  - module: agentm.extensions.builtin.system_prompt
    config:
      prompt: |
        You are working inside an isolated ARL agent_env sandbox. Your file
        and shell tools execute in /workspace inside the sandbox, not in the
        host AgentM repository. If the task requires a repository, clone or
        initialize it explicitly before editing. If credentials or mounted
        config are required, use only what the scenario or sandbox environment
        provides.
