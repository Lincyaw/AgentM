name: tau2
description: >
  Scenario for tau2-bench evaluation. Bridges tau2's Gym environment
  into AgentM sessions. One session = one task.
extensions:
  - module: agentm.extensions.builtin.operations
    config:
      backend: local
  - module: agentm.extensions.builtin.observability
  - module: agentm.extensions.builtin.retry_policy
    config:
      retry_streaming: true
      wrap_providers: true
  - module: agentm_eval.benchmarks.tau2.tau2_gym
