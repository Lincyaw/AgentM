name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check src/ contrib/gateway-peers/terminal/src contrib/gateway-peers/feishu/src contrib/extensions/llmharness/src contrib/scenarios/rca/src

      - name: Type check (mypy)
        # The gateway lives in src/ (channels v2 — single process). Chat-client
        # peers ship their own mypy config; check each from its own root so
        # per-package overrides apply.
        run: |
          uv run mypy src/
          cd contrib/gateway-peers/terminal && uv run mypy src/agentm_terminal
          cd ../feishu && uv run mypy src/agentm_feishu
          cd ../../extensions/llmharness && uv run mypy src/llmharness
          cd ../../scenarios/rca && uv run mypy src/agentm_rca

      - name: Tests (pytest)
        run: uv run pytest --tb=short
