name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check src/ contrib/channels/src/ contrib/extensions/llmharness/src contrib/scenarios/rca/src

      - name: Type check (mypy)
        # Workspace members ship their own mypy config; check each from its
        # own root so per-package overrides apply.
        run: |
          uv run mypy src/ contrib/channels/src/
          cd contrib/extensions/llmharness && uv run mypy src/llmharness
          cd ../../scenarios/rca && uv run mypy src/agentm_rca

      - name: Tests (pytest)
        run: uv run pytest --tb=short
