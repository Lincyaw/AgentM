name: Publish to PyPI

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g., 0.2.0)"
        required: true
        default: "0.0.0"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Publishing version: ${VERSION}"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Stamp version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/^version = .*/version = \"${VERSION}\"/" pyproject.toml
          sed -i "s/^version = .*/version = \"${VERSION}\"/" contrib/extensions/agentenv/pyproject.toml
          echo "=== agentm ==="
          grep "^version" pyproject.toml
          echo "=== agentm-agentenv ==="
          grep "^version" contrib/extensions/agentenv/pyproject.toml

      - name: Build agentm
        run: uv build --out-dir dist

      - name: Build agentm-agentenv
        run: uv build --out-dir "${{ github.workspace }}/dist"
        working-directory: contrib/extensions/agentenv

      - name: Publish all packages
        run: uv publish dist/* --trusted-publishing always

      - name: Summary
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "Published to PyPI:"
          echo "  agentm==${VERSION}"
          echo "  agentm-agentenv==${VERSION}"
