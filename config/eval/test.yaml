# AgentM × rcabench-platform v3 — Eval Config Example
# Run: uv run agentm eval config/eval/example.yaml

# Experiment identifier — used to group results in the DB.
# Change this for each new experiment to avoid mixing results.
exp_id: "agentm-v13"

# Agent / model labels written to every result row for filtering in stat.
# model_name is optional — auto-read from scenario orchestrator.model if omitted.
agent_type: "agentm"
# model_name: "gpt-4o"

# Database that stores rollout results, judgements, and stats.
# Defaults to env var LLM_EVAL_DB_URL if not set here.
db_url: "sqlite:///eval.db"

# Dataset to evaluate against.
data:
  dataset: "RCABench"        # dataset name as registered in the DB
  type: "single"             # "single" | "mixed" (multiple benchmarks)
  question_field: "question"
  gt_field: "answer"
  tags:                    # optional: filter samples by tag (OR logic)
    - "openrca2-lite"

# Rollout parallelism.
concurrency: 10

# Cap the number of samples to roll out (null = all).
max_samples: 1

# Judge model — called after rollout to score CausalGraph predictions.
judge_concurrency: 4
judge_model:
  model_provider:
    type: "chat.completions"
    model: "gpt-4o-mini"
    base_url: "https://bobdong.cn/v1"
    api_key: ""
  rate_limit:
    rpm: 500
    tpm: 800000
    max_retries: 20
