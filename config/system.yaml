models:
  gpt-5.1:
    provider: "openai"
    model: "gpt-5.1"
    config:
      base_url: "${OPENAI_BASE_URL:}"
    rate_limit:
      requests_per_second: 20
      max_bucket_size: 50
  gpt-5.1-mini:
    provider: "openai"
    model: "gpt-5.1-mini"
    config:
      base_url: "${OPENAI_BASE_URL:}"
    rate_limit:
      requests_per_second: 20
      max_bucket_size: 50
  MiniMax-M2.5:
    provider: "minimax"
    model: "MiniMax-M2.5"
    rate_limit:
      requests_per_second: 20
      max_bucket_size: 50
  GLM-5:
    provider: "zai"
    model: "GLM-5"
    rate_limit:
      requests_per_second: 20
      max_bucket_size: 50
  "${AGENTM_CUSTOM_ENDPOINT_MODEL:ep-custom}":
    provider: "openai"
    model: "${AGENTM_CUSTOM_ENDPOINT_MODEL:ep-custom}"
    config:
      base_url: "${OPENAI_BASE_URL:}"
    rate_limit:
      requests_per_second: 20
      max_bucket_size: 50
  claude-sonnet-4-6:
    provider: "anthropic"
    model: "claude-sonnet-4-6"
    rate_limit:
      requests_per_second: 20
      max_bucket_size: 50
  deepseek-v3.2:
    provider: "deepseek"
    model: "deepseek-v3.2"
    rate_limit:
      requests_per_second: 20
      max_bucket_size: 50
  claude-haiku-4-5-20251001:
    provider: "anthropic"
    model: "claude-haiku-4-5-20251001"
    rate_limit:
      requests_per_second: 20
      max_bucket_size: 50
  Doubao-Seed-2.0-pro:
    provider: "openai"
    model: "Doubao-Seed-2.0-pro"
    config:
      base_url: "${OPENAI_BASE_URL:}"
    rate_limit:
      requests_per_second: 20
      max_bucket_size: 50 

storage:
  checkpointer:
    backend: "sqlite"
    url: "./checkpoints.db"
  store:
    backend: "memory"
    url: ""

recovery:
  mode: "manual"
  expose_api: true

debug:
  trajectory:
    enabled: true
    output_dir: "./trajectories"
  console_live: false
  verbose: false
