system:
  type: "hypothesis_driven"

orchestrator:
  provider: "openai"
  model: "gpt-5.1"
  temperature: 0.7
  orchestrator_mode: "node"
  max_rounds: 60

  prompts:
    system: "prompts/orchestrator_system.j2"

  skills:
    - "skill/rca-orchestrator-guide"

  tools:
    - dispatch_agent
    - check_tasks
    - update_hypothesis
    - remove_hypothesis
    - update_service_profile
    - query_service_profile
    - inject_instruction
    - abort_task
    - vault_search
    - vault_list
    - vault_read

  feature_gates:
    adversarial_review: false
    parallel_verification: false
    auto_refine_partial: false
    min_verifications_before_confirm: 2
    deep_exploration: false

  compression:
    enabled: false
    compression_threshold: 0.8
    compression_model: "gpt-5.1-mini"
    notebook:
      compression_model: "gpt-5.1-mini"
    recall:
      enabled: false
      model: "gpt-5.1-mini"
      max_messages_per_query: 200

  output:
    prompt: "prompts/output/causal_graph.j2"
    schema_name: "CausalGraph"

  sanitizer:
    enabled: false
    periodic_interval: 5
    drift_window: 3
    block_on: [C1, C2, J3]
    warn_on: [E1, E2, E3, E4, C4, J2, P1]

  monitoring:
    summary_model: "gpt-5.1-mini"
    stream_mode: ["updates", "custom"]

# Worker agent — one definition, task_type selects the prompt
agents:
  worker:
    provider: "openai"
    model: "gpt-5.1"
    temperature: 0.7
    task_type_prompts:
      scout: "prompts/task_types/scout.j2"
      verify: "prompts/task_types/verify.j2"
      deep_analyze: "prompts/task_types/deep_analyze.j2"
    tools:
      - describe_tables
      - query_sql
      - vault_read
    execution:
      max_steps: 40
      timeout: 900
      tool_call_budget: 20
      budget_excluded_tools:
        - vault_read
        - vault_search
        - vault_list
      dedup:
        enabled: false
        max_cache_size: 50
    skills:
      - "skill/diagnose-sql"
      - "skill/rca-worker-guide"
    # compression:
    #   compression_model: "gpt-5.1-mini"
    #   prompt: "prompts/compression/sub_agent_compress.j2"
