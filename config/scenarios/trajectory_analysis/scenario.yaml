system:
  type: "trajectory_analysis"

orchestrator:
  model: "gpt-5.1"
  temperature: 0.7
  orchestrator_mode: "node"
  max_rounds: 40

  prompts:
    system: "prompts/orchestrator_system.j2"

  tools:
    - dispatch_agent
    - check_tasks
    - vault_write
    - vault_read
    - vault_edit
    - vault_delete
    - vault_rename
    - vault_search
    - vault_list
    - vault_backlinks
    - vault_traverse
    - vault_lint
    - jq_query

  output:
    prompt: "prompts/output/analysis_report.j2"
    schema_name: "AnalysisReport"

agents:
  worker:
    model: "gpt-5.1-mini"
    temperature: 0.7
    prompt: "workers/trajectory-reader.md"
    task_type_prompts:
      critique: "workers/analysis-critic.md"
    tools:
      - jq_query
      - vault_read
      - vault_search
      - vault_list
      - vault_backlinks
      - vault_traverse
      - load_case_data
      - describe_tables
      - query_sql
    execution:
      max_steps: 60
      timeout: 180
