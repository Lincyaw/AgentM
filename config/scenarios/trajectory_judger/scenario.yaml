system:
  type: "trajectory_judger"

orchestrator:
  provider: "openai"
  model: "gpt-5.1-mini"
  temperature: 0.3
  orchestrator_mode: "node"
  max_rounds: 10

  prompts:
    system: "prompts/orchestrator_system.j2"

  tools:
    - jq_query

  skeleton:
    exclude_tools: ["think", "reflect"]
    max_args_length: 500
    response_preview_length: 100

agents:
  worker:
    provider: "openai"
    model: "gpt-5.1-mini"
    temperature: 0.3
    prompt: "prompts/worker.md"
    tools:
      - jq_query
    execution:
      max_steps: 30
      timeout: 120
