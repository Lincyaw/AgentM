system:
  type: "memory_extraction"

orchestrator:
  model: "gpt-5.1"
  temperature: 0.3
  orchestrator_mode: "node"
  max_rounds: 20

  prompts:
    system: "prompts/orchestrator_system.j2"

  tools:
    - dispatch_agent
    - check_tasks
    - vault_write
    - vault_read
    - vault_edit
    - vault_delete
    - vault_rename
    - vault_search
    - vault_list
    - vault_backlinks
    - vault_traverse
    - vault_lint
    - read_trajectory
    - get_checkpoint_history

  output:
    prompt: "prompts/output/knowledge_summary.j2"
    schema_name: "KnowledgeSummary"

agents:
  worker:
    model: "gpt-5.1-mini"
    temperature: 0.2
    task_type_prompts:
      extract: "prompts/task_types/extract.j2"
    tools:
      - read_trajectory
      - get_checkpoint_history
      - vault_read
      - vault_search
      - vault_list
      - vault_backlinks
      - vault_traverse
      # Workers are read-only — no vault_write/vault_edit/vault_delete
    execution:
      max_steps: 20
      timeout: 120
      subgraph_mode: "node"
