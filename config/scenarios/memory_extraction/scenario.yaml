system:
  type: "memory_extraction"

orchestrator:
  model: "gpt-5.1"
  temperature: 0.3
  orchestrator_mode: "node"
  max_rounds: 20

  prompts:
    system: "prompts/orchestrator_system.j2"

  tools:
    - dispatch_agent
    - check_tasks
    - knowledge_search
    - knowledge_list
    - knowledge_read
    - knowledge_write
    - read_trajectory
    - get_checkpoint_history

  output:
    prompt: "prompts/output/knowledge_summary.j2"
    schema_name: "KnowledgeSummary"

agents:
  worker:
    model: "gpt-5.1-mini"
    temperature: 0.2
    task_type_prompts:
      extract: "prompts/task_types/extract.j2"
    tools:
      - read_trajectory
      - get_checkpoint_history
      - knowledge_search
      - knowledge_list
      - knowledge_read
      # No knowledge_write — workers are read-only
    execution:
      max_steps: 20
      timeout: 120
      subgraph_mode: "node"
