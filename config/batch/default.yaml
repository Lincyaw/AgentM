# Judge batch configuration
#
# Usage:
#   agentm judge config/batch/default.yaml
#   agentm judge config/batch/default.yaml --filter all --limit 30
#   agentm judge config/batch/default.yaml --exp-id agentm-v12

# Data source — "directory" reads local JSON files, "database" queries eval DB
source:
  type: "directory"                    # "directory" or "database"
  directory: "./eval-trajectories"     # used when type=directory
  filter: "incorrect"                  # incorrect | correct | all
  # exp_id: "agentm-v11"              # filter by experiment ID
  # agent_type: "agentm"              # filter by agent type
  # limit: 50                         # max total cases
  data_base_dir: "/mnt/jfs/rcabench_dataset/"   # base dir for observability data (resolved via _eval_meta.source)

concurrency: 1                         # parallel judge workers

scenario: "config/scenarios/trajectory_analysis"
system_config: "config/system.yaml"
