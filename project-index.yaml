requirements:
  - id: REQ-219-v2-trajectory-runtime-integrity
    title: V2 trajectory runtime preserves durable and live session integrity
    description: >
      Trigger execution must fail-stop after an indeterminate turn failure, close
      terminal queues, publish receipts only after durable trajectory and effect
      commits, and wait for synchronous store commits to reach a known outcome
      despite task cancellation. Effect snapshots must exclude SDK control-plane
      persistence, unpublished world/resource rollback must be serialized, and
      rebuildable node projection failures must not prevent effect commit after the
      authoritative turn append. JSONL stores must recover torn tails without
      corrupting framing, serialize competing appenders, and isolate codec
      registries. Spawn, fork, resume, and graph rebuild must preserve execution
      restrictions, avoid event-loop-blocking store calls, and reconstruct lineage
      independently of metadata enumeration order. Process and environment tool
      executors must use explicit typed adapters, safe portable wire data, and
      terminate-and-reap subprocesses on both signal and caller cancellation.
      Tool results and orchestration states must be immutable, JSON-portable,
      internally consistent, and propagate caller cancellation without detached
      work or stale post-hook observations. Project-specific AST checks must
      prevent runtime composition policy, legacy extension shapes, dynamic
      attribute probing, untyped ABI contracts, and standard-library logging
      from re-entering the SDK, while allowing precise documented ignores at
      genuine dynamic boundaries. Gateway wire DTOs, durable delivery/auth/session
      ports, observability parsing, and SQL driver adapters must remain outside
      core and fail at their transport or persistence boundaries.
    priority: P0
    status: tested
    confidence: confirmed
