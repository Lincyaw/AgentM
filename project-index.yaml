      the agent keeps taking turns. Bounded (``max_workers=N``) and unbounded
      (``max_workers=None``) contracts: the unbounded mode short-circuits all
      slot accounting; the bounded mode raises ``SlotLimitReached`` at N+1.
      Today consumed by ``sub_agent`` (bounded) and ``background_exec``
      (unbounded).
