    title: Shared LLM provider stream accumulator and tool spec adapters
    description: >
      Anthropic and OpenAI-compatible providers must share stream assembly,
      tool-argument JSON encoding, tool-call argument parse-error signaling,
      and real timestamp stamping while keeping provider-specific code limited
      to event mapping and vendor tool-spec adaptation. Anthropic tool-result
      message packing must remain a single linear pass.
    priority: P0
    status: tested
    confidence: confirmed
