requirements:
  - id: REQ-086-atom-rework-infra
    title: Atom rework infrastructure surface and validator hardening
    description: >
      ExtensionAPI and core.lib must expose additive surfaces needed by the
      upcoming atom rework: typed event observation, kwargs-based child session
      spawning, per-session service registration, resource writer version
      lookup, and shared JSON serialization. The atom validator must reject
      private API reflection, ExtensionAPI attribute overwrites, mutable module
      globals without Final, and f-string dynamic imports under agentm.*.
    priority: P0
    status: tested
    confidence: confirmed
    code:
      - path: src/agentm/core/abi/events.py
      - path: src/agentm/core/abi/resource.py
      - path: src/agentm/core/lib/serialization.py
      - path: src/agentm/core/lib/__init__.py
      - path: src/agentm/harness/extension.py
      - path: src/agentm/harness/resource_writer.py
      - path: src/agentm/harness/session.py
      - path: src/agentm/extensions/validate.py
      - path: src/agentm/extensions/builtin/inherit_provider.py
    tests:
      - path: tests/unit/extensions/test_observability.py
      - path: tests/unit/harness/test_extension_api_infra.py
      - path: tests/unit/core/lib/test_serialization.py
      - path: tests/unit/extensions/test_extension_contract.py
      - path: tests/integration/test_resource_writer.py
    docs:
      - path: .claude/designs/extension-as-scenario.md
      - path: .claude/designs/self-modifiable-architecture.md
      - path: .claude/tasks/2026-05-09-issue-86-atom-rework-infra.md
    depends_on: []

  - id: REQ-079-atom-reloader-fail-stop
    title: Atom reloader fail-stop hardening
    description: >
      Atom reload must preserve the previous live atom state when rollback also
      fails, use native async reload/install/freeze boundaries, unregister
      reloader-owned bus subscriptions during session shutdown, and track atom
      registration ownership uniformly by kind.
    priority: P0
    status: tested
    confidence: confirmed
    code:
      - path: src/agentm/harness/atom_reloader.py
      - path: src/agentm/harness/session.py
    tests:
      - path: tests/unit/harness/test_transactional_reload.py
    docs:
      - path: .claude/designs/self-modifiable-architecture.md
      - path: .claude/tasks/2026-05-09-issue-79-atom-reloader-hardening.md
    depends_on: []

  - id: REQ-087-builtin-atoms-extension-api
    title: Builtin atoms consume ExtensionAPI C-1 capabilities
    description: >
      The observability, sub_agent, artifact_store, micro_compact, and
      llm_compaction atoms must consume the additive C-1 ExtensionAPI/core.lib
      surfaces instead of private bus mutation, harness config construction,
      writer type checks, module-level service registries, hard-coded builtin
      module paths, or local JSON serialization ladders. The sub_agent atom
      remains a single file for this round; revisit splitting only at or above
      1500 lines.
    priority: P0
    status: tested
    confidence: confirmed
    code:
      - path: src/agentm/core/abi/events.py
      - path: src/agentm/core/abi/__init__.py
      - path: src/agentm/harness/extension.py
      - path: src/agentm/harness/atom_reloader.py
      - path: src/agentm/extensions/builtin/observability.py
      - path: src/agentm/extensions/builtin/sub_agent.py
      - path: src/agentm/extensions/builtin/artifact_store.py
      - path: src/agentm/extensions/builtin/micro_compact.py
      - path: src/agentm/extensions/builtin/llm_compaction.py
      - path: contrib/scenarios/rca/src/agentm_rca/tools/hypothesis_tools.py
    tests:
      - path: tests/integration/test_artifact_store.py
      - path: tests/unit/extensions/test_compaction_atoms.py
      - path: tests/integration/test_observability_cli.py
      - path: tests/integration/test_sub_agent_budgets.py
      - path: tests/integration/test_sub_agent_lifecycle.py
      - path: tests/unit/extensions/test_extension_contract.py
      - path: tests/unit/harness/test_extension_api_infra.py
      - path: tests/unit/extensions/test_observability.py
      - path: tests/unit/harness/test_transactional_reload.py
    docs:
      - path: .claude/designs/observability.md
      - path: .claude/designs/sub-agent-lifecycle.md
      - path: .claude/designs/artifact-system.md
      - path: .claude/tasks/2026-05-09-issue-87-builtin-atoms-extension-api.md
    depends_on:
      - REQ-086-atom-rework-infra

