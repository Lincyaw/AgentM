  - id: REQ-197-terminal-mainline-workflow-ux
    title: Terminal TUI keeps parent conversation primary during workflows
    description: >
      The Go terminal peer must treat workflow/sub-agent sessions as background
      activity until the user explicitly opens them, keeping the parent
      conversation focused instead of exposing a tab-management surface for
      every spawned worker. Background workflow tabs must be summarized in the
      status bar with a discoverable next-tab shortcut while they are new,
      running, or waiting for input, and completed workflow rows must disappear
      from the bottom task surface instead of accumulating. Auto-backgrounded
      tool work and monitor/wakeup state must use the same bottom surface as
      structured activity rows without being promoted into tabs. The composer should
      follow chat-first terminal semantics:
      Enter sends, Enter queues cooperatively while the active agent is busy,
      Shift+Enter/Ctrl+j inserts a newline, `?` opens shortcuts from an empty
      editor, `/` and `@` expose inline command/file completions that keep
      filtering candidates as the user types, left arrow cycles agents from an
      empty editor, Esc interrupts or asks for a second press before clearing
      input, and Ctrl+C uses a second-press exit confirmation instead of a
      focus-stealing modal.
      The legacy right-side session sidebar is removed from the primary terminal
      layout, and transient notifications should render as compact Claude-style
      status hints rather than large bottom-right cards.
    priority: P1
    status: implemented
    confidence: confirmed
    code:
