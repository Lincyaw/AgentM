  - id: REQ-100-cc-extension-package
    title: Claude Code compatibility atoms share a package boundary
    description: >
      The Claude Code compatibility atoms must be mounted explicitly as the
      `contrib.extensions.cc` package, with agents, commands, and plugins as
      tier-2 single-file atoms. Markdown frontmatter parsing for command skill
      records is shared inside the package, plugin command discovery flows
      through the typed ResourcesDiscoverEvent contract instead of an
      extra_skills workaround, and sub-agent availability XML rendering is
      centralized in core.lib for reuse by RCA.
    priority: P0
    status: tested
    confidence: confirmed
