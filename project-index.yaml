      - path: tests/integration/test_cli_slash_commands.py
      - path: tests/unit/core/catalog/test_indexer.py
      - path: tests/unit/extensions/test_extension_contract.py
    docs:
      - path: .claude/designs/pluggable-architecture.md
      - path: .claude/tasks/2026-05-09-issue-85-session-refactor.md
      - path: .claude/tasks/2026-05-09-issue-85-review-follow-up.md
