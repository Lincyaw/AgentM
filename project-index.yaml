requirements:

  - id: REQ-177-full-compress-compaction
    title: Full-compress context compaction with turn-addressed recall
    description: >
      Context compaction summarizes every turn since the previous compaction
      into a single user message that replaces prior context (no verbatim
      tail), chained incrementally onto the previous summary and tagged with
      [Turn N] markers. Turn numbering is shared via core.lib.enumerate_turns
      so the read_history tool returns verbatim content of any cited turn from
      the live session branch. should_compact disables itself when
      reserve_tokens >= context_window instead of firing every turn.
    priority: P1
    status: tested
    confidence: confirmed
    code:
      - path: src/agentm/core/lib/turns.py
      - path: src/agentm/core/abi/compaction.py
      - path: src/agentm/extensions/builtin/llm_compaction.py
      - path: src/agentm/extensions/builtin/compaction_prompts.py
      - path: src/agentm/extensions/builtin/read_history.py
    tests:
      - path: tests/unit/extensions/test_compaction_full_compress.py
      - path: tests/unit/core/test_compaction_descenario.py
    docs:
      - path: .claude/designs/compaction.md
    depends_on: []

