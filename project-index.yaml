  - id: REQ-198-terminal-one-command-gateway
    title: AgentM CLI can launch a gateway-backed terminal in one command
    description: >
      The `agentm terminal` command must start or reuse a local gateway daemon,
      wait for its gateway endpoint, connect the `agentm-terminal` TUI to it, and
      write gateway/supervisor logs to a deterministic file. The daemon is a
      lightweight Python supervisor around a gateway worker: it keeps the client
      endpoint stable and keeps the worker fixed by default so in-memory
      sessions survive source edits. When `--reload` is explicit, it restarts
      the worker when watched source/config files change so SDK/session code
      updates apply without manually restarting the TUI. Each `agentm terminal`
      launch must get a fresh terminal session
      by default, so multiple TUI windows attached to the same daemon do not
      share a `terminal:<session-id>` session unless the user explicitly passes a
      session id. `--private-gateway` preserves the old one-terminal-one-gateway
      lifecycle. The Go terminal peer remains a wire-only client; advanced users
      can still connect it to an external gateway explicitly. The daemon can also
      bind ws/wss for remote terminal clients, persists the active connect URL
      for status/reuse, and enables token-file authentication by default unless
      anonymous mode is explicit. Stale
      chat-to-session mappings must be discarded automatically when their target
      session file no longer exists, so a terminal can recover by starting a
      fresh session instead of surfacing a raw FileNotFoundError. The standalone
      `ag` terminal binary exposes a compact long-option CLI, including
      `--scenario <name>` for validated scenario selection, and intentionally
      stays an interactive TUI surface rather than adding structured output
      modes that belong to the Python CLI/SDK.
    priority: P1
    status: implemented
    confidence: confirmed
