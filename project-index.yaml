  - id: REQ-176-background-exec-atom
    title: Builtin background_exec atom — auto-background overran tool calls
    description: >
      The ``background_exec`` atom wraps every registered tool in an auto-bg
      shim: fast calls return unchanged; overruns and pending core-inbox input
      move the running tool to a detached task and return a ticket plus
      inbox-driven progress reports (ticker + completion milestone). Companion
      tools ``check_background`` / ``wait_background`` / ``cancel_background``
      poll the registry and are never themselves auto-backgrounded; a
      timed-out ``wait_background`` returns running status rather than creating
      a second detached wait task. ``cancel_background`` must propagate through
      the per-task abort signal to local bash process groups so nested commands
      such as shell-managed ``sleep`` processes are killed. A session_shutdown
      handler drains running tasks under a configurable grace. The shim keeps
      its session-state wrapper on the event loop but executes the wrapped tool
      through the core tool executor, preserving the wrapped tool's own
      ``execution_domain`` metadata.
    priority: P0
    status: tested
    confidence: confirmed
    code:
      - path: src/agentm/extensions/builtin/_operations/local.py
      - path: src/agentm/extensions/builtin/background_exec.py
    tests:
