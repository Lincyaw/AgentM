  - id: REQ-196-workgraph-filesystem-orchestration
    title: WorkGraph filesystem orchestration scenario
    description: >
      The contrib workgraph scenario must provide a long-lived main
      orchestrator agent that talks with the user, maintains a lightweight
      filesystem task bus under ``.agentm/workgraph/``, and launches
      short-lived ARL-backed development workflows for individual ready tasks.
      The main orchestrator must have skill discovery, prompt templates,
      history compaction, explicit history recall, and terminal TUI snapshot
      support so it can operate as a durable chat-facing controller rather than
      a one-shot worker.
      The task bus must use Markdown task files and simple directories for
      ready, running, verified, merging, merge_pending, done, failed,
      conflicts, locks, and results state instead of a rigid database schema.
      The development workflow must claim dependency-
      satisfied tasks, honor file/resource locks so parallel work does not
      trample shared areas, launch coder and verifier child agents with only
      per-task context in isolated ``agent_env`` sandboxes, let those workers
      own git clone/branch/rebase/push/PR operations, load durable workflow
      defaults such as repo, base, parallelism, and agent_env settings from
      the task bus config file, forward controller git token variables or a
      runtime ``gh auth token`` result through the agent-env ``config_env``
      interface when present, reuse a task's reported ARL session for verifier
      and follow-up
      worker calls within the same workflow pass, require a visible remote
      branch or PR before accepting a coder success, and persist each worker's
      final free-text report as the delivery artifact. Verifier-passed remote
      branches or PRs must move to a verified queue instead of done; a separate
      ARL-backed merge
      workflow must serialize merges by repo/base, delegate rebase and GitHub
      merge operations to a merge agent, accept a verified remote branch even
      when no PR exists yet, create the PR before merging when needed, move
      merged tasks to done, park GitHub auto-merge tasks in merge_pending, and
      route non-mechanical merge conflicts to conflicts. Conflicted work must be
      routed to a conflict queue so
      the main orchestrator can decide whether to launch a resolver or ask for
      human intervention.
    priority: P1
    status: implemented
    confidence: confirmed
    code:
      - path: contrib/scenarios/workgraph/main/manifest.yaml
      - path: contrib/scenarios/workgraph/agents/coder/manifest.yaml
