  - id: REQ-185-process-tool-executor
    title: Process tool execution domain is killable and event-loop safe
    description: >
      Tools declaring ``metadata["execution_domain"] = "process"`` must run in
      a child process owned by the substrate executor rather than on the
      session event loop. The parent watches a result pipe and the session
      signal; signal or coroutine cancellation sets the child signal, then
      escalates through ``terminate()`` and ``kill()`` before ``join()`` so a
      non-cooperative blocking tool cannot strand the core session. The process
      domain is spawn-backed and is a kill boundary, not shared runtime state:
      process-domain tools must be pickleable/importable and must not rely on
      child writes to parent bus/session/API objects.
    priority: P0
    status: tested
    confidence: confirmed
