requirements:
  - id: REQ-219-v2-trajectory-runtime-integrity
    title: V2 trajectory runtime preserves durable and live session integrity
    description: >
      Trigger execution must fail-stop after an indeterminate turn failure, close
      terminal queues, publish receipts only after durable trajectory and effect
      commits, and wait for synchronous store commits to reach a known outcome
      despite task cancellation. JSONL stores must recover torn tails without
      corrupting framing, serialize competing appenders, and isolate codec
      registries. Spawn, fork, resume, and graph rebuild must preserve execution
      restrictions, avoid event-loop-blocking store calls, and reconstruct lineage
      independently of metadata enumeration order.
    priority: P0
    status: tested
    confidence: confirmed
