  - id: REQ-120-harness-reload-state-preservation
    title: Harness reload uses immutable snapshot for double-failure rollback
    description: >
      Atom reload's claim of "transactional" must be backed by a single
      pre-reload immutable snapshot covering loaded-atom registries, per-atom
      handler/registration tracking, owners-by-kind, all extension registries,
      apis dict, sys.modules entry, and bus subscriptions. On apply failure
      the reloader first attempts in-place re-install of the original atom;
      if that rollback itself raises, restore_from_snapshot writes back every
      mutable structure from the snapshot's pre-copied data so the live agent
      lands in an entirely pre-reload state rather than half-new / half-old.
      The session_factory's three-section builtin/contrib/user auto-discovery
      collapses into a single iteration over an AtomSource iterable.
