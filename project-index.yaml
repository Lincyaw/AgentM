  - id: REQ-096-cli-provider-session-seams
    title: CLI presenter consumes provider registry and session-store ports
    description: >
      CLI and TUI presenter construction must not encode the provider universe
      or JSONL session lookup format inline. Provider extension specs and
      defaults come from ProviderRegistry descriptors, CLI resume/continue
      flows consume the SessionStore protocol with JsonlSessionStore as the
      default implementation, shared diagnostic/session-config helpers remove
      duplicated presenter wiring, and Textual must clone AgentSessionConfig
      through a public with_bus helper instead of reflecting on __dict__.
    priority: P1
    status: tested
    confidence: confirmed
