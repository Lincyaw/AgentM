  - id: REQ-089-file-tool-io-seams
    title: File tool atoms use documented read and write seams
    description: >
      Builtin file tool atoms must use the documented hybrid IO seam: read-only
      tools consume FileOperations through ExtensionAPI operations, while write
      tools consume ResourceWriter exclusively so scenario overrides and managed
      resource protections intercept all file mutations consistently.
    priority: P0
    status: tested
    confidence: confirmed
    code:
