  - id: REQ-176-monitor-atom
    title: Builtin monitor atom — agent-defined wakeups + channel subscriptions
    description: >
      The ``monitor`` atom exposes ``schedule_wakeup`` (one-shot timer →
      inbox push at now+delay) and ``create_monitor`` in three
      mutually-exclusive forms: a bus channel subscription (``watch`` →
      inbox push on each fire) and a recurring condition poll (``condition``
      → re-post the free-text predicate every ``poll_interval`` seconds so
      the agent re-evaluates and cancels when satisfied; #178), plus a
      persistent gateway cron schedule (``cron`` + required ``note``) when the
      host injects the optional scheduler service. Non-cron monitors fire
      under a stable dedup_key. ``create_monitor`` refuses kernel-control
      channels at the call site (denylist of channels like ``context`` /
      ``decide_turn_action`` that would create an unbreakable inbox/loop
      spin) and clamps a condition ``poll_interval`` up to a configured floor
      so the agent cannot wedge a tight re-poll spin. Non-cron state is
      per-session and in-memory; cron state is durable gateway state and can be
      deleted through ``cancel_monitor(schedule:<job_id>)``.
    priority: P0
    status: implemented
    confidence: confirmed
    code:
      - path: src/agentm/core/abi/roles.py
      - path: src/agentm/core/abi/__init__.py
      - path: src/agentm/extensions/builtin/monitor.py
      - path: src/agentm/gateway/runtime.py
