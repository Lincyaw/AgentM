  - id: REQ-199-gateway-durable-schedule
    title: Gateway durable scheduled prompts
    description: >
      The gateway owns durable, host-level scheduled prompts for chat sessions:
      jobs are persisted under the gateway state directory, target a
      ``session_key`` plus routing metadata, accept standard 5-field cron
      expressions, and fire by enqueueing a synthetic prompt into the target
      session's inbox through the same path as external inbound messages.
      If the target session is not live, the gateway resumes it via
      ``ChatSessionMap``; if the session is already running, the prompt waits
      for the normal inbox turn boundary. Users can manage jobs through
      gateway `/schedule`, and agents can create session-bound durable cron
      monitors through ``create_monitor(cron=..., note=...)`` when the gateway
      injects the scheduler service. Session-local ``monitor`` wakeups,
      condition polls, and channel subscriptions stay in-memory and do not
      manage host crontab state.
