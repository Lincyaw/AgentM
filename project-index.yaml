  - id: REQ-092-retry-transport-policy
    title: Retry and transport policy are pluggable provider services
    description: >
      LLM provider retry behavior must be supplied through a core RetryPolicy
      port and a builtin retry_policy atom instead of provider-local module
      globals, string-sniffed rate-limit checks, or OpenAI-only wire retries.
      OpenAI and Anthropic providers must accept injected retry policies with
      provider-typed retry predicates, and security-relevant transport overrides
      such as verify_ssl=False must emit visible diagnostics at composition time.
    priority: P0
    status: tested
    confidence: confirmed
    code:
