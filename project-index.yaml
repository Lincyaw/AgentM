  - id: REQ-176-session-inbox
    title: SessionInbox spine + persistent driver
    description: >
      The runtime owns a per-session FIFO ``SessionInbox`` (substrate, not
      atom) that is the single entry point for messages reaching the loop —
      user prompts and atom-pushed items (background completions, monitor
      fires, sub_agent findings). A persistent driver task is the SOLE
      caller of ``_loop.run``; ``prompt`` and ``tick`` push to the inbox and
      wait on the next ``agent_end``. The runtime registers two handlers
      (``context`` drain + ``decide_turn_action`` keep-alive floor) that
      generalize the legacy per-atom completion-injection paths. Concurrent
      ``prompt`` callers FIFO-serialize through an ``asyncio.Lock``.
      ``AgentSession.idle()`` blocks until the session is truly at rest —
      driver parked, inbox empty, and no tracked detached background unit
      still running — so a one-shot host (``agentm -p``) waits out a late
      background/subagent completion instead of dropping it onto a dead event
      loop (#179). Producers bracket their detached unit with
      ``ExtensionAPI.track_background``; recurring signals (monitor / ticker)
      deliberately do not track. ``idle(timeout=...)`` accepts an optional
      bound (the one-shot CLI passes a generous default): on trip it returns
      ``False`` without raising so a leaked counter or a stuck background unit
      becomes a visible warning + clean exit rather than a silent permanent
      hang, while ``timeout=None`` keeps the unbounded #179 semantics (#201).
    priority: P0
    status: implemented
    confidence: confirmed
    code:
      - path: src/agentm/core/runtime/session_inbox.py
      - path: src/agentm/core/runtime/session.py
      - path: src/agentm/core/lib/shutdown.py
      - path: src/agentm/cli.py
    tests:
      - path: tests/unit/core/test_session_inbox.py
    docs:
      - path: .claude/designs/session-inbox.md
    depends_on:
      - REQ-086-atom-rework-infra

  - id: REQ-176-background-tasks-registry
