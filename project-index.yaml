  - id: REQ-119-core-kernel-residuals
    title: Core kernel removes hard-coded layout literals and dead Tool surface
    description: >
      The core kernel must not hard-code project-scope filesystem layout: the
      ``.agentm/skills`` and ``.agentm/prompts`` fallbacks in
      ``core._internal.skills`` and ``core._internal.prompt_templates`` are
      removed, with project-scope directories supplied exclusively through
      ``ProjectLayout``. The agent loop must expose a single
      ``_default_action`` helper that takes paired ``(tool_name, ToolOutcome)``
      tuples — the duplicated unnamed variant is gone. The ``Tool.execute``
      Protocol must not advertise an ``on_update`` parameter that the kernel
      never wires; the parameter is dropped from the Protocol and from every
      builtin/internal implementation until a real progress channel ships.
      Tool execution must enter through the substrate executor rather than
      inline ``tool.execute``: the default ``event_loop`` domain creates an
      explicit asyncio task boundary, the ``thread`` domain runs the tool
      coroutine in a worker-thread event loop to protect core sessions from
      event-loop starvation, the ``process`` domain gives a killable child
      process boundary for non-cooperative blocking tools, and reserved
      ``sandbox`` fails loudly until resource-isolated execution is
      implemented. Runtime sessions emit rate-limited diagnostics when the
      event loop watchdog observes sustained lag.
    priority: P1
    status: implemented
    confidence: confirmed
