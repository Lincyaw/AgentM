requirements:
  - id: REQ-219-v2-trajectory-runtime-integrity
    title: V2 trajectory runtime preserves durable and live session integrity
    description: >
      Trigger execution must fail-stop after an indeterminate turn failure, close
      terminal queues, publish receipts only after durable trajectory and effect
      commits, and wait for synchronous store commits to reach a known outcome
      despite task cancellation. Effect snapshots must exclude SDK control-plane
      persistence and unpublished world/resource rollback must be serialized.
      Turn, message-index, and head publication must succeed or roll back as one
      store mutation before resource/effect commit. JSONL stores must recover torn tails without
      corrupting framing, serialize competing appenders, and isolate codec
      registries. Spawn, fork, resume, and graph rebuild must preserve execution
      restrictions, avoid event-loop-blocking store calls, and reconstruct lineage
      independently of metadata enumeration order. Process and environment tool
      executors must use explicit typed adapters, safe portable wire data, and
      terminate-and-reap subprocesses on both signal and caller cancellation.
      Tool results and orchestration states must be immutable, JSON-portable,
      internally consistent, and propagate caller cancellation without detached
      work or stale post-hook observations. Project-specific AST checks must
      prevent runtime composition policy, legacy extension shapes, dynamic
      attribute probing, `Any` or bare-dict annotations in all scanned source,
      and standard-library logging from re-entering the SDK, while allowing
      precise documented ignores at genuine dynamic boundaries. Gateway wire
      DTOs, durable delivery/auth/session ports, observability parsing, and SQL
      driver adapters must remain outside core and fail at their transport or
      persistence boundaries. StreamFn owns the shared ThinkingLevel ABI used
      by providers, retry policies, sessions, and drivers. Provider
      requests that exhaust retries must persist a non-replayable failed turn
      before the trigger receipt raises, so trajectory inspection never shows
      only an unexplained session header. Every materialized execution step
      must replace an explicit incomplete checkpoint in the selected
      trajectory store. Checkpoints remain queryable after a crash but are
      excluded from resume, context replay, compaction, and message-index queries;
      final append atomically supersedes the matching checkpoint. Successful
      SDK resume compare-and-discards the observed orphan checkpoint only after
      identity, resource, and environment recovery, so a new turn can start
      without replaying or silently overwriting incomplete work.
      Public SDK users select one authoritative trajectory backend. The same
      transaction owns checkpoints, committed turns, message indexes, heads,
      and cache/compaction state; there is no separately selectable or
      rebuildable node store. A configured DSN/path applies to that one port;
      core factories do not discover backends, and resolver-owned resources
      remain alive across sharing descendants. Portable node index declarations
      include tool-call/name, content-reference, and visibility lookups; SQL
      stores materialize them natively while scan stores preserve semantics.
      Compaction publishes its compact boundary, content-replacement state,
      and head advance as one store mutation anchored to the latest committed
      turn. Node/head fork selectors preserve the exact logical-parent anchor
      but are executable only at committed turn boundaries; context projection
      cannot turn a mid-turn message into an external-world snapshot.
      Synchronous store mutations settle to a known backend outcome before
      async caller cancellation propagates. Rollback participants likewise
      settle in effect-before-resource order while preserving any cancellation
      observed during cleanup for propagation after the cleanup boundary.
      External hosts inject
      EnvironmentOperations and ResourceWriter through public SDK fields;
      resource-scoped operation bindings inherit across ordinary children and
      can be explicitly replaced for another environment without ambient
      globals. File tools share one I/O-free planner across environments and
      perform all reads and planned mutations through the active ResourceTxn
      or ResourceWriter, with no bash/CLI fallback or second state authority.
      Exact, quote-normalized, and whitespace-normalized edit matching are
      ordered text-equivalence strategies inside that planner and never change
      the selected resource backend or bypass stale/unique checks.
      Driver cancellation inputs are construction-time invariants and cannot
      degrade to disconnected internal cancel sources. Every composed session
      owns one replaceable ToolOrchestrator before the driver starts; reaction
      execution never installs a hidden fallback. Construction treats
      replaceable Protocol objects as absent only when they are None, never
      because an implementation is falsey. Tools without declared
      execution requirements receive the ABI's explicit neutral in-process
      contract before orchestration. Omitting retry policy means one direct
      provider attempt rather than installation of a no-op policy
      implementation. Explicit OTLP export fails session setup when its sink
      cannot attach; only the named auto mode may choose local diagnostics.
      Prompt-cache policy never advertises provider support through a no-op
      adapter. Extension manifests reject unknown contract fields.
    priority: P0
    status: tested
    confidence: confirmed
